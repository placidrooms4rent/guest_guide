document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r-neutral-200: #eee7db;\n  --color-neutral-300: #dcd3c4;\n  --color-neutral-400: #c0b6a5;\n  --color-neutral-500: #a19786;\n  --color-neutral-600: #82796a;\n  --color-neutral-700: #645c50;\n  --color-neutral-800: #474238;\n  --color-neutral-900: #2e2b25;\n\n  --color-accent-100: #fff2eb;\n  --color-accent-200: #ffe1d0;\n  --color-accent-300: #ffc6a5;\n  --color-accent-400: #f6a06b;\n  --color-accent-500: #d67f48;\n  --color-accent-600: #b2622d;\n  --color-accent-700: #8c491a;\n  --color-accent-800: #643312;\n  --color-accent-900: #402310;\n\n  --color-accent-2-100: #f0fae1;\n  --color-accent-2-200: #e1eecc;\n  --color-accent-2-300: #ccdbb2;\n  --color-accent-2-400: #aebf92;\n  --color-accent-2-500: #8fa073;\n  --color-accent-2-600: #728157;\n  --color-accent-2-700: #56633f;\n  --color-accent-2-800: #3d472b;\n  --color-accent-2-900: #272e1b;\n\n  --font-heading: \"Caprasimo\", system-ui, sans-serif;\n  --font-heading-weight: 400;\n  --font-body: \"Figtree\", system-ui, sans-serif;\n\n  --space-1: 4.4px;\n  --space-2: 8.8px;\n  --space-3: 13.2px;\n  --space-4: 17.6px;\n  --space-6: 26.4px;\n  --space-8: 35.2px;\n\n  --radius-sm: 8px;\n  --radius-md: 16px;\n  --radius-lg: 28px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2e2b25 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2e2b25 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2e2b25 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.washed{filter:saturate(0.6) contrast(0.85) brightness(1.1) opacity(0.94)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n/* — rounded frame: everything softens, small controls go pill — */\n.card, .dialog { border-radius: calc(var(--radius-lg) * 1.15); }\n.btn, .tag, .seg, .input { border-radius: 0 7 0c0-1-.4-2-1-3\"><\u002Fpath><path d=\"M15.5 14.5c1.5 2 3 3.5 3 5.5a3.5 3.5 0 0 1-7 0c0-1 .4-2 1-3\"><\u002Fpath><\u002Fsvg><span>{{ t.leaving.gb4 }}<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <h4 style=\"margin-top:22px;\">{{ t.leaving.beforeHeading }}<\u002Fh4>\n  <div class=\"ph-check-group\" style=\"margin:14px 0;\">\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c1 }}<\u002Fspan><\u002Fdiv>\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c2 }}<\u002Fspan><\u002Fdiv>\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c3 }}<\u002Fspan><\u002Fdiv>\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c4 }}<\u002Fspan><\u002Fdiv>\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c5 }}<\u002Fspan><\u002Fdiv>\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c6 }}<\u002Fspan><\u002Fdiv>\n    <div class=\"ph-check\"><span class=\"ph-checkbox\"><\u002Fspan><span>{{ t.leaving.c7 }}<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ph-callout\" style=\"background:var(--color-neutral-200);margin-top:26px;\">\n    <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-text)\" stroke-width=\"2.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"8\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M11 11 21 21\"><\u002Fpath><path d=\"M17 17l2-2\"><\u002Fpath><path d=\"M14 14l2-2\"><\u002Fpath><\u002Fsvg>\n    <div><strong style=\"display:block;margin-bottom:2px;\">{{ t.leaving.leftTitle }}<\u002Fstrong><span style=\"font-size:14px;opacity:0.85;\">{{ t.leaving.leftBody }}<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  \n<\u002Fsection>\n\n<section id=\"thanks\" style=\"margin-top:36px;min-height:6in;display:flex;flex-direction:column;justify-content:center;\">\n  <h6 style=\"color:var(--color-accent-700);letter-spacing:0.14em;\">{{ t.thanks.kicker }}<\u002Fh6>\n  <h1 style=\"margin-bottom:10px;\">{{ t.thanks.title }}<\u002Fh1>\n  <div class=\"ph-callout\" style=\"background:var(--color-accent-2-100);color:var(--color-accent-2-800);max-width:56ch;margin-bottom:26px;\">\n    <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"><\u002Fpath><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z\"><\u002Fpath><\u002Fsvg>\n    <div><strong style=\"display:block;margin-bottom:2px;\">{{ t.thanks.bookTitle }}<\u002Fstrong><span style=\"font-size:14px;\">{{ t.thanks.bookBody }}<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdoc-page>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst PH_LANGUAGES = [\n  { code: 'en', label: 'English' },\n  { code: 'es', label: 'Español' },\n  { code: 'fr', label: 'Français' },\n  { code: 'de', label: 'Deutsch' },\n  { code: 'it', label: 'Italiano' },\n  { code: 'ja', label: '日本語 (Japanese)' },\n  { code: 'ko', label: '한국어 (Korean)' },\n  { code: 'zh_cn', label: '简体中文 (Chinese, Simplified)' },\n  { code: 'zh_tw', label: '繁體中文 (Chinese, Traditional)' },\n  { code: 'ms', label: 'Bahasa Malaysia' },\n  { code: 'id', label: 'Bahasa Indonesia' },\n  { code: 'vi', label: 'Tiếng Việt (Vietnamese)' },\n  { code: 'th', label: 'ภาษาไทย (Thai)' },\n];\n\nconst PH_TRANSLATIONS = {\n  en: {\n    switcher: \"Language\",\n    cover: {\n      kicker: \"GUEST GUIDE\",\n      title: \"Placid Homestead\",\n      subtitle: \"Everything you need for a comfortable stay — how the homestead works, and how we all get along.\",\n      intro: \"Hello, we're glad you're here. Most of our guests are backpackers, travellers and seasonal workers staying nearby for farm or regional work. This guide covers the everyday stuff: your room, shared spaces, the animals, and how to keep the homestead comfortable for everyone.\"\n    },\n    glance: {\n      kicker: \"AT A GLANCE\", title: \"The Essentials\",\n      subtitle: \"Keep this page handy — it's the short version of everything else in this guide.\",\n      emergencyTitle: \"Emergency: 000\", emergencyBody: \"For immediate danger, fire, serious injury or a medical emergency, call 000 first. Contact your host once it's safe.\",\n      quietTitle: \"Quiet hours: 10pm–7am\", quietBody: \"Keep music, calls, kitchen and laundry noise, and footsteps near rooms low.\",\n      areaTitle: \"Your area\", areaBody: \"Main House or Paddock Rooms — please use your own area's kitchen, bathroom and laundry.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"Connection details are on the noticeboard, as well as in your room.\",\n      flushTitle: \"Never flush\", flushBody: \"Wipes, sanitary products, cotton buds or food. It's septic — use the bathroom bin instead.\",\n      alcoholTitle: \"Alcohol & smoking\", alcoholBody: \"Permitted within reason. Smoke and vape outside only — no illicit drugs.\",\n      gatesTitle: \"Gates & animals\", gatesBody: \"Keep gates closed at all times. Don't feed, chase or interfere with animals.\",\n      considerateTitle: \"Be considerate\", considerateBody: \"Be respectful and considerate to the Host and all guests sharing the property with you.\"\n    },\n    hosts: {\n      kicker: \"GETTING SETTLED\", title: \"Your Hosts & Getting Help\",\n      hostName: \"Simon & Sita\",\n      p1: \"Welcome — Simon and I are so happy to share our home with you, and hope your stay here is a pleasant, happy and relaxing one.\",\n      p2: \"You'll generally find Simon around most days, as he lives on-site, and I'm around most days too, helping with house management and guest relations. We love to chat and help wherever we can, though there are times we're busy or taking a moment to unwind — so we may not always be available right away, but we're never far, and always just a message away.\",\n      p3: \"We want your time here to be comfortable, easygoing and enjoyable, and hope you leave with good memories.\",\n      p4: \"We've put this guide together for the comfort and safety of all our guests, so please take the time to read through it and get familiar with your responsibilities while staying with us.\",\n      p5: \"Thank you for your consideration and respect — enjoy your stay, and we'll see you around.\",\n      signoff: \"Kind regards,\",\n      signoffNames: \"Simon & Sita\",\n      getInTouch: \"Get in Touch\",\n      contactLines: \"Simon's mobile: 0474 735 389\\nSita's mobile: 0404 534 688\\nEmail: placid.rooms4rent@gmail.com\",\n      whatsapp: \"WhatsApp Group\",\n      communityChat: \"After scanning the QR code, you'll be added to our community chat, where we'll share updates and announcements to all our guests that relate to general areas, as well as a private chat just for you and your room for anything more personal about your stay — questions, requests, or anything you'd rather keep private and not raised in the group.\",\n      dangerTitle: \"Immediate danger\",\n      dangerBody: \"Call 000 first — fire, serious injury, violence, electrical danger or a medical emergency. Contact us afterwards, once it's safe.\"\n    },\n    toc: { kicker: \"WHAT'S INSIDE\", title: \"Contents\", groupSettled: \"Getting Settled\", hosts: \"Your Hosts & Getting Help\", room: \"Your Room\", zones: \"Two Living Spaces, One Home\", around: \"Getting Around Safely\", parking: \"Parking & Restricted Areas\", groupShared: \"Shared Facilities\", bathrooms: \"Bathrooms & Toilets\", kitchen: \"Kitchen & Cooking\", laundry: \"Laundry & Cleaning Supplies\", groupLiving: \"Living Together\", outdoor: \"Outdoor Living & Quiet Hours\", alcohol: \"Alcohol, Smoking & Drugs\", animals: \"Animals & Farm Life\", groupWifi: \"Wi-Fi & Equipment\", wifi: \"Wi-Fi, Printing & Entertainment\", aircon: \"Air Conditioning and Heating\", groupSystems: \"Property Systems\", waste: \"Waste Removal & Septic Systems\", utilities: \"Power & Utilities\", maintenance: \"Maintenance\", mail: \"Mail & Deliveries\", groupLeaving: \"Leaving Well\", leaving: \"Belongings, Housemates & Check-Out\" },\n    room: { kicker: \"GETTING SETTLED\", title: \"Your Room\",\n      intro: \"We hope you find your room comfortable and clean. Please help reduce damage and discomfort for guests by following the guidelines below.\",\n      b1: \"Food kept in your room should be sealed and stored correctly.\", b2: \"Put rubbish in the correct bins regularly.\", b3: \"Keep wet towels and clothing off beds, floors and furniture.\", b4: \"Open a window when you can, to help keep the room fresh and airy.\", b5: \"Regularly clean your room, including provided bed linen.\", b6: \"Report damage, leaks, pests, mould or anything broken as soon as you notice it.\", b7: \"Please follow house rules regarding noise, even when in rooms.\",\n      cookingTitle: \"Cooking in your room — fire safety risk\", cookingBody: \"Basic microwave or kettle use is fine where one's provided or approved. That's it — no portable cooktops, electric frypans, rice cookers, air fryers, toasters, camping stoves, gas burners or candles in rooms unless both the appliance and the location have been approved. These items are a genuine fire hazard in a bedroom — please don't use them without our sign-off.\",\n      dontTitle: \"Please don't\", dontBody: \"Move furniture between rooms, or remove anything that was already in your room when you arrived — including supplied items — unless we've said it's fine.\",\n      arrivalTitle: \"On arrival\", arrivalBody: \"If something's missing, damaged or not working properly, tell us as soon as possible.\" },\n    zones: { kicker: \"GETTING SETTLED\", title: \"Two Living Spaces, One Home\",\n      intro: \"Placid Homestead has two separate guest areas, each with its own shared spaces and its own unique qualities and appeal. We ask that our guests please stick to the kitchen, bathroom and laundry in your own area. It just keeps things simple, fair, and comfortable for everyone. Not sure which area you're in? Just ask us.\",\n      mainHouse: \"The Main House\", paddockRooms: \"The Paddock Rooms\",\n      switchTitle: \"Want to switch areas?\", switchBody: \"Fancy moving to the other area during your stay? Just let us know — we're happy to add you to a waitlist, so if a spot opens up over there, you'll get first option before we advertise it to new guests.\" },\n    around: { kicker: \"GETTING SETTLED\", title: \"Getting Around Safely\",\n      intro: \"Several access points, pathways and gates connect rooms, parking and shared spaces across the property. Please take care moving around so everyone can get to and from their space safely.\",\n      b1: \"Use the approved guest access points and keep pathways clear.\", b2: \"Take extra care around uneven ground, gravel and low light, especially after dark.\", b3: \"Wear sturdy footwear outside, especially at night, after rain, and around animal areas.\", b4: \"Watch for animals, vehicles and other guests as you move around the property.\", b5: \"Report anything that looks like a safety or tripping hazard.\",\n      gatesTitle: \"Gates\", gatesBody: \"Property gates are to be kept closed, to stop animals escaping into guest areas — or worse, onto the road, where they could be injured or cause a traffic accident. If you find a gate open, please close it, unless you've been told otherwise.\",\n      accessTitle: \"Access security\", accessBody: \"If you've been allocated an access key, please don't share or give it to anyone who isn't an approved guest.\" },\n    parking: { kicker: \"PROPERTY SYSTEMS\", title: \"Parking & Restricted Areas\",\n      intro: \"Parking is a shared, communal space, so please park considerately and keep access areas clear at all times — driveways, gates and farm or emergency access need to stay open for everyone's use. Some parts of the property are restricted for safety reasons, or simply to protect the Host's and other guests' privacy, so please stay out of these areas unless you've been told otherwise.\",\n      parkingHeading: \"Parking\",\n      b1: \"Park in approved areas only — vehicles are parked at your own risk.\", b2: \"Never block gates, driveways, or emergency/farm access.\", b3: \"Watch for animals, uneven ground and low light when driving or parking.\", b4: \"Tell us if your vehicle leaks oil or fluids, and move it if asked.\",\n      restrictedTitle: \"Restricted areas\", restrictedBody: \"Sheds, workshops, paddocks, dams, water infrastructure and private host areas are off-limits unless we've clearly said otherwise. Not locked doesn't mean safe — ask before entering.\" },\n    bathrooms: { kicker: \"SHARED FACILITIES\", title: \"Bathrooms & Toilets\",\n      intro: \"Our bathrooms are shared spaces, so please use them with consideration for the other guests sharing them with you. A few simple habits go a long way toward keeping things clean and pleasant for everyone.\",\n      b1: \"Rinse the shower area and clear hair from drains after use.\", b2: \"Wipe up excess water from floors, sinks and benches.\", b3: \"Hang excessively wet bath mats outside on the clothesline to dry.\", b4: \"Take your things with you — no towels, clothing or toiletries left laying around.\", b5: \"Remove toiletries from the shower when finished, and take them to your basket or room.\", b6: \"Keep showers short, so everyone gets a turn and the hot water doesn't run out.\",\n      septicTitle: \"Septic & grey water — needs special care\", septicBody: \"This is a septic system, not town sewerage. Only flush toilet paper and human waste — everything else goes in the bathroom bin: wipes (even ones labelled \\\"flushable\\\"), pads and tampons, cotton buds, paper towel, condoms, food and hair. The wrong item can block it fast.\",\n      reportTitle: \"Report early\", reportBody: \"Tell us about leaks, blockages, hot-water issues, slow drains, smells or gurgling straightaway — small issues are much easier, and cheaper, to fix early.\" },\n    kitchen: { kicker: \"SHARED FACILITIES\", title: \"Kitchen & Cooking\",\n      intro: \"Our kitchen is a shared space, so please use it with consideration for the other guests sharing it with you. Clean up after yourself, be mindful of how long you spend cooking, and keep the space free of anything that doesn't belong there — so it stays clean, tidy, and everyone gets equal access.\",\n      b1: \"Wash, dry and put away your dishes straight after use.\", b2: \"Wipe benches, tables and the stovetop, and clean appliances after use.\", b3: \"Place all food scraps, wrappers and packaging in the correct bins.\", b4: \"If a bin is getting full, don't overload it — take it out to the main rubbish collection point.\", b5: \"Don't leave food out overnight — it attracts pests and inconveniences others.\", b6: \"Be considerate of other guests waiting to cook — don't leave your mess for the next person.\", b7: \"Keep shared kitchen items (utensils, pots, containers) in the kitchen — don't take them to your room.\",\n      storageTitle: \"Food storage\", storageBody: \"The fridges and pantry cupboards in the kitchen are reserved for the Host only. All guest food should be stored in your own fridge and cupboards within your room, unless you've been allocated a kitchen drawer for storage. Food left out in the kitchen may be removed or disposed of.\",\n      respectTitle: \"Respect other guests' food\", respectBody: \"Please don't use or take another guest's food, drinks, utensils or containers without asking.\",\n      safetyTitle: \"Cooking safety\", safetyBody: \"Never leave cooking unattended. Make sure the stovetop, oven and appliances are turned off when you're finished, and keep the area around them clear. If something spills, burns or smells wrong, stop and let us know — don't keep using an appliance that seems unsafe.\" },\n    laundry: { kicker: \"SHARED FACILITIES\", title: \"Laundry & Cleaning Supplies\",\n      intro: \"Keeping the laundry running smoothly is a shared effort — a few small habits make it easier for everyone using the space. Collect your washing promptly, tidy up after yourself, and leave things ready for the next guest.\",\n      laundryHeading: \"Laundry\",\n      b1: \"Remove washing and dry clothes promptly when finished.\", b2: \"Avoid overloading the washing machine, and clean up any liquid spills.\", b3: \"Use short cycles only, to allow access for other guests.\", b4: \"Shake off mud, grass or debris outdoors first, before washing farm or work clothing.\", b5: \"Check with us before washing anything heavily muddy, oily or chemical-soaked.\", b6: \"Return pegs and baskets to their storage spot right after use.\", b7: \"Avoid laundry late at night if it might disturb others.\",\n      cleaningHeading: \"Cleaning\", cleaningIntro: \"We thoroughly clean shared areas at least twice a week. Between cleans, please tidy up after yourself and return anything you use to its storage spot.\",\n      toolsTitle: \"Cleaning Tools\", toolsBody: \"You'll find a vacuum, mop and broom stored in the laundry room. Please ensure you place the vacuum on charge and replace the mop head with a clean one when returning it.\",\n      suppliesTitle: \"Cleaning Supplies\", suppliesBody: \"Laundry liquid is found near the washing machine and cleaning supplies under the bathroom sink. Spare cleaning supplies and cloths are stored in the linen cupboard, as well as toilet paper.\",\n      dirtyTitle: \"Dirty cloths & mop heads\", dirtyBody: \"Please place dirty cloths and mop heads in the laundry hamper next to the washing machine, so they can be cleaned for future use.\",\n      lowTitle: \"Running low or something's broken?\", lowBody: \"Please let us know if you notice supplies have run low, or if anything's broken or not functioning properly. This includes cleaning supplies, toilet paper, clean cloths, mop heads, and the vacuum cleaner making noises or not cleaning properly.\" },\n    outdoor: { kicker: \"LIVING TOGETHER\", title: \"Outdoor Living & Quiet Hours\",\n      intro: \"Our outdoor area — with a pool table, treadmill, rowing machine, BBQ and outdoor eating tables — is a great place for guests to relax and socialise together. Please enjoy it whilst considering the peace and comfort of other guests.\",\n      b1: \"Enjoy the pool table, gym equipment and BBQ area — just keep noise at a respectful level.\", b2: \"Clean up after eating, drinking or using the BBQ, and bin your rubbish.\", b3: \"Return equipment and furniture to their place after use, and keep walkways clear.\", b4: \"Be mindful of guests who aren't part of your gathering — especially those with early starts or different schedules.\", b5: \"Got a small concern? Raise it politely if you're comfortable, or just tell us — we'd rather keep things calm than formal.\",\n      quietHeading: \"Quiet Hours\", quietText: \"Quiet hours run from 10pm to 7am. During this time, please keep music, TV and phone calls low, avoid loud conversations outdoors, and keep kitchen, laundry and footstep noise to a minimum near guest rooms.\",\n      partyTitle: \"Not a party property\", partyBody: \"This is a home for people working, resting and travelling — not a venue for parties. Loud music, disruptive gatherings, aggressive behaviour or heavy intoxication put other guests' rest and comfort at risk, so they're not permitted here.\" },\n    alcoholSmoking: { kicker: \"LIVING TOGETHER\", title: \"Alcohol, Smoking & Drugs\",\n      intro: \"Alcohol consumption and smoking are permitted, with limitations. We ask that you follow these essential rules to keep the space comfortable and safe for everyone.\",\n      b1: \"Drink responsibly — excessive drinking that leads to aggressive or unruly behaviour is not acceptable.\", b2: \"Smoke and vape outside only, in designated areas — never near doors or windows.\", b3: \"Check with nearby guests before smoking, and move along if someone isn't comfortable being around the smoke.\", b4: \"Dispose of cigarette butts properly — never leave them on the ground or laying around.\",\n      dangerTitle: \"No illicit drugs or aggressive behaviour\", dangerBody: \"Placid Homestead is a peaceful, drug-free property. Illicit drug use or possession, as well as aggressive or threatening behaviour, is not permitted, to keep this a safe space for everyone. Failure to comply with this rule may lead to a notice to vacate, or in serious instances, involvement with police.\" },\n    animals: { kicker: \"LIVING TOGETHER\", title: \"Animals & Farm Life\",\n      intro: \"Part of the experience here is sharing the property with the animals who live on it. Livestock and pets roam freely, so you'll see them around the household and property regularly — it's part of the charm. Just remember they're still animals, so a little care and consideration goes a long way.\",\n      b1: \"Don't feed animals unless we've said it's okay.\", b2: \"Don't chase, tease, pick up or otherwise interfere with them.\", b3: \"Keep gates closed at all times, and watch for animals when driving or walking.\", b4: \"Report any animal that's loose, injured, sick or acting aggressively.\",\n      petsTitle: \"No pets or children on-stay\", petsBody: \"To keep the property suitable as shared worker accommodation, guests can't have children, babies or pets/animals of their own staying with them, and can't have visitors bring children, babies or pets/animals either — unless prior approval has been given.\" },\n    wifi: { kicker: \"WI-FI & EQUIPMENT\", title: \"Wi-Fi, Printing & Entertainment\",\n      wifiHeading: \"Wi-Fi Details\", wifiText: \"Rural internet can be a little slower or less reliable than you're used to — weather, outages and distance from the towers can all play a part, so thanks for your patience. Please avoid heavy downloading that slows things down for other guests, and let us know if it drops out — some outages are outside our control, but we'll always look into it.\",\n      wifiCallout: \"Wi-Fi connection details will be on the noticeboard, as well as in your room.\",\n      printingHeading: \"Printing\", printingText: \"A Wi-Fi printer (Brother HL-L2400DW, Main House) is free for reasonable personal use — visa paperwork, travel documents, tickets and forms.\",\n      printB1: \"Check documents before printing.\", printB2: \"Collect prints promptly.\", printB3: \"Heavy or repeated printing may incur a small cost.\", printB4: \"Need a hand connecting? Just let us know.\",\n      tvHeading: \"Smart TV\", tvText: \"We've provided you with a Smart TV for your own private entertainment. We ask that you follow these guidelines, and let us know if you experience any issues.\",\n      tvB1: \"Use your own streaming accounts, and log out before leaving.\", tvB2: \"Keep the volume reasonable.\", tvB3: \"Please switch the language settings back to English before you check out.\", tvB4: \"Need a hand setting it up? Message us.\" },\n    aircon: { kicker: \"WI-FI & EQUIPMENT\", title: \"Air Conditioning and Heating\",\n      intro: \"Where possible, air conditioning units and heating appliances have been provided for your comfort and enjoyment. Please follow these guidelines to ensure safe use and reduce power consumption.\",\n      b1: \"Keep doors and windows closed while air-con or heating is running.\", b2: \"Turn it off when you're out of the room for a while.\", b3: \"Avoid setting it to extremes, and keep filters and vents clear.\", b4: \"Keep heating away from bedding, curtains and furniture.\", b5: \"Report leaks, odd smells, unusual noises or poor cooling/heating.\", b6: \"Don't use anything damaged, frayed or that seems unsafe.\",\n      unsureTitle: \"Not sure how something works?\", unsureBody: \"Just ask — always better than risking accidental damage.\" },\n        wasteSeptic: { kicker: \"PROPERTY SYSTEMS\", title: \"Waste Removal & Septic Systems\",\n      intro: \"Rural properties rely on septic and waste systems that work a little differently to what you might be used to in town, and they can be sensitive to the wrong things going in the wrong place. Keeping waste, recycling and drains organised and used correctly helps protect the whole property, and keeps things running smoothly for everyone staying here.\",\n      b1: \"Use the correct bins — no loose rubbish left in rooms or shared spaces.\", b2: \"Seal food waste so it doesn't attract pests.\", b3: \"Ask before disposing of batteries, chemicals, oil or anything hazardous.\",\n      neverTitle: \"Never pour down a drain\", neverBody: \"Cooking oil or fat, paint or chemicals, food scraps, coffee grounds, medication, mud, or wipes and sanitary products. The septic system can't handle them — scrape plates into the bin, and hose muddy boots off outside.\",\n      reportTitle: \"Report early\", reportBody: \"Slow drains, bad smells, gurgling or backed-up water? Tell us immediately — small problems get big fast out here.\" },\n    utilities: { kicker: \"PROPERTY SYSTEMS\", title: \"Power & Utilities\",\n      intro: \"At times, power may be interrupted. We ask that you're mindful of running multiple appliances at once, as this can overload the electrical system and interrupt the power supply for everyone.\",\n      b1: \"Turn off lights, fans, heaters and air-con when not needed.\", b2: \"Please report any faults with water, electricity and internet supply early.\",\n      dontTouchTitle: \"Please don't touch\", dontTouchBody: \"Meters, pumps, tanks, solar systems, batteries or switches — leave these to us.\" },\n    maintenance: { kicker: \"PROPERTY SYSTEMS\", title: \"Maintenance\",\n      intro: \"Maintenance work may need to be carried out around the property from time to time, which can create some noise and, at times, brief interruptions to power or water supply — we appreciate your patience when this happens.\",\n      b1: \"Please report any faults with water, electricity or internet supplies early, so we can have them fixed before they cause interruptions.\",\n      accessTitle: \"Room access\", accessBody: \"We may occasionally need to access rooms or shared areas for repairs or safety checks — we'll give notice where we can.\" },\n    mail: { kicker: \"PROPERTY SYSTEMS\", title: \"Mail & Deliveries\",\n      intro: \"Deliveries are organised through a designated mail area — a little advance notice helps us keep things running smoothly.\",\n      b1: \"Mail and deliveries go to the allocated mail area near the kitchen in the Main House.\", b2: \"Guests who reside in the Paddock Rooms will be notified if they have mail delivered.\", b3: \"Tell us in advance if you're expecting something urgent, valuable, or under a different name.\", b4: \"Collect your own mail promptly.\",\n      noteTitle: \"Please note\", noteBody: \"We aim to ensure all mail is collected and placed in the correct location, and guests are notified — however, guests are responsible for their own mail.\" },\n    leaving: { kicker: \"LEAVING WELL\", title: \"Belongings, Housemates & Check-Out\",\n      intro: \"Simple habits keep shared accommodation comfortable for everyone — including whoever's next.\",\n      p1: \"Keep your belongings secure and tidy, and don't leave valuables in shared areas or unlocked vehicles — we can't be responsible for personal items that are lost, stolen or damaged.\",\n      goodHabitsHeading: \"Good housemate habits\",\n      gb1: \"Clean up after yourself and respect other people's sleep and work hours.\", gb2: \"Ask before borrowing anything.\", gb3: \"Communicate kindly, report issues early, and be mindful of noise.\", gb4: \"Treat the home — and the animals — as you'd want yours treated.\",\n      beforeHeading: \"Before you leave\",\n      c1: \"Remove all personal belongings and food from your room fridge, cupboards or allocated drawer.\", c2: \"Bin your rubbish and leave your room tidy.\", c3: \"Return keys, remotes and other access items.\", c4: \"Take bed linen off the bed and leave it in the room.\", c5: \"Log out of streaming accounts, and collect any prints or mail.\", c6: \"Clear washing from machines or the clothes line.\", c7: \"Report any damage or missing items.\",\n      leftTitle: \"Left something behind?\", leftBody: \"Contact us as soon as possible after check-out — we'll do our best, but can't guarantee items can be stored or returned.\" },\n    thanks: { kicker: \"THANK YOU FOR STAYING WITH US\", title: \"Placid Homestead\", bookTitle: \"Our Visitors Book\", bookBody: \"We hope it's been a memorable stay. We'd love for you to leave a friendly message in our visitors book, so we can look back on it and share it with other guests.\" }\n  },\n  es: {\n    switcher: \"Idioma\",\n    cover: { kicker: \"GUÍA DEL HUÉSPED\", title: \"Placid Homestead\",\n      subtitle: \"Todo lo que necesitas para una estancia cómoda — cómo funciona la casa y cómo nos llevamos todos.\",\n      intro: \"Hola, nos alegra que estés aquí. La mayoría de nuestros huéspedes son mochileros, viajeros y trabajadores de temporada alojados cerca por trabajo agrícola o regional. Esta guía cubre lo esencial del día a día: tu habitación, los espacios compartidos, los animales y cómo mantener la casa cómoda para todos.\" },\n    glance: { kicker: \"DE UN VISTAZO\", title: \"Lo esencial\",\n      subtitle: \"Ten esta página a mano — es la versión corta de todo lo demás en esta guía.\",\n      emergencyTitle: \"Emergencia: 000\", emergencyBody: \"Ante peligro inmediato, incendio, lesión grave o emergencia médica, llama primero al 000. Contacta a tu anfitrión cuando sea seguro.\",\n      quietTitle: \"Horario de silencio: 22:00–7:00\", quietBody: \"Mantén baja la música, las llamadas, el ruido de cocina y lavandería, y los pasos cerca de las habitaciones.\",\n      areaTitle: \"Tu área\", areaBody: \"Casa Principal o Paddock Rooms — usa la cocina, el baño y el lavadero de tu propia área.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"Los datos de conexión están en el tablón de anuncios y también en tu habitación.\",\n      flushTitle: \"Nunca tires por el inodoro\", flushBody: \"Toallitas, productos de higiene, bastoncillos o comida. Es un sistema séptico — usa la papelera del baño.\",\n      alcoholTitle: \"Alcohol y tabaco\", alcoholBody: \"Permitido con moderación. Fuma y vapea solo afuera — nada de drogas ilícitas.\",\n      gatesTitle: \"Portones y animales\", gatesBody: \"Mantén los portones cerrados siempre. No alimentes, persigas ni molestes a los animales.\",\n      considerateTitle: \"Sé considerado\", considerateBody: \"Sé respetuoso y considerado con el anfitrión y todos los huéspedes que comparten la propiedad contigo.\" },\n    hosts: { kicker: \"INSTALÁNDOTE\", title: \"Tus anfitriones y cómo pedir ayuda\", hostName: \"Simon y Sita\",\n      p1: \"Bienvenido — Simon y yo estamos encantados de compartir nuestro hogar contigo, y esperamos que tu estancia aquí sea agradable, feliz y relajante.\",\n      p2: \"Normalmente encontrarás a Simon por aquí la mayoría de los días, ya que vive en la propiedad, y yo también suelo estar cerca, ayudando con la gestión de la casa y la atención a los huéspedes. Nos encanta charlar y ayudar en lo que podamos, aunque a veces estamos ocupados o tomándonos un momento de descanso — así que puede que no estemos disponibles de inmediato, pero nunca estamos lejos, y siempre a un mensaje de distancia.\",\n      p3: \"Queremos que tu tiempo aquí sea cómodo, tranquilo y agradable, y esperamos que te lleves buenos recuerdos.\",\n      p4: \"Hemos preparado esta guía para la comodidad y seguridad de todos nuestros huéspedes, así que tómate el tiempo de leerla y familiarizarte con tus responsabilidades durante tu estancia con nosotros.\",\n      p5: \"Gracias por tu consideración y respeto — disfruta tu estancia, ¡nos vemos por aquí!\",\n      signoff: \"Un saludo cordial,\", signoffNames: \"Simon y Sita\",\n      getInTouch: \"Contacto\",\n      contactLines: \"Móvil de Simon: 0474 735 389\\nMóvil de Sita: 0404 534 688\\nCorreo: placid.rooms4rent@gmail.com\",\n      whatsapp: \"Grupo de WhatsApp\",\n      communityChat: \"Después de escanear el código QR, te añadiremos a nuestro chat comunitario, donde compartiremos novedades y anuncios generales para todos los huéspedes, además de un chat privado solo para ti y tu habitación, para cualquier tema más personal sobre tu estancia — preguntas, solicitudes o cualquier cosa que prefieras mantener en privado y no mencionar en el grupo.\",\n      dangerTitle: \"Peligro inmediato\",\n      dangerBody: \"Llama primero al 000 — incendio, lesión grave, violencia, peligro eléctrico o emergencia médica. Contáctanos después, una vez que sea seguro.\" },\n    toc: { kicker: \"CONTENIDO\", title: \"Índice\", groupSettled: \"Instalándote\", hosts: \"Tus anfitriones y cómo pedir ayuda\", room: \"Tu habitación\", zones: \"Dos espacios, un hogar\", around: \"Cómo moverte con seguridad\", parking: \"Estacionamiento y áreas restringidas\", groupShared: \"Instalaciones compartidas\", bathrooms: \"Baños y aseos\", kitchen: \"Cocina\", laundry: \"Lavandería y artículos de limpieza\", groupLiving: \"Convivencia\", outdoor: \"Zona exterior y horario de silencio\", alcohol: \"Alcohol, tabaco y drogas\", animals: \"Animales y vida de granja\", groupWifi: \"Wi-Fi y equipamiento\", wifi: \"Wi-Fi, impresión y entretenimiento\", aircon: \"Aire acondicionado y calefacción\", groupSystems: \"Sistemas de la propiedad\", waste: \"Residuos y sistema séptico\", utilities: \"Electricidad y servicios\", maintenance: \"Mantenimiento\", mail: \"Correo y entregas\", groupLeaving: \"Al marcharte\", leaving: \"Pertenencias, convivencia y salida\" },\n    room: { kicker: \"INSTALÁNDOTE\", title: \"Tu habitación\",\n      intro: \"Esperamos que tu habitación te resulte cómoda y limpia. Ayúdanos a reducir daños y molestias para los huéspedes siguiendo estas pautas.\",\n      b1: \"La comida guardada en tu habitación debe estar sellada y almacenada correctamente.\", b2: \"Tira la basura en los contenedores correctos con regularidad.\", b3: \"Mantén toallas y ropa mojada fuera de camas, suelos y muebles.\", b4: \"Abre una ventana cuando puedas, para mantener la habitación fresca y ventilada.\", b5: \"Limpia tu habitación regularmente, incluida la ropa de cama proporcionada.\", b6: \"Informa de daños, filtraciones, plagas, moho o cualquier cosa rota en cuanto lo notes.\", b7: \"Sigue las normas de la casa sobre el ruido, incluso dentro de las habitaciones.\",\n      cookingTitle: \"Cocinar en tu habitación — riesgo de incendio\", cookingBody: \"El uso básico de microondas o hervidor está bien si se ha proporcionado o aprobado uno. Eso es todo — nada de cocinas portátiles, sartenes eléctricas, ollas arroceras, freidoras de aire, tostadoras, cocinillas de camping, quemadores de gas o velas en las habitaciones, salvo que tanto el aparato como el lugar hayan sido aprobados. Estos objetos son un verdadero riesgo de incendio en un dormitorio — por favor no los uses sin nuestra autorización.\",\n      dontTitle: \"Por favor, no\", dontBody: \"No muevas muebles entre habitaciones ni retires nada que ya estuviera en tu habitación cuando llegaste — incluidos los artículos suministrados — salvo que te hayamos dicho que está bien.\",\n      arrivalTitle: \"A tu llegada\", arrivalBody: \"Si algo falta, está dañado o no funciona correctamente, avísanos lo antes posible.\" },\n    zones: { kicker: \"INSTALÁNDOTE\", title: \"Dos espacios, un hogar\",\n      intro: \"Placid Homestead tiene dos áreas de huéspedes independientes, cada una con sus propios espacios compartidos y su propio encanto particular. Pedimos a nuestros huéspedes que usen la cocina, el baño y el lavadero de su propia área. Así mantenemos las cosas simples, justas y cómodas para todos. ¿No estás seguro de en qué área estás? Solo pregúntanos.\",\n      mainHouse: \"La Casa Principal\", paddockRooms: \"Las Paddock Rooms\",\n      switchTitle: \"¿Quieres cambiar de área?\", switchBody: \"¿Te apetece mudarte a la otra área durante tu estancia? Avísanos — con gusto te añadimos a una lista de espera, para que si se libera un lugar allí, tengas la primera opción antes de anunciarlo a nuevos huéspedes.\" },\n    around: { kicker: \"INSTALÁNDOTE\", title: \"Cómo moverte con seguridad\",\n      intro: \"Varios accesos, senderos y portones conectan habitaciones, estacionamiento y espacios compartidos por toda la propiedad. Por favor ten cuidado al moverte para que todos puedan llegar a su espacio de forma segura.\",\n      b1: \"Usa los accesos aprobados para huéspedes y mantén los senderos despejados.\", b2: \"Ten cuidado extra en terrenos irregulares, grava y poca luz, sobre todo de noche.\", b3: \"Usa calzado resistente en exteriores, especialmente de noche, tras la lluvia y cerca de los animales.\", b4: \"Ten cuidado con animales, vehículos y otros huéspedes al moverte por la propiedad.\", b5: \"Informa de cualquier cosa que parezca un riesgo de seguridad o de tropiezo.\",\n      gatesTitle: \"Portones\", gatesBody: \"Los portones de la propiedad deben mantenerse cerrados, para evitar que los animales escapen a las áreas de huéspedes — o peor, a la carretera, donde podrían resultar heridos o causar un accidente. Si encuentras un portón abierto, ciérralo, salvo que se te haya dicho lo contrario.\",\n      accessTitle: \"Seguridad de acceso\", accessBody: \"Si se te ha asignado una llave de acceso, no la compartas ni se la des a nadie que no sea un huésped aprobado.\" },\n    parking: { kicker: \"SISTEMAS DE LA PROPIEDAD\", title: \"Estacionamiento y áreas restringidas\",\n      intro: \"El estacionamiento es un espacio compartido y comunal, así que aparca con consideración y mantén las áreas de acceso despejadas en todo momento — caminos, portones y accesos agrícolas o de emergencia deben permanecer abiertos para el uso de todos. Algunas partes de la propiedad están restringidas por motivos de seguridad, o simplemente para proteger la privacidad del anfitrión y otros huéspedes, así que evita esas áreas salvo que se te indique lo contrario.\",\n      parkingHeading: \"Estacionamiento\",\n      b1: \"Aparca solo en las áreas aprobadas — los vehículos se aparcan bajo tu propio riesgo.\", b2: \"Nunca bloquees portones, caminos o accesos de emergencia/agrícolas.\", b3: \"Ten cuidado con animales, terreno irregular y poca luz al conducir o aparcar.\", b4: \"Avísanos si tu vehículo pierde aceite o líquidos, y muévelo si te lo pedimos.\",\n      restrictedTitle: \"Áreas restringidas\", restrictedBody: \"Cobertizos, talleres, potreros, represas, infraestructura de agua y áreas privadas del anfitrión están fuera de límites salvo que se indique claramente lo contrario. Que no esté cerrado con llave no significa que sea seguro — pregunta antes de entrar.\" },\n    bathrooms: { kicker: \"INSTALACIONES COMPARTIDAS\", title: \"Baños y aseos\",\n      intro: \"Nuestros baños son espacios compartidos, así que úsalos con consideración hacia los demás huéspedes que los comparten contigo. Unos pocos hábitos sencillos ayudan mucho a mantener todo limpio y agradable para todos.\",\n      b1: \"Enjuaga la zona de la ducha y retira el pelo de los desagües después de usarlos.\", b2: \"Seca el exceso de agua de suelos, lavabos y encimeras.\", b3: \"Cuelga las alfombrillas de baño muy mojadas fuera en el tendedero para que se sequen.\", b4: \"Llévate tus cosas — nada de toallas, ropa o artículos de aseo dejados por ahí.\", b5: \"Retira los artículos de aseo de la ducha al terminar y llévalos a tu cesta o habitación.\", b6: \"Duchas cortas, para que todos tengan su turno y no se acabe el agua caliente.\",\n      septicTitle: \"Sistema séptico y aguas grises — requiere cuidado especial\", septicBody: \"Este es un sistema séptico, no alcantarillado urbano. Solo tira papel higiénico y residuos humanos — todo lo demás va a la papelera del baño: toallitas (incluso las que dicen \\\"desechables por el inodoro\\\"), compresas y tampones, bastoncillos, papel de cocina, condones, comida y pelo. El artículo equivocado puede obstruirlo rápidamente.\",\n      reportTitle: \"Informa pronto\", reportBody: \"Cuéntanos sobre fugas, obstrucciones, problemas de agua caliente, desagües lentos, olores o gorgoteos de inmediato — los problemas pequeños son mucho más fáciles y baratos de solucionar a tiempo.\" },\n    kitchen: { kicker: \"INSTALACIONES COMPARTIDAS\", title: \"Cocina\",\n      intro: \"Nuestra cocina es un espacio compartido, así que úsala con consideración hacia los demás huéspedes que la comparten contigo. Limpia después de usarla, ten en cuenta cuánto tiempo pasas cocinando y mantén el espacio libre de cualquier cosa que no pertenezca allí — así se mantiene limpia, ordenada, y todos tienen el mismo acceso.\",\n      b1: \"Lava, seca y guarda tus platos justo después de usarlos.\", b2: \"Limpia encimeras, mesas y la placa, y limpia los electrodomésticos después de usarlos.\", b3: \"Pon todos los restos de comida, envoltorios y embalajes en los contenedores correctos.\", b4: \"Si un contenedor se está llenando, no lo sobrecargues — llévalo al punto de recogida principal.\", b5: \"No dejes comida fuera durante la noche — atrae plagas e incomoda a los demás.\", b6: \"Sé considerado con otros huéspedes que esperan para cocinar — no dejes tu desorden para el siguiente.\", b7: \"Mantén los utensilios de cocina compartidos (utensilios, ollas, recipientes) en la cocina — no los lleves a tu habitación.\",\n      storageTitle: \"Almacenamiento de comida\", storageBody: \"Los refrigeradores y armarios de despensa en la cocina están reservados solo para el anfitrión. Toda la comida de los huéspedes debe guardarse en tu propio refrigerador y armarios dentro de tu habitación, salvo que se te haya asignado un cajón de cocina para almacenamiento. La comida dejada en la cocina puede ser retirada o desechada.\",\n      respectTitle: \"Respeta la comida de otros huéspedes\", respectBody: \"Por favor no uses ni tomes la comida, bebidas, utensilios o recipientes de otro huésped sin preguntar.\",\n      safetyTitle: \"Seguridad al cocinar\", safetyBody: \"Nunca dejes la cocina desatendida mientras cocinas. Asegúrate de que la placa, el horno y los electrodomésticos estén apagados cuando termines, y mantén despejada el área alrededor. Si algo se derrama, se quema o huele mal, detente y avísanos — no sigas usando un aparato que parezca inseguro.\" },\n    laundry: { kicker: \"INSTALACIONES COMPARTIDAS\", title: \"Lavandería y artículos de limpieza\",\n      intro: \"Mantener la lavandería funcionando sin problemas es un esfuerzo compartido — unos pocos hábitos sencillos lo hacen más fácil para todos los que usan el espacio. Recoge tu ropa con prontitud, ordena después de usarla y deja las cosas listas para el siguiente huésped.\",\n      laundryHeading: \"Lavandería\",\n      b1: \"Retira la ropa lavada y seca con prontitud al terminar.\", b2: \"Evita sobrecargar la lavadora, y limpia cualquier derrame de líquido.\", b3: \"Usa solo ciclos cortos, para permitir el acceso a otros huéspedes.\", b4: \"Sacude el barro, la hierba o los residuos al aire libre antes de lavar ropa de granja o trabajo.\", b5: \"Consúltanos antes de lavar algo muy embarrado, aceitoso o empapado en productos químicos.\", b6: \"Devuelve las pinzas y cestas a su lugar de almacenamiento justo después de usarlas.\", b7: \"Evita hacer la colada tarde en la noche si puede molestar a otros.\",\n      cleaningHeading: \"Limpieza\", cleaningIntro: \"Limpiamos a fondo las áreas compartidas al menos dos veces por semana. Entre limpiezas, por favor ordena después de usarlas y devuelve todo lo que uses a su lugar de almacenamiento.\",\n      toolsTitle: \"Herramientas de limpieza\", toolsBody: \"Encontrarás una aspiradora, fregona y escoba guardadas en la sala de lavandería. Asegúrate de poner la aspiradora a cargar y reemplazar la cabeza de la fregona por una limpia al devolverla.\",\n      suppliesTitle: \"Artículos de limpieza\", suppliesBody: \"El detergente para ropa se encuentra cerca de la lavadora y los artículos de limpieza debajo del lavabo del baño. Los artículos de limpieza y paños de repuesto se guardan en el armario de ropa blanca, junto con el papel higiénico.\",\n      dirtyTitle: \"Paños sucios y cabezas de fregona\", dirtyBody: \"Por favor coloca los paños sucios y las cabezas de fregona en el cesto de la lavandería junto a la lavadora, para que puedan limpiarse para uso futuro.\",\n      lowTitle: \"¿Se está acabando algo o está roto?\", lowBody: \"Por favor avísanos si notas que los suministros se están acabando, o si algo está roto o no funciona correctamente. Esto incluye artículos de limpieza, papel higiénico, paños limpios, cabezas de fregona, y la aspiradora haciendo ruidos o no limpiando bien.\" },\n    outdoor: { kicker: \"CONVIVENCIA\", title: \"Zona exterior y horario de silencio\",\n      intro: \"Nuestra zona exterior — con mesa de billar, cinta de correr, remo, barbacoa y mesas para comer al aire libre — es un gran lugar para que los huéspedes se relajen y socialicen juntos. Disfrútala considerando la paz y comodidad de otros huéspedes.\",\n      b1: \"Disfruta la mesa de billar, el equipo de gimnasio y la zona de barbacoa — solo mantén el ruido a un nivel respetuoso.\", b2: \"Limpia después de comer, beber o usar la barbacoa, y tira tu basura.\", b3: \"Devuelve el equipo y los muebles a su lugar después de usarlos, y mantén los pasillos despejados.\", b4: \"Ten en cuenta a los huéspedes que no forman parte de tu reunión — especialmente quienes madrugan o tienen horarios distintos.\", b5: \"¿Tienes una pequeña preocupación? Coméntala con amabilidad si te sientes cómodo, o simplemente dínoslo — preferimos mantener las cosas tranquilas que formales.\",\n      quietHeading: \"Horario de silencio\", quietText: \"El horario de silencio va de 22:00 a 7:00. Durante este tiempo, mantén baja la música, la TV y las llamadas, evita conversaciones ruidosas en el exterior, y reduce al mínimo el ruido de cocina, lavandería y pasos cerca de las habitaciones.\",\n      partyTitle: \"No es una propiedad para fiestas\", partyBody: \"Esta es una casa para personas que trabajan, descansan y viajan — no un lugar para fiestas. La música alta, las reuniones disruptivas, el comportamiento agresivo o la intoxicación excesiva ponen en riesgo el descanso y la comodidad de otros huéspedes, así que no están permitidos aquí.\" },\n    alcoholSmoking: { kicker: \"CONVIVENCIA\", title: \"Alcohol, tabaco y drogas\",\n      intro: \"El consumo de alcohol y el tabaco están permitidos, con limitaciones. Te pedimos que sigas estas reglas esenciales para mantener el espacio cómodo y seguro para todos.\",\n      b1: \"Bebe con responsabilidad — el consumo excesivo que lleve a un comportamiento agresivo o descontrolado no es aceptable.\", b2: \"Fuma y vapea solo afuera, en áreas designadas — nunca cerca de puertas o ventanas.\", b3: \"Consulta con los huéspedes cercanos antes de fumar, y aléjate si a alguien no le resulta cómodo estar cerca del humo.\", b4: \"Desecha las colillas correctamente — nunca las dejes en el suelo ni tiradas por ahí.\",\n      dangerTitle: \"Nada de drogas ilícitas ni comportamiento agresivo\", dangerBody: \"Placid Homestead es una propiedad tranquila y libre de drogas. No se permite el uso o posesión de drogas ilícitas, ni el comportamiento agresivo o amenazante, para mantener este un espacio seguro para todos. El incumplimiento de esta regla puede dar lugar a un aviso de desalojo, o en casos graves, a la intervención de la policía.\" },\n    animals: { kicker: \"CONVIVENCIA\", title: \"Animales y vida de granja\",\n      intro: \"Parte de la experiencia aquí es compartir la propiedad con los animales que viven en ella. El ganado y las mascotas se mueven libremente, así que los verás por la casa y la propiedad con regularidad — es parte del encanto. Solo recuerda que siguen siendo animales, así que un poco de cuidado y consideración es muy valioso.\",\n      b1: \"No alimentes a los animales a menos que te hayamos dicho que está bien.\", b2: \"No los persigas, molestes, levantes ni interfieras con ellos de ninguna otra manera.\", b3: \"Mantén los portones cerrados siempre, y ten cuidado con los animales al conducir o caminar.\", b4: \"Informa de cualquier animal suelto, herido, enfermo o que actúe de forma agresiva.\",\n      petsTitle: \"Sin mascotas ni niños durante la estancia\", petsBody: \"Para mantener la propiedad adecuada como alojamiento compartido de trabajadores, los huéspedes no pueden tener hijos, bebés o mascotas/animales propios alojándose con ellos, ni pueden traer visitas que traigan niños, bebés o mascotas/animales — salvo que se haya dado aprobación previa.\" },\n    wifi: { kicker: \"WI-FI Y EQUIPAMIENTO\", title: \"Wi-Fi, impresión y entretenimiento\",\n      wifiHeading: \"Datos de Wi-Fi\", wifiText: \"El internet rural puede ser un poco más lento o menos fiable de lo que estás acostumbrado — el clima, los cortes y la distancia a las torres pueden influir, así que gracias por tu paciencia. Evita las descargas pesadas que ralenticen la conexión para otros huéspedes, y avísanos si se corta — algunos cortes están fuera de nuestro control, pero siempre lo investigaremos.\",\n      wifiCallout: \"Los datos de conexión Wi-Fi estarán en el tablón de anuncios y también en tu habitación.\",\n      printingHeading: \"Impresión\", printingText: \"Una impresora Wi-Fi (Brother HL-L2400DW, Casa Principal) es gratuita para uso personal razonable — trámites de visado, documentos de viaje, boletos y formularios.\",\n      printB1: \"Revisa los documentos antes de imprimir.\", printB2: \"Recoge las impresiones con prontitud.\", printB3: \"El uso intensivo o repetido puede tener un pequeño costo.\", printB4: \"¿Necesitas ayuda para conectarte? Avísanos.\",\n      tvHeading: \"Smart TV\", tvText: \"Te hemos proporcionado una Smart TV para tu entretenimiento privado. Te pedimos que sigas estas pautas y nos avises si tienes algún problema.\",\n      tvB1: \"Usa tus propias cuentas de streaming, y cierra sesión antes de irte.\", tvB2: \"Mantén el volumen razonable.\", tvB3: \"Vuelve a poner el idioma en inglés antes de hacer el check-out.\", tvB4: \"¿Necesitas ayuda para configurarla? Escríbenos.\" },\n    aircon: { kicker: \"WI-FI Y EQUIPAMIENTO\", title: \"Aire acondicionado y calefacción\",\n      intro: \"Donde sea posible, se han proporcionado unidades de aire acondicionado y calefacción para tu comodidad y disfrute. Sigue estas pautas para garantizar un uso seguro y reducir el consumo de energía.\",\n      b1: \"Mantén puertas y ventanas cerradas mientras el aire acondicionado o la calefacción estén encendidos.\", b2: \"Apágalo cuando salgas de la habitación por un tiempo.\", b3: \"Evita configurarlo a temperaturas extremas, y mantén los filtros y rejillas despejados.\", b4: \"Mantén la calefacción alejada de la ropa de cama, cortinas y muebles.\", b5: \"Informa de fugas, olores extraños, ruidos inusuales o mal enfriamiento/calentamiento.\", b6: \"No uses nada dañado, deshilachado o que parezca inseguro.\",\n      unsureTitle: \"¿No sabes cómo funciona algo?\", unsureBody: \"Solo pregunta — siempre es mejor que arriesgarse a un daño accidental.\" },\n        wasteSeptic: { kicker: \"SISTEMAS DE LA PROPIEDAD\", title: \"Residuos y sistema séptico\",\n      intro: \"Las propiedades rurales dependen de sistemas sépticos y de residuos que funcionan un poco diferente a lo que estás acostumbrado en la ciudad, y pueden ser sensibles si se echa lo incorrecto en el lugar equivocado. Mantener la basura, el reciclaje y los desagües organizados y usados correctamente ayuda a proteger toda la propiedad, y mantiene todo funcionando sin problemas para todos los que se alojan aquí.\",\n      b1: \"Usa los contenedores correctos — no dejes basura sue
