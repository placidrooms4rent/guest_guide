fumo sono consentiti, con limitazioni. Ti chiediamo di seguire queste regole essenziali per mantenere lo spazio confortevole e sicuro per tutti.\",\n      b1: \"Bevi responsabilmente — un consumo eccessivo che porta a comportamenti aggressivi o indisciplinati non è accettabile.\", b2: \"Fuma e usa la sigaretta elettronica solo all'aperto, nelle aree designate — mai vicino a porte o finestre.\", b3: \"Consulta gli ospiti vicini prima di fumare, e allontanati se qualcuno non è a suo agio con il fumo.\", b4: \"Smaltisci correttamente i mozziconi di sigaretta — non lasciarli mai a terra o in giro.\",\n      dangerTitle: \"Nessuna droga illecita o comportamento aggressivo\", dangerBody: \"Placid Homestead è una proprietà tranquilla e senza droghe. L'uso o il possesso di droghe illecite, così come il comportamento aggressivo o minaccioso, non sono consentiti, per mantenere questo uno spazio sicuro per tutti. La mancata osservanza di questa regola può portare a un avviso di sfratto, o in casi gravi, al coinvolgimento della polizia.\" },\n    animals: { kicker: \"VIVERE INSIEME\", title: \"Animali e vita di fattoria\",\n      intro: \"Parte dell'esperienza qui è condividere la proprietà con gli animali che ci vivono. Bestiame e animali domestici si muovono liberamente, quindi li vedrai regolarmente intorno alla casa e alla proprietà — fa parte del fascino. Ricorda solo che sono comunque animali, quindi un po' di cura e considerazione fa molto.\",\n      b1: \"Non nutrire gli animali a meno che non ti abbiamo detto che va bene.\", b2: \"Non inseguirli, stuzzicarli, prenderli in braccio o interferire altrimenti con loro.\", b3: \"Tieni sempre chiusi i cancelli, e presta attenzione agli animali quando guidi o cammini.\", b4: \"Segnala qualsiasi animale libero, ferito, malato o che si comporta in modo aggressivo.\",\n      petsTitle: \"Niente animali domestici o bambini durante il soggiorno\", petsBody: \"Per mantenere la proprietà adatta come alloggio condiviso per lavoratori, gli ospiti non possono avere figli, neonati o animali domestici propri con loro, né possono far portare ai visitatori bambini, neonati o animali domestici — salvo previa approvazione.\" },\n    wifi: { kicker: \"WI-FI E ATTREZZATURE\", title: \"Wi-Fi, stampa e intrattenimento\",\n      wifiHeading: \"Dettagli Wi-Fi\", wifiText: \"Internet rurale può essere un po' più lento o meno affidabile di quanto sei abituato — meteo, interruzioni e distanza dalle torri possono influire, quindi grazie per la pazienza. Evita download intensivi che rallentano la connessione per altri ospiti, e facci sapere se cade — alcune interruzioni sono fuori dal nostro controllo, ma le verificheremo sempre.\",\n      wifiCallout: \"I dettagli di connessione Wi-Fi saranno in bacheca e anche nella tua stanza.\",\n      printingHeading: \"Stampa\", printingText: \"Una stampante Wi-Fi (Brother HL-L2400DW, Casa Principale) è gratuita per un uso personale ragionevole — documenti visto, documenti di viaggio, biglietti e moduli.\",\n      printB1: \"Controlla i documenti prima di stampare.\", printB2: \"Ritira le stampe prontamente.\", printB3: \"Stampa intensiva o ripetuta può comportare un piccolo costo.\", printB4: \"Serve aiuto per collegarti? Faccelo sapere.\",\n      tvHeading: \"Smart TV\", tvText: \"Ti abbiamo fornito una Smart TV per il tuo intrattenimento privato. Ti chiediamo di seguire queste linee guida e di farci sapere se riscontri problemi.\",\n      tvB1: \"Usa i tuoi account di streaming, ed esci prima di andartene.\", tvB2: \"Mantieni il volume ragionevole.\", tvB3: \"Riporta le impostazioni della lingua in inglese prima del check-out.\", tvB4: \"Serve aiuto per configurarla? Scrivici.\" },\n    aircon: { kicker: \"WI-FI E ATTREZZATURE\", title: \"Aria condizionata e riscaldamento\",\n      intro: \"Dove possibile, sono stati forniti condizionatori e riscaldatori per il tuo comfort. Segui queste linee guida per garantire un uso sicuro e ridurre il consumo energetico.\",\n      b1: \"Tieni porte e finestre chiuse mentre aria condizionata o riscaldamento sono in funzione.\", b2: \"Spegnilo quando esci dalla stanza per un po'.\", b3: \"Evita impostazioni estreme, e mantieni filtri e prese d'aria libere.\", b4: \"Tieni il riscaldamento lontano da biancheria, tende e mobili.\", b5: \"Segnala perdite, odori strani, rumori insoliti o scarso raffreddamento/riscaldamento.\", b6: \"Non usare nulla di danneggiato, sfilacciato o che sembri insicuro.\",\n      unsureTitle: \"Non sei sicuro di come funziona qualcosa?\", unsureBody: \"Chiedi semplicemente — sempre meglio che rischiare danni accidentali.\" },\n        wasteSeptic: { kicker: \"IMPIANTI DELLA PROPRIETÀ\", title: \"Rifiuti e sistema settico\",\n      intro: \"Le proprietà rurali dipendono da sistemi settici e di smaltimento rifiuti che funzionano in modo un po' diverso da quello a cui sei abituato in città, e possono essere sensibili se le cose sbagliate finiscono nel posto sbagliato. Mantenere rifiuti, riciclo e scarichi organizzati e usati correttamente aiuta a proteggere l'intera proprietà, e mantiene tutto funzionante senza intoppi per tutti coloro che soggiornano qui.\",\n      b1: \"Usa i bidoni corretti — niente rifiuti sparsi nelle stanze o negli spazi comuni.\", b2: \"Sigilla gli scarti alimentari così da non attirare parassiti.\", b3: \"Chiedi prima di smaltire batterie, prodotti chimici, olio o qualsiasi cosa pericolosa.\",\n      neverTitle: \"Non versare mai in uno scarico\", neverBody: \"Olio o grasso da cucina, vernice o prodotti chimici, avanzi di cibo, fondi di caffè, farmaci, fango, o salviette e prodotti igienici. Il sistema settico non può gestirli — raschia i piatti nel bidone, e lava gli stivali infangati fuori.\",\n      reportTitle: \"Segnala subito\", reportBody: \"Scarichi lenti, cattivi odori, gorgoglii o acqua stagnante? Faccelo sapere immediatamente — i piccoli problemi diventano grandi in fretta qui.\" },\n    utilities: { kicker: \"IMPIANTI DELLA PROPRIETÀ\", title: \"Elettricità e utenze\",\n      intro: \"A volte l'elettricità potrebbe essere interrotta. Ti chiediamo di fare attenzione a non far funzionare troppi elettrodomestici contemporaneamente, poiché ciò può sovraccaricare l'impianto elettrico e interrompere la corrente per tutti.\",\n      b1: \"Spegni luci, ventilatori, riscaldatori e aria condizionata quando non servono.\", b2: \"Segnala tempestivamente eventuali guasti all'acqua, elettricità e internet.\",\n      dontTouchTitle: \"Per favore non toccare\", dontTouchBody: \"Contatori, pompe, serbatoi, impianti solari, batterie o interruttori — lascia questi a noi.\" },\n    maintenance: { kicker: \"IMPIANTI DELLA PROPRIETÀ\", title: \"Manutenzione\",\n      intro: \"Di tanto in tanto potrebbero essere necessari lavori di manutenzione sulla proprietà, il che può creare rumore e, a volte, brevi interruzioni dell'elettricità o dell'acqua — apprezziamo la tua pazienza quando ciò accade.\",\n      b1: \"Segnala tempestivamente eventuali guasti all'acqua, elettricità o internet, così possiamo ripararli prima che causino interruzioni.\",\n      accessTitle: \"Accesso alle stanze\", accessBody: \"Potremmo occasionalmente dover accedere a stanze o aree comuni per riparazioni o controlli di sicurezza — ti avviseremo quando possibile.\" },\n    mail: { kicker: \"IMPIANTI DELLA PROPRIETÀ\", title: \"Posta e consegne\",\n      intro: \"Le consegne sono organizzate tramite un'area postale designata — un po' di preavviso ci aiuta a mantenere tutto senza intoppi.\",\n      b1: \"Posta e consegne vanno all'area postale assegnata vicino alla cucina nella Casa Principale.\", b2: \"Gli ospiti che risiedono nelle Paddock Rooms saranno avvisati se ricevono posta.\", b3: \"Avvisaci in anticipo se aspetti qualcosa di urgente, di valore o intestato a un altro nome.\", b4: \"Ritira prontamente la tua posta.\",\n      noteTitle: \"Nota bene\", noteBody: \"Il nostro obiettivo è assicurarci che tutta la posta sia raccolta e collocata nel posto giusto, e che gli ospiti siano avvisati — tuttavia gli ospiti sono responsabili della propria posta.\" },\n    leaving: { kicker: \"ALLA PARTENZA\", title: \"Effetti personali, coinquilini e check-out\",\n      intro: \"Abitudini semplici mantengono l'alloggio condiviso confortevole per tutti — incluso chi verrà dopo.\",\n      p1: \"Tieni i tuoi effetti personali al sicuro e in ordine, e non lasciare oggetti di valore nelle aree comuni o in veicoli non chiusi a chiave — non possiamo essere responsabili di oggetti personali smarriti, rubati o danneggiati.\",\n      goodHabitsHeading: \"Buone abitudini da coinquilino\",\n      gb1: \"Pulisci dopo di te e rispetta gli orari di sonno e lavoro degli altri.\", gb2: \"Chiedi prima di prendere in prestito qualcosa.\", gb3: \"Comunica con gentilezza, segnala i problemi tempestivamente e presta attenzione al rumore.\", gb4: \"Tratta la casa — e gli animali — come vorresti fosse trattata la tua.\",\n      beforeHeading: \"Prima di partire\",\n      c1: \"Rimuovi tutti i tuoi effetti personali e il cibo dal frigorifero, dagli armadietti o dal cassetto assegnato nella tua stanza.\", c2: \"Getta i rifiuti e lascia la tua stanza in ordine.\", c3: \"Restituisci chiavi, telecomandi e altri elementi di accesso.\", c4: \"Togli la biancheria dal letto e lasciala nella stanza.\", c5: \"Esci dagli account di streaming, e ritira eventuali stampe o posta.\", c6: \"Rimuovi il bucato dalle lavatrici o dallo stendino.\", c7: \"Segnala eventuali danni o oggetti mancanti.\",\n      leftTitle: \"Hai dimenticato qualcosa?\", leftBody: \"Contattaci il prima possibile dopo il check-out — faremo del nostro meglio, ma non possiamo garantire che gli oggetti possano essere conservati o restituiti.\" },\n    thanks: { kicker: \"GRAZIE PER IL TUO SOGGIORNO CON NOI\", title: \"Placid Homestead\", bookTitle: \"Il nostro libro degli ospiti\", bookBody: \"Speriamo sia stato un soggiorno memorabile. Ci piacerebbe che tu lasciassi un messaggio amichevole nel nostro libro degli ospiti, così potremo ricordarlo e condividerlo con altri ospiti.\" }\n  },\n  ja: {\n    switcher: \"言語\",\n    cover: { kicker: \"ゲストガイド\", title: \"Placid Homestead\",\n      subtitle: \"快適な滞在のために必要な情報 — 家の仕組みと、みんなで仲良く過ごす方法。\",\n      intro: \"こんにちは、来てくれてうれしいです。私たちのゲストのほとんどは、農場や地域の仕事のために近くに滞在しているバックパッカー、旅行者、季節労働者です。このガイドでは、お部屋、共有スペース、動物たち、そしてみんなが快適に過ごすための日常的なことについて説明します。\" },\n    glance: { kicker: \"一目でわかる\", title: \"重要事項\",\n      subtitle: \"このページを手元に置いておいてください — ガイドの要点をまとめた短縮版です。\",\n      emergencyTitle: \"緊急時：000\", emergencyBody: \"危険が差し迫っている、火災、重傷、または医療緊急事態の場合は、まず000に電話してください。安全になったらホストに連絡してください。\",\n      quietTitle: \"静粛時間：午後10時〜午前7時\", quietBody: \"音楽、通話、キッチンや洗濯の音、部屋の近くの足音を静かにしてください。\",\n      areaTitle: \"あなたのエリア\", areaBody: \"メインハウスまたはパドックルーム — ご自身のエリアのキッチン、バスルーム、洗濯設備をご利用ください。\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"接続情報は掲示板とお部屋に掲示されています。\",\n      flushTitle: \"絶対に流さないもの\", flushBody: \"ウェットティッシュ、生理用品、綿棒、食べ物。浄化槽のため、代わりにバスルームのゴミ箱をご利用ください。\",\n      alcoholTitle: \"飲酒・喫煙\", alcoholBody: \"節度をもって許可されています。喫煙・電子タバコは屋外のみ — 違法薬物は禁止です。\",\n      gatesTitle: \"門と動物\", gatesBody: \"門は常に閉めてください。動物に餌を与えたり、追いかけたり、干渉しないでください。\",\n      considerateTitle: \"思いやりを持って\", considerateBody: \"ホストや敷地を共有する他のゲストに対して、敬意と思いやりを持って接してください。\" },\n    hosts: { kicker: \"滞在の準備\", title: \"ホスト紹介とサポートのご案内\", hostName: \"サイモン＆シータ\",\n      p1: \"ようこそ — サイモンと私は私たちの家をあなたと共有できてとても嬉しく思います。ここでの滞在が楽しく、幸せで、リラックスできるものになりますように。\",\n      p2: \"サイモンは敷地内に住んでいるので、ほぼ毎日会えるはずです。私もほぼ毎日おり、家の管理やゲスト対応をお手伝いしています。おしゃべりやお手伝いが大好きですが、忙しかったり、リフレッシュのため休んでいる時間もあるため、すぐに対応できないこともあります。ですが、いつでもメッセージ一つで連絡が取れます。\",\n      p3: \"ここでの時間が快適で気楽で楽しいものになることを願っており、良い思い出を持って帰っていただけたら嬉しいです。\",\n      p4: \"すべてのゲストの快適さと安全のためにこのガイドを作成しましたので、時間を取って読んでいただき、滞在中の責任について理解していただければと思います。\",\n      p5: \"ご配慮とご協力ありがとうございます — 滞在をお楽しみください、また会いましょう。\",\n      signoff: \"敬具\", signoffNames: \"サイモン＆シータ\",\n      getInTouch: \"連絡先\",\n      contactLines: \"サイモンの携帯：0474 735 389\\nシータの携帯：0404 534 688\\nメール：placid.rooms4rent@gmail.com\",\n      whatsapp: \"WhatsAppグループ\",\n      communityChat: \"QRコードをスキャンすると、共有エリアに関する最新情報やお知らせを共有するコミュニティチャットに追加されます。また、滞在に関するより個人的な質問・依頼・グループで話したくないことなどのために、あなたとあなたの部屋専用のプライベートチャットにも追加されます。\",\n      dangerTitle: \"差し迫った危険\",\n      dangerBody: \"まず000に電話してください — 火災、重傷、暴力、感電の危険、または医療緊急事態の場合。安全になってから私たちにご連絡ください。\" },\n    toc: { kicker: \"目次\", title: \"目次\", groupSettled: \"滞在の準備\", hosts: \"ホスト紹介とサポートのご案内\", room: \"お部屋について\", zones: \"2つの居住エリア、ひとつの我が家\", around: \"安全な移動方法\", parking: \"駐車場と立入禁止区域\", groupShared: \"共有設備\", bathrooms: \"浴室・トイレ\", kitchen: \"キッチン\", laundry: \"洗濯・清掃用品\", groupLiving: \"共同生活\", outdoor: \"屋外スペースと静粛時間\", alcohol: \"飲酒・喫煙・薬物について\", animals: \"動物と農場での生活\", groupWifi: \"Wi-Fiと設備\", wifi: \"Wi-Fi・印刷・エンタメ\", aircon: \"エアコンと暖房\", groupSystems: \"設備システム\", waste: \"ゴミと浄化槽\", utilities: \"電気・インフラ\", maintenance: \"メンテナンス\", mail: \"郵便・配達物\", groupLeaving: \"退去にあたって\", leaving: \"持ち物・同居者・チェックアウト\" },\n    room: { kicker: \"滞在の準備\", title: \"お部屋について\",\n      intro: \"お部屋を快適に清潔にお使いいただければと思います。以下のガイドラインに従い、ゲストの不快感や損傷を減らすようご協力ください。\",\n      b1: \"お部屋に置く食品は密閉して正しく保管してください。\", b2: \"ゴミは定期的に正しいゴミ箱に捨ててください。\", b3: \"濡れたタオルや衣類はベッド、床、家具の上に置かないでください。\", b4: \"可能な時は窓を開けて、お部屋を新鮮で風通しの良い状態に保ってください。\", b5: \"支給された寝具を含め、お部屋を定期的に清掃してください。\", b6: \"損傷、水漏れ、害虫、カビ、故障などに気づいたらすぐにご報告ください。\", b7: \"お部屋にいる時も騒音に関するハウスルールを守ってください。\",\n      cookingTitle: \"お部屋での調理 — 火災の危険\", cookingBody: \"備え付けまたは承認された電子レンジや電気ケトルの基本的な使用は問題ありません。それ以外 — ポータブルコンロ、電気フライパン、炊飯器、エアフライヤー、トースター、キャンプ用コンロ、ガスバーナー、キャンドルなどは、家電と設置場所の両方が承認されない限りお部屋での使用はできません。これらは寝室での本当の火災リスクとなるため、許可なく使用しないでください。\",\n      dontTitle: \"ご遠慮いただきたいこと\", dontBody: \"部屋間の家具の移動、またはご到着時にすでにお部屋にあったもの(備品含む)の撤去は、こちらから問題ないとお伝えした場合を除き行わないでください。\",\n      arrivalTitle: \"到着時に\", arrivalBody: \"何か不足していたり、破損していたり、正常に機能していない場合は、できるだけ早くお知らせください。\" },\n    zones: { kicker: \"滞在の準備\", title: \"2つの居住エリア、ひとつの我が家\",\n      intro: \"Placid Homesteadには2つの独立したゲストエリアがあり、それぞれに独自の共有スペースと魅力があります。ゲストの皆様には、ご自身のエリアのキッチン、バスルーム、洗濯設備をご利用いただくようお願いしています。これにより、すべてのゲストにとってシンプルで公平、快適な環境を保つことができます。ご自身のエリアが分からない場合は、お気軽にお尋ねください。\",\n      mainHouse: \"メインハウス\", paddockRooms: \"パドックルーム\",\n      switchTitle: \"エリアの変更をご希望ですか?\", switchBody: \"滞在中に別のエリアへ移動したい場合はお知らせください — 喜んでウェイトリストに追加いたします。空きが出た際は、新規ゲストに募集をかける前に優先的にご案内します。\" },\n    around: { kicker: \"滞在の準備\", title: \"安全な移動方法\",\n      intro: \"敷地内には、お部屋、駐車場、共有スペースをつなぐさまざまな出入口、通路、門があります。皆様が安全に移動できるよう、十分注意してお進みください。\",\n      b1: \"承認されたゲスト用の出入口を使用し、通路を塞がないでください。\", b2: \"特に日没後は、凹凸のある地面、砂利、暗い場所に十分注意してください。\", b3: \"特に夜間、雨の後、動物のいるエリア付近では、屋外で丈夫な靴を履いてください。\", b4: \"敷地内を移動する際は、動物、車両、他のゲストに注意してください。\", b5: \"安全上の危険やつまずきの原因になりそうなものを見つけたらご報告ください。\",\n      gatesTitle: \"門\", gatesBody: \"動物がゲストエリア、あるいは道路に逃げ出してけがをしたり事故を起こしたりしないよう、敷地の門は常に閉めておいてください。開いている門を見つけた場合は、特に指示がない限り閉めてください。\",\n      accessTitle: \"アクセスの安全管理\", accessBody: \"アクセスキーが割り当てられている場合、承認されたゲスト以外に共有したり渡したりしないでください。\" },\n    parking: { kicker: \"設備システム\", title: \"駐車場と立入禁止区域\",\n      intro: \"駐車場は共有スペースですので、配慮を持って駐車し、アクセスエリア(車道、門、農場や緊急用の通路)は常に確保してください。安全上の理由、またはホストや他のゲストのプライバシー保護のために立入が制限されているエリアもありますので、指示がない限りそれらのエリアには立ち入らないでください。\",\n      parkingHeading: \"駐車場\",\n      b1: \"承認された場所のみに駐車してください — 車両の駐車は自己責任となります。\", b2: \"門、車道、緊急・農場用通路を絶対に塞がないでください。\", b3: \"運転や駐車の際は、動物、凹凸のある地面、暗さに注意してください。\", b4: \"車両からオイルや液体が漏れている場合はお知らせください。求められた場合は移動してください。\",\n      restrictedTitle: \"立入禁止区域\", restrictedBody: \"納屋、作業場、放牧地、ダム、水道インフラ、ホストのプライベートエリアは、特に許可がない限り立入禁止です。鍵がかかっていないからといって安全とは限りません — 入る前に必ずお尋ねください。\" },\n    bathrooms: { kicker: \"共有設備\", title: \"浴室・トイレ\",\n      intro: \"浴室は共有スペースですので、他のゲストへの配慮を持ってご利用ください。ちょっとした習慣が、みんなにとって清潔で快適な空間を保つのに役立ちます。\",\n      b1: \"使用後はシャワーエリアを流し、排水口の髪の毛を取り除いてください。\", b2: \"床、洗面台、台の水気を拭き取ってください。\", b3: \"びしょ濡れのバスマットは、屋外の物干しに干してください。\", b4: \"タオルや衣類、洗面用品を放置せず、使用後は持ち帰ってください。\", b5: \"使用後はシャワーから洗面用品を取り出し、バスケットまたはお部屋に持ち帰ってください。\", b6: \"全員が順番に使え、お湯が切れないよう、シャワーは短めにしてください。\",\n      septicTitle: \"浄化槽・グレーウォーター — 特別な注意が必要\", septicBody: \"これは浄化槽であり、市の下水道ではありません。トイレに流せるのはトイレットペーパーと排泄物のみです — それ以外(「流せる」と表示されたウェットティッシュ、生理用品、綿棒、ペーパータオル、コンドーム、食べ物、髪の毛など)はすべて浴室のゴミ箱に捨ててください。誤ったものを流すとすぐに詰まる可能性があります。\",\n      reportTitle: \"早めのご報告を\", reportBody: \"水漏れ、詰まり、お湯の問題、排水の遅れ、臭い、ゴボゴボという音などに気づいたらすぐにご連絡ください — 小さな問題ほど早く対処すれば簡単で安く済みます。\" },\n    kitchen: { kicker: \"共有設備\", title: \"キッチン\",\n      intro: \"キッチンは共有スペースですので、他のゲストへの配慮を持ってご利用ください。使用後は片付け、調理にかける時間に気を配り、関係ないものを置かないようにして、清潔で整頓された、みんなが平等に使えるスペースを保ってください。\",\n      b1: \"使用後はすぐに食器を洗い、乾かして片付けてください。\", b2: \"台、テーブル、コンロを拭き、使用後は家電を清掃してください。\", b3: \"食べ物の残り、包装、パッケージはすべて正しいゴミ箱に入れてください。\", b4: \"ゴミ箱がいっぱいになってきたら、詰め込まずにメインのゴミ収集場所に持って行ってください。\", b5: \"食べ物を一晩放置しないでください — 害虫を引き寄せ、他の人に迷惑がかかります。\", b6: \"調理を待っている他のゲストに配慮し、次の人のために散らかしたままにしないでください。\", b7: \"共有のキッチン用品(調理器具、鍋、容器)はキッチンに置いたままにし、お部屋に持ち帰らないでください。\",\n      storageTitle: \"食品の保管\", storageBody: \"キッチンの冷蔵庫とパントリーの棚はホスト専用です。ゲストの食品はすべて、収納用のキッチンの引き出しを割り当てられていない限り、お部屋の冷蔵庫と棚に保管してください。キッチンに放置された食品は撤去または処分される場合があります。\",\n      respectTitle: \"他のゲストの食品を尊重してください\", respectBody: \"他のゲストの食品、飲み物、調理器具、容器を無断で使用したり取ったりしないでください。\",\n      safetyTitle: \"調理の安全\", safetyBody: \"調理中は絶対にその場を離れないでください。使い終わったらコンロ、オーブン、家電の電源が切れていることを確認し、周囲を片付けておいてください。何かがこぼれたり、焦げたり、変な匂いがしたりした場合は、使用を中止してご連絡ください — 安全でないと思われる家電の使用を続けないでください。\" },\n    laundry: { kicker: \"共有設備\", title: \"洗濯・清掃用品\",\n      intro: \"洗濯設備を円滑に運用するにはみんなの協力が必要です — ちょっとした習慣が、このスペースを利用するすべての人にとって使いやすくします。洗濯物は速やかに取り出し、使用後は片付け、次のゲストのために整えておいてください。\",\n      laundryHeading: \"洗濯\",\n      b1: \"洗濯・乾燥が終わったら速やかに取り出してください。\", b2: \"洗濯機に詰め込みすぎないようにし、液体がこぼれた場合は拭き取ってください。\", b3: \"他のゲストが利用できるよう、短い洗濯コースのみを使用してください。\", b4: \"農作業や仕事着を洗う前に、まず屋外で泥や草、ゴミを払い落としてください。\", b5: \"非常に泥だらけ、油まみれ、または化学薬品が染み込んだものを洗う前は、事前にご相談ください。\", b6: \"洗濯バサミやカゴは使用後すぐに保管場所へ戻してください。\", b7: \"他の人の迷惑になる可能性がある場合は、夜遅くの洗濯は避けてください。\",\n      cleaningHeading: \"清掃\", cleaningIntro: \"共有スペースは少なくとも週2回、徹底的に清掃しています。清掃の合間は、使用後の片付けと、使用したものを所定の場所に戻すようご協力ください。\",\n      toolsTitle: \"清掃用具\", toolsBody: \"掃除機、モップ、ほうきは洗濯室に保管されています。掃除機は充電し、モップのヘッドは清潔なものに交換してから戻すようお願いします。\",\n      suppliesTitle: \"清掃用品\", suppliesBody: \"洗濯用洗剤は洗濯機の近くに、清掃用品は浴室の洗面台の下にあります。予備の清掃用品や布巾、トイレットペーパーはリネン戸棚に保管されています。\",\n      dirtyTitle: \"汚れた布巾・モップヘッド\", dirtyBody: \"汚れた布巾やモップヘッドは、今後の使用のために洗濯できるよう、洗濯機の隣にある洗濯かごに入れてください。\",\n      lowTitle: \"在庫が少ない、または壊れているものはありますか?\", lowBody: \"在庫が少なくなっている、または何かが壊れていたり正常に機能していない場合はお知らせください。これには、清掃用品、トイレットペーパー、清潔な布巾、モップヘッド、そして音がする、またはうまく掃除できない掃除機も含まれます。\" },\n    outdoor: { kicker: \"共同生活\", title: \"屋外スペースと静粛時間\",\n      intro: \"ビリヤード台、ランニングマシン、ローイングマシン、BBQ、屋外テーブルを備えた屋外エリアは、ゲストがくつろぎ交流するのに最適な場所です。他のゲストの静けさと快適さに配慮しながらお楽しみください。\",\n      b1: \"ビリヤード台、ジム機器、BBQエリアをお楽しみください — 音量は節度あるレベルに保ってください。\", b2: \"飲食やBBQ使用後は片付け、ゴミは所定の場所に捨ててください。\", b3: \"使用後は機材や家具を元の場所に戻し、通路を確保してください。\", b4: \"集まりに参加していない他のゲスト、特に朝が早い方やスケジュールが異なる方に配慮してください。\", b5: \"気になることがあれば、可能であれば丁寧に伝えるか、私たちにお知らせください — 堅苦しくせず穏やかに対応したいと思います。\",\n      quietHeading: \"静粛時間\", quietText: \"静粛時間は午後10時から午前7時までです。この間は、音楽・テレビ・通話の音量を抑え、屋外での大声での会話を避け、客室付近でのキッチン・洗濯・足音を最小限にしてください。\",\n      partyTitle: \"パーティー用の物件ではありません\", partyBody: \"ここは働き、休み、旅をする人々のための家であり、パーティー会場ではありません。大音量の音楽、迷惑になる集まり、攻撃的な行動、過度な酩酊は他のゲストの休息と快適さを損なうため、許可されていません。\" },\n    alcoholSmoking: { kicker: \"共同生活\", title: \"飲酒・喫煙・薬物について\",\n      intro: \"飲酒と喫煙は制限付きで許可されています。全員にとって快適で安全な空間を保つため、以下の基本ルールを守っていただくようお願いします。\",\n      b1: \"節度を持って飲酒してください — 過度の飲酒による攻撃的または手に負えない行動は許容されません。\", b2: \"喫煙・電子タバコは指定された屋外エリアのみで — ドアや窓の近くでは絶対にしないでください。\", b3: \"喫煙前に近くのゲストに確認し、煙を不快に感じる人がいれば場所を移動してください。\", b4: \"タバコの吸い殻は正しく処分してください — 地面や放置は厳禁です。\",\n      dangerTitle: \"違法薬物・攻撃的行動の禁止\", dangerBody: \"Placid Homesteadは平和で薬物のない物件です。すべての人にとって安全な空間を保つため、違法薬物の使用・所持、および攻撃的・脅迫的な行動は禁止されています。この規則に違反した場合、退去通知、重大な場合は警察の介入につながる可能性があります。\" },\n    animals: { kicker: \"共同生活\", title: \"動物と農場での生活\",\n      intro: \"ここでの体験の一部は、この土地に暮らす動物たちと空間を共にすることです。家畜やペットは自由に歩き回るため、家や敷地の周りで頻繁に見かけることになります — それもまた魅力の一部です。ただし彼らも動物であることを忘れず、少しの配慮と注意が大切です。\",\n      b1: \"許可がない限り動物に餌を与えないでください。\", b2: \"追いかけたり、からかったり、抱き上げたり、その他干渉したりしないでください。\", b3: \"門は常に閉め、運転や歩行の際は動物に注意してください。\", b4: \"放し飼いになっている、負傷している、病気の、または攻撃的な動物を見つけたらご報告ください。\",\n      petsTitle: \"滞在中のペット・お子様の同伴不可\", petsBody: \"共同労働者用宿泊施設として適した環境を保つため、ゲストはご自身のお子様、乳幼児、ペット・動物を同伴することはできず、訪問者がお子様、乳幼児、ペット・動物を連れてくることもできません — 事前の承認がある場合を除きます。\" },\n    wifi: { kicker: \"WI-FIと設備\", title: \"Wi-Fi・印刷・エンタメ\",\n      wifiHeading: \"Wi-Fiの詳細\", wifiText: \"地方のインターネットは、慣れているものより少し遅かったり不安定だったりすることがあります — 天候、停電、電波塔からの距離などが影響しますので、ご理解のほどお願いします。他のゲストの通信速度を落とすような大容量のダウンロードは避け、接続が切れた場合はお知らせください — 一部の障害は私たちの管理外ですが、必ず対応いたします。\",\n      wifiCallout: \"Wi-Fi接続情報は掲示板とお部屋に掲示されます。\",\n      printingHeading: \"印刷\", printingText: \"Wi-Fiプリンター(Brother HL-L2400DW、メインハウス)は、ビザ書類、旅行書類、チケット、フォームなど、常識的な個人利用であれば無料でご利用いただけます。\",\n      printB1: \"印刷前に書類を確認してください。\", printB2: \"印刷物は速やかに回収してください。\", printB3: \"大量または頻繁な印刷には少額の費用がかかる場合があります。\", printB4: \"接続にお困りの場合はお知らせください。\",\n      tvHeading: \"スマートTV\", tvText: \"個人的な娯楽のためにスマートTVをご用意しています。以下のガイドラインに従っていただき、問題が発生した場合はお知らせください。\",\n      tvB1: \"ご自身のストリーミングアカウントを使用し、退出前にログアウトしてください。\", tvB2: \"音量は適切な範囲に保ってください。\", tvB3: \"チェックアウト前に言語設定を英語に戻してください。\", tvB4: \"設定にお困りの場合はメッセージをください。\" },\n    aircon: { kicker: \"WI-FIと設備\", title: \"エアコンと暖房\",\n      intro: \"可能な限り、快適にお過ごしいただくためにエアコンや暖房器具をご用意しています。安全にご使用いただき、電力消費を抑えるため、以下のガイドラインに従ってください。\",\n      b1: \"エアコンや暖房使用中はドアと窓を閉めてください。\", b2: \"しばらく部屋を離れる際は電源を切ってください。\", b3: \"極端な設定は避け、フィルターや通気口を清潔に保ってください。\", b4: \"暖房器具は寝具、カーテン、家具から離してください。\", b5: \"水漏れ、異臭、異音、冷暖房の効きが悪い場合はご報告ください。\", b6: \"破損、擦り切れ、または安全でないと思われるものは使用しないでください。\",\n      unsureTitle: \"使い方がわからないものがありますか?\", unsureBody: \"ぜひお尋ねください — 誤って破損させるリスクを冒すよりも安全です。\" },\n        wasteSeptic: { kicker: \"設備システム\", title: \"ゴミと浄化槽\",\n      intro: \"田舎の物件では、街とは少し異なる仕組みの浄化槽やゴミ処理システムに頼っています。誤ったものが誤った場所に入ると影響を受けやすいため注意が必要です。ゴミ、リサイクル、排水を整理し正しく使用することは、敷地全体を守り、滞在するすべての人にとって物事を円滑に保つことにつながります。\",\n      b1: \"正しいゴミ箱を使用してください — 部屋や共有スペースにゴミを放置しないでください。\", b2: \"生ゴミは密封し、害虫を寄せ付けないようにしてください。\", b3: \"電池、化学薬品、油、その他危険物を廃棄する前にはご相談ください。\",\n      neverTitle: \"排水口に絶対に流さないもの\", neverBody: \"調理油や脂、ペンキや化学薬品、生ゴミ、コーヒーかす、薬、泥、ウェットティッシュや衛生用品。浄化槽ではこれらを処理できません — お皿はゴミ箱にこすり落とし、泥だらけのブーツは屋外でホースで洗ってください。\",\n      reportTitle: \"早めのご報告を\", reportBody: \"排水が遅い、悪臭がする、ゴボゴボ音がする、水が逆流している場合はすぐにお知らせください — 小さな問題はここではすぐに大きくなります。\" },\n    utilities: { kicker: \"設備システム\", title: \"電気・インフラ\",\n      intro: \"時々、電気が止まることがあります。複数の家電を同時に使用すると電気系統に負荷がかかり、全体の電力供給が止まる可能性がありますのでご注意ください。\",\n      b1: \"不要な時は照明、扇風機、暖房、エアコンの電源を切ってください。\", b2: \"水道、電気、インターネットの不具合は早めにご報告ください。\",\n      dontTouchTitle: \"触れないでください\", dontTouchBody: \"メーター、ポンプ、タンク、太陽光発電システム、バッテリー、スイッチなどは私たちにお任せください。\" },\n    maintenance: { kicker: \"設備システム\", title: \"メンテナンス\",\n      intro: \"敷地内では時折メンテナンス作業が必要になることがあり、その際は多少の騒音や、電気・水道の短時間の中断が発生することがあります — その際はご理解のほどお願いします。\",\n      b1: \"水道、電気、インターネットの不具合は早めにご報告いただければ、支障が出る前に修理できます。\",\n      accessTitle: \"客室への立ち入り\", accessBody: \"修理や安全点検のため、時折お部屋や共有スペースに立ち入る必要がある場合があります — 可能な限り事前にお知らせします。\" },\n    mail: { kicker: \"設備システム\", title: \"郵便・配達物\",\n      intro: \"配達物は指定の郵便エリアで管理されています — 事前にご連絡いただけるとスムーズに対応できます。\",\n      b1: \"郵便物や配達物はメインハウスのキッチン近くの指定郵便エリアに届けられます。\", b2: \"パドックルームにお住まいのゲストは、郵便物が届いた場合にお知らせします。\", b3: \"急ぎのもの、貴重なもの、別名義のものが届く予定の場合は事前にお知らせください。\", b4: \"ご自身の郵便物は速やかに受け取ってください。\",\n      noteTitle: \"ご注意ください\", noteBody: \"すべての郵便物が正しい場所に届けられ、ゲストに通知されるよう努めていますが、郵便物の管理はゲスト自身の責任となります。\" },\n    leaving: { kicker: \"退去にあたって\", title: \"持ち物・同居者・チェックアウト\",\n      intro: \"簡単な習慣が、次に利用する方も含め、みんなにとって共同生活を快適に保ちます。\",\n      p1: \"貴重品は共有スペースや施錠されていない車内に置かず、安全に整理整頓しておいてください — 紛失、盗難、破損した個人の所持品について当方は責任を負いかねます。\",\n      goodHabitsHeading: \"良い同居者の習慣\",\n      gb1: \"使用後は片付け、他の人の睡眠・仕事の時間を尊重してください。\", gb2: \"何かを借りる前には一声かけてください。\", gb3: \"親切にコミュニケーションを取り、問題は早めに報告し、騒音に配慮してください。\", gb4: \"自分の家や動物と同じように、この家と動物たちを大切に扱ってください。\",\n      beforeHeading: \"退去前に\",\n      c1: \"お部屋の冷蔵庫、戸棚、割り当てられた引き出しから、すべての個人の持ち物と食品を取り出してください。\", c2: \"ゴミを捨て、お部屋を整頓してください。\", c3: \"鍵、リモコン、その他のアクセス用品を返却してください。\", c4: \"ベッドリネンを外し、お部屋に置いていってください。\", c5: \"ストリーミングアカウントからログアウトし、印刷物や郵便物を回収してください。\", c6: \"洗濯機や物干しから洗濯物を取り出してください。\", c7: \"損傷や紛失した物品があればご報告ください。\",\n      leftTitle: \"忘れ物をしましたか?\", leftBody: \"チェックアウト後はできるだけ早くご連絡ください — 最善を尽くしますが、保管や返送を保証することはできません。\" },\n    thanks: { kicker: \"ご滞在いただきありがとうございました\", title: \"Placid Homestead\", bookTitle: \"ゲストブック\", bookBody: \"思い出深い滞在になっていましたら幸いです。ゲストブックに一言メッセージを残していただけると嬉しいです。後で振り返ったり、他のゲストと共有したりするために活用させていただきます。\" }\n  },\n  ko: {\n    switcher: \"언어\",\n    cover: { kicker: \"게스트 가이드\", title: \"Placid Homestead\",\n      subtitle: \"편안한 숙박을 위해 필요한 모든 것 — 이 홈스테드가 어떻게 운영되는지, 그리고 우리 모두 잘 지내는 방법.\",\n      intro: \"안녕하세요, 이곳에 오신 것을 환영합니다. 저희 게스트 대부분은 농장이나 지역 일자리를 위해 근처에 머무는 배낭여행객, 여행자, 계절 노동자입니다. 이 가이드는 방, 공용 공간, 동물들, 그리고 모두가 편안하게 지낼 수 있는 방법 등 일상적인 내용을 다룹니다.\" },\n    glance: { kicker: \"한눈에 보기\", title: \"핵심 요약\",\n      subtitle: \"이 페이지를 가까이 두세요 — 이 가이드의 나머지 내용을 요약한 버전입니다.\",\n      emergencyTitle: \"응급상황: 000\", emergencyBody: \"긴급한 위험, 화재, 중상 또는 의료 응급상황 시 먼저 000에 전화하세요. 안전해지면 호스트에게 연락하세요.\",\n      quietTitle: \"조용한 시간: 오후 10시–오전 7시\", quietBody: \"음악, 통화, 주방·세탁 소음, 방 근처 발소리를 낮춰 주세요.\",\n      areaTitle: \"귀하의 구역\", areaBody: \"메인 하우스 또는 패독 룸 — 본인이 배정된 구역의 주방, 욕실, 세탁 시설을 이용해 주세요.\",\n      wifiTitle: \"와이파이\", wifiBody: \"연결 정보는 게시판과 객실에 안내되어 있습니다.\",\n      flushTitle: \"절대 변기에 버리지 마세요\", flushBody: \"물티슈, 위생용품, 면봉 또는 음식물. 정화조 시스템이므로 화장실 쓰레기통을 이용하세요.\",\n      alcoholTitle: \"음주 및 흡연\", alcoholBody: \"적당한 범위 내에서 허용됩니다. 흡연 및 전자담배는 실외에서만 — 불법 약물은 금지입니다.\",\n      gatesTitle: \"출입문 및 동물\", gatesBody: \"출입문은 항상 닫아 두세요. 동물에게 먹이를 주거나, 쫓거나, 간섭하지 마세요.\",\n      considerateTitle: \"배려해 주세요\", considerateBody: \"호스트와 함께 이 공간을 공유하는 모든 게스트를 존중하고 배려해 주세요.\" },\n    hosts: { kicker: \"정착하기\", title: \"호스트 소개 및 도움받는 방법\", hostName: \"사이먼 & 시타\",\n      p1: \"환영합니다 — 사이먼과 저는 저희 집을 여러분과 함께 나눌 수 있어 매우 기쁘며, 이곳에서의 시간이 즐겁고 행복하며 편안하시길 바랍니다.\",\n      p2: \"사이먼은 이곳에 거주하고 있어 대부분의 날에 볼 수 있으며, 저도 대부분 이곳에서 하우스 관리와 게스트 응대를 돕고 있습니다. 저희는 대화하고 도와드리는 것을 좋아하지만, 바쁘거나 잠시 쉬는 시간에는 바로 응답하지 못할 수도 있습니다 — 하지만 항상 멀지 않은 곳에 있으며, 메시지 한 통이면 연락이 닿습니다.\",\n      p3: \"이곳에서의 시간이 편안하고 여유롭고 즐거우시길 바라며, 좋은 추억을 안고 떠나시길 바랍니다.\",\n      p4: \"모든 게스트의 편안함과 안전을 위해 이 가이드를 준비했으니, 시간을 내어 읽어보시고 숙박 중 지켜야 할 사항들을 숙지해 주세요.\",\n      p5: \"배려와 존중에 감사드립니다 — 즐거운 시간 보내시고, 또 뵙겠습니다.\",\n      signoff: \"감사합니다,\", signoffNames: \"사이먼 & 시타\",\n      getInTouch: \"연락처\",\n      contactLines: \"사이먼 휴대폰: 0474 735 389\\n시타 휴대폰: 0404 534 688\\n이메일: placid.rooms4rent@gmail.com\",\n      whatsapp: \"왓츠앱 그룹\",\n      communityChat: \"QR 코드를 스캔하면 공용 구역과 관련된 소식과 공지사항을 공유하는 커뮤니티 채팅방에 추가되며, 숙박과 관련된 더 개인적인 질문, 요청 또는 그룹에서 공유하고 싶지 않은 사항을 위한 본인과 본인 객실 전용 개인 채팅방에도 추가됩니다.\",\n      dangerTitle: \"긴급한 위험\",\n      dangerBody: \"먼저 000에 전화하세요 — 화재, 중상, 폭력, 전기 위험 또는 의료 응급상황. 안전해진 후 저희에게 연락해 주세요.\" },\n    toc: { kicker: \"목차\", title: \"목차\", groupSettled: \"정착하기\", hosts: \"호스트 소개 및 도움받는 방법\", room: \"객실 안내\", zones: \"두 개의 생활 공간, 하나의 집\", around: \"안전하게 이동하기\", parking: \"주차 및 출입 제한 구역\", groupShared: \"공용 시설\", bathrooms: \"욕실 및 화장실\", kitchen: \"주방\", laundry: \"세탁 및 청소용품\", groupLiving: \"함께 생활하기\", outdoor: \"야외 공간 및 조용한 시간\", alcohol: \"음주, 흡연 및 약물\", animals: \"동물 및 농장 생활\", groupWifi: \"와이파이 및 기기\", wifi: \"와이파이, 프린트 및 엔터테인먼트\", aircon: \"냉난방\", groupSystems: \"시설 시스템\", waste: \"폐기물 및 정화조 시스템\", utilities: \"전력 및 유틸리티\", maintenance: \"유지보수\", mail: \"우편 및 배송\", groupLeaving: \"퇴실 준비\", leaving: \"소지품, 룸메이트 및 체크아웃\" },\n    room: { kicker: \"정착하기\", title: \"객실 안내\",\n      intro: \"객실이 편안하고 깨끗하시길 바랍니다. 아래 안내사항을 따라 손상과 불편을 줄이는 데 협조해 주세요.\",\n      b1: \"객실에 보관하는 음식은 밀봉하여 올바르게 보관해 주세요.\", b2: \"쓰레기는 정기적으로 올바른 쓰레기통에 버려 주세요.\", b3: \"젖은 수건과 옷은 침대, 바닥, 가구에서 치워 주세요.\", b4: \"가능할 때는 창문을 열어 방을 신선하고 통풍이 잘 되게 해 주세요.\", b5: \"제공된 침구를 포함해 객실을 정기적으로 청소해 주세요.\", b6: \"손상, 누수, 해충, 곰팡이 또는 고장이 발견되면 즉시 알려 주세요.\", b7: \"객실 내에서도 소음 관련 하우스 규칙을 지켜 주세요.\",\n      cookingTitle: \"객실 내 조리 — 화재 위험\", cookingBody: \"제공되거나 승인된 전자레인지나 전기 주전자의 기본 사용은 괜찮습니다. 그 외에는 안 됩니다 — 휴대용 인덕션, 전기 프라이팬, 전기밥솥, 에어프라이어, 토스터, 캠핑용 버너, 가스버너 또는 양초는 기기와 장소 모두 승인받지 않는 한 객실 내 사용이 금지됩니다. 이러한 물품들은 침실에서 실제 화재 위험을 초래하므로 저희 승인 없이는 사용하지 마세요.\",\n      dontTitle: \"삼가 주세요\", dontBody: \"객실 간 가구 이동, 또는 도착 시 이미 객실에 있던 물품(비치품 포함)을 제거하는 행위 — 저희가 괜찮다고 말씀드린 경우가 아니라면 삼가 주세요.\",\n      arrivalTitle: \"도착 시\", arrivalBody: \"누락되거나 손상되었거나 제대로 작동하지 않는 것이 있으면 가능한 한 빨리 알려 주세요.\" },\n    zones: { kicker: \"정착하기\", title: \"두 개의 생활 공간, 하나의 집\",\n      intro: \"Placid Homestead에는 두 개의 별도 게스트 구역이 있으며, 각각 고유한 공용 공간과 매력을 지니고 있습니다. 게스트분들께는 본인이 배정된 구역의 주방, 욕실, 세탁 시설을 이용해 주시길 부탁드립니다. 이렇게 하면 모두에게 간단하고 공평하며 편안한 환경이 유지됩니다. 본인이 어느 구역인지 확실하지 않다면 저희에게 문의해 주세요.\",\n      mainHouse: \"메인 하우스\", paddockRooms: \"패독 룸\",\n      switchTitle: \"구역을 변경하고 싶으신가요?\", switchBody: \"숙박 중 다른 구역으로 옮기고 싶으시다면 알려주세요 — 대기자 명단에 기꺼이 등록해 드리며, 자리가 나면 새 게스트에게 광고하기 전에 우선적으로 안내해 드립니다.\" },\n    around: { kicker: \"정착하기\", title: \"안전하게 이동하기\",\n      intro: \"부지 곳곳에 객실, 주차장, 공용 공간을 연결하는 여러 출입구, 통로, 문이 있습니다. 모두가 안전하게 이동할 수 있도록 주의해 주세요.\",\n      b1: \"승인된 게스트 출입구를 이용하고 통로를 막지 마세요.\", b2: \"특히 해가 진 후에는 고르지 않은 지면, 자갈, 어두운 곳에 각별히 주의하세요.\", b3: \"특히 밤, 비 온 후, 동물 구역 근처에서는 야외에서 튼튼한 신발을 착용하세요.\", b4: \"부지 내에서 이동할 때는 동물, 차량, 다른 게스트에 주의하세요.\", b5: \"안전 위험이나 걸려 넘어질 위험으로 보이는 것을 발견하면 신고해 주세요.\",\n      gatesTitle: \"출입문\", gatesBody: \"동물이 게스트 구역으로, 혹은 더 나쁘게는 도로로 탈출해 다치거나 교통사고를 일으키지 않도록 부지 내 출입문은 항상 닫아 두어야 합니다. 열려 있는 문을 발견하면, 다른 안내가 없는 한 닫아 주세요.\",\n      accessTitle: \"출입 보안\", accessBody: \"출입 열쇠를 배정받으셨다면, 승인된 게스트가 아닌 사람과 공유하거나 전달하지 마세요.\" },\n    parking: { kicker: \"시설 시스템\", title: \"주차 및 출입 제한 구역\",\n      intro: \"주차장은 공용 공간이므로, 배려 있게 주차하고 진입로(차도, 출입문, 농장 또는 비상 접근로)는 항상 비워두시기 바랍니다. 안전상의 이유로, 또는 호스트와 다른 게스트의 사생활 보호를 위해 일부 구역은 출입이 제한되므로, 별도 안내가 없는 한 이 구역에는 들어가지 마세요.\",\n      parkingHeading: \"주차\",\n      b1: \"승인된 구역에만 주차하세요 — 차량 주차는 본인 책임입니다.\", b2: \"출입문, 차도, 비상/농장 접근로를 절대 막지 마세요.\", b3: \"운전하거나 주차할 때 동물, 고르지 않은 지면, 어두움에 주의하세요.\", b4: \"차량에서 오일이나 액체가 새는 경우 알려 주시고, 요청받으면 이동해 주세요.\",\n      restrictedTitle: \"출입 제한 구역\", restrictedBody: \"헛간, 작업장, 방목장, 댐, 수도 시설, 호스트 전용 구역은 별도의 명확한 안내가 없는 한 출입이 금지됩니다. 잠겨 있지 않다고 해서 안전한 것은 아닙니다 — 들어가기 전에 반드시 문의하세요.\" },\n    bathrooms: { kicker: \"공용 시설\", title: \"욕실 및 화장실\",\n      intro: \"저희 욕실은 공용 공간이므로, 함께 사용하는 다른 게스트를 배려하며 이용해 주세요. 몇 가지 간단한 습관이 모두에게 깨끗하고 쾌적한 환경을 유지하는 데 큰 도움이 됩니다.\",\n      b1: \"사용 후 샤워 구역을 헹구고 배수구의 머리카락을 제거해 주세요.\", b2: \"바닥, 세면대, 선반의 물기를 닦아 주세요.\", b3: \"많이 젖은 욕실 매트는 야외 빨랫줄에 널어 말려 주세요.\", b4: \"수건, 옷, 세면용품을 방치하지 말고 사용 후 가져가 주세요.\", b5: \"샤워 후 세면용품을 바구니나 객실로 가져가 주세요.\", b6: \"모두가 순서대로 이용하고 온수가 부족하지 않도록 샤워는 짧게 해 주세요.\",\n      septicTitle: \"정화조 및 회색수 — 특별한 주의 필요\", septicBody: \"이곳은 정화조 시스템이며 도시 하수도가 아닙니다. 화장지와 인체 배설물만 변기에 흘려보내 주세요 — 그 외 모든 것(‘변기에 버릴 수 있다’고 표시된 물티슈 포함, 생리대와 탐폰, 면봉, 종이타월, 콘돔, 음식물, 머리카락 등)은 욕실 쓰레기통에 버려 주세요. 잘못된 물건은 빠르게 막힐 수 있습니다.\",\n      reportTitle: \"조기에 알려주세요\", reportBody: \"누수, 막힘, 온수 문제, 배수 지연, 냄새 또는 꾸르륵 소리가 나면 즉시 알려 주세요 — 작은 문제일수록 일찍 해결하는 것이 훨씬 쉽고 저렴합니다.\" },\n    kitchen: { kicker: \"공용 시설\", title: \"주방\",\n      intro: \"저희 주방은 공용 공간이므로, 함께 사용하는 다른 게스트를 배려하며 이용해 주세요. 사용 후 정리하고, 조리에 소요되는 시간에 유의하며, 관련 없는 물건을 두지 않아 공간을 깨끗하고 정돈된 상태로 유지하고 모두가 동등하게 이용할 수 있도록 해 주세요.\",\n      b1: \"사용 후 즉시 설거지하고 건조 후 정리해 주세요.\", b2: \"조리대, 테이블, 스토브를 닦고 사용 후 가전제품을 청소해 주세요.\", b3: \"음식물 찌꺼기, 포장지, 포장재는 모두 올바른 쓰레기통에 버려 주세요.\", b4: \"쓰레기통이 가득 차면 무리하게 채우지 말고 메인 수거 장소로 옮겨 주세요.\", b5: \"음식을 밤새 방치하지 마세요 — 해충을 유인하고 다른 사람에게 불편을 줍니다.\", b6: \"조리를 기다리는 다른 게스트를 배려해 다음 사람을 위해 어지럽힌 채로 두지 마세요.\", b7: \"공용 주방용품(조리도구, 냄비, 용기)은 주방에 두고 객실로 가져가지 마세요.\",\n      storageTitle: \"식품 보관\", storageBody: \"주방의 냉장고와 팬트리 찬장은 호스트 전용입니다. 게스트의 모든 식품은 주방 서랍을 배정받은 경우가 아니라면 본인 객실의 냉장고와 찬장에 보관해 주세요. 주방에 방치된 식품은 제거되거나 폐기될 수 있습니다.\",\n      respectTitle: \"다른 게스트의 음식을 존중해 주세요\", respectBody: \"다른 게스트의 음식, 음료, 조리도구, 용기를 허락 없이 사용하거나 가져가지 마세요.\",\n      safetyTitle: \"조리 안전\", safetyBody: \"조리 중에는 절대 자리를 비우지 마세요. 사용을 마치면 스토브, 오븐, 가전제품의 전원이 꺼져 있는지 확인하고 주변을 정리해 주세요. 무언가 넘치거나 타거나 이상한 냄새가 나면 사용을 멈추고 알려 주세요 — 안전하지 않아 보이는 가전제품은 계속 사용하지 마세요.\" },\n    laundry: { kicker: \"공용 시설\", title: \"세탁 및 청소용품\",\n      intro: \"세탁실이 원활히 운영되려면 모두의 협력이 필요합니다 — 몇 가지 작은 습관이 이 공간을 이용하는 모두에게 도움이 됩니다. 세탁물을 제때 수거하고, 사용 후 정리하며, 다음 게스트를 위해 준비해 두세요.\",\n      laundryHeading: \"세탁\",\n      b1: \"세탁 및 건조가 끝나면 즉시 수거해 주세요.\", b2: \"세탁기에 과부하를 주지 말고, 액체가 쏟아지면 닦아 주세요.\", b3: \"다른 게스트도 이용할 수 있도록 짧은 코스만 사용해 주세요.\", b4: \"농장이나 작업복을 세탁하기 전에 야외에서 흙, 풀, 이물질을 먼저 털어 주세요.\", b5: \"심하게 진흙이 묻었거나 기름지거나 화학물질에 젖은 것은 세탁 전 저희와 상의해 주세요.\", b6: \"빨래집게와 바구니는 사용 직후 보관 장소에 돌려놔 주세요.\", b7: \"다른 사람에게 방해가 될 수 있으니 늦은 밤 세탁은 피해 주세요.\",\n      cleaningHeading: \"청소\", cleaningIntro: \"공용 공간은 최소 주 2회 철저히 청소합니다. 청소 사이에는 사용 후 정리하고 사용한 물건을 보관 장소에 돌려놔 주세요.\",\n      toolsTitle: \"청소 도구\", toolsBody: \"진공청소기, 대걸레, 빗자루는 세탁실에 보관되어 있습니다. 반납 시 진공청소기를 충전해 두고 대걸레 헤드를 깨끗한 것으로 교체해 주세요.\",\n      suppliesTitle: \"청소용품\", suppliesBody: \"세탁 세제는 세탁기 근처에, 청소용품은 욕실 세면대 아래에 있습니다. 예비 청소용품과 걸레는 화장지와 함께 리넨 수납장에 보관되어 있습니다.\",\n      dirtyTitle: \"더러운 걸레 및 대걸레 헤드\", dirtyBody: \"더러운 걸레와 대걸레 헤드는 세탁기 옆 세탁 바구니에 넣어 향후 사용을 위해 세척할 수 있도록 해 주세요.\",\n      lowTitle: \"재고가 부족하거나 고장난 것이 있나요?\", lowBody: \"용품이 부족하거나 무언가 고장 나거나 제대로 작동하지 않는 것을 발견하면 알려 주세요. 여기에는 청소용품, 화장지, 깨끗한 걸레, 대걸레 헤드, 그리고 소음이 나거나 청소가 잘 안 되는 진공청소기가 포함됩니다.\" },\n    outdoor: { kicker: \"함께 생활하기\", title: \"야외 공간 및 조용한 시간\",\n      intro: \"당구대, 러닝머신, 로잉머신, 바비큐, 야외 식탁이 있는 야외 공간은 게스트들이 함께 휴식하고 어울리기 좋은 곳입니다. 다른 게스트의 평온함과 편안함을 고려하며 즐겨 주세요.\",\n      b1: \"당구대, 운동 기구, 바비큐 구역을 즐겨 주세요 — 소음은 적절한 수준으로 유지해 주세요.\", b2: \"식사, 음주 또는 바비큐 사용 후 정리하고 쓰레기를 버려 주세요.\", b3: \"사용 후 장비와 가구를 제자리에 돌려놓고 통로를 비워 주세요.\", b4: \"모임에 참여하지 않은 다른 게스트, 특히 일찍 일어나거나 일정이 다른 분들을 배려해 주세요.\", b5: \"작은 우려사항이 있나요? 편하시다면 정중히 말씀해 주시거나 저희에게 알려 주세요 — 격식보다는 편안한 분위기를 선호합니다.\",\n      quietHeading: \"조용한 시간\", quietText: \"조용한 시간은 오후 10시부터 오전 7시까지입니다. 이 시간에는 음악, TV, 전화 통화 소리를 낮추고, 야외에서 시끄러운 대화를 피하며, 객실 근처의 주방·세탁·발소리를 최소화해 주세요.\",\n      partyTitle: \"파티를 위한 공간이 아닙니다\", partyBody: \"이곳은 일하고, 쉬고, 여행하는 사람들을 위한 집이며 파티 장소가 아닙니다. 시끄러운 음악, 소란스러운 모임, 공격적인 행동 또는 심한 취기는 다른 게스트의 휴식과 편안함을 위협하므로 허용되지 않습니다.\" },\n    alcoholSmoking: { kicker: \"함께 생활하기\", title: \"음주, 흡연 및 약물\",\n      intro: \"음주와 흡연은 제한된 범위 내에서 허용됩니다. 모두에게 편안하고 안전한 공간을 유지하기 위해 다음의 필수 규칙을 지켜 주시기 바랍니다.\",\n      b1: \"책임감 있게 음주하세요 — 공격적이거나 무질서한 행동으로 이어지는 과음은 용납되지 않습니다.\", b2: \"흡연 및 전자담배는 지정된 실외 구역에서만 — 문이나 창문 근처에서는 절대 금지입니다.\", b3: \"흡연 전 근처 게스트에게 확인하고, 담배 연기를 불편해하는 사람이 있으면 자리를 옮겨 주세요.\", b4: \"담배꽁초는 올바르게 처리해 주세요 — 바닥에 버리거나 방치하지 마세요.\",\n      dangerTitle: \"불법 약물 및 공격적 행동 금지\", dangerBody: \"Placid Homestead는 평화롭고 약물 없는 공간입니다. 모두에게 안전한 공간을 유지하기 위해 불법 약물 사용 또는 소지, 그리고 공격적이거나 위협적인 행동은 허용되지 않습니다. 이 규칙을 위반할 경우 퇴거 통보나, 심각한 경우 경찰 개입으로 이어질 수 있습니다.\" },\n    animals: { kicker: \"함께 생활하기\", title: \"동물 및 농장 생활\",\n      intro: \"이곳 경험의 일부는 이 땅에 사는 동물들과 공간을 공유하는 것입니다. 가축과 반려동물이 자유롭게 돌아다니므로 집과 부지 주변에서 자주 볼 수 있습니다 — 그것도 이곳의 매력 중 하나입니다. 다만 이들도 동물이므로 약간의 주의와 배려가 큰 도움이 됩니다.\",\n      b1: \"허락하지 않은 한 동물에게 먹이를 주지 마세요.\", b2: \"쫓아다니거나, 괴롭히거나, 들어 올리거나, 그 외에 방해하지 마세요.\", b3: \"출입문은 항상 닫아 두고, 운전하거나 걸을 때 동물을 주의해 주세요.\", b4: \"풀려나거나, 다치거나, 아프거나, 공격적으로 행동하는 동물을 발견하면 신고해 주세요.\",\n      petsTitle: \"체류 중 반려동물 및 아이 동반 불가\", petsBody: \"공동 근로자 숙소로서 적합한 환경을 유지하기 위해, 게스트는 본인의 자녀, 아기 또는 반려동물/동물을 데리고 함께 머물 수 없으며, 방문객이 자녀, 아기 또는 반려동물/동물을 데려오는 것도 허용되지 않습니다 — 사전 승인을 받은 경우는 예외입니다.\" },\n    wifi: { kicker: \"와이파이 및 기기\", title: \"와이파이, 프린트 및 엔터테인먼트\",\n      wifiHeading: \"와이파이 세부 정보\", wifiText: \"시골 지역 인터넷은 익숙하신 것보다 다소 느리거나 불안정할 수 있습니다 — 날씨, 정전, 기지국과의 거리 등이 영향을 미치니 양해 부탁드립니다. 다른 게스트의 속도를 늦추는 대용량 다운로드는 피해 주시고, 연결이 끊기면 알려 주세요 — 일부 장애는 저희 통제 밖이지만 항상 확인해 드립니다.\",\n      wifiCallout: \"와이파이 연결 정보는 게시판과 객실에 안내되어 있습니다.\",\n      printingHeading: \"프린트\", printingText: \"와이파이 프린터(Brother HL-L2400DW, 메인 하우스)는 비자 서류, 여행 서류, 티켓, 서식 등 적절한 개인 용도로 무료 이용 가능합니다.\",\n      printB1: \"인쇄 전 문서를 확인해 주세요.\", printB2: \"인쇄물은 신속히 수거해 주세요.\", printB3: \"과도하거나 반복적인 인쇄는 소정의 비용이 부과될 수 있습니다.\", printB4: \"연결에 도움이 필요하시면 알려 주세요.\",\n      tvHeading: \"스마트 TV\", tvText: \"개인 오락을 위해 스마트 TV를 제공해 드렸습니다. 다음 안내사항을 따라 주시고, 문제가 있으면 알려 주세요.\",\n      tvB1: \"본인의 스트리밍 계정을 사용하고, 나가시기 전에 로그아웃해 주세요.\", tvB2: \"음량은 적절한 수준으로 유지해 주세요.\", tvB3: \"체크아웃 전 언어 설정을 영어로 되돌려 주세요.\", tvB4: \"설정에 도움이 필요하시면 메시지 주세요.\" },\n    aircon: { kicker: \"와이파이 및 기기\", title: \"냉난방\",\n      intro: \"가능한 경우 편안한 숙박을 위해 에어컨과 난방기기를 제공해 드렸습니다. 안전한 사용과 전력 소비 절감을 위해 다음 안내사항을 따라 주세요.\",\n      b1: \"에어컨이나 난방 작동 중에는 문과 창문을 닫아 주세요.\", b2: \"잠시 방을 비울 때는 전원을 꺼 주세요.\", b3: \"극단적인 설정은 피하고 필터와 통풍구를 깨끗하게 유지해 주세요.\", b4: \"난방기는 침구, 커튼, 가구에서 멀리 두세요.\", b5: \"누수, 이상한 냄새, 특이한 소음 또는 냉난방이 잘 안 되는 경우 신고해 주세요.\", b6: \"손상되거나 낡거나 안전하지 않아 보이는 것은 사용하지 마세요.\",\n      unsureTitle: \"작동 방법을 모르시나요?\", unsureBody: \"언제든 문의해 주세요 — 실수로 손상시키는 것보다 항상 낫습니다.\" },\n        wasteSeptic: { kicker: \"시설 시스템\", title: \"폐기물 및 정화조 시스템\",\n      intro: \"시골 지역 부지는 도시와는 조금 다르게 작동하는 정화조 및 폐기물 시스템에 의존하며, 잘못된 것이 잘못된 곳에 들어가면 민감하게 반응할 수 있습니다. 쓰레기, 재활용품, 배수구를 정리하고 올바르게 사용하는 것은 전체 부지를 보호하고 이곳에 머무는 모든 사람들을 위해 원활하게 유지하는 데 도움이 됩니다.\",\n      b1: \"올바른 쓰레기통을 사용하세요 — 객실이나 공용 공간에 쓰레기를 방치하지 마세요.\", b2: \"음식물 쓰레기는 밀봉하여 해충을 유인하지 않도록 하세요.\", b3: \"배터리, 화학물질, 오일 또는 위험한 것을 버리기 전에는 저희에게 문의해 주세요.\",\n      neverTitle: \"배수구에 절대 흘려보내지 마세요\", neverBody: \"조리용 기름이나 지방, 페인트나 화학물질, 음식물 찌꺼기, 커피 찌꺼기, 약물, 진흙, 또는 물티슈와 위생용품. 정화조 시스템은 이를 처리할 수 없습니다 — 접시는 쓰레기통에 긁어내고, 진흙 묻은 신발은 실외에서 호스로 씻어 주세요.\",\n      reportTitle: \"조기에 알려주세요\", reportBody: \"배수가 느리거나, 악취가 나거나, 꾸르륵 소리가 나거나, 물이 역류하나요? 즉시 알려 주세요 — 여기서는 작은 문제가 빠르게 커집니다.\" },\n    utilities: { kicker: \"시설 시스템\", title: \"전력 및 유틸리티\",\n      intro: \"가끔 전력이 중단될 수 있습니다. 여러 기기를 동시에 사용하면 전기 시스템에 과부하가 걸려 모두의 전력 공급이 중단될 수 있으니 유의해 주세요.\",\n      b1: \"필요 없을 때는 조명, 선풍기, 히터, 에어컨을 꺼 주세요.\", b2: \"수도, 전기, 인터넷 관련 고장은 조기에 알려 주세요.\",\n      dontTouchTitle: \"만지지 말아 주세요\", dontTouchBody: \"계량기, 펌프, 탱크, 태양광 시스템, 배터리 또는 스위치는 저희에게 맡겨 주세요.\" },\n    maintenance: { kicker: \"시설 시스템\", title: \"유지보수\",\n      intro: \"부지 곳곳에서 때때로 유지보수 작업이 필요할 수 있으며, 이로 인해 소음이 발생하거나 전력·수도 공급이 잠시 중단될 수 있습니다 — 이러한 경우 양해 부탁드립니다.\",\n      b1: \"수도, 전기 또는 인터넷 관련 고장은 조기에 알려 주시면 문제가 발생하기 전에 수리할 수 있습니다.\",\n      accessTitle: \"객실 출입\", accessBody: \"수리나 안전 점검을 위해 가끔 객실이나 공용 공간에 출입해야 할 수 있습니다 — 가능한 경우 사전에 안내해 드리겠습니다.\" },\n    mail: { kicker: \"시설 시스템\", title: \"우편 및 배송\",\n      intro: \"배송물은 지정된 우편 구역을 통해 관리됩니다 — 미리 알려 주시면 원활히 진행하는 데 도움이 됩니다.\",\n      b1: \"우편물과 배송물은 메인 하우스 주방 근처의 지정 우편 구역으로 전달됩니다.\", b2: \"패독 룸에 거주하는 게스트는 우편물이 도착하면 안내받게 됩니다.\", b3: \"긴급하거나 귀중하거나 다른 이름으로 오는 물건을 기다리신다면 미리 알려 주세요.\", b4: \"본인의 우편물은 신속히 수거해 주세요.\",\n      noteTitle: \"참고해 주세요\", noteBody: \"모든 우편물이 올바른 위치에 수거·보관되고 게스트에게 안내되도록 노력하고 있으나, 우편물 관리는 게스트 본인의 책임입니다.\" },\n    leaving: { kicker: \"퇴실 준비\", title: \"소지품, 룸메이트 및 체크아웃\",\n      intro: \"간단한 습관이 다음 이용자를 포함한 모두에게 공용 숙소를 편안하게 유지해 줍니다.\",\n      p1: \"소지품은 안전하고 정돈되게 보관하고, 귀중품은 공용 공간이나 잠기지 않은 차량에 두지 마세요 — 분실, 도난 또는 손상된 개인 물품에 대해 저희는 책임지지 않습니다.\",\n      goodHabitsHeading: \"좋은 룸메이트 습관\",\n      gb1: \"사용 후 정리하고 다른 사람의 수면 및 근무 시간을 존중해 주세요.\", gb2: \"무언가를 빌리기 전에는 먼저 물어봐 주세요.\", gb3: \"친절하게 소통하고, 문제는 조기에 알리며, 소음에 유의해 주세요.\", gb4: \"이 집과 동물들을 본인의 것처럼 소중히 대해 주세요.\",\n      beforeHeading: \"떠나기 전에\",\n      c1: \"객실 냉장고, 찬장 또는 배정된 서랍에서 개인 소지품과 음식을 모두 치워 주세요.\", c2: \"쓰레기를 버리고 객실을 깔끔하게 정리해 주세요.\", c3: \"열쇠, 리모컨 및 기타 출입 물품을 반납해 주세요.\", c4: \"침구를 벗겨 객실에 남겨 두세요.\", c5: \"스트리밍 계정에서 로그아웃하고, 인쇄물이나 우편물을 수거해 주세요.\", c6: \"세탁기나 빨랫줄에서 세탁물을 정리해 주세요.\", c7: \"손상되거나 분실된 물품을 신고해 주세요.\",\n      leftTitle: \"물건을 두고 가셨나요?\", leftBody: \"체크아웃 후 가능한 한 빨리 연락해 주세요 — 최선을 다하겠지만 물품 보관이나 반송을 보장할 수는 없습니다.\" },\n    thanks: { kicker: \"함께해 주셔서 감사합니다\", title: \"Placid Homestead\", bookTitle: \"방명록\", bookBody: \"기억에 남는 숙박이 되었기를 바랍니다. 방명록에 다정한 메시지를 남겨 주시면 감사하겠습니다. 나중에 돌아보고 다른 게스트와 공유하는 데 사용하겠습니다.\" }\n  },\n  zh_cn: {\n    switcher: \"语言\",\n    cover: { kicker: \"住客指南\", title: \"Placid Homestead\",\n      subtitle: \"舒适住宿所需的一切信息 — 民宿的运作方式,以及大家如何和睦相处。\",\n      intro: \"你好,很高兴你能来到这里。我们的大多数客人是背包客、旅行者以及在附近从事农场或地区工作的季节性工人。本指南涵盖日常事项:你的房间、共用空间、动物,以及如何让每个人都住得舒适。\" },\n    glance: { kicker: \"一览速览\", title: \"重要须知\",\n      subtitle: \"请把这一页留在手边 — 它是本指南其余内容的简版。\",\n      emergencyTitle: \"紧急情况:000\", emergencyBody: \"如遇紧迫危险、火灾、严重受伤或医疗紧急情况,请先拨打000。安全后再联系房东。\",\n      quietTitle: \"安静时段:晚上10点至早上7点\", quietBody: \"请降低音乐、通话、厨房和洗衣的声音,以及靠近房间时的脚步声。\",\n      areaTitle: \"你的区域\", areaBody: \"主屋或牧场客房 — 请使用你所在区域自己的厨房、浴室和洗衣设施。\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"连接信息张贴在公告栏以及你的房间内。\",\n      flushTitle: \"切勿冲入马桶\", flushBody: \"湿巾、卫生用品、棉签或食物。这是化粪池系统 — 请使用浴室垃圾桶。\",\n      alcoholTitle: \"饮酒与吸烟\", alcoholBody: \"适度允许。吸烟和电子烟仅限室外 — 严禁非法毒品。\",\n      gatesTitle: \"大门与动物\", gatesBody: \"请始终保持大门关闭。不要喂食、追赶或打扰动物。\",\n      considerateTitle: \"请多体谅\", considerateBody: \"请对房东以及与你共享这处房产的所有客人保持尊重和体谅。\" },\n    hosts: { kicker: \"安顿入住\", title: \"认识房东与寻求帮助\", hostName: \"西蒙与西塔\",\n      p1: \"欢迎 — 西蒙和我非常高兴能与你分享我们的家,希望你在这里的住宿愉快、开心、放松。\",\n      p2: \"西蒙常住在这里,你大多数时候都能见到他;我也大多数时候在场,协助房屋管理和客人事务。我们很乐意聊天并尽力提供帮助,不过有时我们会比较忙碌,或需要休息片刻 — 所以可能无法立即回应,但我们从不会走远,一条消息就能联系到我们。\",\n      p3: \"我们希望你在这里的时光舒适、轻松、愉快,也希望你能带着美好的回忆离开。\",\n      p4: \"我们编写了这份指南,是为了所有客人的舒适与安全,请花时间通读一遍,熟悉你在住宿期间的责任。\",\n      p5: \"感谢你的体谅与尊重 — 祝你住得愉快,我们随处可见。\",\n      signoff: \"此致,\", signoffNames: \"西蒙与西塔\",\n      getInTouch: \"联系方式\",\n      contactLines: \"西蒙手机:0474 735 389\\n西塔手机:0404 534 688\\n邮箱:placid.rooms4rent@gmail.com\",\n      whatsapp: \"WhatsApp群组\",\n      communityChat: \"扫描二维码后,你将被加入我们的社区群聊,我们会在其中分享与公共区域相关的最新消息和通知,同时也会为你和你的房间单独建立一个私聊,用于讨论住宿相关的更私人的问题、请求,或任何你不想在群里提及的事情。\",\n      dangerTitle: \"紧迫危险\",\n      dangerBody: \"请先拨打000 — 火灾、严重受伤、暴力事件、触电危险或医疗紧急情况。安全后再联系我们。\" },\n    toc: { kicker: \"目录\", title: \"目录\", groupSettled: \"安顿入住\", hosts: \"认识房东与寻求帮助\", room: \"你的房间\", zones: \"两个生活区,一个家\", around: \"安全出行\", parking: \"停车与限制区域\", groupShared: \"共用设施\", bathrooms: \"浴室与卫生间\", kitchen: \"厨房\", laundry: \"洗衣与清洁用品\", groupLiving: \"共同生活\", outdoor: \"户外空间与安静时段\", alcohol: \"酒精、吸烟与毒品\", animals: \"动物与农场生活\", groupWifi: \"Wi-Fi与设备\", wifi: \"Wi-Fi、打印与娱乐\", aircon: \"空调与暖气\", groupSystems: \"房产系统\", waste: \"垃圾处理与化粪池系统\", utilities: \"电力与水电\", maintenance: \"维护保养\", mail: \"邮件与快递\", groupLeaving: \"妥善离店\", leaving: \"个人物品、室友与退房\" },\n    room: { kicker: \"安顿入住\", title: \"你的房间\",\n      intro: \"希望你的房间舒适整洁。请遵循以下指南,帮助减少对其他客人的损坏和不便。\",\n      b1: \"房间内存放的食物应密封并妥善保存。\", b2: \"定期将垃圾放入正确的垃圾桶。\", b3: \"湿毛巾和湿衣物请勿放在床上、地板或家具上。\", b4: \"有条件时请开窗通风,保持房间清新。\", b5: \"请定期清洁房间,包括提供的床上用品。\", b6: \"一旦发现损坏、漏水、害虫、霉菌或任何故障,请立即报告。\", b7: \"即使在房间内,也请遵守关于噪音的房屋规定。\",\n      cookingTitle: \"在房间内烹饪 — 消防安全隐患\", cookingBody: \"如已提供或获批准,可基本使用微波炉或电水壶。仅此而已 — 除非电器和使用地点均已获得批准,否则房间内不得使用便携式炉灶、电煎锅、电饭煲、空气炸锅、烤面包机、露营炉、燃气灶或蜡烛。这些物品在卧室中存在真实的火灾隐患 — 未经我们同意请勿使用。\",\n      dontTitle: \"请勿\", dontBody: \"在房间之间移动家具,或移走你入住时房间里已有的任何物品(包括配备物品)——除非我们已表示可以。\",\n      arrivalTitle: \"入住时\", arrivalBody: \"如有物品缺失、损坏或功能异常,请尽快告知我们。\" },\n    zones: { kicker: \"安顿入住\", title: \"两个生活区,一个家\",\n      intro: \"Placid Homestead 有两个独立的客人区域,各自拥有独立的共用空间和独特魅力。我们请客人使用各自区域自己的厨房、浴室和洗衣设施,这样能让一切保持简单、公平,让每个人都住得舒适。不确定自己属于哪个区域?尽管问我们。\",\n      mainHouse: \"主屋\", paddockRooms: \"牧场客房\",\n      switchTitle: \"想换个区域吗?\", switchBody: \"住宿期间想搬到另一个区域?告诉我们就行 — 我们很乐意把你加入候补名单,这样如果那边有空位,在向新客人公开招募前你会优先获得机会。\" },\n    around: { kicker: \"安顿入住\", title: \"安全出行\",\n      intro: \"多个出入口、通道和大门连接着整个物业的房间、停车场和共用空间。请在移动时多加小心,以便每个人都能安全往返自己的空间。\",\n      b1: \"请使用获批准的客人出入口,并保持通道畅通。\", b2: \"在崎岖地面、碎石路及光线不足处(尤其是天黑后)请格外小心。\", b3: \"在户外请穿着结实的鞋子,尤其是夜间、雨后以及靠近动物活动区域时。\", b4: \"在物业内走动时请留意动物、车辆及其他客人。\", b5: \"如发现任何看似安全隐患或绊倒风险的情况,请报告。\",\n      gatesTitle: \"大门\", gatesBody: \"物业大门需保持关闭,以防动物逃到客人活动区域 —— 甚至逃到马路上,可能受伤或引发交通事故。如果发现大门开着,请关闭它,除非另有告知。\",\n      accessTitle: \"门禁安全\", accessBody: \"如果你获配了门禁钥匙,请勿与非经批准的客人共享或转交。\" },\n    parking: { kicker: \"房产系统\", title: \"停车与限制区域\",\n      intro: \"停车场是共用的公共空间,请体谅他人、合理停放,并始终保持通道畅通 —— 车道、大门以及农场或紧急通道必须始终保持畅通,供所有人使用。物业的部分区域因安全原因或为保护房东及其他客人的隐私而受到限制,除非另有告知,请勿进入这些区域。\",\n      parkingHeading: \"停车\",\n      b1: \"只能停在获批准的区域 —— 车辆停放风险自负。\", b2: \"切勿堵塞大门、车道或紧急/农场通道。\", b3: \"驾驶或停车时请留意动物、崎岖地面及光线不足的情况。\", b4: \"如果你的车辆漏油或漏液,请告知我们,并在要求时将其移走。\",\n      restrictedTitle: \"限制区域\", restrictedBody: \"棚屋、工作间、牧场、水坝、供水设施以及房东的私人区域均属禁区,除非另有明确说明。未上锁不代表安全 —— 进入前请务必先询问。\" },\n    bathrooms: { kicker: \"共用设施\", title: \"浴室与卫生间\",\n      intro: \"我们的浴室是共用空间,请体谅与你共用的其他客人,合理使用。几个简单的小习惯就能让空间对每个人都保持整洁舒适。\",\n      b1: \"使用后请冲洗淋浴区并清理排水口的头发。\", b2: \"擦干地板、洗手台和台面上多余的水。\", b3: \"把浸湿的浴室脚垫挂到户外晾衣绳上晾干。\", b4: \"使用后请带走个人物品 —— 不要把毛巾、衣物或洗漱用品留在原地。\", b5: \"淋浴后请把洗漱用品带回你的篮子或房间。\", b6: \"请缩短淋浴时间,以便大家都能轮到,也避免热水用完。\",\n      septicTitle: \"化粪池与灰水系统 — 需要特别注意\", septicBody: \"这是化粪池系统,不是市政下水道。只能冲厕纸和人体排泄物 —— 其他任何东西都应放入浴室垃圾桶:湿巾(即使标注“可冲厕所”)、卫生巾和卫生棉条、棉签、纸巾、避孕套、食物残渣和毛发。投错东西很快就会造成堵塞。\",\n      reportTitle: \"尽早报告\", reportBody: \"如发现漏水、堵塞、热水问题、排水缓慢、异味或咕噜声,请立即告诉我们 —— 小问题越早处理,修起来就越简单、越省钱。\" },\n    kitchen: { kicker: \"共用设施\", title: \"厨房\",\n      intro: \"我们的厨房是共用空间,请体谅与你共用的其他客人,合理使用。用完请清理干净,注意烹饪所用的时间,并保持空间不堆放无关物品 —— 让厨房保持整洁,大家都能平等使用。\",\n      b1: \"使用后请立即清洗、晾干并收好餐具。\", b2: \"使用后请擦拭台面、桌子和炉灶,并清洁电器。\", b3: \"将所有食物残渣、包装纸和包装材料放入正确的垃圾桶。\", b4: \"如果垃圾桶快满了,请勿硬塞 —— 拿到主垃圾收集点处理。\", b5: \"不要把食物过夜留在外面 —— 这会招引害虫并给他人带来不便。\", b6: \"请体谅其他等着做饭的客人 —— 不要把杂乱留给下一位。\", b7: \"共用厨房用品(餐具、锅具、容器)请留在厨房 —— 不要拿回房间。\",\n      storageTitle: \"食物存放\", storageBody: \"厨房里的冰箱和食品柜仅供房东使用。所有客人的食物应存放在自己房间内的冰箱和柜子里,除非已获配厨房抽屉用于存放。留在厨房的食物可能会被移除或丢弃。\",\n      respectTitle: \"尊重其他客人的食物\", respectBody: \"请勿在未经询问的情况下使用或拿取其他客人的食物、饮料、餐具或容器。\",\n      safetyTitle: \"烹饪安全\", safetyBody: \"烹饪时切勿离开无人看管。用完后请确保炉灶、烤箱和电器均已关闭,并保持周围区域畅通。如有溢出、烧焦或异味,请立即停止并告知我们 —— 请勿继续使用看起来不安全的电器。\" },\n    laundry: { kicker: \"共用设施\", title: \"洗衣与清洁用品\",\n      intro: \"让洗衣房顺畅运作需要大家共同努力 —— 几个小习惯就能让所有使用这个空间的人更方便。请及时收取衣物,用后整理,并为下一位客人留下整洁的空间。\",\n      laundryHeading: \"洗衣\",\n      b1: \"洗好晾干后请及时取走衣物。\", b2: \"避免让洗衣机超载,并清理任何液体溢出。\", b3: \"只使用短程序,以便其他客人也能使用。\", b4: \"清洗农场或工作服前,请先在户外抖落泥土、草屑或杂物。\", b5: \"清洗严重沾泥、油污或化学品浸泡的物品前,请先与我们确认。\", b6: \"衣夹和洗衣篮用后请立即放回原处。\", b7: \"深夜请避免洗衣,以免打扰他人。\",\n      cleaningHeading: \"清洁\", cleaningIntro: \"我们每周至少彻底清洁共用区域两次。两次清洁之间,请自行整理并将使用过的物品放回原处。\",\n      toolsTitle: \"清洁工具\", toolsBody: \"你可以在洗衣房找到吸尘器、拖把和扫帚。归还时请确保将吸尘器接上充电,并把拖把头换成干净的。\",\n      suppliesTitle: \"清洁用品\", suppliesBody: \"洗衣液放在洗衣机附近,清洁用品放在浴室洗手台下方。备用清洁用品和抹布连同厕纸一起存放在被单柜里。\",\n      dirtyTitle: \"脏抹布与拖把头\", dirtyBody: \"请将脏抹布和拖把头放入洗衣机旁边的洗衣篮中,以便清洗后再次使用。\",\n      lowTitle: \"用品快用完了或有东西坏了?\", lowBody: \"如果你发现用品快用完,或有东西损坏、功能异常,请告诉我们。这包括清洁用品、厕纸、干净抹布、拖把头,以及发出异响或清洁效果不佳的吸尘器。\" },\n    outdoor: { kicker: \"共同生活\", title: \"户外空间与安静时段\",\n      intro: \"我们的户外区域 —— 配有台球桌、跑步机、划船机、烧烤设施和户外用餐桌 —— 是客人放松和社交的好去处。请在享受的同时兼顾其他客人的安宁与舒适。\",\n      b1: \"尽情享用台球桌、健身器材和烧烤区 —— 请将噪音控制在适度水平。\", b2: \"用餐、饮酒或使用烧烤设施后请清理干净并丢弃垃圾。\", b3: \"使用后请将器材和家具放回原位,保持通道畅通。\", b4: \"请体谅不属于你聚会的其他客人 —— 尤其是需要早起或作息不同的客人。\", b5: \"有小的顾虑吗?如果方便的话请礼貌提出,或直接告诉我们 —— 我们更希望氛围轻松而非拘谨。\",\n      quietHeading: \"安静时段\", quietText: \"安静时段为晚上10点至早上7点。此期间请将音乐、电视和通话音量调低,避免在户外大声交谈,并将客房附近的厨房、洗衣和脚步声降到最低。\",\n      partyTitle: \"本处不是派对场所\", partyBody: \"这里是供人工作、休息和旅行的家,而非派对场所。大声音乐、扰乱性的聚会、攻击性行为或严重醉酒会危及其他客人的休息与舒适,因此这里不允许这些行为。\" },\n    alcoholSmoking: { kicker: \"共同生活\", title: \"酒精、吸烟与毒品\",\n      intro: \"允许饮酒和吸烟,但有一定限制。请遵守以下基本规定,以保持空间对所有人来说舒适安全。\",\n      b1: \"请负责任地饮酒 —— 导致攻击性或失控行为的过量饮酒是不可接受的。\", b2: \"吸烟和电子烟仅限在指定户外区域 —— 切勿靠近门窗。\", b3: \"吸烟前请先询问附近的客人,如有人不喜欢烟味请移步他处。\", b4: \"正确处理烟蒂 —— 切勿丢在地上或随意乱扔。\",\n      dangerTitle: \"严禁非法毒品或攻击性行为\", dangerBody: \"Placid Homestead 是一处宁静、无毒品的房产。为了让这里对所有人都保持安全,严禁使用或持有非法毒品,以及攻击性或威胁性行为。违反此规定可能导致收到迁离通知,情节严重时将报警处理。\" },\n    animals: { kicker: \"共同生活\", title: \"动物与农场生活\",\n      intro: \"在这里的部分体验就是与生活在此地的动物共享这片土地。牲畜和宠物自由活动,你会经常在住宅和庭院周围看到它们 —— 这也是这里魅力的一部分。请记住它们终究是动物,多一份小心和体谅很重要。\",\n      b1: \"除非我们同意,否则请勿投喂动物。\", b2: \"请勿追赶、逗弄、抱起或以其他方式干扰它们。\", b3: \"请始终保持大门关闭,驾驶或步行时留意动物。\", b4: \"如发现动物走失、受伤、生病或表现出攻击性,请报告。\",\n      petsTitle: \"住宿期间不可携带宠物或儿童\", petsBody: \"为保持本处适合作为共享工人宿舍,客人不得携带自己的孩子、婴儿或宠物/动物入住,也不得让访客携带孩子、婴儿或宠物/动物前来 —— 除非事先获得批准。\" },\n    wifi: { kicker: \"WI-FI与设备\", title: \"Wi-Fi、打印与娱乐\",\n      wifiHeading: \"Wi-Fi详情\", wifiText: \"乡村网络可能比你习惯的稍慢或不够稳定 —— 天气、断网和距离基站远近都可能有影响,感谢你的耐心。请避免大量下载导致其他客人网速变慢,如断线请告知我们 —— 有些故障超出我们控制范围,但我们会一直跟进处理。\",\n      wifiCallout: \"Wi-Fi连接信息将张贴在公告栏以及你的房间内。\",\n      printingHeading: \"打印\", printingText: \"Wi-Fi打印机(Brother HL-L2400DW,位于主屋)可免费用于合理的个人用途 —— 签证文件、旅行文件、票据和表格。\",\n      printB1: \"打印前请检查文件。\", printB2: \"请及时取走打印件。\", printB3: \"大量或重复打印可能会产生少量费用。\", printB4: \"需要帮助连接吗?请告诉我们。\",\n      tvHeading: \"智能电视\", tvText: \"我们为你提供了智能电视,供你个人娱乐使用。请遵循以下指南,如有任何问题请告诉我们。\",\n      tvB1: \"使用你自己的流媒体账户,离开前请登出。\", tvB2: \"请将音量保持在合理范围。\", tvB3: \"退房前请将语言设置改回英语。\", tvB4: \"需要设置帮助吗?请给我们留言。\" },\n    aircon: { kicker: \"WI-FI与设备\", title: \"空调与暖气\",\n      intro: \"在条件允许的情况下,我们已提供空调和取暖设备供你舒适使用。请遵循以下指南以确保安全使用并降低耗电量。\",\n      b1: \"空调或暖气运行时请关好门窗。\", b2: \"暂时离开房间时请将其关闭。\", b3: \"避免设置为极端温度,并保持滤网和通风口畅通。\", b4: \"取暖设备请远离床品、窗帘和家具。\", b5: \"如发现漏水、异味、异响或制冷/制热效果不佳,请报告。\", b6: \"请勿使用任何损坏、磨损或看起来不安全的设备。\",\n      unsureTitle: \"不确定某个设备怎么用?\", unsureBody: \"请随时询问 —— 总比冒险造成意外损坏要好。\" },\n        wasteSeptic: { kicker: \"房产系统\", title: \"垃圾处理与化粪池系统\",\n      intro: \"乡村房产依赖化粪池和垃圾处理系统,其运作方式与你在城镇习惯的略有不同,如果错误的东西进入错误的地方,可能会很敏感。妥善整理并正确使用垃圾、回收物和排水系统,有助于保护整个物业,让在此居住的每个人都能顺利生活。\",\n      b1: \"使用正确的垃圾桶 —— 请勿在房间或共用空间内随意堆放垃圾。\", b2: \"密封食物垃圾,以免招引害虫。\", b3: \"丢弃电池、化学品、油类或任何危险物品前请先询问。\",\n      neverTitle: \"切勿倒入排水管\", neverBody: \"食用油或油脂、油漆或化学品、食物残渣、咖啡渣、药物、泥浆,或湿巾和卫生用品。化粪池系统无法处理这些 —— 请将餐盘残渣刮入垃圾桶,并在户外用水管冲洗沾泥的靴子。\",\n      reportTitle: \"尽早报告\", reportBody: \"排水缓慢、异味、咕噜声或积水?请立即告诉我们 —— 这里的小问题会很快变大。\" },\n    utilities: { kicker: \"房产系统\", title: \"电力与水电\",\n      intro: \"有时电力可能会中断。请注意不要同时使用过多电器,以免造成电路超负荷,导致所有人的供电中断。\",\n      b1: \"不需要时请关闭灯光、风扇、暖气和空调。\", b2: \"如发现水、电或网络方面的故障,请尽早报告。\",\n      dontTouchTitle: \"请勿触碰\", dontTouchBody: \"电表、水泵、水箱、太阳能系统、电池或开关 —— 这些请交给我们处理。\" },\n    maintenance: { kicker: \"房产系统\", title: \"维护保养\",\n      intro: \"物业内不时需要进行维护工作,这可能会产生一些噪音,有时还会短暂中断电力或供水 —— 发生这种情况时感谢你的耐心配合。\",\n      b1: \"如发现水、电或网络方面的故障,请尽早报告,以便我们在造成中断前及时修复。\",\n      accessTitle: \"房间进入\", accessBody: \"我们有时可能需要进入房间或共用区域进行维修或安全检查 —— 我们会尽可能提前通知。\" },\n    mail: { kicker: \"房产系统\", title: \"邮件与快递\",\n      intro: \"快递通过指定的邮件区域进行管理 —— 提前告知有助于我们保持运作顺畅。\",\n      b1: \"邮件和快递会送到主屋厨房附近指定的邮件区域。\", b2: \"住在牧场客房的客人如收到邮件将会收到通知。\", b3: \"如你在等待紧急、贵重或以其他姓名寄送的物品,请提前告知我们。\", b4: \"请及时领取自己的邮件。\",\n      noteTitle: \"请注意\", noteBody: \"我们力求确保所有邮件被收取并放置在正确位置,同时通知客人 —— 但客人需自行负责自己的邮件。\" },\n    leaving: { kicker: \"妥善离店\", title: \"个人物品、室友与退房\",\n      intro: \"简单的习惯能让共用住宿对每个人 —— 包括下一位入住者 —— 都保持舒适。\",\n      p1: \"请妥善保管个人物品并保持整洁,不要将贵重物品留在共用区域或未上锁的车辆内 —— 对于丢失、被盗或损坏的个人物品,我们概不负责。\",\n      goodHabitsHeading: \"良好的室友习惯\",\n      gb1: \"用后请清理干净,并尊重他人的休息和工作时间。\", gb2: \"借用任何东西前请先询问。\", gb3: \"友善沟通,及时报告问题,并注意噪音。\", gb4: \"请像对待自己家一样对待这个家和动物们。\",\n      beforeHeading: \"离开前\",\n      c1: \"请从房间冰箱、柜子或分配的抽屉中取出所有个人物品和食物。\", c2: \"请倒掉垃圾并保持房间整洁。\", c3: \"请归还钥匙、遥控器及其他门禁用品。\", c4: \"请取下床上用品并留在房间内。\", c5: \"请退出流媒体账户,并收取任何打印件或邮件。\", c6: \"请从洗衣机或晾衣绳上取走衣物。\", c7: \"请报告任何损坏或丢失的物品。\",\n      leftTitle: \"落下东西了吗?\", leftBody: \"请在退房后尽快与我们联系 —— 我们会尽力协助,但无法保证物品能够被保存或寄回。\" },\n    thanks: { kicker: \"感谢你的入住\", title: \"Placid Homestead\", bookTitle: \"我们的留言簿\", bookBody: \"希望这是一次难忘的住宿体验。欢迎你在留言簿上留下一句友好的话,让我们日后回顾,也与其他客人分享。\" }\n  },\n  zh_tw: {\n    switcher: \"語言\",\n    cover: { kicker: \"住客指南\", title: \"Placid Homestead\",\n      subtitle: \"舒適住宿所需的一切資訊 — 民宿的運作方式,以及大家如何和睦相處。\",\n      intro: \"你好,很高興你能來到這裡。我們的大多數房客是背包客、旅行者以及在附近從事農場或地區工作的季節性工人。本指南涵蓋日常事項:你的房間、共用空間、動物,以及如何讓每個人都住得舒適。\" },\n    glance: { kicker: \"一覽速覽\", title: \"重要須知\",\n      subtitle: \"請把這一頁留在手邊 — 它是本指南其餘內容的簡版。\",\n      emergencyTitle: \"緊急情況:000\", emergencyBody: \"如遇緊迫危險、火災、嚴重受傷或醫療緊急情況,請先撥打000。安全後再聯繫房東。\",\n      quietTitle: \"安靜時段:晚上10點至早上7點\", quietBody: \"請降低音樂、通話、廚房和洗衣的聲音,以及靠近房間時的腳步聲。\",\n      areaTitle: \"你的區域\", areaBody: \"主屋或牧場客房 — 請使用你所在區域自己的廚房、浴室和洗衣設施。\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"連線資訊張貼在公告欄以及你的房間內。\",\n      flushTitle: \"切勿沖入馬桶\", flushBody: \"濕紙巾、衛生用品、棉花棒或食物。這是化糞池系統 — 請使用浴室垃圾桶。\",\n      alcoholTitle: \"飲酒與吸菸\", alcoholBody: \"適度允許。吸菸和電子菸僅限室外 — 嚴禁非法毒品。\",\n      gatesTitle: \"大門與動物\", gatesBody: \"請隨時保持大門關閉。不要餵食、追趕或打擾動物。\",\n      considerateTitle: \"請多體諒\", considerateBody: \"請對房東以及與你共享這處房產的所有房客保持尊重和體諒。\" },\n    hosts: { kicker: \"安頓入住\", title: \"認識房東與尋求協助\", hostName: \"賽門與希塔\",\n      p1: \"歡迎 — 賽門和我非常高興能與你分享我們的家,希望你在這裡的住宿愉快、開心、放鬆。\",\n      p2: \"賽門常住在這裡,你大多數時候都能見到他;我也大多數時候在場,協助房屋管理和房客事務。我們很樂意聊天並盡力提供協助,不過有時我們會比較忙碌,或需要休息片刻 — 所以可能無法立即回應,但我們從不會走遠,一則訊息就能聯繫到我們。\",\n      p3: \"我們希望你在這裡的時光舒適、輕鬆、愉快,也希望你能帶著美好的回憶離開。\",\n      p4: \"我們編寫了這份指南,是為了所有房客的舒適與安全,請花時間通讀一遍,熟悉你在住宿期間的責任。\",\n      p5: \"感謝你的體諒與尊重 — 祝你住得愉快,我們隨處可見。\",\n      signoff: \"此致,\", signoffNames: \"賽門與希塔\",\n      getInTouch: \"聯絡方式\",\n      contactLines: \"賽門手機:0474 735 389\\n希塔手機:0404 534 688\\n電子郵件:placid.rooms4rent@gmail.com\",\n      whatsapp: \"WhatsApp群組\",\n      communityChat: \"掃描 QR 碼後,你將被加入我們的社群群聊,我們會在其中分享與公共區域相關的最新消息和通知,同時也會為你和你的房間單獨建立一個私聊,用於討論住宿相關的更私人的問題、請求,或任何你不想在群組中提及的事情。\",\n      dangerTitle: \"緊迫危險\",\n      dangerBody: \"請先撥打000 — 火災、嚴重受傷、暴力事件、觸電危險或醫療緊急情況。安全後再聯繫我們。\" },\n    toc: { kicker: \"目錄\", title: \"目錄\", groupSettled: \"安頓入住\", hosts: \"認識房東與尋求協助\", room: \"你的房間\", zones: \"兩個生活區,一個家\", around: \"安全出行\", parking: \"停車與限制區域\", groupShared: \"共用設施\", bathrooms: \"浴室與衛生間\", kitchen: \"廚房\", laundry: \"洗衣與清潔用品\", groupLiving: \"共同生活\", outdoor: \"戶外空間與安靜時段\", alcohol: \"酒精、吸菸與毒品\", animals: \"動物與農場生活\", groupWifi: \"Wi-Fi與設備\", wifi: \"Wi-Fi、列印與娛樂\", aircon: \"空調與暖氣\", groupSystems: \"房產系統\", waste: \"垃圾處理與化糞池系統\", utilities: \"電力與水電\", maintenance: \"維護保養\", mail: \"郵件與快遞\", groupLeaving: \"妥善離店\", leaving: \"個人物品、室友與退房\" },\n    room: { kicker: \"安頓入住\", title: \"你的房間\",\n      intro: \"希望你的房間舒適整潔。請遵循以下指南,幫助減少對其他房客的損壞和不便。\",\n      b1: \"房間內存放的食物應密封並妥善保存。\", b2: \"定期將垃圾放入正確的垃圾桶。\", b3: \"濕毛巾和濕衣物請勿放在床上、地板或家具上。\", b4: \"有條件時請開窗通風,保持房間清新。\", b5: \"請定期清潔房間,包括提供的床上用品。\", b6: \"一旦發現損壞、漏水、害蟲、黴菌或任何故障,請立即回報。\", b7: \"即使在房間內,也請遵守關於噪音的房屋規定。\",\n      cookingTitle: \"在房間內烹飪 — 消防安全隱患\", cookingBody: \"如已提供或獲批准,可基本使用微波爐或電水壺。僅此而已 — 除非電器和使用地點均已獲得批准,否則房間內不得使用可攜式爐具、電煎鍋、電飯鍋、氣炸鍋、烤麵包機、露營爐、瓦斯爐或蠟燭。這些物品在臥室中存在真實的火災隱患 — 未經我們同意請勿使用。\",\n      dontTitle: \"請勿\", dontBody: \"在房間之間移動家具,或移走你入住時房間裡已有的任何物品(包括配備物品)——除非我們已表示可以。\",\n      arrivalTitle: \"入住時\", arrivalBody: \"如有物品缺失、損壞或功能異常,請盡快告知我們。\" },\n    zones: { kicker: \"安頓入住\", title: \"兩個生活區,一個家\",\n      intro: \"Placid Homestead 有兩個獨立的房客區域,各自擁有獨立的共用空間和獨特魅力。我們請房客使用各自區域自己的廚房、浴室和洗衣設施,這樣能讓一切保持簡單、公平,讓每個人都住得舒適。不確定自己屬於哪個區域?儘管問我們。\",\n      mainHouse: \"主屋\", paddockRooms: \"牧場客房\",\n      switchTitle: \"想換個區域嗎?\", switchBody: \"住宿期間想搬到另一個區域?告訴我們就行 — 我們很樂意把你加入候補名單,這樣如果那邊有空位,在向新房客公開招募前你會優先獲得機會。\" },\n    around: { kicker: \"安頓入住\", title: \"安全出行\",\n      intro: \"多個出入口、通道和大門連接著整個物業的房間、停車場和共用空間。請在移動時多加小心,以便每個人都能安全往返自己的空間。\",\n      b1: \"請使用獲批准的房客出入口,並保持通道暢通。\", b2: \"在崎嶇地面、碎石路及光線不足處(尤其是天黑後)請格外小心。\", b3: \"在戶外請穿著結實的鞋子,尤其是夜間、雨後以及靠近動物活動區域時。\", b4: \"在物業內走動時請留意動物、車輛及其他房客。\", b5: \"如發現任何看似安全隱患或絆倒風險的情況,請回報。\",\n      gatesTitle: \"大門\", gatesBody: \"物業大門需保持關閉,以防動物逃到房客活動區域 —— 甚至逃到馬路上,可能受傷或引發交通事故。如果發現大門開著,請關閉它,除非另有告知。\",\n      accessTitle: \"門禁安全\", accessBody: \"如果你獲配了門禁鑰匙,請勿與非經批准的房客共享或轉交。\" },\n    parking: { kicker: \"房產系統\", title: \"停車與限制區域\",\n      intro: \"停車場是共用的公共空間,請體諒他人、合理停放,並始終保持通道暢通 —— 車道、大門以及農場或緊急通道必須始終保持暢通,供所有人使用。物業的部分區域因安全原因或為保護房東及其他房客的隱私而受到限制,除非另有告知,請勿進入這些區域。\",\n      parkingHeading: \"停車\",\n      b1: \"只能停在獲批准的區域 —— 車輛停放風險自負。\", b2: \"切勿堵塞大門、車道或緊急/農場通道。\", b3: \"駕駛或停車時請留意動物、崎嶇地面及光線不足的情況。\", b4: \"如果你的車輛漏油或漏液,請告知我們,並在要求時將其移走。\",\n      restrictedTitle: \"限制區域\", restrictedBody: \"棚屋、工作間、牧場、水壩、供水設施以及房東的私人區域均屬禁區,除非另有明確說明。未上鎖不代表安全 —— 進入前請務必先詢問。\" },\n    bathrooms: { kicker: \"共用設施\", title: \"浴室與衛生間\",\n      intro: \"我們的浴室是共用空間,請體諒與你共用的其他房客,合理使用。幾個簡單的小習慣就能讓空間對每個人都保持整潔舒適。\",\n      b1: \"使用後請沖洗淋浴區並清理排水口的頭髮。\", b2: \"擦乾地板、洗手台和檯面上多餘的水。\", b3: \"把浸濕的浴室腳墊掛到戶外曬衣繩上晾乾。\", b4: \"使用後請帶走個人物品 —— 不要把毛巾、衣物或盥洗用品留在原地。\", b5: \"淋浴後請把盥洗用品帶回你的籃子或房間。\", b6: \"請縮短淋浴時間,以便大家都能輪到,也避免熱水用完。\",\n      septicTitle: \"化糞池與灰水系統 — 需要特別注意\", septicBody: \"這是化糞池系統,不是市政下水道。只能沖馬桶紙和人體排泄物 —— 其他任何東西都應放入浴室垃圾桶:濕紙巾(即使標示「可沖馬桶」)、衛生棉和棉條、棉花棒、紙巾、保險套、食物殘渣和毛髮。丟錯東西很快就會造成堵塞。\",\n      reportTitle: \"盡早回報\", reportBody: \"如發現漏水、堵塞、熱水問題、排水緩慢、異味或咕嚕聲,請立即告訴我們 —— 小問題越早處理,修起來就越簡單、越省錢。\" },\n    kitchen: { kicker: \"共用設施\", title: \"廚房\",\n      intro: \"我們的廚房是共用空間,請體諒與你共用的其他房客,合理使用。用完請清理乾淨,注意烹飪所用的時間,並保持空間不堆放無關物品 —— 讓廚房保持整潔,大家都能平等使用。\",\n      b1: \"使用後請立即清洗、晾乾並收好餐具。\", b2: \"使用後請擦拭檯面、桌子和爐灶,並清潔電器。\", b3: \"將所有食物殘渣、包裝紙和包裝材料放入正確的垃圾桶。\", b4: \"如果垃圾桶快滿了,請勿硬塞 —— 拿到主垃圾收集點處理。\", b5: \"不要把食物過夜留在外面 —— 這會招引害蟲並給他人帶來不便。\", b6: \"請體諒其他等著做飯的房客 —— 不要把雜亂留給下一位。\", b7: \"共用廚房用品(餐具、鍋具、容器)請留在廚房 —— 不要拿回房間。\",\n      storageTitle: \"食物存放\", storageBody: \"廚房裡的冰箱和食品櫃僅供房東使用。所有房客的食物應存放在自己房間內的冰箱和櫃子裡,除非已獲配廚房抽屜用於存放。留在廚房的食物可能會被移除或丟棄。\",\n      respectTitle: \"尊重其他房客的食物\", respectBody: \"請勿在未經詢問的情況下使用或拿取其他房客的食物、飲料、餐具或容器。\",\n      safetyTitle: \"烹飪安全\", safetyBody: \"烹飪時切勿離開無人看管。用完後請確保爐灶、烤箱和電器均已關閉,並保持周圍區域暢通。如有溢出、燒焦或異味,請立即停止並告知我們 —— 請勿繼續使用看起來不安全的電器。\" },\n    laundry: { kicker: \"共用設施\", title: \"洗衣與清潔用品\",\n      intro: \"讓洗衣房順暢運作需要大家共同努力 —— 幾個小習慣就能讓所有使用這個空間的人更方便。請及時收取衣物,用後整理,並為下一位房客留下整潔的空間。\",\n      laundryHeading: \"洗衣\",\n      b1: \"洗好晾乾後請及時取走衣物。\", b2: \"避免讓洗衣機超載,並清理任何液體溢出。\", b3: \"只使用短程序,以便其他房客也能使用。\", b4: \"清洗農場或工作服前,請先在戶外抖落泥土、草屑或雜物。\", b5: \"清洗嚴重沾泥、油污或化學品浸泡的物品前,請先與我們確認。\", b6: \"衣夾和洗衣籃用後請立即放回原處。\", b7: \"深夜請避免洗衣,以免打擾他人。\",\n      cleaningHeading: \"清潔\", cleaningIntro: \"我們每週至少徹底清潔共用區域兩次。兩次清潔之間,請自行整理並將使用過的物品放回原處。\",\n      toolsTitle: \"清潔工具\", toolsBody: \"你可以在洗衣房找到吸塵器、拖把和掃把。歸還時請確保將吸塵器接上充電,並把拖把頭換成乾淨的。\",\n      suppliesTitle: \"清潔用品\", suppliesBody: \"洗衣精放在洗衣機附近,清潔用品放在浴室洗手台下方。備用清潔用品和抹布連同衛生紙一起存放在被單櫃裡。\",\n      dirtyTitle: \"髒抹布與拖把頭\", dirtyBody: \"請將髒抹布和拖把頭放入洗衣機旁邊的洗衣籃中,以便清洗後再次使用。\",\n      lowTitle: \"用品快用完了或有東西壞了?\", lowBody: \"如果你發現用品快用完,或有東西損壞、功能異常,請告訴我們。這包括清潔用品、衛生紙、乾淨抹布、拖把頭,以及發出異響或清潔效果不佳的吸塵器。\" },\n    outdoor: { kicker: \"共同生活\", title: \"戶外空間與安靜時段\",\n      intro: \"我們的戶外區域 —— 配有撞球桌、跑步機、划船機、烤肉設施和戶外用餐桌 —— 是房客放鬆和社交的好去處。請在享受的同時兼顧其他房客的安寧與舒適。\",\n      b1: \"盡情享用撞球桌、健身器材和烤肉區 —— 請將噪音控制在適度水平。\", b2: \"用餐、飲酒或使用烤肉設施後請清理乾淨並丟棄垃圾。\", b3: \"使用後請將器材和家具放回原位,保持通道暢通。\", b4: \"請體諒不屬於你聚會的其他房客 —— 尤其是需要早起或作息不同的房客。\", b5: \"有小的顧慮嗎?如果方便的話請禮貌提出,或直接告訴我們 —— 我們更希望氛圍輕鬆而非拘謹。\",\n      quietHeading: \"安靜時段\", quietText: \"安靜時段為晚上10點至早上7點。此期間請將音樂、電視和通話音量調低,避免在戶外大聲交談,並將客房附近的廚房、洗衣和腳步聲降到最低。\",\n      partyTitle: \"本處不是派對場所\", partyBody: \"這裡是供人工作、休息和旅行的家,而非派對場所。大聲音樂、擾亂性的聚會、攻擊性行為或嚴重醉酒會危及其他房客的休息與舒適,因此這裡不允許這些行為。\" },\n    alcoholSmoking: { kicker: \"共同生活\", title: \"酒精、吸菸與毒品\",\n      intro: \"允許飲酒和吸菸,但有一定限制。請遵守以下基本規定,以保持空間對所有人來說舒適安全。\",\n      b1: \"請負責任地飲酒 —— 導致攻擊性或失控行為的過量飲酒是不可接受的。\", b2: \"吸菸和電子菸僅限在指定戶外區域 —— 切勿靠近門窗。\", b3: \"吸菸前請先詢問附近的房客,如有人不喜歡菸味請移步他處。\", b4: \"正確處理菸蒂 —— 切勿丟在地上或隨意亂丟。\",\n      dangerTitle: \"嚴禁非法毒品或攻擊性行為\", dangerBody: \"Placid Homestead 是一處寧靜、無毒品的房產。為了讓這裡對所有人都保持安全,嚴禁使用或持有非法毒品,以及攻擊性或威脅性行為。違反此規定可能導致收到遷離通知,情節嚴重時將報警處理。\" },\n    animals: { kicker: \"共同生活\", title: \"動物與農場生活\",\n      intro: \"在這裡的部分體驗就是與生活在此地的動物共享這片土地。牲畜和寵物自由活動,你會經常在住宅和庭院周圍看到它們 —— 這也是這裡魅力的一部分。請記住它們終究是動物,多一份小心和體諒很重要。\",\n      b1: \"除非我們同意,否則請勿餵食動物。\", b2: \"請勿追趕、逗弄、抱起或以其他方式干擾牠們。\", b3: \"請始終保持大門關閉,駕駛或步行時留意動物。\", b4: \"如發現動物走失、受傷、生病或表現出攻擊性,請報告。\",\n      petsTitle: \"住宿期間不可攜帶寵物或兒童\", petsBody: \"為保持本處適合作為共享工人宿舍,房客不得攜帶自己的孩子、嬰兒或寵物/動物入住,也不得讓訪客攜帶孩子、嬰兒或寵物/動物前來 —— 除非事先獲得批准。\" },\n    wifi: { kicker: \"WI-FI與設備\", title: \"Wi-Fi、列印與娛樂\",\n      wifiHeading: \"Wi-Fi詳情\", wifiText: \"鄉村網路可能比你習慣的稍慢或不夠穩定 —— 天氣、斷網和距離基地台遠近都可能有影響,感謝你的耐心。請避免大量下載導致其他房客網速變慢,如斷線請告知我們 —— 有些故障超出我們控制範圍,但我們會一直跟進處理。\",\n      wifiCallout: \"Wi-Fi連線資訊將張貼在公告欄以及你的房間內。\",\n      printingHeading: \"列印\", printingText: \"Wi-Fi印表機(Brother HL-L2400DW,位於主屋)可免費用於合理的個人用途 —— 簽證文件、旅行文件、票據和表格。\",\n      printB1: \"列印前請檢查文件。\", printB2: \"請及時取走列印件。\", printB3: \"大量或重複列印可能會產生少量費用。\", printB4: \"需要協助連線嗎?請告訴我們。\",\n      tvHeading: \"智慧電視\", tvText: \"我們為你提供了智慧電視,供你個人娛樂使用。請遵循以下指南,如有任何問題請告訴我們。\",\n      tvB1: \"使用你自己的串流帳戶,離開前請登出。\", tvB2: \"請將音量保持在合理範圍。\", tvB3: \"退房前請將語言設定改回英文。\", tvB4: \"需要設定協助嗎?請給我們留言。\" },\n    aircon: { kicker: \"WI-FI與設備\", title: \"空調與暖氣\",\n      intro: \"在條件允許的情況下,我們已提供空調和暖氣設備供你舒適使用。請遵循以下指南以確保安全使用並降低耗電量。\",\n      b1: \"空調或暖氣運行時請關好門窗。\", b2: \"暫時離開房間時請將其關閉。\", b3: \"避免設定為極端溫度,並保持濾網和通風口暢通。\", b4: \"暖氣設備請遠離床品、窗簾和家具。\", b5: \"如發現漏水、異味、異響或製冷/製熱效果不佳,請報告。\", b6: \"請勿使用任何損壞、磨損或看起來不安全的設備。\",\n      unsureTitle: \"不確定某個設備怎麼用?\", unsureBody: \"請隨時詢問 —— 總比冒險造成意外損壞要好。\" },\n        wasteSeptic: { kicker: \"房產系統\", title: \"垃圾處理與化糞池系統\",\n      intro: \"鄉村房產依賴化糞池和垃圾處理系統,其運作方式與你在城鎮習慣的略有不同,如果錯誤的東西進入錯誤的地方,可能會很敏感。妥善整理並正確使用垃圾、回收物和排水系統,有助於保護整個物業,讓在此居住的每個人都能順利生活。\",\n      b1: \"使用正確的垃圾桶 —— 請勿在房間或共用空間內隨意堆放垃圾。\", b2: \"密封食物垃圾,以免招引害蟲。\", b3: \"丟棄電池、化學品、油類或任何危險物品前請先詢問。\",\n      neverTitle: \"切勿倒入排水管\", neverBody: \"食用油或油脂、油漆或化學品、食物殘渣、咖啡渣、藥物、泥漿,或濕紙巾和衛生用品。化糞池系統無法處理這些 —— 請將餐盤殘渣刮入垃圾桶,並在戶外用水管沖洗沾泥的靴子。\",\n      reportTitle: \"盡早回報\", reportBody: \"排水緩慢、異味、咕嚕聲或積水?請立即告訴我們 —— 這裡的小問題會很快變大。\" },\n    utilities: { kicker: \"房產系統\", title: \"電力與水電\",\n      intro: \"有時電力可能會中斷。請注意不要同時使用過多電器,以免造成電路超負荷,導致所有人的供電中斷。\",\n      b1: \"不需要時請關閉燈光、風扇、暖氣和空調。\", b2: \"如發現水、電或網路方面的故障,請盡早報告。\",\n      dontTouchTitle: \"請勿觸碰\", dontTouchBody: \"電表、水泵、水箱、太陽能系統、電池或開關 —— 這些請交給我們處理。\" },\n    maintenance: { kicker: \"房產系統\", title: \"維護保養\",\n      intro: \"物業內不時需要進行維護工作,這可能會產生一些噪音,有時還會短暫中斷電力或供水 —— 發生這種情況時感謝你的耐心配合。\",\n      b1: \"如發現水、電或網路方面的故障,請盡早報告,以便我們在造成中斷前及時修復。\",\n      accessTitle: \"房間進入\", accessBody: \"我們有時可能需要進入房間或共用區域進行維修或安全檢查 —— 我們會盡可能提前通知。\" },\n    mail: { kicker: \"房產系統\", title: \"郵件與快遞\",\n      intro: \"快遞透過指定的郵件區域進行管理 —— 提前告知有助於我們保持運作順暢。\",\n      b1: \"郵件和快遞會送到主屋廚房附近指定的郵件區域。\", b2: \"住在牧場客房的房客如收到郵件將會收到通知。\", b3: \"如你在等待緊急、貴重或以其他姓名寄送的物品,請提前告知我們。\", b4: \"請及時領取自己的郵件。\",\n      noteTitle: \"請注意\", noteBody: \"我們力求確保所有郵件被收取並放置在正確位置,同時通知房客 —— 但房客需自行負責自己的郵件。\" },\n    leaving: { kicker: \"妥善離店\", title: \"個人物品、室友與退房\",\n      intro: \"簡單的習慣能讓共用住宿對每個人 —— 包括下一位入住者 —— 都保持舒適。\",\n      p1: \"請妥善保管個人物品並保持整潔,不要將貴重物品留在共用區域或未上鎖的車輛內 —— 對於遺失、被竊或損壞的個人物品,我們概不負責。\",\n      goodHabitsHeading: \"良好的室友習慣\",\n      gb1: \"用後請清理乾淨,並尊重他人的休息和工作時間。\", gb2: \"借用任何東西前請先詢問。\", gb3: \"友善溝通,及時回報問題,並注意噪音。\", gb4: \"請像對待自己家一樣對待這個家和動物們。\",\n      beforeHeading: \"離開前\",\n      c1: \"請從房間冰箱、櫃子或分配的抽屜中取出所有個人物品和食物。\", c2: \"請倒掉垃圾並保持房間整潔。\", c3: \"請歸還鑰匙、遙控器及其他門禁用品。\", c4: \"請取下床上用品並留在房間內。\", c5: \"請登出串流帳戶,並收取任何列印件或郵件。\", c6: \"請從洗衣機或曬衣繩上取走衣物。\", c7: \"請回報任何損壞或遺失的物品。\",\n      leftTitle: \"落下東西了嗎?\", leftBody: \"請在退房後盡快與我們聯繫 —— 我們會盡力協助,但無法保證物品能夠被保存或寄回。\" },\n    thanks: { kicker: \"感謝你的入住\", title: \"Placid Homestead\", bookTitle: \"我們的留言簿\", bookBody: \"希望這是一次難忘的住宿體驗。歡迎你在留言簿上留下一句友善的話,讓我們日後回顧,也與其他房客分享。\" }\n  },\n  ms: {\n    switcher: \"Bahasa\",\n    cover: { kicker: \"PANDUAN TETAMU\", title: \"Placid Homestead\",\n      subtitle: \"Semua yang anda perlukan untuk penginapan yang selesa — cara rumah ini berfungsi, dan cara kita semua hidup bersama dengan baik.\",\n      intro: \"Hai, kami gembira anda berada di sini. Kebanyakan tetamu kami ialah backpacker, pengembara dan pekerja bermusim yang tinggal berdekatan untuk kerja ladang atau serantau. Panduan ini merangkumi perkara harian: bilik anda, ruang kongsi, haiwan, dan cara mengekalkan keselesaan rumah ini untuk semua orang.\" },\n    glance: { kicker: \"SEPINTAS LALU\", title: \"Perkara Penting\",\n      subtitle: \"Simpan halaman ini berdekatan — ia adalah versi ringkas bagi segala-galanya dalam panduan ini.\",\n      emergencyTitle: \"Kecemasan: 000\", emergencyBody: \"Untuk bahaya segera, kebakaran, kecederaan serius atau kecemasan perubatan, hubungi 000 dahulu. Hubungi hos anda selepas selamat.\",\n      quietTitle: \"Waktu senyap: 10 malam–7 pagi\", quietBody: \"Kurangkan bunyi muzik, panggilan, dapur dan dobi, serta bunyi langkah berhampiran bilik.\",\n      areaTitle: \"Kawasan anda\", areaBody: \"Rumah Utama atau Paddock Rooms — sila gunakan dapur, bilik air dan dobi kawasan anda sendiri.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"Butiran sambungan terdapat di papan notis, serta di bilik anda.\",\n      flushTitle: \"Jangan sesekali siram\", flushBody: \"Tisu basah, produk kebersihan, kapas cotton bud atau makanan. Ini sistem septik — gunakan tong sampah bilik air.\",\n      alcoholTitle: \"Alkohol & merokok\", alcoholBody: \"Dibenarkan secara munasabah. Merokok dan vape di luar sahaja — tiada dadah haram.\",\n      gatesTitle: \"Pintu pagar & haiwan\", gatesBody: \"Pastikan pintu pagar sentiasa tertutup. Jangan beri makan, kejar atau ganggu haiwan.\",\n      considerateTitle: \"Bersikap bertimbang rasa\", considerateBody: \"Bersikap hormat dan bertimbang rasa terhadap Hos dan semua tetamu yang berkongsi hartanah ini dengan anda.\" },\n    hosts: { kicker: \"MENETAP\", title: \"Hos Anda & Cara Mendapatkan Bantuan\", hostName: \"Simon & Sita\",\n      p1: \"Selamat datang — Simon dan saya sangat gembira dapat berkongsi rumah kami dengan anda, dan berharap penginapan anda di sini menyenangkan, gembira dan santai.\",\n      p2: \"Anda akan sering menjumpai Simon di sekitar rumah pada kebanyakan hari kerana dia tinggal di premis ini, dan saya juga selalu berada di sini, membantu pengurusan rumah dan hubungan tetamu. Kami suka berbual dan membantu di mana boleh, walaupun ada kalanya kami sibuk atau meluangkan masa untuk berehat — jadi kami mungkin tidak selalu tersedia serta-merta, tetapi kami tidak pernah jauh, dan sentiasa boleh dihubungi melalui mesej.\",\n      p3: \"Kami mahu masa anda di sini selesa, senang dan menyeronokkan, dan berharap anda pulang dengan kenangan yang baik.\",\n      p4: \"Kami telah menyediakan panduan ini demi keselesaan dan keselamatan semua tetamu kami, jadi sila luangkan masa untuk membacanya dan memahami tanggungjawab anda semasa tinggal bersama kami.\",\n      p5: \"Terima kasih atas timbang rasa dan hormat anda — nikmati penginapan anda, dan jumpa lagi.\",\n      signoff: \"Salam hormat,\", signoffNames: \"Simon & Sita\",\n      getInTouch: \"Hubungi Kami\",\n      contactLines: \"Telefon bimbit Simon: 0474 735 389\\nTelefon bimbit Sita: 0404 534 688\\nE-mel: placid.rooms4rent@gmail.com\",\n      whatsapp: \"Kumpulan WhatsApp\",\n      communityChat: \"Selepas mengimbas kod QR, anda akan ditambah ke sembang komuniti kami, di mana kami akan berkongsi kemas kini dan pengumuman kepada semua tetamu berkaitan kawasan umum, serta sembang peribadi khas untuk anda dan bilik anda bagi sebarang perkara lebih peribadi tentang penginapan anda — soalan, permintaan, atau apa-apa yang anda mahu rahsiakan dan tidak dibangkitkan dalam kumpulan.\",\n      dangerTitle: \"Bahaya segera\",\n      dangerBody: \"Hubungi 000 dahulu — kebakaran, kecederaan serius, keganasan, bahaya elektrik atau kecemasan perubatan. Hubungi kami selepas itu, sebaik sahaja selamat.\" },\n    toc: { kicker: \"KANDUNGAN\", title: \"Kandungan\", groupSettled: \"Menetap\", hosts: \"Hos Anda & Cara Mendapatkan Bantuan\", room: \"Bilik Anda\", zones: \"Dua Ruang Kediaman, Satu Rumah\", around: \"Bergerak Dengan Selamat\", parking: \"Tempat Letak Kereta & Kawasan Terhad\", groupShared: \"Kemudahan Berkongsi\", bathrooms: \"Bilik Air & Tandas\", kitchen: \"Dapur\", laundry: \"Dobi & Bekalan Pembersihan\", groupLiving: \"Hidup Bersama\", outdoor: \"Ruang Luar & Waktu Senyap\", alcohol: \"Alkohol, Merokok & Dadah\", animals: \"Haiwan & Kehidupan Ladang\", groupWifi: \"Wi-Fi & Peralatan\", wifi: \"Wi-Fi, Percetakan & Hiburan\", aircon: \"Penyaman Udara dan Pemanas\", groupSystems: \"Sistem Hartanah\", waste: \"Pelupusan Sisa & Sistem Septik\", utilities: \"Kuasa & Utiliti\", maintenance: \"Penyelenggaraan\", mail: \"Mel & Penghantaran\", groupLeaving: \"Berlepas Dengan Baik\", leaving: \"Barangan, Rakan Serumah & Daftar Keluar\" },\n    room: { kicker: \"MENETAP\", title: \"Bilik Anda\",\n      intro: \"Kami harap bilik anda selesa dan bersih. Sila bantu kurangkan kerosakan dan kesulitan kepada tetamu dengan mengikuti garis panduan di bawah.\",\n      b1: \"Makanan yang disimpan dalam bilik anda perlu dimeteraikan dan disimpan dengan betul.\", b2: \"Buang sampah ke tong yang betul secara kerap.\", b3: \"Jauhkan tuala dan pakaian basah daripada katil, lantai dan perabot.\", b4: \"Buka tingkap apabila boleh, untuk membantu bilik kekal segar dan berangin.\", b5: \"Bersihkan bilik anda secara kerap, termasuk linen katil yang disediakan.\", b6: \"Laporkan kerosakan, kebocoran, perosak, kulapuk atau apa-apa yang rosak sebaik sahaja anda perasan.\", b7: \"Sila ikut peraturan rumah berkaitan bunyi bising, walaupun di dalam bilik.\",\n      cookingTitle: \"Memasak dalam bilik anda — risiko keselamatan kebakaran\", cookingBody: \"Penggunaan asas ketuhar gelombang mikro atau cerek elektrik adalah dibenarkan jika disediakan atau diluluskan. Itu sahaja — tiada dapur mudah alih, kuali elektrik, periuk nasi, penggoreng udara, pemanggang roti, dapur berkhemah, pembakar gas atau lilin dalam bilik melainkan kedua-dua peralatan dan lokasi telah diluluskan. Barangan ini merupakan bahaya kebakaran sebenar dalam bilik tidur — sila jangan gunakannya tanpa kelulusan kami.\",\n      dontTitle: \"Sila jangan\", dontBody: \"Mengalihkan perabot antara bilik, atau mengeluarkan apa-apa yang sudah ada dalam bilik anda semasa ketibaan — termasuk barangan yang disediakan — melainkan kami telah membenarkannya.\",\n      arrivalTitle: \"Semasa ketibaan\", arrivalBody: \"Jika ada sesuatu yang hilang, rosak atau tidak berfungsi dengan baik, beritahu kami secepat mungkin.\" },\n    zones: { kicker: \"MENETAP\", title: \"Dua Ruang Kediaman, Satu Rumah\",\n      intro: \"Placid Homestead mempunyai dua kawasan tetamu berasingan, masing-masing dengan ruang kongsi sendiri dan daya tarikan uniknya sendiri. Kami meminta tetamu kami menggunakan dapur, bilik air dan dobi kawasan sendiri sahaja. Ini memastikan semuanya kekal mudah, adil dan selesa untuk semua orang. Tidak pasti kawasan anda? Tanya kami sahaja.\",\n      mainHouse: \"Rumah Utama\", paddockRooms: \"Paddock Rooms\",\n      switchTitle: \"Mahu bertukar kawasan?\", switchBody: \"Ingin berpindah ke kawasan lain semasa penginapan anda? Beritahu kami sahaja — kami sedia menambah anda ke senarai menunggu, supaya jika ada kekosongan di sana, anda akan diberi pilihan pertama sebelum kami mengiklankannya kepada tetamu baharu.\" },\n    around: { kicker: \"MENETAP\", title: \"Bergerak Dengan Selamat\",\n      intro: \"Beberapa laluan masuk, laluan pejalan kaki dan pintu pagar menghubungkan bilik, tempat letak kereta dan ruang kongsi di seluruh hartanah. Sila berhati-hati semasa bergerak supaya semua orang boleh sampai ke ruang mereka dengan selamat.\",\n      b1: \"Gunakan laluan masuk tetamu yang diluluskan dan pastikan laluan sentiasa jelas.\", b2: \"Berhati-hati di atas tanah tidak rata, batu kelikir dan cahaya malap, terutamanya selepas gelap.\", b3: \"Pakai kasut yang kukuh di luar, terutamanya waktu malam, selepas hujan, dan berhampiran kawasan haiwan.\", b4: \"Perhatikan haiwan, kenderaan dan tetamu lain semasa bergerak di sekitar hartanah.\", b5: \"Laporkan apa-apa yang kelihatan seperti bahaya keselamatan atau risiko tersandung.\",\n      gatesTitle: \"Pintu Pagar\", gatesBody: \"Pintu pagar hartanah perlu sentiasa ditutup, untuk menghalang haiwan melarikan diri ke kawasan tetamu — atau lebih teruk, ke jalan raya, di mana mereka boleh tercedera atau menyebabkan kemalangan. Jika anda dapati pintu pagar terbuka, sila tutup, melainkan diberitahu sebaliknya.\",\n      accessTitle: \"Keselamatan Akses\", accessBody: \"Jika anda telah diberikan kunci akses, sila jangan kongsi atau berikannya kepada sesiapa yang bukan tetamu yang diluluskan.\" },\n    parking: { kicker: \"SISTEM HARTANAH\", title: \"Tempat Letak Kereta & Kawasan Terhad\",\n      intro: \"Tempat letak kereta adalah ruang kongsi, jadi sila letak kenderaan dengan bertimbang rasa dan pastikan kawasan akses sentiasa jelas — laluan masuk, pintu pagar dan akses ladang atau kecemasan perlu kekal terbuka untuk kegunaan semua. Sebahagian kawasan hartanah adalah terhad atas sebab keselamatan, atau sekadar untuk melindungi privasi Hos dan tetamu lain, jadi sila jauhi kawasan ini melainkan diberitahu sebaliknya.\",\n      parkingHeading: \"Tempat Letak Kereta\",\n      b1: \"Letak kenderaan hanya di kawasan yang diluluskan — kenderaan diletak atas risiko sendiri.\", b2: \"Jangan sekali-kali menghalang pintu pagar, laluan masuk atau akses kecemasan/ladang.\", b3: \"Perhatikan haiwan, tanah tidak rata dan cahaya malap semasa memandu atau meletak kenderaan.\", b4: \"Beritahu kami jika kenderaan anda bocor minyak atau cecair, dan alihkannya jika diminta.\",\n      restrictedTitle: \"Kawasan Terhad\", restrictedBody: \"Bangsal, bengkel, kawasan ladang, empangan, infrastruktur air dan kawasan peribadi hos adalah dilarang melainkan dinyatakan sebaliknya dengan jelas. Tidak berkunci tidak bermakna selamat — tanya dahulu sebelum masuk.\" },\n    bathrooms: { kicker: \"KEMUDAHAN BERKONGSI\", title: \"Bilik Air & Tandas\",\n      intro: \"Bilik air kami adalah ruang kongsi, jadi sila gunakannya dengan bertimbang rasa terhadap tetamu lain yang berkongsi dengan anda. Beberapa tabiat mudah membantu banyak dalam mengekalkan kebersihan dan keselesaan untuk semua.\",\n      b1: \"Bilas kawasan pancuran dan bersihkan rambut dari saliran selepas digunakan.\", b2: \"Lap lebihan air dari lantai, sinki dan permukaan meja.\", b3: \"Gantung tikar mandi yang terlalu basah di luar pada tali pengering untuk kering.\", b4: \"Bawa barang anda — jangan tinggalkan tuala, pakaian atau alat mandi berselerak.\", b5: \"Keluarkan alat mandi dari bilik pancuran selepas selesai, dan bawa ke bakul atau bilik anda.\", b6: \"Pastikan mandi ringkas, supaya semua orang mendapat giliran dan air panas tidak habis.\",\n      septicTitle: \"Sistem septik & air kelabu — memerlukan penjagaan khas\", septicBody: \"Ini adalah sistem septik, bukan pembetungan bandar. Hanya siram tisu tandas dan sisa manusia — segala yang lain masuk ke tong sampah bilik air: tisu basah (walaupun berlabel \\\"boleh disiram\\\"), pad dan tampon, kapas cotton bud, tuala kertas, kondom, makanan dan rambut. Barang yang salah boleh menyumbatnya dengan cepat.\",\n      reportTitle: \"Laporkan awal\", reportBody: \"Beritahu kami tentang kebocoran, penyumbatan, masalah air panas, saliran perlahan, bau atau bunyi berkokok dengan segera — masalah kecil jauh lebih mudah, dan murah, untuk dibaiki lebih awal.\" },\n    kitchen: { kicker: \"KEMUDAHAN BERKONGSI\", title: \"Dapur\",\n      intro: \"Dapur kami adalah ruang kongsi, jadi sila gunakannya dengan bertimbang rasa terhadap tetamu lain yang berkongsi dengannya. Bersihkan selepas anda gunakan, ambil perhatian tentang berapa lama anda memasak, dan pastikan ruang bebas daripada apa-apa yang tidak sepatutnya berada di situ — supaya ia kekal bersih, kemas, dan semua orang mendapat akses yang sama.\",\n      b1: \"Basuh, keringkan dan simpan pinggan mangkuk anda sejurus selepas digunakan.\", b2: \"Lap permukaan meja, meja makan dan dapur, serta bersihkan peralatan selepas digunakan.\", b3: \"Letakkan semua sisa makanan, pembungkus dan bahan pembungkusan ke dalam tong sampah yang betul.\", b4: \"Jika tong sampah semakin penuh, jangan bebankannya — bawa keluar ke tempat kutipan sampah utama.\", b5: \"Jangan tinggalkan makanan semalaman — ia menarik perosak dan menyusahkan orang lain.\", b6: \"Bertimbang rasa terhadap tetamu lain yang menunggu untuk memasak — jangan tinggalkan kekotoran anda untuk orang seterusnya.\", b7: \"Simpan barangan dapur kongsi (alatan, periuk, bekas) di dalam dapur — jangan bawa ke bilik anda.\",\n      storageTitle: \"Penyimpanan makanan\", storageBody: \"Peti sejuk dan almari dapur di dalam dapur dikhaskan untuk Hos sahaja. Semua makanan tetamu perlu disimpan dalam peti sejuk dan almari sendiri di dalam bilik anda, melainkan anda telah diberikan laci dapur untuk penyimpanan. Makanan yang ditinggalkan di dapur mungkin akan dialihkan atau dibuang.\",\n      respectTitle: \"Hormati makanan tetamu lain\", respectBody: \"Sila jangan gunakan atau ambil makanan, minuman, alatan atau bekas tetamu lain tanpa bertanya.\",\n      safetyTitle: \"Keselamatan memasak\", safetyBody: \"Jangan sesekali tinggalkan masakan tanpa pengawasan. Pastikan dapur, ketuhar dan peralatan dimatikan apabila anda selesai, dan pastikan kawasan sekelilingnya jelas. Jika sesuatu tertumpah, hangus atau berbau pelik, hentikan dan beritahu kami — jangan terus menggunakan peralatan yang kelihatan tidak selamat.\" },\n    laundry: { kicker: \"KEMUDAHAN BERKONGSI\", title: \"Dobi & Bekalan Pembersihan\",\n      intro: \"Memastikan dobi berjalan lancar adalah usaha bersama — beberapa tabiat kecil memudahkan semua orang yang menggunakan ruang ini. Kutip pakaian anda dengan segera, kemaskan selepas anda gunakan, dan tinggalkan segala-galanya sedia untuk tetamu seterusnya.\",\n      laundryHeading: \"Dobi\",\n      b1: \"Keluarkan pakaian basuh dan kering dengan segera apabila selesai.\", b2: \"Elakkan membebankan mesin basuh, dan bersihkan sebarang tumpahan cecair.\", b3: \"Gunakan kitaran pendek sahaja, untuk membolehkan akses kepada tetamu lain.\", b4: \"Kebaskan lumpur, rumput atau kekotoran di luar dahulu, sebelum membasuh pakaian ladang atau kerja.\", b5: \"Berbincang dengan kami dahulu sebelum membasuh apa-apa yang sangat berlumpur, berminyak atau terkena bahan kimia.\", b6: \"Pulangkan penyepit dan bakul ke tempat penyimpanan sejurus selepas digunakan.\", b7: \"Elakkan mencuci lewat malam jika ia mungkin mengganggu orang lain.\",\n      cleaningHeading: \"Pembersihan\", cleaningIntro: \"Kami membersihkan kawasan kongsi secara menyeluruh sekurang-kurangnya dua kali seminggu. Antara pembersihan, sila kemaskan selepas anda gunakan dan pulangkan apa-apa yang anda gunakan ke tempat penyimpanannya.\",\n      toolsTitle: \"Alatan Pembersihan\", toolsBody: \"Anda akan menemui pembersih vakum, mop dan penyapu disimpan di dalam bilik dobi. Sila pastikan anda mengecas pembersih vakum dan menggantikan kepala mop dengan yang bersih apabila memulangkannya.\",\n      suppliesTitle: \"Bekalan Pembersihan\", suppliesBody: \"Cecair dobi terdapat berhampiran mesin basuh dan bekalan pembersihan di bawah sinki bilik air. Bekalan pembersihan dan kain lap ganti disimpan di dalam almari linen, bersama tisu tandas.\",\n      dirtyTitle: \"Kain lap kotor & kepala mop\", dirtyBody: \"Sila letakkan kain lap kotor dan kepala mop di dalam bakul dobi bersebelahan mesin basuh, supaya ia boleh dibersihkan untuk kegunaan akan datang.\",\n      lowTitle: \"Kehabisan bekalan atau sesuatu rosak?\", lowBody: \"Sila beritahu kami jika anda perasan bekalan semakin kurang, atau sesuatu rosak atau tidak berfungsi dengan baik. Ini termasuk bekalan pembersihan, tisu tandas, kain lap bersih, kepala mop, dan pembersih vakum yang berbunyi atau tidak membersihkan dengan baik.\" },\n    outdoor: { kicker: \"HIDUP BERSAMA\", title: \"Ruang Luar & Waktu Senyap\",\n      intro: \"Kawasan luar kami — dengan meja biliard, treadmill, mesin dayung, BBQ dan meja makan luar — adalah tempat yang bagus untuk tetamu berehat dan bersosial bersama. Sila nikmatinya sambil mempertimbangkan ketenangan dan keselesaan tetamu lain.\",\n      b1: \"Nikmati meja biliard, peralatan gim dan kawasan BBQ — hanya pastikan bunyi bising pada tahap yang menghormati.\", b2: \"Bersihkan selepas makan, minum atau menggunakan BBQ, dan buang sampah anda.\", b3: \"Pulangkan peralatan dan perabot ke tempatnya selepas digunakan, dan pastikan laluan sentiasa jelas.\", b4: \"Bertimbang rasa terhadap tetamu yang bukan sebahagian daripada perhimpunan anda — terutamanya mereka yang bermula awal atau mempunyai jadual berbeza.\", b5: \"Ada sedikit kebimbangan? Sila sampaikan dengan sopan jika anda selesa, atau beritahu kami sahaja — kami lebih suka mengekalkan suasana tenang berbanding formal.\",\n      quietHeading: \"Waktu Senyap\", quietText: \"Waktu senyap bermula dari 10 malam hingga 7 pagi. Semasa waktu ini, sila pastikan muzik, TV dan panggilan telefon perlahan, elakkan perbualan kuat di luar, dan kurangkan bunyi dapur, dobi dan langkah kaki berhampiran bilik tetamu.\",\n      partyTitle: \"Bukan hartanah untuk parti\", partyBody: \"Ini adalah rumah untuk orang yang bekerja, berehat dan mengembara — bukan tempat untuk parti. Muzik kuat, perhimpunan yang mengganggu, tingkah laku agresif atau mabuk teruk mengancam rehat dan keselesaan tetamu lain, jad
