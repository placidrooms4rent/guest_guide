จ้งให้ย้ายออก หรือในกรณีร้ายแรง อาจมีการแจ้งตำรวจ\" },\n    animals: { kicker: \"การอยู่ร่วมกัน\", title: \"สัตว์เลี้ยงและชีวิตในฟาร์ม\",\n      intro: \"ส่วนหนึ่งของประสบการณ์ที่นี่คือการแบ่งปันพื้นที่กับสัตว์ที่อาศัยอยู่ในบริเวณนี้ ปศุสัตว์และสัตว์เลี้ยงเดินเพ่นพ่านอย่างอิสระ คุณจะเห็นพวกมันรอบบ้านและบริเวณเป็นประจำ — เป็นส่วนหนึ่งของเสน่ห์ที่นี่ เพียงจำไว้ว่าพวกมันยังคงเป็นสัตว์ ดังนั้นความระมัดระวังและเกรงใจเล็กน้อยจึงสำคัญมาก\",\n      b1: \"อย่าให้อาหารสัตว์เว้นแต่เราจะบอกว่าสามารถทำได้\", b2: \"อย่าไล่ ล้อเล่น อุ้ม หรือรบกวนพวกมันไม่ว่าด้วยวิธีใด\", b3: \"ปิดประตูรั้วไว้ตลอดเวลา และระวังสัตว์เมื่อขับรถหรือเดิน\", b4: \"รายงานสัตว์ที่หลุดออกมา บาดเจ็บ ป่วย หรือมีพฤติกรรมก้าวร้าว\",\n      petsTitle: \"ห้ามพาสัตว์เลี้ยงหรือเด็กมาพักด้วย\", petsBody: \"เพื่อให้สถานที่นี้เหมาะสมกับการเป็นที่พักคนงานร่วมกัน แขกไม่สามารถพาบุตร ทารก หรือสัตว์เลี้ยง/สัตว์ของตนเองมาพักด้วยได้ และไม่สามารถให้ผู้เยี่ยมชมพาบุตร ทารก หรือสัตว์เลี้ยง/สัตว์มาได้ — เว้นแต่จะได้รับการอนุมัติล่วงหน้า\" },\n    wifi: { kicker: \"ไวไฟและอุปกรณ์\", title: \"ไวไฟ การพิมพ์ และความบันเทิง\",\n      wifiHeading: \"รายละเอียดไวไฟ\", wifiText: \"อินเทอร์เน็ตในพื้นที่ชนบทอาจช้ากว่าหรือไม่เสถียรเท่าที่คุณคุ้นเคย — สภาพอากาศ ไฟฟ้าดับ และระยะห่างจากเสาสัญญาณล้วนมีผล ขอบคุณสำหรับความอดทนของคุณ โปรดหลีกเลี่ยงการดาวน์โหลดหนัก ๆ ที่ทำให้อินเทอร์เน็ตช้าลงสำหรับแขกท่านอื่น และแจ้งเราหากสัญญาณขาดหาย — บางกรณีอยู่นอกเหนือการควบคุมของเรา แต่เราจะตรวจสอบให้เสมอ\",\n      wifiCallout: \"รายละเอียดการเชื่อมต่อไวไฟจะอยู่ที่บอร์ดประกาศและในห้องพักของคุณ\",\n      printingHeading: \"การพิมพ์\", printingText: \"เครื่องพิมพ์ไวไฟ (Brother HL-L2400DW ที่บ้านหลัก) ให้ใช้งานฟรีสำหรับการใช้งานส่วนตัวตามสมควร — เอกสารวีซ่า เอกสารการเดินทาง ตั๋ว และแบบฟอร์ม\",\n      printB1: \"ตรวจสอบเอกสารก่อนพิมพ์\", printB2: \"รับเอกสารที่พิมพ์แล้วโดยเร็ว\", printB3: \"การพิมพ์จำนวนมากหรือบ่อยครั้งอาจมีค่าใช้จ่ายเล็กน้อย\", printB4: \"ต้องการความช่วยเหลือในการเชื่อมต่อหรือไม่ แจ้งเราได้เลย\",\n      tvHeading: \"สมาร์ททีวี\", tvText: \"เราได้จัดเตรียมสมาร์ททีวีไว้ให้เพื่อความบันเทิงส่วนตัวของคุณ โปรดปฏิบัติตามแนวทางเหล่านี้ และแจ้งเราหากพบปัญหาใด ๆ\",\n      tvB1: \"ใช้บัญชีสตรีมมิ่งของคุณเอง และออกจากระบบก่อนออกจากห้อง\", tvB2: \"ปรับระดับเสียงให้เหมาะสม\", tvB3: \"โปรดเปลี่ยนการตั้งค่าภาษากลับเป็นภาษาอังกฤษก่อนเช็คเอาต์\", tvB4: \"ต้องการความช่วยเหลือในการตั้งค่าหรือไม่ ส่งข้อความหาเราได้เลย\" },\n    aircon: { kicker: \"ไวไฟและอุปกรณ์\", title: \"เครื่องปรับอากาศและเครื่องทำความร้อน\",\n      intro: \"หากเป็นไปได้ เราได้จัดเตรียมเครื่องปรับอากาศและเครื่องทำความร้อนไว้เพื่อความสะดวกสบายของคุณ โปรดปฏิบัติตามแนวทางเหล่านี้เพื่อการใช้งานที่ปลอดภัยและลดการใช้พลังงาน\",\n      b1: \"ปิดประตูและหน้าต่างขณะเครื่องปรับอากาศหรือเครื่องทำความร้อนทำงาน\", b2: \"ปิดเครื่องเมื่อคุณออกจากห้องเป็นเวลานาน\", b3: \"หลีกเลี่ยงการตั้งค่าที่รุนแรงเกินไป และรักษาแผ่นกรองและช่องระบายอากาศให้สะอาด\", b4: \"วางเครื่องทำความร้อนให้ห่างจากเครื่องนอน ผ้าม่าน และเฟอร์นิเจอร์\", b5: \"แจ้งหากพบการรั่วซึม กลิ่นแปลก เสียงผิดปกติ หรือระบบทำความเย็น/ความร้อนทำงานได้ไม่ดี\", b6: \"อย่าใช้สิ่งใดที่ชำรุด ขาดหลุดลุ่ย หรือดูไม่ปลอดภัย\",\n      unsureTitle: \"ไม่แน่ใจว่าใช้งานอย่างไร?\", unsureBody: \"สอบถามได้เลย — ดีกว่าเสี่ยงทำให้เกิดความเสียหายโดยไม่ตั้งใจ\" },\n        wasteSeptic: { kicker: \"ระบบของทรัพย์สิน\", title: \"การกำจัดขยะและระบบบ่อเกรอะ\",\n      intro: \"ทรัพย์สินในชนบทอาศัยระบบบ่อเกรอะและการกำจัดขยะที่ทำงานแตกต่างจากที่คุณคุ้นเคยในเมืองเล็กน้อย และอาจอ่อนไหวหากมีสิ่งผิดพลาดเข้าไปในที่ผิด การจัดการขยะ การรีไซเคิล และท่อระบายน้ำให้เป็นระเบียบและใช้งานอย่างถูกต้องช่วยปกป้องทรัพย์สินทั้งหมด และทำให้ทุกอย่างดำเนินไปอย่างราบรื่นสำหรับทุกคนที่พักอยู่ที่นี่\",\n      b1: \"ใช้ถังขยะที่ถูกต้อง — ห้ามทิ้งขยะเกลื่อนกลาดในห้องหรือพื้นที่ส่วนกลาง\", b2: \"ปิดผนึกขยะอาหารเพื่อไม่ให้ดึงดูดแมลง\", b3: \"สอบถามก่อนทิ้งแบตเตอรี่ สารเคมี น้ำมัน หรือสิ่งอันตรายใด ๆ\",\n      neverTitle: \"ห้ามเทลงท่อระบายน้ำโดยเด็ดขาด\", neverBody: \"น้ำมันหรือไขมันจากการปรุงอาหาร สีหรือสารเคมี เศษอาหาร กากกาแฟ ยา โคลน หรือทิชชู่เปียกและผลิตภัณฑ์สุขอนามัย ระบบบ่อเกรอะไม่สามารถจัดการสิ่งเหล่านี้ได้ — ขูดเศษอาหารจากจานลงถังขยะ และฉีดน้ำล้างรองเท้าบูทที่เปื้อนโคลนกลางแจ้ง\",\n      reportTitle: \"แจ้งแต่เนิ่น ๆ\", reportBody: \"ท่อระบายช้า กลิ่นเหม็น เสียงกลั้วน้ำ หรือน้ำท่วมขัง? แจ้งเราทันที — ปัญหาเล็ก ๆ ที่นี่จะลุกลามใหญ่โตอย่างรวดเร็ว\" },\n    utilities: { kicker: \"ระบบของทรัพย์สิน\", title: \"ไฟฟ้าและสาธารณูปโภค\",\n      intro: \"บางครั้งไฟฟ้าอาจถูกตัดขัดข้อง เราขอให้คุณระมัดระวังการใช้เครื่องใช้ไฟฟ้าหลายชิ้นพร้อมกัน เนื่องจากอาจทำให้ระบบไฟฟ้าโอเวอร์โหลดและตัดไฟสำหรับทุกคน\",\n      b1: \"ปิดไฟ พัดลม เครื่องทำความร้อน และเครื่องปรับอากาศเมื่อไม่จำเป็น\", b2: \"โปรดแจ้งปัญหาเกี่ยวกับน้ำ ไฟฟ้า และอินเทอร์เน็ตแต่เนิ่น ๆ\",\n      dontTouchTitle: \"โปรดอย่าสัมผัส\", dontTouchBody: \"มาตรวัด ปั๊มน้ำ ถังเก็บน้ำ ระบบพลังงานแสงอาทิตย์ แบตเตอรี่ หรือสวิตช์ — ให้เป็นหน้าที่ของเราจัดการ\" },\n    maintenance: { kicker: \"ระบบของทรัพย์สิน\", title: \"การบำรุงรักษา\",\n      intro: \"อาจมีความจำเป็นต้องดำเนินงานบำรุงรักษาในบริเวณเป็นครั้งคราว ซึ่งอาจทำให้เกิดเสียงและบางครั้งอาจตัดไฟหรือน้ำชั่วคราว — เราขอบคุณสำหรับความอดทนของคุณเมื่อเกิดเหตุการณ์เช่นนี้\",\n      b1: \"โปรดแจ้งปัญหาเกี่ยวกับน้ำ ไฟฟ้า หรืออินเทอร์เน็ตแต่เนิ่น ๆ เพื่อให้เราสามารถซ่อมแซมได้ก่อนที่จะก่อให้เกิดการหยุดชะงัก\",\n      accessTitle: \"การเข้าถึงห้องพัก\", accessBody: \"บางครั้งเราอาจต้องเข้าไปในห้องพักหรือพื้นที่ส่วนกลางเพื่อซ่อมแซมหรือตรวจสอบความปลอดภัย — เราจะแจ้งล่วงหน้าเมื่อทำได้\" },\n    mail: { kicker: \"ระบบของทรัพย์สิน\", title: \"จดหมายและพัสดุ\",\n      intro: \"การจัดส่งจะจัดการผ่านพื้นที่รับจดหมายที่กำหนดไว้ — การแจ้งล่วงหน้าเล็กน้อยช่วยให้เราดำเนินการได้อย่างราบรื่น\",\n      b1: \"จดหมายและพัสดุจะถูกส่งไปยังพื้นที่รับจดหมายที่กำหนดใกล้ครัวในบ้านหลัก\", b2: \"แขกที่พักอยู่ใน Paddock Rooms จะได้รับแจ้งหากมีจดหมายมาส่ง\", b3: \"แจ้งเราล่วงหน้าหากคุณกำลังรอสิ่งของที่เร่งด่วน มีค่า หรือใช้ชื่ออื่น\", b4: \"รับจดหมายของคุณเองโดยเร็ว\",\n      noteTitle: \"โปรดทราบ\", noteBody: \"เรามุ่งมั่นให้แน่ใจว่าจดหมายทั้งหมดถูกเก็บและวางไว้ในตำแหน่งที่ถูกต้อง และแจ้งให้แขกทราบ — อย่างไรก็ตาม แขกต้องรับผิดชอบต่อจดหมายของตนเอง\" },\n    leaving: { kicker: \"การเตรียมตัวออกจากที่พัก\", title: \"ทรัพย์สิน เพื่อนร่วมบ้าน และการเช็คเอาต์\",\n      intro: \"นิสัยง่าย ๆ ช่วยให้ที่พักร่วมกันสะดวกสบายสำหรับทุกคน — รวมถึงผู้ที่จะเข้าพักต่อจากคุณ\",\n      p1: \"เก็บทรัพย์สินของคุณให้ปลอดภัยและเป็นระเบียบ และอย่าทิ้งของมีค่าไว้ในพื้นที่ส่วนกลางหรือในรถที่ไม่ได้ล็อก — เราไม่สามารถรับผิดชอบต่อทรัพย์สินส่วนตัวที่สูญหาย ถูกขโมย หรือเสียหาย\",\n      goodHabitsHeading: \"นิสัยที่ดีของผู้ร่วมพัก\",\n      gb1: \"ทำความสะอาดหลังใช้งานและเคารพเวลานอนและเวลาทำงานของผู้อื่น\", gb2: \"ถามก่อนยืมสิ่งของใด ๆ\", gb3: \"สื่อสารด้วยความเป็นมิตร แจ้งปัญหาแต่เนิ่น ๆ และคำนึงถึงเสียงดัง\", gb4: \"ปฏิบัติต่อบ้านหลังนี้ — และสัตว์เลี้ยง — เหมือนที่คุณต้องการให้บ้านของคุณได้รับการปฏิบัติ\",\n      beforeHeading: \"ก่อนออกเดินทาง\",\n      c1: \"นำสิ่งของส่วนตัวและอาหารทั้งหมดออกจากตู้เย็น ตู้ หรือลิ้นชักที่จัดสรรในห้องของคุณ\", c2: \"ทิ้งขยะและทำความสะอาดห้องให้เรียบร้อย\", c3: \"คืนกุญแจ รีโมท และอุปกรณ์เข้าออกอื่น ๆ\", c4: \"ถอดผ้าปูที่นอนออกและทิ้งไว้ในห้อง\", c5: \"ออกจากระบบบัญชีสตรีมมิ่ง และเก็บเอกสารที่พิมพ์หรือจดหมายใด ๆ\", c6: \"นำผ้าออกจากเครื่องซักผ้าหรือราวตากผ้า\", c7: \"แจ้งความเสียหายหรือสิ่งของที่สูญหาย\",\n      leftTitle: \"ลืมสิ่งของไว้หรือไม่?\", leftBody: \"ติดต่อเราโดยเร็วที่สุดหลังเช็คเอาต์ — เราจะพยายามอย่างเต็มที่ แต่ไม่สามารถรับประกันได้ว่าจะสามารถเก็บรักษาหรือส่งคืนสิ่งของได้\" },\n    thanks: { kicker: \"ขอบคุณที่เข้าพักกับเรา\", title: \"Placid Homestead\", bookTitle: \"สมุดเยี่ยมชมของเรา\", bookBody: \"เราหวังว่าการเข้าพักครั้งนี้จะเป็นความทรงจำที่ดี เราอยากให้คุณฝากข้อความมิตรไมตรีไว้ในสมุดเยี่ยมชมของเรา เพื่อให้เราได้ย้อนดูและแบ่งปันให้แขกท่านอื่นได้อ่านด้วย\" }\n  }\n};\n\nclass Component extends DCLogic {\n  state = { lang: 'en', unlocked: (typeof localStorage !== 'undefined' && localStorage.getItem('ph_unlocked') === '1'), code: '', error: false };\n  checkCode = () => {\n    if (this.state.code.trim().toLowerCase() === 'placid2026') {\n      try { localStorage.setItem('ph_unlocked', '1'); } catch (e) {}\n      this.setState({ unlocked: true, error: false });\n    } else {\n      this.setState({ error: true });\n    }\n  };\n  renderVals() {\n    const dict = PH_TRANSLATIONS || {};\n    const t = dict[this.state.lang] || dict.en || {};\n    return {\n      lang: this.state.lang,\n      languages: PH_LANGUAGES || [{ code: 'en', label: 'English' }],\n      setLang: (e) => this.setState({ lang: e.target.value }),\n      t,\n      unlocked: this.state.unlocked,\n      locked: !this.state.unlocked,\n      code: this.state.code,\n      error: this.state.error,\n      setCode: (e) => this.setState({ code: e.target.value, error: false }),\n      checkCode: this.checkCode,\n      onCodeKey: (e) => { if (e.key === 'Enter') this.checkCode(); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
