i ia tidak dibenarkan di sini.\" },\n    alcoholSmoking: { kicker: \"HIDUP BERSAMA\", title: \"Alkohol, Merokok & Dadah\",\n      intro: \"Penggunaan alkohol dan merokok dibenarkan, dengan had tertentu. Kami meminta anda mengikuti peraturan penting ini untuk mengekalkan ruang yang selesa dan selamat untuk semua orang.\",\n      b1: \"Minum secara bertanggungjawab — meminum berlebihan yang membawa kepada tingkah laku agresif atau tidak terkawal tidak boleh diterima.\", b2: \"Merokok dan vape hanya di luar, di kawasan yang ditetapkan — jangan sekali-kali berhampiran pintu atau tingkap.\", b3: \"Berbincang dengan tetamu berdekatan sebelum merokok, dan berpindah jika seseorang tidak selesa dengan asap.\", b4: \"Buang puntung rokok dengan betul — jangan sesekali tinggalkan di tanah atau berselerak.\",\n      dangerTitle: \"Tiada dadah haram atau tingkah laku agresif\", dangerBody: \"Placid Homestead adalah hartanah yang aman dan bebas dadah. Penggunaan atau pemilikan dadah haram, serta tingkah laku agresif atau mengancam, tidak dibenarkan, untuk mengekalkan ini sebagai ruang selamat untuk semua orang. Kegagalan mematuhi peraturan ini boleh menyebabkan notis untuk berpindah, atau dalam kes serius, penglibatan polis.\" },\n    animals: { kicker: \"HIDUP BERSAMA\", title: \"Haiwan & Kehidupan Ladang\",\n      intro: \"Sebahagian daripada pengalaman di sini adalah berkongsi hartanah dengan haiwan yang tinggal di situ. Ternakan dan haiwan peliharaan bergerak bebas, jadi anda akan melihat mereka di sekitar rumah dan hartanah dengan kerap — ia sebahagian daripada daya tarikannya. Cuma ingat mereka tetap haiwan, jadi sedikit penjagaan dan pertimbangan amat membantu.\",\n      b1: \"Jangan beri makan haiwan melainkan kami sudah katakan ia okey.\", b2: \"Jangan kejar, ganggu, angkat atau sebaliknya campur tangan dengan mereka.\", b3: \"Pastikan pintu pagar sentiasa tertutup, dan perhatikan haiwan semasa memandu atau berjalan.\", b4: \"Laporkan sebarang haiwan yang terlepas, cedera, sakit atau bertindak agresif.\",\n      petsTitle: \"Tiada haiwan peliharaan atau kanak-kanak semasa penginapan\", petsBody: \"Untuk mengekalkan hartanah sesuai sebagai penginapan pekerja berkongsi, tetamu tidak boleh membawa anak, bayi atau haiwan peliharaan/haiwan sendiri untuk tinggal bersama mereka, dan tidak boleh membenarkan pelawat membawa anak, bayi atau haiwan peliharaan/haiwan — melainkan kelulusan awal telah diberikan.\" },\n    wifi: { kicker: \"WI-FI & PERALATAN\", title: \"Wi-Fi, Percetakan & Hiburan\",\n      wifiHeading: \"Butiran Wi-Fi\", wifiText: \"Internet luar bandar boleh menjadi sedikit lebih perlahan atau kurang boleh dipercayai berbanding yang anda biasa — cuaca, gangguan dan jarak dari menara semuanya boleh menjadi faktor, jadi terima kasih atas kesabaran anda. Sila elakkan muat turun berat yang melambatkan sambungan untuk tetamu lain, dan beritahu kami jika ia terputus — sesetengah gangguan di luar kawalan kami, tetapi kami akan sentiasa menyiasat.\",\n      wifiCallout: \"Butiran sambungan Wi-Fi akan berada di papan notis, serta di bilik anda.\",\n      printingHeading: \"Percetakan\", printingText: \"Pencetak Wi-Fi (Brother HL-L2400DW, Rumah Utama) percuma untuk kegunaan peribadi yang munasabah — dokumen visa, dokumen perjalanan, tiket dan borang.\",\n      printB1: \"Semak dokumen sebelum mencetak.\", printB2: \"Kutip cetakan dengan segera.\", printB3: \"Percetakan berat atau berulang mungkin dikenakan kos kecil.\", printB4: \"Perlukan bantuan untuk menyambung? Beritahu kami sahaja.\",\n      tvHeading: \"TV Pintar\", tvText: \"Kami telah menyediakan TV Pintar untuk hiburan peribadi anda. Kami memohon anda mengikuti garis panduan ini, dan beritahu kami jika anda menghadapi sebarang masalah.\",\n      tvB1: \"Gunakan akaun streaming anda sendiri, dan log keluar sebelum meninggalkan.\", tvB2: \"Kekalkan kelantangan yang munasabah.\", tvB3: \"Sila tukar tetapan bahasa kembali ke Bahasa Inggeris sebelum daftar keluar.\", tvB4: \"Perlukan bantuan untuk menyediakannya? Hantar mesej kepada kami.\" },\n    aircon: { kicker: \"WI-FI & PERALATAN\", title: \"Penyaman Udara dan Pemanas\",\n      intro: \"Di mana mungkin, unit penyaman udara dan alat pemanas telah disediakan untuk keselesaan dan kenikmatan anda. Sila ikut garis panduan ini untuk memastikan penggunaan yang selamat dan mengurangkan penggunaan kuasa.\",\n      b1: \"Pastikan pintu dan tingkap tertutup semasa penyaman udara atau pemanas berfungsi.\", b2: \"Matikannya apabila anda keluar dari bilik untuk seketika.\", b3: \"Elakkan menetapkannya pada tahap melampau, dan pastikan penapis dan alur udara jelas.\", b4: \"Jauhkan pemanas daripada bedding, langsir dan perabot.\", b5: \"Laporkan kebocoran, bau pelik, bunyi luar biasa atau penyejukan/pemanasan yang lemah.\", b6: \"Jangan gunakan apa-apa yang rosak, lusuh atau kelihatan tidak selamat.\",\n      unsureTitle: \"Tidak pasti bagaimana sesuatu berfungsi?\", unsureBody: \"Tanya sahaja — sentiasa lebih baik daripada berisiko kerosakan tidak sengaja.\" },\n        wasteSeptic: { kicker: \"SISTEM HARTANAH\", title: \"Pelupusan Sisa & Sistem Septik\",\n      intro: \"Hartanah luar bandar bergantung kepada sistem septik dan sisa yang berfungsi sedikit berbeza daripada yang anda biasa di bandar, dan ia boleh menjadi sensitif jika benda yang salah masuk ke tempat yang salah. Menjaga sisa, kitar semula dan saliran teratur serta digunakan dengan betul membantu melindungi keseluruhan hartanah, dan memastikan semuanya berjalan lancar untuk semua yang tinggal di sini.\",\n      b1: \"Gunakan tong sampah yang betul — jangan tinggalkan sampah berselerak di bilik atau ruang kongsi.\", b2: \"Meterai sisa makanan supaya tidak menarik perosak.\", b3: \"Tanya dahulu sebelum melupuskan bateri, bahan kimia, minyak atau apa-apa yang berbahaya.\",\n      neverTitle: \"Jangan sesekali tuang ke dalam saliran\", neverBody: \"Minyak masakan atau lemak, cat atau bahan kimia, sisa makanan, hampas kopi, ubat-ubatan, lumpur, atau tisu basah dan produk kebersihan. Sistem septik tidak dapat menampungnya — kikis pinggan ke dalam tong sampah, dan basuh kasut berlumpur di luar.\",\n      reportTitle: \"Laporkan awal\", reportBody: \"Saliran perlahan, bau busuk, bunyi berkokok atau air bertakung? Beritahu kami serta-merta — masalah kecil menjadi besar dengan cepat di sini.\" },\n    utilities: { kicker: \"SISTEM HARTANAH\", title: \"Kuasa & Utiliti\",\n      intro: \"Kadangkala, bekalan kuasa mungkin terganggu. Kami meminta anda mengambil perhatian tentang menggunakan beberapa peralatan serentak, kerana ini boleh membebankan sistem elektrik dan mengganggu bekalan kuasa untuk semua orang.\",\n      b1: \"Matikan lampu, kipas, pemanas dan penyaman udara apabila tidak diperlukan.\", b2: \"Sila laporkan sebarang kerosakan bekalan air, elektrik dan internet dengan segera.\",\n      dontTouchTitle: \"Sila jangan sentuh\", dontTouchBody: \"Meter, pam, tangki, sistem solar, bateri atau suis — biarkan ini kepada kami.\" },\n    maintenance: { kicker: \"SISTEM HARTANAH\", title: \"Penyelenggaraan\",\n      intro: \"Kerja penyelenggaraan mungkin perlu dijalankan di sekitar hartanah dari semasa ke semasa, yang boleh mencipta sedikit bunyi bising dan, kadangkala, gangguan ringkas kepada bekalan kuasa atau air — kami menghargai kesabaran anda apabila ini berlaku.\",\n      b1: \"Sila laporkan sebarang kerosakan bekalan air, elektrik atau internet dengan segera, supaya kami dapat membaikinya sebelum ia menyebabkan gangguan.\",\n      accessTitle: \"Akses bilik\", accessBody: \"Kami mungkin sekali-sekala perlu mengakses bilik atau kawasan kongsi untuk pembaikan atau pemeriksaan keselamatan — kami akan memberi notis apabila boleh.\" },\n    mail: { kicker: \"SISTEM HARTANAH\", title: \"Mel & Penghantaran\",\n      intro: \"Penghantaran dianjurkan melalui kawasan mel yang ditetapkan — sedikit notis awal membantu kami mengekalkan operasi lancar.\",\n      b1: \"Mel dan penghantaran pergi ke kawasan mel yang diperuntukkan berhampiran dapur di Rumah Utama.\", b2: \"Tetamu yang tinggal di Paddock Rooms akan dimaklumkan jika mereka menerima mel.\", b3: \"Beritahu kami terlebih dahulu jika anda menjangkakan sesuatu yang mendesak, berharga, atau atas nama lain.\", b4: \"Kutip mel anda sendiri dengan segera.\",\n      noteTitle: \"Sila ambil perhatian\", noteBody: \"Kami bertujuan memastikan semua mel dikutip dan diletakkan di lokasi yang betul, dan tetamu dimaklumkan — namun, tetamu bertanggungjawab terhadap mel mereka sendiri.\" },\n    leaving: { kicker: \"BERLEPAS DENGAN BAIK\", title: \"Barangan, Rakan Serumah & Daftar Keluar\",\n      intro: \"Tabiat mudah mengekalkan penginapan berkongsi selesa untuk semua orang — termasuk sesiapa yang seterusnya.\",\n      p1: \"Pastikan barangan anda selamat dan kemas, dan jangan tinggalkan barang berharga di kawasan kongsi atau kenderaan yang tidak berkunci — kami tidak boleh bertanggungjawab terhadap barang peribadi yang hilang, dicuri atau rosak.\",\n      goodHabitsHeading: \"Tabiat rakan serumah yang baik\",\n      gb1: \"Bersihkan selepas anda gunakan dan hormati waktu tidur dan bekerja orang lain.\", gb2: \"Tanya sebelum meminjam apa-apa.\", gb3: \"Berkomunikasi dengan baik, laporkan isu awal, dan ambil perhatian tentang bunyi bising.\", gb4: \"Layan rumah ini — dan haiwan — seperti anda mahu rumah anda dilayan.\",\n      beforeHeading: \"Sebelum anda berlepas\",\n      c1: \"Keluarkan semua barangan peribadi dan makanan dari peti sejuk, almari atau laci yang diperuntukkan di bilik anda.\", c2: \"Buang sampah anda dan tinggalkan bilik anda kemas.\", c3: \"Pulangkan kunci, alat kawalan jauh dan item akses lain.\", c4: \"Tanggalkan linen katil dan tinggalkan di dalam bilik.\", c5: \"Log keluar dari akaun streaming, dan kutip sebarang cetakan atau mel.\", c6: \"Keluarkan cucian dari mesin atau tali pengering.\", c7: \"Laporkan sebarang kerosakan atau barang hilang.\",\n      leftTitle: \"Tertinggal sesuatu?\", leftBody: \"Hubungi kami secepat mungkin selepas daftar keluar — kami akan berusaha sebaik mungkin, tetapi tidak dapat menjamin barang boleh disimpan atau dipulangkan.\" },\n    thanks: { kicker: \"TERIMA KASIH KERANA MENGINAP BERSAMA KAMI\", title: \"Placid Homestead\", bookTitle: \"Buku Pelawat Kami\", bookBody: \"Kami harap ia merupakan penginapan yang bermakna. Kami amat menghargai jika anda dapat meninggalkan mesej mesra dalam buku pelawat kami, supaya kami dapat mengimbas kembali dan berkongsinya dengan tetamu lain.\" }\n  },\n  id: {\n    switcher: \"Bahasa\",\n    cover: { kicker: \"PANDUAN TAMU\", title: \"Placid Homestead\",\n      subtitle: \"Semua yang Anda butuhkan untuk menginap dengan nyaman — cara kerja rumah ini, dan bagaimana kita semua bisa akur.\",\n      intro: \"Halo, senang Anda ada di sini. Sebagian besar tamu kami adalah backpacker, pelancong, dan pekerja musiman yang tinggal di dekat sini untuk bekerja di pertanian atau wilayah setempat. Panduan ini mencakup hal-hal sehari-hari: kamar Anda, ruang bersama, hewan-hewan, dan cara menjaga kenyamanan rumah ini untuk semua orang.\" },\n    glance: { kicker: \"SEKILAS\", title: \"Hal-Hal Penting\",\n      subtitle: \"Simpan halaman ini di dekat Anda — ini adalah versi singkat dari seluruh isi panduan ini.\",\n      emergencyTitle: \"Darurat: 000\", emergencyBody: \"Untuk bahaya mendesak, kebakaran, cedera serius, atau keadaan darurat medis, hubungi 000 terlebih dahulu. Hubungi host Anda setelah aman.\",\n      quietTitle: \"Jam tenang: 22.00–07.00\", quietBody: \"Jaga volume musik, panggilan telepon, suara dapur dan cucian, serta langkah kaki dekat kamar tetap rendah.\",\n      areaTitle: \"Area Anda\", areaBody: \"Rumah Utama atau Paddock Rooms — mohon gunakan dapur, kamar mandi, dan area cuci di area Anda sendiri.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"Detail koneksi ada di papan pengumuman, serta di kamar Anda.\",\n      flushTitle: \"Jangan pernah dibuang ke toilet\", flushBody: \"Tisu basah, produk kebersihan, cotton bud, atau makanan. Ini sistem septik — gunakan tempat sampah kamar mandi.\",\n      alcoholTitle: \"Alkohol & merokok\", alcoholBody: \"Diizinkan dalam batas wajar. Merokok dan vape hanya di luar — dilarang keras narkoba.\",\n      gatesTitle: \"Gerbang & hewan\", gatesBody: \"Selalu jaga gerbang tetap tertutup. Jangan memberi makan, mengejar, atau mengganggu hewan.\",\n      considerateTitle: \"Bersikaplah pengertian\", considerateBody: \"Bersikaplah hormat dan pengertian terhadap Host dan semua tamu yang berbagi properti ini dengan Anda.\" },\n    hosts: { kicker: \"MENETAP\", title: \"Host Anda & Cara Mendapat Bantuan\", hostName: \"Simon & Sita\",\n      p1: \"Selamat datang — Simon dan saya sangat senang bisa berbagi rumah kami dengan Anda, dan berharap masa menginap Anda di sini menyenangkan, bahagia, dan menenangkan.\",\n      p2: \"Anda biasanya akan menjumpai Simon di sekitar rumah hampir setiap hari karena ia tinggal di lokasi, dan saya juga hampir selalu ada, membantu manajemen rumah dan hubungan dengan tamu. Kami senang mengobrol dan membantu semampu kami, meski terkadang kami sibuk atau meluangkan waktu untuk bersantai — jadi kami mungkin tidak selalu bisa langsung membantu, tapi kami tidak pernah jauh, dan selalu bisa dihubungi lewat pesan.\",\n      p3: \"Kami ingin waktu Anda di sini nyaman, santai, dan menyenangkan, dan berharap Anda pulang dengan kenangan indah.\",\n      p4: \"Kami menyusun panduan ini demi kenyamanan dan keselamatan semua tamu kami, jadi luangkan waktu untuk membacanya dan memahami tanggung jawab Anda selama tinggal bersama kami.\",\n      p5: \"Terima kasih atas perhatian dan rasa hormat Anda — selamat menikmati masa menginap, sampai jumpa.\",\n      signoff: \"Salam hangat,\", signoffNames: \"Simon & Sita\",\n      getInTouch: \"Hubungi Kami\",\n      contactLines: \"HP Simon: 0474 735 389\\nHP Sita: 0404 534 688\\nEmail: placid.rooms4rent@gmail.com\",\n      whatsapp: \"Grup WhatsApp\",\n      communityChat: \"Setelah memindai kode QR, Anda akan ditambahkan ke obrolan komunitas kami, tempat kami membagikan pembaruan dan pengumuman untuk semua tamu terkait area umum, serta obrolan pribadi khusus untuk Anda dan kamar Anda untuk hal-hal yang lebih personal tentang masa menginap Anda — pertanyaan, permintaan, atau apa pun yang ingin Anda rahasiakan dan tidak dibahas di grup.\",\n      dangerTitle: \"Bahaya mendesak\",\n      dangerBody: \"Hubungi 000 terlebih dahulu — kebakaran, cedera serius, kekerasan, bahaya listrik, atau keadaan darurat medis. Hubungi kami setelahnya, setelah aman.\" },\n    toc: { kicker: \"DAFTAR ISI\", title: \"Daftar Isi\", groupSettled: \"Menetap\", hosts: \"Host Anda & Cara Mendapat Bantuan\", room: \"Kamar Anda\", zones: \"Dua Ruang Hunian, Satu Rumah\", around: \"Bergerak dengan Aman\", parking: \"Parkir & Area Terbatas\", groupShared: \"Fasilitas Bersama\", bathrooms: \"Kamar Mandi & Toilet\", kitchen: \"Dapur\", laundry: \"Cucian & Perlengkapan Bersih-Bersih\", groupLiving: \"Hidup Bersama\", outdoor: \"Ruang Luar & Jam Tenang\", alcohol: \"Alkohol, Rokok & Narkoba\", animals: \"Hewan & Kehidupan Peternakan\", groupWifi: \"Wi-Fi & Peralatan\", wifi: \"Wi-Fi, Cetak & Hiburan\", aircon: \"AC dan Pemanas\", groupSystems: \"Sistem Properti\", waste: \"Pembuangan Sampah & Sistem Septik\", utilities: \"Listrik & Utilitas\", maintenance: \"Pemeliharaan\", mail: \"Surat & Pengiriman\", groupLeaving: \"Persiapan Kepulangan\", leaving: \"Barang Bawaan, Teman Sekamar & Check-Out\" },\n    room: { kicker: \"MENETAP\", title: \"Kamar Anda\",\n      intro: \"Kami harap kamar Anda nyaman dan bersih. Mohon bantu kurangi kerusakan dan ketidaknyamanan bagi tamu lain dengan mengikuti panduan di bawah.\",\n      b1: \"Makanan yang disimpan di kamar Anda harus disegel dan disimpan dengan benar.\", b2: \"Buang sampah ke tempat sampah yang benar secara rutin.\", b3: \"Jauhkan handuk dan pakaian basah dari tempat tidur, lantai, dan furnitur.\", b4: \"Buka jendela saat memungkinkan, agar kamar tetap segar dan berudara.\", b5: \"Bersihkan kamar Anda secara rutin, termasuk seprai yang disediakan.\", b6: \"Laporkan kerusakan, kebocoran, hama, jamur, atau apa pun yang rusak segera setelah Anda menyadarinya.\", b7: \"Mohon ikuti peraturan rumah terkait kebisingan, bahkan saat berada di kamar.\",\n      cookingTitle: \"Memasak di kamar — risiko kebakaran\", cookingBody: \"Penggunaan dasar microwave atau ketel listrik boleh saja jika disediakan atau disetujui. Hanya itu — tidak boleh ada kompor portabel, wajan listrik, rice cooker, air fryer, pemanggang roti, kompor kemah, kompor gas, atau lilin di kamar kecuali baik alat maupun lokasinya telah disetujui. Barang-barang ini benar-benar berisiko kebakaran di kamar tidur — mohon jangan gunakan tanpa persetujuan kami.\",\n      dontTitle: \"Mohon jangan\", dontBody: \"Memindahkan furnitur antar kamar, atau mengeluarkan apa pun yang sudah ada di kamar Anda saat Anda tiba — termasuk barang yang disediakan — kecuali kami sudah mengatakan itu boleh.\",\n      arrivalTitle: \"Saat kedatangan\", arrivalBody: \"Jika ada yang hilang, rusak, atau tidak berfungsi dengan baik, segera beri tahu kami.\" },\n    zones: { kicker: \"MENETAP\", title: \"Dua Ruang Hunian, Satu Rumah\",\n      intro: \"Placid Homestead memiliki dua area tamu terpisah, masing-masing dengan ruang bersama dan daya tariknya sendiri. Kami meminta tamu kami untuk menggunakan dapur, kamar mandi, dan area cuci di area masing-masing. Ini menjaga semuanya tetap sederhana, adil, dan nyaman untuk semua. Tidak yakin ada di area mana? Tanyakan saja pada kami.\",\n      mainHouse: \"Rumah Utama\", paddockRooms: \"Paddock Rooms\",\n      switchTitle: \"Ingin pindah area?\", switchBody: \"Ingin pindah ke area lain selama masa menginap Anda? Beri tahu kami saja — dengan senang hati kami akan menambahkan Anda ke daftar tunggu, sehingga jika ada tempat kosong di sana, Anda akan mendapat kesempatan pertama sebelum kami menawarkannya kepada tamu baru.\" },\n    around: { kicker: \"MENETAP\", title: \"Bergerak dengan Aman\",\n      intro: \"Beberapa titik akses, jalur, dan gerbang menghubungkan kamar, area parkir, dan ruang bersama di seluruh properti. Mohon berhati-hati saat berjalan agar semua orang bisa sampai ke area mereka dengan aman.\",\n      b1: \"Gunakan titik akses tamu yang disetujui dan jaga jalur tetap bersih.\", b2: \"Berhati-hatilah di permukaan tidak rata, kerikil, dan cahaya redup, terutama setelah gelap.\", b3: \"Kenakan alas kaki yang kokoh di luar ruangan, terutama malam hari, setelah hujan, dan di dekat area hewan.\", b4: \"Waspadai hewan, kendaraan, dan tamu lain saat berjalan di sekitar properti.\", b5: \"Laporkan apa pun yang tampak seperti risiko keselamatan atau bahaya tersandung.\",\n      gatesTitle: \"Gerbang\", gatesBody: \"Gerbang properti harus selalu tertutup, untuk mencegah hewan kabur ke area tamu — atau lebih buruk, ke jalan raya, di mana mereka bisa terluka atau menyebabkan kecelakaan lalu lintas. Jika Anda menemukan gerbang terbuka, mohon tutup kembali, kecuali diberi tahu sebaliknya.\",\n      accessTitle: \"Keamanan Akses\", accessBody: \"Jika Anda telah diberikan kunci akses, mohon jangan dibagikan atau diberikan kepada siapa pun yang bukan tamu yang disetujui.\" },\n    parking: { kicker: \"SISTEM PROPERTI\", title: \"Parkir & Area Terbatas\",\n      intro: \"Parkir adalah ruang bersama, jadi mohon parkir dengan bijak dan jaga area akses tetap bersih setiap saat — jalan masuk, gerbang, dan akses pertanian atau darurat harus tetap terbuka untuk digunakan semua orang. Beberapa bagian properti dibatasi karena alasan keselamatan, atau sekadar untuk melindungi privasi Host dan tamu lain, jadi mohon jauhi area ini kecuali diberi tahu sebaliknya.\",\n      parkingHeading: \"Parkir\",\n      b1: \"Parkir hanya di area yang disetujui — kendaraan diparkir dengan risiko sendiri.\", b2: \"Jangan pernah memblokir gerbang, jalan masuk, atau akses darurat/pertanian.\", b3: \"Waspadai hewan, permukaan tidak rata, dan cahaya redup saat mengemudi atau parkir.\", b4: \"Beri tahu kami jika kendaraan Anda bocor oli atau cairan, dan pindahkan jika diminta.\",\n      restrictedTitle: \"Area Terbatas\", restrictedBody: \"Gudang, bengkel, padang penggembalaan, bendungan, infrastruktur air, dan area pribadi host tidak boleh dimasuki kecuali dinyatakan sebaliknya secara jelas. Tidak terkunci bukan berarti aman — tanyakan dahulu sebelum masuk.\" },\n    bathrooms: { kicker: \"FASILITAS BERSAMA\", title: \"Kamar Mandi & Toilet\",\n      intro: \"Kamar mandi kami adalah ruang bersama, jadi mohon gunakan dengan mempertimbangkan tamu lain yang berbagi dengan Anda. Beberapa kebiasaan sederhana sangat membantu menjaga semuanya tetap bersih dan nyaman untuk semua orang.\",\n      b1: \"Bilas area shower dan bersihkan rambut dari saluran air setelah digunakan.\", b2: \"Lap kelebihan air dari lantai, wastafel, dan meja.\", b3: \"Gantung keset kamar mandi yang sangat basah di luar pada tali jemuran untuk mengering.\", b4: \"Bawa barang Anda — jangan tinggalkan handuk, pakaian, atau perlengkapan mandi berserakan.\", b5: \"Ambil perlengkapan mandi dari shower setelah selesai, dan bawa ke keranjang atau kamar Anda.\", b6: \"Mandi secukupnya, agar semua orang kebagian giliran dan air panas tidak habis.\",\n      septicTitle: \"Sistem septik & air limbah — perlu perhatian khusus\", septicBody: \"Ini adalah sistem septik, bukan saluran pembuangan kota. Hanya buang tisu toilet dan kotoran manusia — yang lainnya masuk tempat sampah kamar mandi: tisu basah (bahkan yang berlabel \\\"bisa disiram\\\"), pembalut dan tampon, cotton bud, tisu, kondom, makanan, dan rambut. Barang yang salah bisa cepat menyumbat.\",\n      reportTitle: \"Laporkan lebih awal\", reportBody: \"Beri tahu kami segera tentang kebocoran, penyumbatan, masalah air panas, saluran lambat, bau, atau suara gemericik — masalah kecil jauh lebih mudah, dan murah, untuk diperbaiki lebih awal.\" },\n    kitchen: { kicker: \"FASILITAS BERSAMA\", title: \"Dapur\",\n      intro: \"Dapur kami adalah ruang bersama, jadi mohon gunakan dengan mempertimbangkan tamu lain yang berbagi dengannya. Bersihkan setelah digunakan, perhatikan berapa lama Anda memasak, dan jaga ruang bebas dari apa pun yang bukan miliknya — agar tetap bersih, rapi, dan semua mendapat akses yang setara.\",\n      b1: \"Cuci, keringkan, dan simpan piring Anda segera setelah digunakan.\", b2: \"Lap meja, meja makan, dan kompor, serta bersihkan peralatan setelah digunakan.\", b3: \"Buang semua sisa makanan, bungkus, dan kemasan ke tempat sampah yang benar.\", b4: \"Jika tempat sampah hampir penuh, jangan dijejali — bawa ke tempat pengumpulan sampah utama.\", b5: \"Jangan biarkan makanan semalaman — bisa mengundang hama dan mengganggu orang lain.\", b6: \"Bersikaplah pengertian terhadap tamu lain yang menunggu memasak — jangan tinggalkan kekacauan untuk orang berikutnya.\", b7: \"Simpan peralatan dapur bersama (alat, panci, wadah) di dapur — jangan dibawa ke kamar Anda.\",\n      storageTitle: \"Penyimpanan makanan\", storageBody: \"Kulkas dan lemari dapur di dapur khusus untuk Host saja. Semua makanan tamu harus disimpan di kulkas dan lemari milik Anda sendiri di kamar, kecuali Anda telah diberi laci dapur untuk penyimpanan. Makanan yang dibiarkan di dapur bisa disingkirkan atau dibuang.\",\n      respectTitle: \"Hormati makanan tamu lain\", respectBody: \"Mohon jangan menggunakan atau mengambil makanan, minuman, peralatan, atau wadah tamu lain tanpa izin.\",\n      safetyTitle: \"Keamanan memasak\", safetyBody: \"Jangan pernah meninggalkan masakan tanpa pengawasan. Pastikan kompor, oven, dan peralatan dimatikan setelah selesai, dan jaga area sekitarnya tetap bersih. Jika ada yang tumpah, gosong, atau berbau aneh, hentikan dan beri tahu kami — jangan terus menggunakan peralatan yang tampak tidak aman.\" },\n    laundry: { kicker: \"FASILITAS BERSAMA\", title: \"Cucian & Perlengkapan Bersih-Bersih\",\n      intro: \"Menjaga area cuci berjalan lancar adalah usaha bersama — beberapa kebiasaan kecil membuat semuanya lebih mudah bagi semua yang menggunakan ruang ini. Ambil cucian Anda tepat waktu, bereskan setelah digunakan, dan siapkan segalanya untuk tamu berikutnya.\",\n      laundryHeading: \"Cucian\",\n      b1: \"Segera ambil cucian yang sudah dicuci dan dikeringkan setelah selesai.\", b2: \"Hindari membebani mesin cuci, dan bersihkan tumpahan cairan.\", b3: \"Gunakan siklus singkat saja, agar tamu lain juga bisa menggunakannya.\", b4: \"Kebaskan lumpur, rumput, atau kotoran di luar dulu, sebelum mencuci pakaian ladang atau kerja.\", b5: \"Konsultasikan dengan kami sebelum mencuci barang yang sangat berlumpur, berminyak, atau terkena bahan kimia.\", b6: \"Kembalikan jepitan dan keranjang ke tempat penyimpanannya segera setelah digunakan.\", b7: \"Hindari mencuci larut malam jika bisa mengganggu orang lain.\",\n      cleaningHeading: \"Kebersihan\", cleaningIntro: \"Kami membersihkan area bersama secara menyeluruh setidaknya dua kali seminggu. Di antara waktu pembersihan, mohon bereskan setelah digunakan dan kembalikan apa pun yang Anda pakai ke tempat penyimpanannya.\",\n      toolsTitle: \"Alat Kebersihan\", toolsBody: \"Anda akan menemukan vacuum cleaner, pel, dan sapu disimpan di ruang cuci. Pastikan Anda mengisi daya vacuum cleaner dan mengganti kepala pel dengan yang bersih saat mengembalikannya.\",\n      suppliesTitle: \"Perlengkapan Kebersihan\", suppliesBody: \"Deterjen cair ada di dekat mesin cuci dan perlengkapan kebersihan di bawah wastafel kamar mandi. Perlengkapan kebersihan dan kain lap cadangan disimpan di lemari linen, beserta tisu toilet.\",\n      dirtyTitle: \"Kain lap kotor & kepala pel\", dirtyBody: \"Mohon letakkan kain lap kotor dan kepala pel di keranjang cucian di sebelah mesin cuci, agar bisa dibersihkan untuk digunakan kembali.\",\n      lowTitle: \"Persediaan menipis atau ada yang rusak?\", lowBody: \"Mohon beri tahu kami jika Anda melihat persediaan menipis, atau ada yang rusak atau tidak berfungsi dengan baik. Ini termasuk perlengkapan kebersihan, tisu toilet, kain lap bersih, kepala pel, dan vacuum cleaner yang berisik atau tidak membersihkan dengan baik.\" },\n    outdoor: { kicker: \"HIDUP BERSAMA\", title: \"Ruang Luar & Jam Tenang\",\n      intro: \"Area luar kami — dengan meja biliar, treadmill, mesin dayung, BBQ dan meja makan luar — adalah tempat yang bagus bagi tamu untuk bersantai dan bersosialisasi bersama. Nikmatilah sambil mempertimbangkan ketenangan dan kenyamanan tamu lain.\",\n      b1: \"Nikmati meja biliar, peralatan gym dan area BBQ — jaga volume suara pada tingkat yang wajar.\", b2: \"Bersihkan setelah makan, minum atau menggunakan BBQ, dan buang sampah Anda.\", b3: \"Kembalikan peralatan dan furnitur ke tempatnya setelah digunakan, dan jaga jalur tetap bersih.\", b4: \"Perhatikan tamu yang bukan bagian dari kumpulan Anda — terutama yang harus bangun pagi atau memiliki jadwal berbeda.\", b5: \"Ada kekhawatiran kecil? Sampaikan dengan sopan jika Anda nyaman, atau beri tahu kami saja — kami lebih memilih suasana santai daripada formal.\",\n      quietHeading: \"Jam Tenang\", quietText: \"Jam tenang berlaku dari pukul 22.00 hingga 07.00. Selama waktu ini, mohon jaga volume musik, TV dan panggilan telepon tetap rendah, hindari percakapan keras di luar, dan minimalkan suara dapur, cucian dan langkah kaki dekat kamar tamu.\",\n      partyTitle: \"Bukan properti untuk pesta\", partyBody: \"Ini adalah rumah bagi orang yang bekerja, beristirahat dan bepergian — bukan tempat untuk pesta. Musik keras, perkumpulan yang mengganggu, perilaku agresif atau mabuk berat membahayakan istirahat dan kenyamanan tamu lain, sehingga tidak diizinkan di sini.\" },\n    alcoholSmoking: { kicker: \"HIDUP BERSAMA\", title: \"Alkohol, Rokok & Narkoba\",\n      intro: \"Konsumsi alkohol dan merokok diizinkan, dengan batasan. Kami meminta Anda mengikuti aturan penting ini untuk menjaga ruang tetap nyaman dan aman bagi semua orang.\",\n      b1: \"Minumlah dengan bertanggung jawab — minum berlebihan yang menyebabkan perilaku agresif atau tidak terkendali tidak dapat diterima.\", b2: \"Merokok dan vape hanya di luar, di area yang ditentukan — jangan pernah di dekat pintu atau jendela.\", b3: \"Konfirmasi dengan tamu di sekitar sebelum merokok, dan pindah jika ada yang tidak nyaman dengan asap.\", b4: \"Buang puntung rokok dengan benar — jangan pernah meninggalkannya di tanah atau berserakan.\",\n      dangerTitle: \"Tidak ada narkoba ilegal atau perilaku agresif\", dangerBody: \"Placid Homestead adalah properti yang tenang dan bebas narkoba. Penggunaan atau kepemilikan narkoba ilegal, serta perilaku agresif atau mengancam, tidak diizinkan, untuk menjaga tempat ini tetap aman bagi semua orang. Pelanggaran aturan ini dapat menyebabkan pemberitahuan untuk pindah, atau dalam kasus serius, keterlibatan polisi.\" },\n    animals: { kicker: \"HIDUP BERSAMA\", title: \"Hewan & Kehidupan Peternakan\",\n      intro: \"Sebagian dari pengalaman di sini adalah berbagi properti dengan hewan yang tinggal di sana. Ternak dan hewan peliharaan berkeliaran bebas, jadi Anda akan sering melihat mereka di sekitar rumah dan properti — itu bagian dari daya tariknya. Ingatlah bahwa mereka tetap hewan, jadi sedikit perhatian dan kehati-hatian sangat membantu.\",\n      b1: \"Jangan memberi makan hewan kecuali kami sudah bilang itu boleh.\", b2: \"Jangan mengejar, mengganggu, mengangkat, atau ikut campur dengan cara lain.\", b3: \"Jaga gerbang tetap tertutup setiap saat, dan waspadai hewan saat mengemudi atau berjalan.\", b4: \"Laporkan hewan mana pun yang lepas, terluka, sakit, atau bersikap agresif.\",\n      petsTitle: \"Tidak boleh membawa hewan peliharaan atau anak-anak selama menginap\", petsBody: \"Untuk menjaga properti tetap cocok sebagai akomodasi pekerja bersama, tamu tidak boleh membawa anak, bayi, atau hewan peliharaan/hewan milik sendiri untuk tinggal bersama mereka, dan tidak boleh membiarkan pengunjung membawa anak, bayi, atau hewan peliharaan/hewan — kecuali telah mendapat persetujuan sebelumnya.\" },\n    wifi: { kicker: \"WI-FI & PERALATAN\", title: \"Wi-Fi, Cetak & Hiburan\",\n      wifiHeading: \"Detail Wi-Fi\", wifiText: \"Internet pedesaan bisa sedikit lebih lambat atau kurang stabil dibanding yang biasa Anda gunakan — cuaca, gangguan, dan jarak dari menara semuanya bisa berpengaruh, jadi terima kasih atas kesabaran Anda. Mohon hindari unduhan berat yang memperlambat koneksi untuk tamu lain, dan beri tahu kami jika terputus — beberapa gangguan di luar kendali kami, tapi kami akan selalu memeriksanya.\",\n      wifiCallout: \"Detail koneksi Wi-Fi akan ada di papan pengumuman, serta di kamar Anda.\",\n      printingHeading: \"Cetak\", printingText: \"Printer Wi-Fi (Brother HL-L2400DW, Rumah Utama) gratis untuk penggunaan pribadi yang wajar — dokumen visa, dokumen perjalanan, tiket, dan formulir.\",\n      printB1: \"Periksa dokumen sebelum mencetak.\", printB2: \"Segera ambil hasil cetakan.\", printB3: \"Pencetakan berat atau berulang dapat dikenakan biaya kecil.\", printB4: \"Butuh bantuan menyambungkan? Beri tahu kami saja.\",\n      tvHeading: \"Smart TV\", tvText: \"Kami telah menyediakan Smart TV untuk hiburan pribadi Anda. Mohon ikuti panduan ini, dan beri tahu kami jika Anda mengalami masalah.\",\n      tvB1: \"Gunakan akun streaming Anda sendiri, dan logout sebelum pergi.\", tvB2: \"Jaga volume tetap wajar.\", tvB3: \"Mohon ubah pengaturan bahasa kembali ke Bahasa Inggris sebelum check-out.\", tvB4: \"Butuh bantuan mengaturnya? Kirim pesan kepada kami.\" },\n    aircon: { kicker: \"WI-FI & PERALATAN\", title: \"AC dan Pemanas\",\n      intro: \"Bila memungkinkan, unit AC dan pemanas telah disediakan demi kenyamanan Anda. Mohon ikuti panduan ini untuk memastikan penggunaan yang aman dan mengurangi konsumsi daya.\",\n      b1: \"Jaga pintu dan jendela tetap tertutup saat AC atau pemanas beroperasi.\", b2: \"Matikan saat Anda keluar kamar untuk sementara.\", b3: \"Hindari mengatur ke suhu ekstrem, dan jaga filter serta ventilasi tetap bersih.\", b4: \"Jauhkan pemanas dari sprei, tirai, dan furnitur.\", b5: \"Laporkan kebocoran, bau aneh, suara tidak biasa, atau pendinginan/pemanasan yang buruk.\", b6: \"Jangan gunakan apa pun yang rusak, aus, atau tampak tidak aman.\",\n      unsureTitle: \"Tidak yakin cara kerja sesuatu?\", unsureBody: \"Tanyakan saja — selalu lebih baik daripada berisiko kerusakan yang tidak disengaja.\" },\n        wasteSeptic: { kicker: \"SISTEM PROPERTI\", title: \"Pembuangan Sampah & Sistem Septik\",\n      intro: \"Properti pedesaan mengandalkan sistem septik dan pembuangan sampah yang bekerja sedikit berbeda dari yang biasa Anda temui di kota, dan bisa sensitif jika hal yang salah masuk ke tempat yang salah. Menjaga sampah, daur ulang, dan saluran air tetap teratur dan digunakan dengan benar membantu melindungi seluruh properti, dan menjaga semuanya berjalan lancar bagi semua yang tinggal di sini.\",\n      b1: \"Gunakan tempat sampah yang benar — jangan biarkan sampah berserakan di kamar atau area bersama.\", b2: \"Segel sampah makanan agar tidak mengundang hama.\", b3: \"Tanyakan dulu sebelum membuang baterai, bahan kimia, oli, atau apa pun yang berbahaya.\",\n      neverTitle: \"Jangan pernah dituang ke saluran air\", neverBody: \"Minyak atau lemak masakan, cat atau bahan kimia, sisa makanan, ampas kopi, obat-obatan, lumpur, atau tisu basah dan produk sanitasi. Sistem septik tidak dapat menanganinya — kerok piring ke tempat sampah, dan semprot sepatu bot yang berlumpur di luar.\",\n      reportTitle: \"Laporkan lebih awal\", reportBody: \"Saluran lambat, bau tidak sedap, suara gemericik, atau air tergenang? Beri tahu kami segera — masalah kecil cepat membesar di sini.\" },\n    utilities: { kicker: \"SISTEM PROPERTI\", title: \"Listrik & Utilitas\",\n      intro: \"Terkadang, listrik bisa terputus. Kami meminta Anda memperhatikan penggunaan beberapa peralatan sekaligus, karena ini dapat membebani sistem listrik dan mengganggu pasokan daya untuk semua orang.\",\n      b1: \"Matikan lampu, kipas, pemanas, dan AC saat tidak diperlukan.\", b2: \"Mohon segera laporkan gangguan pada pasokan air, listrik, dan internet.\",\n      dontTouchTitle: \"Mohon jangan disentuh\", dontTouchBody: \"Meteran, pompa, tangki, sistem tenaga surya, baterai, atau saklar — serahkan ini kepada kami.\" },\n    maintenance: { kicker: \"SISTEM PROPERTI\", title: \"Pemeliharaan\",\n      intro: \"Pekerjaan pemeliharaan mungkin perlu dilakukan di sekitar properti dari waktu ke waktu, yang dapat menimbulkan sedikit kebisingan dan, kadang-kadang, gangguan singkat pada pasokan listrik atau air — kami menghargai kesabaran Anda saat hal ini terjadi.\",\n      b1: \"Mohon segera laporkan gangguan pada pasokan air, listrik, atau internet, agar kami dapat memperbaikinya sebelum menyebabkan gangguan.\",\n      accessTitle: \"Akses kamar\", accessBody: \"Kadang kami mungkin perlu mengakses kamar atau area bersama untuk perbaikan atau pemeriksaan keselamatan — kami akan memberi tahu sebelumnya bila memungkinkan.\" },\n    mail: { kicker: \"SISTEM PROPERTI\", title: \"Surat & Pengiriman\",\n      intro: \"Pengiriman diatur melalui area surat yang ditentukan — sedikit pemberitahuan lebih awal membantu kami menjaga semuanya berjalan lancar.\",\n      b1: \"Surat dan pengiriman diletakkan di area surat yang dialokasikan dekat dapur di Rumah Utama.\", b2: \"Tamu yang tinggal di Paddock Rooms akan diberi tahu jika ada surat yang dikirim untuk mereka.\", b3: \"Beri tahu kami sebelumnya jika Anda menunggu sesuatu yang mendesak, berharga, atau atas nama lain.\", b4: \"Segera ambil surat Anda sendiri.\",\n      noteTitle: \"Mohon diperhatikan\", noteBody: \"Kami berupaya memastikan semua surat dikumpulkan dan ditempatkan di lokasi yang benar, dan tamu diberi tahu — namun, tamu bertanggung jawab atas surat mereka sendiri.\" },\n    leaving: { kicker: \"PERSIAPAN KEPULANGAN\", title: \"Barang Bawaan, Teman Sekamar & Check-Out\",\n      intro: \"Kebiasaan sederhana menjaga akomodasi bersama tetap nyaman bagi semua orang — termasuk siapa pun yang berikutnya.\",\n      p1: \"Jaga barang bawaan Anda aman dan rapi, dan jangan tinggalkan barang berharga di area bersama atau kendaraan yang tidak terkunci — kami tidak dapat bertanggung jawab atas barang pribadi yang hilang, dicuri, atau rusak.\",\n      goodHabitsHeading: \"Kebiasaan baik sebagai teman sekamar\",\n      gb1: \"Bersihkan setelah digunakan dan hormati jam tidur serta kerja orang lain.\", gb2: \"Tanyakan dulu sebelum meminjam apa pun.\", gb3: \"Berkomunikasilah dengan baik, laporkan masalah lebih awal, dan perhatikan kebisingan.\", gb4: \"Perlakukan rumah ini — dan hewan-hewannya — seperti Anda ingin rumah Anda diperlakukan.\",\n      beforeHeading: \"Sebelum Anda pergi\",\n      c1: \"Keluarkan semua barang pribadi dan makanan dari kulkas, lemari, atau laci yang dialokasikan di kamar Anda.\", c2: \"Buang sampah Anda dan tinggalkan kamar dalam keadaan rapi.\", c3: \"Kembalikan kunci, remote, dan item akses lainnya.\", c4: \"Lepaskan seprai dari tempat tidur dan tinggalkan di kamar.\", c5: \"Logout dari akun streaming, dan ambil hasil cetakan atau surat.\", c6: \"Ambil cucian dari mesin cuci atau tali jemuran.\", c7: \"Laporkan kerusakan atau barang yang hilang.\",\n      leftTitle: \"Ada yang tertinggal?\", leftBody: \"Hubungi kami sesegera mungkin setelah check-out — kami akan berusaha sebaik mungkin, tapi tidak dapat menjamin barang bisa disimpan atau dikembalikan.\" },\n    thanks: { kicker: \"TERIMA KASIH TELAH MENGINAP BERSAMA KAMI\", title: \"Placid Homestead\", bookTitle: \"Buku Tamu Kami\", bookBody: \"Kami harap ini menjadi pengalaman menginap yang berkesan. Kami senang jika Anda bisa meninggalkan pesan ramah di buku tamu kami, agar kami bisa mengenangnya dan membagikannya kepada tamu lain.\" }\n  },\n  vi: {\n    switcher: \"Ngôn ngữ\",\n    cover: { kicker: \"HƯỚNG DẪN KHÁCH LƯU TRÚ\", title: \"Placid Homestead\",\n      subtitle: \"Mọi thứ bạn cần cho một kỳ nghỉ thoải mái — cách trang trại vận hành, và cách mọi người hòa hợp với nhau.\",\n      intro: \"Xin chào, chúng tôi rất vui vì bạn đã ở đây. Hầu hết khách của chúng tôi là những người đi phượt, du khách và lao động thời vụ ở gần đây để làm việc nông trại hoặc trong vùng. Hướng dẫn này bao gồm những điều thường ngày: phòng của bạn, không gian chung, các loài vật nuôi, và cách giữ cho trang trại thoải mái cho tất cả mọi người.\" },\n    glance: { kicker: \"TỔNG QUAN NHANH\", title: \"Những Điều Cốt Yếu\",\n      subtitle: \"Hãy giữ trang này bên mình — đây là bản tóm tắt của mọi thứ khác trong hướng dẫn này.\",\n      emergencyTitle: \"Khẩn cấp: 000\", emergencyBody: \"Trong trường hợp nguy hiểm tức thời, hỏa hoạn, thương tích nghiêm trọng hoặc cấp cứu y tế, hãy gọi 000 trước. Liên hệ chủ nhà khi đã an toàn.\",\n      quietTitle: \"Giờ yên tĩnh: 22h–7h\", quietBody: \"Giữ âm lượng nhạc, cuộc gọi, tiếng ồn bếp và giặt giũ, cũng như tiếng bước chân gần phòng ở mức thấp.\",\n      areaTitle: \"Khu vực của bạn\", areaBody: \"Nhà Chính hoặc Paddock Rooms — vui lòng chỉ sử dụng bếp, phòng tắm và giặt giũ của khu vực mình.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"Thông tin kết nối được dán ở bảng thông báo cũng như trong phòng của bạn.\",\n      flushTitle: \"Tuyệt đối không xả\", flushBody: \"Khăn ướt, sản phẩm vệ sinh, tăm bông hoặc thức ăn. Đây là hệ thống bể tự hoại — hãy dùng thùng rác trong phòng tắm.\",\n      alcoholTitle: \"Rượu bia & hút thuốc\", alcoholBody: \"Được phép trong chừng mực hợp lý. Hút thuốc và vape chỉ ở ngoài trời — không ma túy bất hợp pháp.\",\n      gatesTitle: \"Cổng & vật nuôi\", gatesBody: \"Luôn đóng cổng. Không cho ăn, đuổi bắt hoặc quấy rối vật nuôi.\",\n      considerateTitle: \"Hãy chu đáo\", considerateBody: \"Hãy tôn trọng và chu đáo với Chủ nhà cũng như tất cả khách đang chia sẻ khu đất này với bạn.\" },\n    hosts: { kicker: \"ỔN ĐỊNH CHỖ Ở\", title: \"Chủ Nhà & Cách Được Giúp Đỡ\", hostName: \"Simon & Sita\",\n      p1: \"Chào mừng — Simon và tôi rất vui được chia sẻ ngôi nhà của mình với bạn, và hy vọng kỳ nghỉ của bạn ở đây sẽ dễ chịu, vui vẻ và thư thái.\",\n      p2: \"Bạn sẽ thường thấy Simon quanh nhà hầu hết các ngày vì anh ấy sống tại đây, và tôi cũng ở đây hầu hết thời gian, hỗ trợ quản lý nhà cửa và quan hệ với khách. Chúng tôi rất thích trò chuyện và giúp đỡ bất cứ khi nào có thể, tuy nhiên đôi khi chúng tôi bận việc khác hoặc dành thời gian nghỉ ngơi — nghĩa là có thể chúng tôi không hỗ trợ ngay lập tức được, nhưng luôn ở gần và chỉ cách một tin nhắn.\",\n      p3: \"Chúng tôi muốn thời gian của bạn ở đây thoải mái, dễ chịu và vui vẻ, và hy vọng bạn sẽ ra về với những kỷ niệm đẹp.\",\n      p4: \"Chúng tôi đã soạn hướng dẫn này vì sự thoải mái và an toàn của tất cả khách, vì vậy hãy dành thời gian đọc kỹ và làm quen với trách nhiệm của bạn trong thời gian ở cùng chúng tôi.\",\n      p5: \"Cảm ơn sự chu đáo và tôn trọng của bạn — chúc bạn có kỳ nghỉ vui vẻ, hẹn gặp lại.\",\n      signoff: \"Trân trọng,\", signoffNames: \"Simon & Sita\",\n      getInTouch: \"Liên Hệ\",\n      contactLines: \"Di động của Simon: 0474 735 389\\nDi động của Sita: 0404 534 688\\nEmail: placid.rooms4rent@gmail.com\",\n      whatsapp: \"Nhóm WhatsApp\",\n      communityChat: \"Sau khi quét mã QR, bạn sẽ được thêm vào nhóm chat cộng đồng của chúng tôi, nơi chúng tôi chia sẻ cập nhật và thông báo cho tất cả khách liên quan đến khu vực chung, cũng như một cuộc trò chuyện riêng chỉ dành cho bạn và phòng của bạn cho những điều riêng tư hơn về kỳ nghỉ — câu hỏi, yêu cầu, hoặc bất cứ điều gì bạn muốn giữ kín và không nêu trong nhóm.\",\n      dangerTitle: \"Nguy hiểm tức thời\",\n      dangerBody: \"Hãy gọi 000 trước — hỏa hoạn, thương tích nghiêm trọng, bạo lực, nguy hiểm về điện hoặc cấp cứu y tế. Liên hệ chúng tôi sau đó, khi đã an toàn.\" },\n    toc: { kicker: \"MỤC LỤC\", title: \"Mục Lục\", groupSettled: \"Ổn Định Chỗ Ở\", hosts: \"Chủ Nhà & Cách Được Giúp Đỡ\", room: \"Phòng Của Bạn\", zones: \"Hai Không Gian Sống, Một Mái Nhà\", around: \"Di Chuyển An Toàn\", parking: \"Bãi Đỗ Xe & Khu Vực Hạn Chế\", groupShared: \"Tiện Ích Chung\", bathrooms: \"Phòng Tắm & Nhà Vệ Sinh\", kitchen: \"Bếp\", laundry: \"Giặt Giũ & Vật Dụng Vệ Sinh\", groupLiving: \"Sống Cùng Nhau\", outdoor: \"Không Gian Ngoài Trời & Giờ Yên Tĩnh\", alcohol: \"Rượu Bia, Thuốc Lá & Ma Túy\", animals: \"Vật Nuôi & Cuộc Sống Nông Trại\", groupWifi: \"Wi-Fi & Thiết Bị\", wifi: \"Wi-Fi, In Ấn & Giải Trí\", aircon: \"Điều Hòa và Sưởi\", groupSystems: \"Hệ Thống Nhà Đất\", waste: \"Xử Lý Rác & Hệ Thống Bể Tự Hoại\", utilities: \"Điện & Tiện Ích\", maintenance: \"Bảo Trì\", mail: \"Thư Từ & Giao Hàng\", groupLeaving: \"Rời Đi Chu Đáo\", leaving: \"Đồ Đạc, Bạn Cùng Nhà & Trả Phòng\" },\n    room: { kicker: \"ỔN ĐỊNH CHỖ Ở\", title: \"Phòng Của Bạn\",\n      intro: \"Chúng tôi hy vọng phòng của bạn thoải mái và sạch sẽ. Vui lòng giúp giảm hư hỏng và bất tiện cho khách bằng cách tuân theo các hướng dẫn dưới đây.\",\n      b1: \"Thức ăn để trong phòng cần được đậy kín và bảo quản đúng cách.\", b2: \"Bỏ rác vào đúng thùng thường xuyên.\", b3: \"Không để khăn và quần áo ướt trên giường, sàn nhà và đồ nội thất.\", b4: \"Mở cửa sổ khi có thể để giữ phòng thoáng mát.\", b5: \"Vệ sinh phòng thường xuyên, bao gồm cả bộ ga trải giường được cung cấp.\", b6: \"Báo cáo hư hỏng, rò rỉ, sâu bọ, nấm mốc hoặc bất cứ thứ gì hỏng ngay khi bạn nhận thấy.\", b7: \"Vui lòng tuân thủ quy định về tiếng ồn, ngay cả khi ở trong phòng.\",\n      cookingTitle: \"Nấu ăn trong phòng — nguy cơ cháy nổ\", cookingBody: \"Sử dụng cơ bản lò vi sóng hoặc ấm đun nước là ổn nếu được cung cấp hoặc chấp thuận. Chỉ vậy thôi — không được dùng bếp di động, chảo điện, nồi cơm điện, nồi chiên không dầu, máy nướng bánh mì, bếp cắm trại, bếp gas hoặc nến trong phòng trừ khi cả thiết bị và vị trí đã được chấp thuận. Những vật dụng này là nguy cơ cháy nổ thực sự trong phòng ngủ — vui lòng không sử dụng khi chưa được chúng tôi cho phép.\",\n      dontTitle: \"Vui lòng không\", dontBody: \"Di chuyển đồ nội thất giữa các phòng, hoặc lấy đi bất cứ thứ gì đã có sẵn trong phòng khi bạn đến — kể cả vật dụng được cung cấp — trừ khi chúng tôi đã nói là được phép.\",\n      arrivalTitle: \"Khi đến nơi\", arrivalBody: \"Nếu có thứ gì bị thiếu, hư hỏng hoặc không hoạt động đúng cách, hãy báo cho chúng tôi càng sớm càng tốt.\" },\n    zones: { kicker: \"ỔN ĐỊNH CHỖ Ở\", title: \"Hai Không Gian Sống, Một Mái Nhà\",\n      intro: \"Placid Homestead có hai khu vực khách riêng biệt, mỗi khu vực có không gian chung riêng và sức hút riêng. Chúng tôi mong khách chỉ sử dụng bếp, phòng tắm và khu giặt giũ trong khu vực của mình. Điều này giúp mọi thứ đơn giản, công bằng và thoải mái cho tất cả mọi người. Không chắc mình thuộc khu vực nào? Cứ hỏi chúng tôi.\",\n      mainHouse: \"Nhà Chính\", paddockRooms: \"Paddock Rooms\",\n      switchTitle: \"Muốn chuyển khu vực?\", switchBody: \"Muốn chuyển sang khu vực khác trong thời gian lưu trú? Chỉ cần cho chúng tôi biết — chúng tôi sẵn lòng thêm bạn vào danh sách chờ, để nếu có chỗ trống bên đó, bạn sẽ được ưu tiên lựa chọn trước khi chúng tôi thông báo cho khách mới.\" },\n    around: { kicker: \"ỔN ĐỊNH CHỖ Ở\", title: \"Di Chuyển An Toàn\",\n      intro: \"Nhiều điểm ra vào, lối đi và cổng kết nối các phòng, bãi đỗ xe và không gian chung trên toàn bộ khu đất. Vui lòng cẩn thận khi di chuyển để mọi người có thể đến và rời khỏi không gian của mình một cách an toàn.\",\n      b1: \"Sử dụng các lối ra vào được phê duyệt cho khách và giữ lối đi thông thoáng.\", b2: \"Đặc biệt cẩn thận ở mặt đất gồ ghề, sỏi đá và nơi thiếu ánh sáng, nhất là sau khi trời tối.\", b3: \"Mang giày dép chắc chắn khi ở ngoài trời, đặc biệt vào ban đêm, sau mưa và gần khu vực có động vật.\", b4: \"Chú ý động vật, phương tiện và khách khác khi di chuyển quanh khu đất.\", b5: \"Báo cáo bất cứ điều gì trông giống như nguy cơ mất an toàn hoặc vấp ngã.\",\n      gatesTitle: \"Cổng\", gatesBody: \"Cổng khu đất cần được đóng để ngăn động vật thoát ra khu vực khách — hoặc tệ hơn, ra đường, nơi chúng có thể bị thương hoặc gây tai nạn giao thông. Nếu thấy cổng mở, vui lòng đóng lại, trừ khi được thông báo khác.\",\n      accessTitle: \"An ninh ra vào\", accessBody: \"Nếu bạn được cấp chìa khóa ra vào, vui lòng không chia sẻ hoặc đưa cho bất kỳ ai không phải là khách được chấp thuận.\" },\n    parking: { kicker: \"HỆ THỐNG NHÀ ĐẤT\", title: \"Bãi Đỗ Xe & Khu Vực Hạn Chế\",\n      intro: \"Bãi đỗ xe là không gian chung, vì vậy vui lòng đỗ xe chu đáo và giữ các khu vực tiếp cận luôn thông thoáng — lối vào, cổng và lối vào nông trại hoặc khẩn cấp cần luôn mở cho mọi người sử dụng. Một số khu vực của khu đất bị hạn chế vì lý do an toàn, hoặc đơn giản để bảo vệ sự riêng tư của Chủ nhà và các khách khác, vì vậy vui lòng tránh xa các khu vực này trừ khi được thông báo khác.\",\n      parkingHeading: \"Đỗ Xe\",\n      b1: \"Chỉ đỗ xe ở khu vực được phê duyệt — xe được đỗ với rủi ro tự chịu.\", b2: \"Không bao giờ chặn cổng, lối vào, hoặc lối vào khẩn cấp/nông trại.\", b3: \"Chú ý động vật, mặt đất gồ ghề và ánh sáng yếu khi lái xe hoặc đỗ xe.\", b4: \"Cho chúng tôi biết nếu xe của bạn rò rỉ dầu hoặc chất lỏng, và di chuyển xe nếu được yêu cầu.\",\n      restrictedTitle: \"Khu Vực Hạn Chế\", restrictedBody: \"Nhà kho, xưởng, đồng cỏ, đập nước, cơ sở hạ tầng nước và khu vực riêng tư của chủ nhà đều bị cấm trừ khi chúng tôi nói rõ khác. Không khóa không có nghĩa là an toàn — hãy hỏi trước khi vào.\" },\n    bathrooms: { kicker: \"TIỆN ÍCH CHUNG\", title: \"Phòng Tắm & Nhà Vệ Sinh\",\n      intro: \"Phòng tắm của chúng tôi là không gian chung, vì vậy vui lòng sử dụng với sự cân nhắc cho các khách khác cùng chia sẻ với bạn. Vài thói quen đơn giản góp phần lớn trong việc giữ mọi thứ sạch sẽ và dễ chịu cho tất cả mọi người.\",\n      b1: \"Xả sạch khu vực vòi sen và loại bỏ tóc khỏi cống thoát nước sau khi sử dụng.\", b2: \"Lau khô nước thừa trên sàn, bồn rửa và mặt bàn.\", b3: \"Phơi thảm phòng tắm quá ướt ngoài trời trên dây phơi để khô.\", b4: \"Mang theo đồ đạc của bạn — không để khăn tắm, quần áo hoặc đồ dùng vệ sinh cá nhân bừa bãi.\", b5: \"Lấy đồ dùng vệ sinh cá nhân ra khỏi phòng tắm khi xong, mang về giỏ hoặc phòng của bạn.\", b6: \"Tắm nhanh gọn, để mọi người đều có lượt và không hết nước nóng.\",\n      septicTitle: \"Bể tự hoại & nước thải — cần chăm sóc đặc biệt\", septicBody: \"Đây là hệ thống bể tự hoại, không phải hệ thống cống thành phố. Chỉ xả giấy vệ sinh và chất thải con người — mọi thứ khác bỏ vào thùng rác phòng tắm: khăn ướt (kể cả loại ghi \\\"có thể xả\\\"), băng vệ sinh và tampon, tăm bông, khăn giấy, bao cao su, thức ăn và tóc. Bỏ nhầm đồ có thể gây tắc nghẽn nhanh chóng.\",\n      reportTitle: \"Báo cáo sớm\", reportBody: \"Hãy báo ngay cho chúng tôi về rò rỉ, tắc nghẽn, vấn đề nước nóng, thoát nước chậm, mùi hôi hoặc tiếng ọc ọc — vấn đề nhỏ dễ và rẻ hơn nhiều để khắc phục khi phát hiện sớm.\" },\n    kitchen: { kicker: \"TIỆN ÍCH CHUNG\", title: \"Bếp\",\n      intro: \"Bếp của chúng tôi là không gian chung, vì vậy vui lòng sử dụng với sự cân nhắc cho các khách khác cùng chia sẻ với bạn. Dọn dẹp sau khi dùng, chú ý thời gian nấu nướng, và giữ không gian không có bất cứ thứ gì không thuộc về đó — để bếp luôn sạch sẽ, gọn gàng, và mọi người đều được tiếp cận công bằng.\",\n      b1: \"Rửa, lau khô và cất bát đĩa ngay sau khi dùng.\", b2: \"Lau bàn bếp, bàn ăn và bếp nấu, và vệ sinh thiết bị sau khi dùng.\", b3: \"Cho tất cả thức ăn thừa, bao bì và vỏ hộp vào đúng thùng rác.\", b4: \"Nếu thùng rác đầy, đừng nhồi nhét — mang ra điểm thu gom rác chính.\", b5: \"Không để thức ăn qua đêm — sẽ thu hút sâu bọ và gây bất tiện cho người khác.\", b6: \"Hãy chu đáo với các khách khác đang chờ nấu ăn — đừng để lại sự bừa bộn cho người tiếp theo.\", b7: \"Giữ đồ dùng bếp chung (dụng cụ, nồi, hộp đựng) trong bếp — không mang về phòng của bạn.\",\n      storageTitle: \"Bảo quản thực phẩm\", storageBody: \"Tủ lạnh và tủ đựng thức ăn trong bếp chỉ dành riêng cho Chủ nhà. Toàn bộ thực phẩm của khách nên được cất trong tủ lạnh và tủ riêng trong phòng của bạn, trừ khi bạn được cấp ngăn kéo bếp để lưu trữ. Thực phẩm để trong bếp có thể bị dọn đi hoặc vứt bỏ.\",\n      respectTitle: \"Tôn trọng thực phẩm của khách khác\", respectBody: \"Vui lòng không sử dụng hoặc lấy thực phẩm, đồ uống, dụng cụ hoặc hộp đựng của khách khác khi chưa hỏi ý kiến.\",\n      safetyTitle: \"An toàn khi nấu ăn\", safetyBody: \"Không bao giờ để việc nấu ăn không có người trông coi. Đảm bảo bếp, lò nướng và thiết bị đã tắt khi bạn hoàn tất, và giữ khu vực xung quanh thông thoáng. Nếu có gì tràn ra, cháy khét hoặc có mùi lạ, hãy dừng lại và báo cho chúng tôi — đừng tiếp tục sử dụng thiết bị có vẻ không an toàn.\" },\n    laundry: { kicker: \"TIỆN ÍCH CHUNG\", title: \"Giặt Giũ & Vật Dụng Vệ Sinh\",\n      intro: \"Giữ cho khu giặt giũ hoạt động trơn tru là nỗ lực chung — vài thói quen nhỏ giúp mọi người sử dụng không gian này dễ dàng hơn. Lấy đồ giặt kịp thời, dọn dẹp sau khi dùng, và để mọi thứ sẵn sàng cho khách tiếp theo.\",\n      laundryHeading: \"Giặt Giũ\",\n      b1: \"Lấy quần áo giặt và sấy khô kịp thời khi xong.\", b2: \"Tránh cho máy giặt quá tải, và lau sạch chất lỏng bị đổ.\", b3: \"Chỉ dùng chu trình ngắn, để khách khác cũng có thể sử dụng.\", b4: \"Rũ sạch bùn đất, cỏ hoặc mảnh vụn ngoài trời trước khi giặt quần áo nông trại hoặc đồ làm việc.\", b5: \"Hỏi ý kiến chúng tôi trước khi giặt bất cứ thứ gì dính nhiều bùn, dầu hoặc hóa chất.\", b6: \"Trả kẹp phơi và giỏ về đúng chỗ cất giữ ngay sau khi dùng.\", b7: \"Tránh giặt đồ vào khuya nếu có thể làm phiền người khác.\",\n      cleaningHeading: \"Vệ Sinh\", cleaningIntro: \"Chúng tôi vệ sinh kỹ khu vực chung ít nhất hai lần một tuần. Giữa các lần vệ sinh, vui lòng dọn dẹp sau khi dùng và trả lại bất cứ thứ gì bạn sử dụng về đúng chỗ cất giữ.\",\n      toolsTitle: \"Dụng Cụ Vệ Sinh\", toolsBody: \"Bạn sẽ thấy máy hút bụi, cây lau nhà và chổi được cất trong phòng giặt. Vui lòng sạc máy hút bụi và thay đầu lau bằng cái sạch khi trả lại.\",\n      suppliesTitle: \"Vật Dụng Vệ Sinh\", suppliesBody: \"Nước giặt được đặt gần máy giặt và vật dụng vệ sinh dưới bồn rửa phòng tắm. Vật dụng vệ sinh và khăn lau dự phòng được cất trong tủ ga trải giường, cùng với giấy vệ sinh.\",\n      dirtyTitle: \"Khăn bẩn & đầu lau nhà\", dirtyBody: \"Vui lòng đặt khăn bẩn và đầu lau nhà vào giỏ giặt đồ bên cạnh máy giặt, để có thể được giặt sạch cho lần sử dụng sau.\",\n      lowTitle: \"Vật dụng sắp hết hoặc có gì hỏng?\", lowBody: \"Vui lòng cho chúng tôi biết nếu bạn nhận thấy vật dụng sắp hết, hoặc có gì hỏng hoặc không hoạt động đúng cách. Điều này bao gồm vật dụng vệ sinh, giấy vệ sinh, khăn sạch, đầu lau nhà, và máy hút bụi phát ra tiếng ồn hoặc không hút sạch được.\" },\n    outdoor: { kicker: \"SỐNG CÙNG NHAU\", title: \"Không Gian Ngoài Trời & Giờ Yên Tĩnh\",\n      intro: \"Khu vực ngoài trời của chúng tôi — với bàn bi-a, máy chạy bộ, máy chèo thuyền, khu BBQ và bàn ăn ngoài trời — là nơi tuyệt vời để khách thư giãn và giao lưu cùng nhau. Vui lòng tận hưởng trong khi cân nhắc sự yên tĩnh và thoải mái của các khách khác.\",\n      b1: \"Tận hưởng bàn bi-a, thiết bị tập gym và khu BBQ — chỉ cần giữ tiếng ồn ở mức tôn trọng.\", b2: \"Dọn dẹp sau khi ăn, uống hoặc sử dụng BBQ, và bỏ rác vào thùng.\", b3: \"Trả lại thiết bị và đồ nội thất về vị trí sau khi dùng, và giữ lối đi thông thoáng.\", b4: \"Lưu ý đến các khách không tham gia buổi tụ họp của bạn — đặc biệt những người dậy sớm hoặc có lịch trình khác.\", b5: \"Có một mối lo nhỏ? Hãy nêu ra một cách lịch sự nếu bạn thấy thoải mái, hoặc chỉ cần báo cho chúng tôi — chúng tôi muốn giữ mọi thứ nhẹ nhàng hơn là trang trọng.\",\n      quietHeading: \"Giờ Yên Tĩnh\", quietText: \"Giờ yên tĩnh từ 22h đến 7h. Trong thời gian này, vui lòng giữ âm lượng nhạc, TV và cuộc gọi điện thoại thấp, tránh trò chuyện ồn ào ngoài trời, và giảm thiểu tiếng ồn bếp, giặt giũ và bước chân gần phòng khách.\",\n      partyTitle: \"Không phải nơi tổ chức tiệc tùng\", partyBody: \"Đây là nơi ở cho những người làm việc, nghỉ ngơi và du lịch — không phải địa điểm tổ chức tiệc. Nhạc lớn, tụ tập gây rối, hành vi hung hăng hoặc say xỉn nặng gây nguy hiểm cho sự nghỉ ngơi và thoải mái của các khách khác, vì vậy không được phép ở đây.\" },\n    alcoholSmoking: { kicker: \"SỐNG CÙNG NHAU\", title: \"Rượu Bia, Thuốc Lá & Ma Túy\",\n      intro: \"Uống rượu bia và hút thuốc được phép, có giới hạn. Chúng tôi yêu cầu bạn tuân theo các quy tắc thiết yếu này để giữ không gian thoải mái và an toàn cho tất cả mọi người.\",\n      b1: \"Uống có trách nhiệm — uống quá mức dẫn đến hành vi hung hăng hoặc mất kiểm soát là không thể chấp nhận.\", b2: \"Hút thuốc và vape chỉ ở ngoài trời, tại các khu vực chỉ định — không bao giờ gần cửa ra vào hoặc cửa sổ.\", b3: \"Hỏi ý kiến các khách gần đó trước khi hút thuốc, và di chuyển đi nếu ai đó không thoải mái với khói thuốc.\", b4: \"Vứt bỏ đầu lọc thuốc lá đúng cách — không bao giờ để lại trên mặt đất hoặc vứt bừa bãi.\",\n      dangerTitle: \"Không ma túy bất hợp pháp hoặc hành vi hung hăng\", dangerBody: \"Placid Homestead là một khu đất yên bình, không ma túy. Việc sử dụng hoặc sở hữu ma túy bất hợp pháp, cũng như hành vi hung hăng hoặc đe dọa, không được phép, để giữ đây là không gian an toàn cho tất cả mọi người. Việc không tuân thủ quy tắc này có thể dẫn đến thông báo rời đi, hoặc trong trường hợp nghiêm trọng, sự can thiệp của cảnh sát.\" },\n    animals: { kicker: \"SỐNG CÙNG NHAU\", title: \"Vật Nuôi & Cuộc Sống Nông Trại\",\n      intro: \"Một phần trải nghiệm ở đây là chia sẻ khu đất với các loài động vật sống ở đó. Gia súc và vật nuôi đi lại tự do, vì vậy bạn sẽ thường thấy chúng quanh nhà và khu đất — đó là một phần của sự thú vị. Chỉ cần nhớ rằng chúng vẫn là động vật, nên một chút cẩn thận và cân nhắc sẽ rất hữu ích.\",\n      b1: \"Không cho động vật ăn trừ khi chúng tôi đã nói là được phép.\", b2: \"Không đuổi bắt, trêu chọc, bế lên hoặc can thiệp vào chúng theo bất kỳ cách nào khác.\", b3: \"Luôn đóng cổng, và chú ý động vật khi lái xe hoặc đi bộ.\", b4: \"Báo cáo bất kỳ động vật nào bị sổng, bị thương, bị bệnh hoặc có hành vi hung hăng.\",\n      petsTitle: \"Không mang theo vật nuôi hoặc trẻ em trong thời gian lưu trú\", petsBody: \"Để giữ khu đất phù hợp làm nơi ở chung cho người lao động, khách không được mang theo con cái, trẻ sơ sinh hoặc vật nuôi/động vật của riêng mình ở cùng, và không được để khách đến thăm mang theo trẻ em, trẻ sơ sinh hoặc vật nuôi/động vật — trừ khi đã được chấp thuận trước.\" },\n    wifi: { kicker: \"WI-FI & THIẾT BỊ\", title: \"Wi-Fi, In Ấn & Giải Trí\",\n      wifiHeading: \"Thông Tin Wi-Fi\", wifiText: \"Internet ở vùng nông thôn có thể chậm hơn hoặc kém ổn định hơn so với bạn quen dùng — thời tiết, mất kết nối và khoảng cách đến các trạm phát sóng đều có thể ảnh hưởng, cảm ơn sự kiên nhẫn của bạn. Vui lòng tránh tải xuống nặng làm chậm kết nối cho các khách khác, và báo cho chúng tôi nếu mất kết nối — một số sự cố nằm ngoài tầm kiểm soát của chúng tôi, nhưng chúng tôi luôn kiểm tra.\",\n      wifiCallout: \"Thông tin kết nối Wi-Fi sẽ có ở bảng thông báo cũng như trong phòng của bạn.\",\n      printingHeading: \"In Ấn\", printingText: \"Máy in Wi-Fi (Brother HL-L2400DW, Nhà Chính) miễn phí cho mục đích cá nhân hợp lý — giấy tờ visa, tài liệu du lịch, vé và biểu mẫu.\",\n      printB1: \"Kiểm tra tài liệu trước khi in.\", printB2: \"Lấy bản in kịp thời.\", printB3: \"In nhiều hoặc lặp lại có thể phát sinh một khoản phí nhỏ.\", printB4: \"Cần giúp đỡ kết nối? Hãy cho chúng tôi biết.\",\n      tvHeading: \"Smart TV\", tvText: \"Chúng tôi đã cung cấp cho bạn một Smart TV để giải trí riêng tư. Chúng tôi yêu cầu bạn tuân theo các hướng dẫn này và cho chúng tôi biết nếu gặp bất kỳ sự cố nào.\",\n      tvB1: \"Sử dụng tài khoản streaming của riêng bạn, và đăng xuất trước khi rời đi.\", tvB2: \"Giữ âm lượng ở mức hợp lý.\", tvB3: \"Vui lòng chuyển cài đặt ngôn ngữ về tiếng Anh trước khi trả phòng.\", tvB4: \"Cần trợ giúp thiết lập? Nhắn tin cho chúng tôi.\" },\n    aircon: { kicker: \"WI-FI & THIẾT BỊ\", title: \"Điều Hòa và Sưởi\",\n      intro: \"Khi có thể, chúng tôi đã cung cấp máy điều hòa và thiết bị sưởi để bạn thoải mái. Vui lòng tuân theo các hướng dẫn này để đảm bảo sử dụng an toàn và giảm tiêu thụ điện.\",\n      b1: \"Giữ cửa ra vào và cửa sổ đóng khi điều hòa hoặc sưởi đang chạy.\", b2: \"Tắt khi bạn ra khỏi phòng một lúc.\", b3: \"Tránh đặt ở mức cực đoan, và giữ bộ lọc và lỗ thông gió sạch sẽ.\", b4: \"Giữ thiết bị sưởi cách xa chăn ga, rèm cửa và đồ nội thất.\", b5: \"Báo cáo rò rỉ, mùi lạ, tiếng ồn bất thường hoặc làm mát/sưởi kém.\", b6: \"Không sử dụng bất cứ thứ gì bị hỏng, sờn hoặc có vẻ không an toàn.\",\n      unsureTitle: \"Không chắc cách sử dụng thứ gì đó?\", unsureBody: \"Chỉ cần hỏi — luôn tốt hơn là mạo hiểm gây hư hỏng ngoài ý muốn.\" },\n        wasteSeptic: { kicker: \"HỆ THỐNG NHÀ ĐẤT\", title: \"Xử Lý Rác & Hệ Thống Bể Tự Hoại\",\n      intro: \"Các khu đất nông thôn dựa vào hệ thống bể tự hoại và xử lý rác hoạt động hơi khác so với những gì bạn quen thuộc ở thành phố, và chúng có thể nhạy cảm nếu vật sai lọt vào nơi sai. Giữ rác, tái chế và cống thoát nước ngăn nắp và sử dụng đúng cách giúp bảo vệ toàn bộ khu đất, và giữ mọi thứ vận hành trơn tru cho tất cả mọi người ở đây.\",\n      b1: \"Sử dụng đúng thùng rác — không để rác bừa bãi trong phòng hoặc khu vực chung.\", b2: \"Đóng kín rác thực phẩm để không thu hút sâu bọ.\", b3: \"Hỏi trước khi vứt bỏ pin, hóa chất, dầu hoặc bất cứ thứ gì nguy hiểm.\",\n      neverTitle: \"Tuyệt đối không đổ xuống cống\", neverBody: \"Dầu hoặc mỡ nấu ăn, sơn hoặc hóa chất, thức ăn thừa, bã cà phê, thuốc, bùn đất, hoặc khăn ướt và sản phẩm vệ sinh. Hệ thống bể tự hoại không thể xử lý chúng — cạo thức ăn thừa vào thùng rác, và xịt rửa giày ống dính bùn ở ngoài trời.\",\n      reportTitle: \"Báo cáo sớm\", reportBody: \"Cống thoát chậm, mùi hôi, tiếng ọc ọc hoặc nước bị ứ đọng? Hãy báo cho chúng tôi ngay lập tức — vấn đề nhỏ ở đây nhanh chóng trở nên nghiêm trọng.\" },\n    utilities: { kicker: \"HỆ THỐNG NHÀ ĐẤT\", title: \"Điện & Tiện Ích\",\n      intro: \"Đôi khi, điện có thể bị gián đoạn. Chúng tôi yêu cầu bạn lưu ý khi sử dụng nhiều thiết bị cùng lúc, vì điều này có thể làm quá tải hệ thống điện và gián đoạn nguồn cấp điện cho tất cả mọi người.\",\n      b1: \"Tắt đèn, quạt, máy sưởi và điều hòa khi không cần thiết.\", b2: \"Vui lòng báo cáo sớm bất kỳ sự cố nào về nước, điện và internet.\",\n      dontTouchTitle: \"Vui lòng không chạm vào\", dontTouchBody: \"Đồng hồ đo, máy bơm, bể chứa, hệ thống năng lượng mặt trời, pin hoặc công tắc — hãy để chúng tôi xử lý.\" },\n    maintenance: { kicker: \"HỆ THỐNG NHÀ ĐẤT\", title: \"Bảo Trì\",\n      intro: \"Công việc bảo trì có thể cần được thực hiện quanh khu đất theo thời gian, có thể gây ra tiếng ồn và đôi khi gián đoạn ngắn về điện hoặc nước — chúng tôi rất cảm kích sự kiên nhẫn của bạn khi điều này xảy ra.\",\n      b1: \"Vui lòng báo cáo sớm bất kỳ sự cố nào về nước, điện hoặc internet, để chúng tôi có thể sửa chữa trước khi gây gián đoạn.\",\n      accessTitle: \"Ra vào phòng\", accessBody: \"Đôi khi chúng tôi có thể cần vào phòng hoặc khu vực chung để sửa chữa hoặc kiểm tra an toàn — chúng tôi sẽ thông báo trước khi có thể.\" },\n    mail: { kicker: \"HỆ THỐNG NHÀ ĐẤT\", title: \"Thư Từ & Giao Hàng\",\n      intro: \"Việc giao hàng được sắp xếp qua khu vực thư từ chỉ định — báo trước một chút giúp chúng tôi vận hành trơn tru.\",\n      b1: \"Thư từ và bưu kiện được gửi đến khu vực thư từ chỉ định gần bếp trong Nhà Chính.\", b2: \"Khách ở tại Paddock Rooms sẽ được thông báo nếu có thư được gửi đến.\", b3: \"Báo trước cho chúng tôi nếu bạn đang chờ thứ gì đó khẩn cấp, có giá trị hoặc dưới tên khác.\", b4: \"Nhận thư của bạn kịp thời.\",\n      noteTitle: \"Xin lưu ý\", noteBody: \"Chúng tôi cố gắng đảm bảo tất cả thư từ được thu thập và đặt đúng vị trí, và khách được thông báo — tuy nhiên, khách chịu trách nhiệm về thư từ của riêng mình.\" },\n    leaving: { kicker: \"RỜI ĐI CHU ĐÁO\", title: \"Đồ Đạc, Bạn Cùng Nhà & Trả Phòng\",\n      intro: \"Những thói quen đơn giản giúp nơi ở chung luôn thoải mái cho tất cả mọi người — kể cả người tiếp theo.\",\n      p1: \"Giữ đồ đạc của bạn an toàn và gọn gàng, và không để đồ có giá trị ở khu vực chung hoặc trong xe không khóa — chúng tôi không thể chịu trách nhiệm về đồ cá nhân bị mất, trộm hoặc hư hỏng.\",\n      goodHabitsHeading: \"Thói quen tốt của bạn cùng nhà\",\n      gb1: \"Dọn dẹp sau khi dùng và tôn trọng giờ ngủ, giờ làm việc của người khác.\", gb2: \"Hỏi trước khi mượn bất cứ thứ gì.\", gb3: \"Giao tiếp tử tế, báo cáo vấn đề sớm, và lưu ý tiếng ồn.\", gb4: \"Đối xử với ngôi nhà — và các loài vật nuôi — như cách bạn muốn nhà mình được đối xử.\",\n      beforeHeading: \"Trước khi bạn rời đi\",\n      c1: \"Lấy hết đồ đạc cá nhân và thức ăn ra khỏi tủ lạnh, tủ hoặc ngăn kéo được chỉ định trong phòng bạn.\", c2: \"Bỏ rác và để phòng bạn gọn gàng.\", c3: \"Trả lại chìa khóa, điều khiển từ xa và các vật dụng ra vào khác.\", c4: \"Tháo ga trải giường và để lại trong phòng.\", c5: \"Đăng xuất khỏi tài khoản streaming, và lấy các bản in hoặc thư từ.\", c6: \"Lấy đồ giặt ra khỏi máy hoặc dây phơi.\", c7: \"Báo cáo bất kỳ hư hỏng hoặc đồ vật bị mất nào.\",\n      leftTitle: \"Bạn để quên thứ gì đó?\", leftBody: \"Liên hệ với chúng tôi càng sớm càng tốt sau khi trả phòng — chúng tôi sẽ cố gắng hết sức, nhưng không thể đảm bảo đồ vật có thể được lưu giữ hoặc trả lại.\" },\n    thanks: { kicker: \"CẢM ƠN BẠN ĐÃ LƯU TRÚ CÙNG CHÚNG TÔI\", title: \"Placid Homestead\", bookTitle: \"Sổ Lưu Bút Của Chúng Tôi\", bookBody: \"Chúng tôi hy vọng đây là một kỳ nghỉ đáng nhớ. Chúng tôi rất mong bạn để lại một lời nhắn thân thiện trong sổ lưu bút, để chúng tôi có thể nhìn lại và chia sẻ với các khách khác.\" }\n  },\n  th: {\n    switcher: \"ภาษา\",\n    cover: { kicker: \"คู่มือสำหรับผู้เข้าพัก\", title: \"Placid Homestead\",\n      subtitle: \"ทุกสิ่งที่คุณต้องรู้เพื่อการเข้าพักที่สะดวกสบาย — บ้านหลังนี้ทำงานอย่างไร และเราจะอยู่ร่วมกันได้อย่างไร\",\n      intro: \"สวัสดีค่ะ/ครับ เรายินดีที่คุณมาอยู่ที่นี่ แขกของเราส่วนใหญ่เป็นแบ็คแพ็คเกอร์ นักเดินทาง และแรงงานตามฤดูกาลที่พักอยู่ใกล้ ๆ เพื่อทำงานฟาร์มหรืองานในพื้นที่ คู่มือนี้ครอบคลุมเรื่องทั่วไปในชีวิตประจำวัน เช่น ห้องพักของคุณ พื้นที่ส่วนกลาง สัตว์เลี้ยง และวิธีทำให้ทุกคนอยู่อย่างสะดวกสบาย\" },\n    glance: { kicker: \"สรุปโดยย่อ\", title: \"สิ่งสำคัญที่ควรรู้\",\n      subtitle: \"เก็บหน้านี้ไว้ใกล้ตัว — เป็นฉบับย่อของเนื้อหาทั้งหมดในคู่มือนี้\",\n      emergencyTitle: \"ฉุกเฉิน: 000\", emergencyBody: \"หากมีอันตรายเฉพาะหน้า ไฟไหม้ บาดเจ็บสาหัส หรือเหตุฉุกเฉินทางการแพทย์ โทร 000 ก่อนเป็นอันดับแรก แล้วติดต่อโฮสต์เมื่อปลอดภัยแล้ว\",\n      quietTitle: \"ช่วงเวลาเงียบสงบ: 22.00–7.00 น.\", quietBody: \"ลดเสียงเพลง การโทรศัพท์ เสียงจากครัวและซักผ้า รวมถึงเสียงฝีเท้าใกล้ห้องพัก\",\n      areaTitle: \"โซนของคุณ\", areaBody: \"บ้านหลักหรือ Paddock Rooms — กรุณาใช้ครัว ห้องน้ำ และห้องซักผ้าของโซนตัวเองเท่านั้น\",\n      wifiTitle: \"ไวไฟ\", wifiBody: \"รายละเอียดการเชื่อมต่ออยู่ที่บอร์ดประกาศและในห้องพักของคุณ\",\n      flushTitle: \"ห้ามทิ้งลงชักโครกเด็ดขาด\", flushBody: \"ทิชชู่เปียก ผ้าอนามัย สำลีก้าน หรือเศษอาหาร เนื่องจากเป็นระบบบ่อเกรอะ — ให้ทิ้งลงถังขยะในห้องน้ำแทน\",\n      alcoholTitle: \"แอลกอฮอล์และการสูบบุหรี่\", alcoholBody: \"อนุญาตในขอบเขตที่เหมาะสม สูบบุหรี่และบุหรี่ไฟฟ้าได้เฉพาะนอกอาคาร — ห้ามใช้ยาเสพติดผิดกฎหมายโดยเด็ดขาด\",\n      gatesTitle: \"ประตูรั้วและสัตว์เลี้ยง\", gatesBody: \"ปิดประตูรั้วไว้ตลอดเวลา ห้ามให้อาหาร ไล่ หรือรบกวนสัตว์\",\n      considerateTitle: \"โปรดมีน้ำใจ\", considerateBody: \"โปรดให้ความเคารพและมีน้ำใจต่อโฮสต์และแขกทุกคนที่พักอาศัยร่วมกับคุณ\" },\n    hosts: { kicker: \"การเริ่มต้นเข้าพัก\", title: \"โฮสต์ของคุณและวิธีขอความช่วยเหลือ\", hostName: \"ไซมอน & สิตา\",\n      p1: \"ยินดีต้อนรับ — ไซมอนและฉันดีใจมากที่ได้แบ่งปันบ้านของเรากับคุณ และหวังว่าการเข้าพักที่นี่จะเป็นช่วงเวลาที่น่าประทับใจ มีความสุข และผ่อนคลาย\",\n      p2: \"โดยทั่วไปคุณจะพบไซมอนอยู่แถวนี้เกือบทุกวันเพราะเขาอาศัยอยู่ในพื้นที่ และฉันเองก็อยู่แถวนี้เกือบทุกวันเช่นกัน คอยช่วยดูแลบ้านและติดต่อกับแขก เรายินดีพูดคุยและช่วยเหลือทุกครั้งที่ทำได้ แม้ว่าบางครั้งเราอาจไม่ว่างหรือกำลังพักผ่อนอยู่บ้าง — จึงอาจไม่สามารถตอบกลับได้ทันที แต่เราไม่เคยอยู่ไกลเกินเอื้อม และพร้อมรับข้อความเสมอ\",\n      p3: \"เราอยากให้เวลาที่คุณอยู่ที่นี่สะดวกสบาย ผ่อนคลาย และสนุกสนาน และหวังว่าคุณจะได้ความทรงจำดี ๆ กลับไป\",\n      p4: \"เราได้จัดทำคู่มือนี้เพื่อความสะดวกสบายและความปลอดภัยของแขกทุกคน จึงขอให้คุณสละเวลาอ่านและทำความเข้าใจข้อควรปฏิบัติระหว่างพักอยู่กับเรา\",\n      p5: \"ขอบคุณสำหรับความเกรงใจและความเคารพของคุณ — ขอให้สนุกกับการเข้าพัก แล้วพบกัน\",\n      signoff: \"ด้วยความนับถือ,\", signoffNames: \"ไซมอน & สิตา\",\n      getInTouch: \"ติดต่อเรา\",\n      contactLines: \"มือถือไซมอน: 0474 735 389\\nมือถือสิตา: 0404 534 688\\nอีเมล: placid.rooms4rent@gmail.com\",\n      whatsapp: \"กลุ่ม WhatsApp\",\n      communityChat: \"หลังจากสแกน QR โค้ดแล้ว คุณจะถูกเพิ่มเข้ากลุ่มแชทชุมชนของเรา ซึ่งเราจะแจ้งข่าวสารและประกาศต่าง ๆ ที่เกี่ยวกับพื้นที่ส่วนกลางให้แขกทุกคนทราบ รวมถึงแชทส่วนตัวเฉพาะสำหรับคุณและห้องพักของคุณ สำหรับเรื่องที่เป็นส่วนตัวมากขึ้นเกี่ยวกับการเข้าพัก ไม่ว่าจะเป็นคำถาม คำขอ หรือเรื่องที่คุณอยากเก็บเป็นความลับไม่พูดในกลุ่ม\",\n      dangerTitle: \"อันตรายเฉพาะหน้า\",\n      dangerBody: \"โทร 000 ก่อนเป็นอันดับแรก — ไฟไหม้ บาดเจ็บสาหัส ความรุนแรง อันตรายจากไฟฟ้า หรือเหตุฉุกเฉินทางการแพทย์ แล้วติดต่อเราภายหลังเมื่อปลอดภัยแล้ว\" },\n    toc: { kicker: \"สารบัญ\", title: \"สารบัญ\", groupSettled: \"การเริ่มต้นเข้าพัก\", hosts: \"โฮสต์ของคุณและวิธีขอความช่วยเหลือ\", room: \"ห้องพักของคุณ\", zones: \"สองพื้นที่พักอาศัย หนึ่งบ้าน\", around: \"การเดินทางอย่างปลอดภัย\", parking: \"ที่จอดรถและพื้นที่หวงห้าม\", groupShared: \"สิ่งอำนวยความสะดวกส่วนกลาง\", bathrooms: \"ห้องน้ำและห้องส้วม\", kitchen: \"ห้องครัว\", laundry: \"ซักรีดและอุปกรณ์ทำความสะอาด\", groupLiving: \"การอยู่ร่วมกัน\", outdoor: \"พื้นที่กลางแจ้งและช่วงเวลาเงียบสงบ\", alcohol: \"แอลกอฮอล์ บุหรี่ และยาเสพติด\", animals: \"สัตว์เลี้ยงและชีวิตในฟาร์ม\", groupWifi: \"ไวไฟและอุปกรณ์\", wifi: \"ไวไฟ การพิมพ์ และความบันเทิง\", aircon: \"เครื่องปรับอากาศและเครื่องทำความร้อน\", groupSystems: \"ระบบของทรัพย์สิน\", waste: \"การกำจัดขยะและระบบบ่อเกรอะ\", utilities: \"ไฟฟ้าและสาธารณูปโภค\", maintenance: \"การบำรุงรักษา\", mail: \"จดหมายและพัสดุ\", groupLeaving: \"การเตรียมตัวออกจากที่พัก\", leaving: \"ทรัพย์สิน เพื่อนร่วมบ้าน และการเช็คเอาต์\" },\n    room: { kicker: \"การเริ่มต้นเข้าพัก\", title: \"ห้องพักของคุณ\",\n      intro: \"เราหวังว่าห้องพักของคุณจะสะดวกสบายและสะอาด โปรดช่วยลดความเสียหายและความไม่สะดวกของแขกท่านอื่นโดยปฏิบัติตามแนวทางด้านล่าง\",\n      b1: \"อาหารที่เก็บไว้ในห้องควรปิดผนึกและจัดเก็บอย่างถูกต้อง\", b2: \"ทิ้งขยะลงถังที่ถูกต้องเป็นประจำ\", b3: \"อย่าวางผ้าเช็ดตัวและเสื้อผ้าที่เปียกบนเตียง พื้น หรือเฟอร์นิเจอร์\", b4: \"เปิดหน้าต่างเมื่อทำได้ เพื่อให้ห้องปลอดโปร่งและถ่ายเทอากาศดี\", b5: \"ทำความสะอาดห้องของคุณเป็นประจำ รวมถึงผ้าปูที่นอนที่จัดเตรียมให้\", b6: \"แจ้งความเสียหาย รอยรั่ว แมลง เชื้อรา หรือสิ่งใดที่ชำรุดทันทีที่คุณสังเกตเห็น\", b7: \"โปรดปฏิบัติตามกฎของบ้านเรื่องเสียงดัง แม้ในขณะอยู่ในห้อง\",\n      cookingTitle: \"การทำอาหารในห้อง — ความเสี่ยงด้านอัคคีภัย\", cookingBody: \"การใช้ไมโครเวฟหรือกาต้มน้ำไฟฟ้าพื้นฐานสามารถทำได้หากมีให้หรือได้รับอนุญาต เท่านั้น — ห้ามใช้เตาไฟฟ้าแบบพกพา กระทะไฟฟ้า หม้อหุงข้าว หม้อทอดไร้น้ำมัน เครื่องปิ้งขนมปัง เตาแคมป์ปิ้ง เตาแก๊ส หรือเทียนในห้อง เว้นแต่ทั้งอุปกรณ์และสถานที่ได้รับการอนุมัติแล้ว สิ่งเหล่านี้เป็นความเสี่ยงด้านอัคคีภัยที่แท้จริงในห้องนอน — โปรดอย่าใช้โดยไม่ได้รับอนุมัติจากเรา\",\n      dontTitle: \"โปรดอย่า\", dontBody: \"ย้ายเฟอร์นิเจอร์ระหว่างห้อง หรือนำสิ่งของที่มีอยู่ในห้องของคุณอยู่แล้วตั้งแต่ตอนที่คุณมาถึงออกไป — รวมถึงสิ่งของที่จัดเตรียมให้ — เว้นแต่เราจะแจ้งว่าสามารถทำได้\",\n      arrivalTitle: \"เมื่อมาถึง\", arrivalBody: \"หากมีสิ่งใดขาดหาย ชำรุด หรือทำงานไม่ถูกต้อง โปรดแจ้งให้เราทราบโดยเร็วที่สุด\" },\n    zones: { kicker: \"การเริ่มต้นเข้าพัก\", title: \"สองพื้นที่พักอาศัย หนึ่งบ้าน\",\n      intro: \"Placid Homestead มีพื้นที่แขกสองส่วนแยกจากกัน แต่ละส่วนมีพื้นที่ส่วนกลางและเสน่ห์เฉพาะตัว เราขอให้แขกใช้ครัว ห้องน้ำ และห้องซักผ้าของพื้นที่ตนเองเท่านั้น วิธีนี้ช่วยให้ทุกอย่างเรียบง่าย ยุติธรรม และสะดวกสบายสำหรับทุกคน หากไม่แน่ใจว่าอยู่พื้นที่ไหน สอบถามเราได้เลย\",\n      mainHouse: \"บ้านหลัก\", paddockRooms: \"Paddock Rooms\",\n      switchTitle: \"อยากเปลี่ยนพื้นที่ไหม?\", switchBody: \"อยากย้ายไปอีกพื้นที่ระหว่างการเข้าพักหรือไม่? แจ้งเราได้เลย — เรายินดีเพิ่มชื่อคุณในรายชื่อรอ เพื่อว่าหากมีที่ว่างฝั่งนั้น คุณจะได้สิทธิ์เลือกก่อนที่เราจะประกาศให้แขกใหม่ทราบ\" },\n    around: { kicker: \"การเริ่มต้นเข้าพัก\", title: \"การเดินทางอย่างปลอดภัย\",\n      intro: \"จุดเข้าออก ทางเดิน และประตูรั้วหลายจุดเชื่อมต่อห้องพัก ที่จอดรถ และพื้นที่ส่วนกลางทั่วทั้งบริเวณ โปรดระมัดระวังในการเคลื่อนที่เพื่อให้ทุกคนไปยังพื้นที่ของตนได้อย่างปลอดภัย\",\n      b1: \"ใช้จุดเข้าออกที่ได้รับอนุญาตสำหรับแขก และรักษาทางเดินให้โล่ง\", b2: \"ระมัดระวังเป็นพิเศษบริเวณพื้นผิวไม่เรียบ กรวด และแสงน้อย โดยเฉพาะหลังพลบค่ำ\", b3: \"สวมรองเท้าที่แข็งแรงเมื่ออยู่กลางแจ้ง โดยเฉพาะตอนกลางคืน หลังฝนตก และบริเวณใกล้สัตว์\", b4: \"ระวังสัตว์ ยานพาหนะ และแขกท่านอื่นขณะเดินไปมาในบริเวณ\", b5: \"แจ้งหากพบสิ่งใดที่ดูเหมือนอันตรายด้านความปลอดภัยหรือเสี่ยงสะดุดล้ม\",\n      gatesTitle: \"ประตูรั้ว\", gatesBody: \"ประตูรั้วของบริเวณต้องปิดไว้เสมอ เพื่อป้องกันไม่ให้สัตว์หลุดเข้าไปในพื้นที่แขก หรือแย่กว่านั้นคือออกไปที่ถนน ซึ่งอาจได้รับบาดเจ็บหรือก่อให้เกิดอุบัติเหตุ หากพบประตูรั้วเปิดอยู่ โปรดปิดให้เรียบร้อย เว้นแต่จะได้รับแจ้งเป็นอย่างอื่น\",\n      accessTitle: \"ความปลอดภัยของกุญแจเข้าออก\", accessBody: \"หากคุณได้รับกุญแจเข้าออก โปรดอย่าแบ่งปันหรือมอบให้ผู้ที่ไม่ใช่แขกที่ได้รับอนุญาต\" },\n    parking: { kicker: \"ระบบของทรัพย์สิน\", title: \"ที่จอดรถและพื้นที่หวงห้าม\",\n      intro: \"ที่จอดรถเป็นพื้นที่ส่วนกลาง จึงขอให้จอดรถอย่างมีน้ำใจและรักษาพื้นที่ทางเข้าให้โล่งตลอดเวลา — ทางรถเข้า ประตูรั้ว และทางเข้าฟาร์มหรือฉุกเฉินต้องเปิดไว้สำหรับทุกคนใช้งาน บางส่วนของบริเวณถูกจำกัดด้วยเหตุผลด้านความปลอดภัย หรือเพื่อปกป้องความเป็นส่วนตัวของโฮสต์และแขกท่านอื่น จึงขอให้หลีกเลี่ยงพื้นที่เหล่านี้ เว้นแต่จะได้รับแจ้งเป็นอย่างอื่น\",\n      parkingHeading: \"ที่จอดรถ\",\n      b1: \"จอดในพื้นที่ที่ได้รับอนุญาตเท่านั้น — การจอดรถเป็นความเสี่ยงของคุณเอง\", b2: \"ห้ามกีดขวางประตูรั้ว ทางรถเข้า หรือทางเข้าฉุกเฉิน/ฟาร์มโดยเด็ดขาด\", b3: \"ระวังสัตว์ พื้นผิวไม่เรียบ และแสงน้อยขณะขับรถหรือจอดรถ\", b4: \"แจ้งเราหากรถของคุณมีน้ำมันหรือของเหลวรั่วไหล และย้ายรถหากได้รับการร้องขอ\",\n      restrictedTitle: \"พื้นที่หวงห้าม\", restrictedBody: \"โรงเก็บของ โรงงาน ทุ่งหญ้า เขื่อน โครงสร้างพื้นฐานด้านน้ำ และพื้นที่ส่วนตัวของโฮสต์เป็นเขตหวงห้าม เว้นแต่จะได้รับแจ้งอย่างชัดเจนเป็นอย่างอื่น การไม่ล็อกไม่ได้หมายความว่าปลอดภัย — โปรดสอบถามก่อนเข้า\" },\n    bathrooms: { kicker: \"สิ่งอำนวยความสะดวกส่วนกลาง\", title: \"ห้องน้ำและห้องส้วม\",\n      intro: \"ห้องน้ำของเราเป็นพื้นที่ส่วนกลาง จึงขอให้ใช้ด้วยความเกรงใจต่อแขกท่านอื่นที่ใช้ร่วมกับคุณ นิสัยเล็ก ๆ น้อย ๆ ช่วยรักษาความสะอาดและความน่าอยู่ให้ทุกคนได้มาก\",\n      b1: \"ล้างบริเวณห้องอาบน้ำและเก็บเส้นผมออกจากท่อระบายหลังใช้งาน\", b2: \"เช็ดน้ำส่วนเกินออกจากพื้น อ่างล้างหน้า และเคาน์เตอร์\", b3: \"นำผ้าปูรองอาบน้ำที่เปียกมากไปตากบนราวตากผ้ากลางแจ้ง\", b4: \"นำของใช้ส่วนตัวติดตัวไป — ไม่ทิ้งผ้าเช็ดตัว เสื้อผ้า หรือของใช้อาบน้ำไว้เกลื่อนกลาด\", b5: \"นำของใช้อาบน้ำออกจากห้องอาบน้ำเมื่อใช้เสร็จ แล้วนำกลับไปที่ตะกร้าหรือห้องพัก\", b6: \"อาบน้ำให้สั้นกระชับ เพื่อให้ทุกคนได้ใช้และน้ำอุ่นไม่หมด\",\n      septicTitle: \"ระบบบ่อเกรอะและน้ำเสีย — ต้องดูแลเป็นพิเศษ\", septicBody: \"นี่คือระบบบ่อเกรอะ ไม่ใช่ระบบท่อระบายน้ำของเมือง ให้ทิ้งเฉพาะกระดาษชำระและของเสียจากร่างกายลงชักโครกเท่านั้น — สิ่งอื่นทั้งหมดให้ทิ้งลงถังขยะในห้องน้ำ ได้แก่ ทิชชู่เปียก (แม้จะระบุว่า “ทิ้งชักโครกได้”) ผ้าอนามัยและแทมปอน สำลีก้าน กระดาษทิชชู่ ถุงยางอนามัย เศษอาหาร และเส้นผม การทิ้งสิ่งของผิดประเภทอาจทำให้ตันได้เร็ว\",\n      reportTitle: \"แจ้งแต่เนิ่น ๆ\", reportBody: \"โปรดแจ้งเราทันทีหากพบการรั่วซึม การอุดตัน ปัญหาน้ำอุ่น ท่อระบายช้า กลิ่นเหม็น หรือเสียงกลั้วน้ำ — ปัญหาเล็ก ๆ จะแก้ไขได้ง่ายและประหยัดกว่ามากหากรีบแจ้งแต่เนิ่น ๆ\" },\n    kitchen: { kicker: \"สิ่งอำนวยความสะดวกส่วนกลาง\", title: \"ห้องครัว\",\n      intro: \"ห้องครัวของเราเป็นพื้นที่ส่วนกลาง จึงขอให้ใช้ด้วยความเกรงใจต่อแขกท่านอื่นที่ใช้ร่วมกับคุณ ทำความสะอาดหลังใช้งาน ระวังเรื่องเวลาที่ใช้ในการทำอาหาร และรักษาพื้นที่ให้ปราศจากสิ่งที่ไม่เกี่ยวข้อง เพื่อให้ครัวสะอาด เป็นระเบียบ และทุกคนเข้าถึงได้อย่างเท่าเทียม\",\n      b1: \"ล้าง เช็ดให้แห้ง และเก็บจานชามทันทีหลังใช้งาน\", b2: \"เช็ดเคาน์เตอร์ โต๊ะ และเตา และทำความสะอาดเครื่องใช้ไฟฟ้าหลังใช้งาน\", b3: \"ทิ้งเศษอาหาร ห่อ และบรรจุภัณฑ์ทั้งหมดลงถังขยะที่ถูกต้อง\", b4: \"หากถังขยะเริ่มเต็ม อย่ายัดเพิ่ม — นำไปทิ้งที่จุดรวบรวมขยะหลัก\", b5: \"อย่าทิ้งอาหารค้างคืน — จะดึงดูดแมลงและสร้างความไม่สะดวกให้ผู้อื่น\", b6: \"เกรงใจแขกท่านอื่นที่รอทำอาหาร — อย่าทิ้งความยุ่งเหยิงไว้ให้คนต่อไป\", b7: \"เก็บอุปกรณ์ครัวส่วนกลาง (ช้อนส้อม หม้อ ภาชนะ) ไว้ในครัว — อย่านำกลับห้องพัก\",\n      storageTitle: \"การเก็บอาหาร\", storageBody: \"ตู้เย็นและตู้เก็บอาหารในครัวสงวนไว้สำหรับโฮสต์เท่านั้น อาหารของแขกทุกคนควรเก็บไว้ในตู้เย็นและตู้ในห้องพักของตนเอง เว้นแต่จะได้รับจัดสรรลิ้นชักในครัวสำหรับเก็บของ อาหารที่ทิ้งไว้ในครัวอาจถูกนำออกหรือทิ้ง\",\n      respectTitle: \"เคารพอาหารของแขกท่านอื่น\", respectBody: \"โปรดอย่าใช้หรือหยิบอาหาร เครื่องดื่ม อุปกรณ์ หรือภาชนะของแขกท่านอื่นโดยไม่ได้ขออนุญาต\",\n      safetyTitle: \"ความปลอดภัยในการทำอาหาร\", safetyBody: \"อย่าทิ้งการทำอาหารไว้โดยไม่มีคนดูแล ตรวจสอบให้แน่ใจว่าเตา เตาอบ และเครื่องใช้ไฟฟ้าถูกปิดเมื่อใช้เสร็จ และรักษาพื้นที่รอบ ๆ ให้โล่ง หากมีสิ่งใดหกเลอะ ไหม้ หรือมีกลิ่นผิดปกติ ให้หยุดและแจ้งเรา — อย่าใช้เครื่องใช้ไฟฟ้าที่ดูไม่ปลอดภัยต่อไป\" },\n    laundry: { kicker: \"สิ่งอำนวยความสะดวกส่วนกลาง\", title: \"ซักรีดและอุปกรณ์ทำความสะอาด\",\n      intro: \"การรักษาให้ห้องซักผ้าใช้งานได้อย่างราบรื่นเป็นความร่วมมือของทุกคน — นิสัยเล็ก ๆ น้อย ๆ ช่วยให้ทุกคนที่ใช้พื้นที่นี้สะดวกขึ้น เก็บผ้าของคุณให้ทันเวลา จัดการให้เรียบร้อยหลังใช้งาน และเตรียมทุกอย่างให้พร้อมสำหรับแขกท่านต่อไป\",\n      laundryHeading: \"ซักรีด\",\n      b1: \"เก็บผ้าที่ซักและตากแห้งทันทีเมื่อเสร็จ\", b2: \"หลีกเลี่ยงการใส่ผ้าในเครื่องซักผ้ามากเกินไป และเช็ดของเหลวที่หกทันที\", b3: \"ใช้โปรแกรมซักสั้นเท่านั้น เพื่อให้แขกท่านอื่นได้ใช้งานด้วย\", b4: \"สลัดโคลน หญ้า หรือเศษดินออกกลางแจ้งก่อน ก่อนซักเสื้อผ้าทำงานฟาร์มหรือทำงาน\", b5: \"ปรึกษาเราก่อนซักสิ่งที่เปื้อนโคลนมาก มัน หรือแช่สารเคมี\", b6: \"นำที่หนีบผ้าและตะกร้ากลับไปเก็บที่เดิมทันทีหลังใช้งาน\", b7: \"หลีกเลี่ยงการซักผ้าในช่วงดึกหากอาจรบกวนผู้อื่น\",\n      cleaningHeading: \"การทำความสะอาด\", cleaningIntro: \"เราทำความสะอาดพื้นที่ส่วนกลางอย่างละเอียดอย่างน้อยสัปดาห์ละสองครั้ง ระหว่างการทำความสะอาด โปรดจัดเก็บให้เรียบร้อยหลังใช้งานและนำสิ่งของที่ใช้กลับไปเก็บที่เดิม\",\n      toolsTitle: \"เครื่องมือทำความสะอาด\", toolsBody: \"คุณจะพบเครื่องดูดฝุ่น ไม้ถูพื้น และไม้กวาดเก็บไว้ในห้องซักผ้า โปรดชาร์จเครื่องดูดฝุ่นและเปลี่ยนหัวไม้ถูพื้นเป็นอันใหม่สะอาดก่อนนำไปคืน\",\n      suppliesTitle: \"อุปกรณ์ทำความสะอาด\", suppliesBody: \"น้ำยาซักผ้าอยู่ใกล้เครื่องซักผ้า และอุปกรณ์ทำความสะอาดอยู่ใต้อ่างล้างหน้าในห้องน้ำ อุปกรณ์ทำความสะอาดและผ้าเช็ดสำรองเก็บไว้ในตู้ผ้าปูที่นอนพร้อมกับกระดาษชำระ\",\n      dirtyTitle: \"ผ้าเช็ดสกปรกและหัวไม้ถูพื้น\", dirtyBody: \"โปรดนำผ้าเช็ดสกปรกและหัวไม้ถูพื้นใส่ตะกร้าซักผ้าข้างเครื่องซักผ้า เพื่อนำไปซักสำหรับใช้ในครั้งต่อไป\",\n      lowTitle: \"ของใกล้หมดหรือมีอะไรชำรุด?\", lowBody: \"โปรดแจ้งให้เราทราบหากคุณสังเกตเห็นว่าของใกล้หมด หรือมีอะไรชำรุดหรือทำงานไม่ถูกต้อง รวมถึงอุปกรณ์ทำความสะอาด กระดาษชำระ ผ้าเช็ดสะอาด หัวไม้ถูพื้น และเครื่องดูดฝุ่นที่มีเสียงดังหรือทำความสะอาดได้ไม่ดี\" },\n    outdoor: { kicker: \"การอยู่ร่วมกัน\", title: \"พื้นที่กลางแจ้งและช่วงเวลาเงียบสงบ\",\n      intro: \"พื้นที่กลางแจ้งของเรา — พร้อมโต๊ะพูล ลู่วิ่ง เครื่องพายเรือ บาร์บีคิว และโต๊ะรับประทานอาหารกลางแจ้ง — เป็นสถานที่ที่ดีสำหรับแขกในการพักผ่อนและเข้าสังคมร่วมกัน โปรดเพลิดเพลินโดยคำนึงถึงความสงบและความสะดวกสบายของแขกท่านอื่น\",\n      b1: \"เพลิดเพลินกับโต๊ะพูล อุปกรณ์ออกกำลังกาย และพื้นที่บาร์บีคิว — เพียงรักษาระดับเสียงให้เหมาะสม\", b2: \"ทำความสะอาดหลังรับประทานอาหาร ดื่ม หรือใช้บาร์บีคิว และทิ้งขยะ\", b3: \"นำอุปกรณ์และเฟอร์นิเจอร์กลับไปที่เดิมหลังใช้งาน และรักษาทางเดินให้โล่ง\", b4: \"คำนึงถึงแขกที่ไม่ได้ร่วมสังสรรค์กับคุณ — โดยเฉพาะผู้ที่ต้องตื่นเช้าหรือมีตารางเวลาต่างกัน\", b5: \"มีเรื่องกังวลเล็กน้อยหรือไม่? หากสะดวกใจ โปรดแจ้งอย่างสุภาพ หรือบอกเราโดยตรง — เราต้องการให้บรรยากาศผ่อนคลายมากกว่าเป็นทางการ\",\n      quietHeading: \"ช่วงเวลาเงียบสงบ\", quietText: \"ช่วงเวลาเงียบสงบคือ 22.00 น. ถึง 7.00 น. ในช่วงเวลานี้ โปรดลดเสียงเพลง โทรทัศน์ และการโทรศัพท์ หลีกเลี่ยงการสนทนาเสียงดังกลางแจ้ง และลดเสียงจากครัว ซักผ้า และฝีเท้าใกล้ห้องพักแขกให้น้อยที่สุด\",\n      partyTitle: \"ไม่ใช่สถานที่จัดปาร์ตี้\", partyBody: \"ที่นี่เป็นบ้านสำหรับผู้ที่ทำงาน พักผ่อน และเดินทาง ไม่ใช่สถานที่จัดปาร์ตี้ เพลงเสียงดัง การรวมตัวที่ก่อความวุ่นวาย พฤติกรรมก้าวร้าว หรือความมึนเมาอย่างหนักเป็นอันตรายต่อการพักผ่อนและความสะดวกสบายของแขกท่านอื่น จึงไม่ได้รับอนุญาตที่นี่\" },\n    alcoholSmoking: { kicker: \"การอยู่ร่วมกัน\", title: \"แอลกอฮอล์ บุหรี่ และยาเสพติด\",\n      intro: \"อนุญาตให้ดื่มแอลกอฮอล์และสูบบุหรี่ได้ภายใต้ข้อจำกัด เราขอให้คุณปฏิบัติตามกฎสำคัญเหล่านี้เพื่อรักษาพื้นที่ให้สะดวกสบายและปลอดภัยสำหรับทุกคน\",\n      b1: \"ดื่มอย่างมีความรับผิดชอบ — การดื่มมากเกินไปจนนำไปสู่พฤติกรรมก้าวร้าวหรือควบคุมไม่ได้เป็นสิ่งที่ยอมรับไม่ได้\", b2: \"สูบบุหรี่และบุหรี่ไฟฟ้าได้เฉพาะกลางแจ้งในพื้นที่ที่กำหนดเท่านั้น — ห้ามใกล้ประตูหรือหน้าต่างโดยเด็ดขาด\", b3: \"ตรวจสอบกับแขกใกล้เคียงก่อนสูบบุหรี่ และย้ายที่หากมีใครไม่สบายใจกับควันบุหรี่\", b4: \"ทิ้งก้นบุหรี่อย่างถูกวิธี — ห้ามทิ้งไว้บนพื้นหรือเกลื่อนกลาดโดยเด็ดขาด\",\n      dangerTitle: \"ห้ามใช้ยาเสพติดผิดกฎหมายหรือมีพฤติกรรมก้าวร้าว\", dangerBody: \"Placid Homestead เป็นสถานที่ที่สงบและปลอดยาเสพติด ห้ามใช้หรือครอบครองยาเสพติดผิดกฎหมาย รวมถึงพฤติกรรมก้าวร้าวหรือคุกคาม เพื่อรักษาให้ที่นี่เป็นพื้นที่ปลอดภัยสำหรับทุกคน การไม่ปฏิบัติตามกฎนี้อาจนำไปสู่การแ
