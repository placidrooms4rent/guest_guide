lta en habitaciones o espacios compartidos.\", b2: \"Sella los residuos de comida para que no atraigan plagas.\", b3: \"Pregunta antes de desechar pilas, químicos, aceite o cualquier cosa peligrosa.\",\n      neverTitle: \"Nunca viertas por el desagüe\", neverBody: \"Aceite o grasa de cocina, pintura o químicos, restos de comida, posos de café, medicamentos, barro, o toallitas y productos sanitarios. El sistema séptico no puede procesarlos — raspa los platos en la papelera, y lava las botas embarradas afuera.\",\n      reportTitle: \"Informa pronto\", reportBody: \"¿Desagües lentos, malos olores, gorgoteos o agua estancada? Avísanos de inmediato — los problemas pequeños se agrandan rápido aquí.\" },\n    utilities: { kicker: \"SISTEMAS DE LA PROPIEDAD\", title: \"Electricidad y servicios\",\n      intro: \"A veces, la electricidad puede interrumpirse. Te pedimos que tengas en cuenta el uso de varios aparatos a la vez, ya que esto puede sobrecargar el sistema eléctrico e interrumpir el suministro para todos.\",\n      b1: \"Apaga luces, ventiladores, calefactores y aire acondicionado cuando no los necesites.\", b2: \"Por favor informa de cualquier falla con el suministro de agua, electricidad e internet cuanto antes.\",\n      dontTouchTitle: \"Por favor no toques\", dontTouchBody: \"Medidores, bombas, tanques, sistemas solares, baterías o interruptores — déjanos esto a nosotros.\" },\n    maintenance: { kicker: \"SISTEMAS DE LA PROPIEDAD\", title: \"Mantenimiento\",\n      intro: \"De vez en cuando puede que sea necesario realizar trabajos de mantenimiento en la propiedad, lo que puede generar algo de ruido y, a veces, breves interrupciones en el suministro de electricidad o agua — agradecemos tu paciencia cuando esto ocurra.\",\n      b1: \"Por favor informa de cualquier falla con el suministro de agua, electricidad o internet cuanto antes, para poder solucionarlo antes de que cause interrupciones.\",\n      accessTitle: \"Acceso a habitaciones\", accessBody: \"Ocasionalmente podemos necesitar acceder a habitaciones o áreas compartidas para reparaciones o revisiones de seguridad — avisaremos con antelación cuando sea posible.\" },\n    mail: { kicker: \"SISTEMAS DE LA PROPIEDAD\", title: \"Correo y entregas\",\n      intro: \"Las entregas se organizan a través de un área de correo designada — un poco de aviso previo nos ayuda a mantener todo funcionando sin problemas.\",\n      b1: \"El correo y las entregas van al área de correo asignada cerca de la cocina en la Casa Principal.\", b2: \"Los huéspedes que residen en las Paddock Rooms serán notificados si reciben correo.\", b3: \"Avísanos con antelación si esperas algo urgente, valioso o a nombre de otra persona.\", b4: \"Recoge tu propio correo con prontitud.\",\n      noteTitle: \"Ten en cuenta\", noteBody: \"Nuestro objetivo es asegurar que todo el correo se recoja y se coloque en el lugar correcto, y que se notifique a los huéspedes — sin embargo, los huéspedes son responsables de su propio correo.\" },\n    leaving: { kicker: \"AL MARCHARTE\", title: \"Pertenencias, convivencia y salida\",\n      intro: \"Unos hábitos sencillos mantienen el alojamiento compartido cómodo para todos — incluido quien venga después.\",\n      p1: \"Mantén tus pertenencias seguras y ordenadas, y no dejes objetos de valor en áreas compartidas o vehículos sin llave — no podemos responsabilizarnos de objetos personales perdidos, robados o dañados.\",\n      goodHabitsHeading: \"Buenos hábitos de convivencia\",\n      gb1: \"Limpia después de ti y respeta las horas de sueño y trabajo de los demás.\", gb2: \"Pregunta antes de tomar prestado algo.\", gb3: \"Comunícate con amabilidad, informa los problemas pronto y ten en cuenta el ruido.\", gb4: \"Trata la casa — y a los animales — como te gustaría que trataran la tuya.\",\n      beforeHeading: \"Antes de irte\",\n      c1: \"Retira todas tus pertenencias personales y comida del refrigerador, armarios o cajón asignado de tu habitación.\", c2: \"Tira la basura y deja tu habitación ordenada.\", c3: \"Devuelve llaves, mandos y otros elementos de acceso.\", c4: \"Quita la ropa de cama y déjala en la habitación.\", c5: \"Cierra sesión en cuentas de streaming, y recoge impresiones o correo.\", c6: \"Retira la ropa de las máquinas o del tendedero.\", c7: \"Informa de cualquier daño u objeto faltante.\",\n      leftTitle: \"¿Olvidaste algo?\", leftBody: \"Contáctanos lo antes posible después del check-out — haremos todo lo posible, pero no podemos garantizar que los objetos puedan guardarse o devolverse.\" },\n    thanks: { kicker: \"GRACIAS POR TU ESTANCIA CON NOSOTROS\", title: \"Placid Homestead\", bookTitle: \"Nuestro libro de visitas\", bookBody: \"Esperamos que haya sido una estancia memorable. Nos encantaría que dejaras un mensaje amistoso en nuestro libro de visitas, para poder recordarlo y compartirlo con otros huéspedes.\" }\n  },\n  fr: {\n    switcher: \"Langue\",\n    cover: { kicker: \"GUIDE DE L'HÔTE\", title: \"Placid Homestead\",\n      subtitle: \"Tout ce qu'il vous faut pour un séjour confortable — le fonctionnement de la maison, et comment bien vivre ensemble.\",\n      intro: \"Bonjour, nous sommes ravis de vous accueillir. La plupart de nos hôtes sont des routards, des voyageurs et des travailleurs saisonniers logés à proximité pour un travail agricole ou régional. Ce guide couvre l'essentiel du quotidien : votre chambre, les espaces communs, les animaux, et comment garder la maison agréable pour tous.\" },\n    glance: { kicker: \"EN UN COUP D'ŒIL\", title: \"L'essentiel\",\n      subtitle: \"Gardez cette page à portée de main — c'est la version courte de tout le reste de ce guide.\",\n      emergencyTitle: \"Urgence : 000\", emergencyBody: \"En cas de danger immédiat, incendie, blessure grave ou urgence médicale, appelez d'abord le 000. Contactez votre hôte une fois la situation sécurisée.\",\n      quietTitle: \"Heures calmes : 22h–7h\", quietBody: \"Gardez la musique, les appels, le bruit de cuisine et de lessive, et les pas près des chambres à un niveau bas.\",\n      areaTitle: \"Votre zone\", areaBody: \"Maison principale ou Paddock Rooms — merci d'utiliser la cuisine, la salle de bain et la buanderie de votre propre zone.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"Les informations de connexion sont sur le tableau d'affichage, ainsi que dans votre chambre.\",\n      flushTitle: \"Ne jamais jeter dans les toilettes\", flushBody: \"Lingettes, produits d'hygiène, cotons-tiges ou nourriture. C'est une fosse septique — utilisez la poubelle de la salle de bain.\",\n      alcoholTitle: \"Alcool et tabac\", alcoholBody: \"Autorisés avec modération. Fumez et vapotez uniquement dehors — aucune drogue illicite.\",\n      gatesTitle: \"Portails et animaux\", gatesBody: \"Gardez toujours les portails fermés. Ne nourrissez pas, ne poursuivez pas et n'importunez pas les animaux.\",\n      considerateTitle: \"Soyez respectueux\", considerateBody: \"Soyez respectueux et attentionné envers l'hôte et tous les autres hôtes partageant la propriété avec vous.\" },\n    hosts: { kicker: \"S'INSTALLER\", title: \"Vos hôtes et comment obtenir de l'aide\", hostName: \"Simon et Sita\",\n      p1: \"Bienvenue — Simon et moi sommes ravis de partager notre maison avec vous, et espérons que votre séjour ici sera agréable, heureux et reposant.\",\n      p2: \"Vous trouverez généralement Simon présent la plupart des jours, puisqu'il vit sur place, et je suis également présente la plupart du temps, aidant à la gestion de la maison et aux relations avec les hôtes. Nous adorons discuter et aider autant que possible, même s'il nous arrive d'être occupés ou de prendre un moment pour nous détendre — nous ne serons donc pas toujours disponibles immédiatement, mais jamais loin, et toujours à un message près.\",\n      p3: \"Nous voulons que votre séjour ici soit confortable, agréable et sans tracas, et espérons que vous en garderez de bons souvenirs.\",\n      p4: \"Nous avons préparé ce guide pour le confort et la sécurité de tous nos hôtes, alors prenez le temps de le lire et de vous familiariser avec vos responsabilités pendant votre séjour chez nous.\",\n      p5: \"Merci de votre considération et de votre respect — profitez de votre séjour, et à bientôt.\",\n      signoff: \"Cordialement,\", signoffNames: \"Simon et Sita\",\n      getInTouch: \"Nous contacter\",\n      contactLines: \"Mobile de Simon : 0474 735 389\\nMobile de Sita : 0404 534 688\\nEmail : placid.rooms4rent@gmail.com\",\n      whatsapp: \"Groupe WhatsApp\",\n      communityChat: \"Après avoir scanné le code QR, vous serez ajouté à notre chat communautaire, où nous partagerons les mises à jour et annonces générales pour tous les hôtes, ainsi qu'un chat privé rien que pour vous et votre chambre, pour tout ce qui est plus personnel concernant votre séjour — questions, demandes, ou tout ce que vous préférez garder privé plutôt que d'en parler dans le groupe.\",\n      dangerTitle: \"Danger immédiat\",\n      dangerBody: \"Appelez d'abord le 000 — incendie, blessure grave, violence, danger électrique ou urgence médicale. Contactez-nous ensuite, une fois la situation sécurisée.\" },\n    toc: { kicker: \"SOMMAIRE\", title: \"Sommaire\", groupSettled: \"S'installer\", hosts: \"Vos hôtes et comment obtenir de l'aide\", room: \"Votre chambre\", zones: \"Deux espaces, une maison\", around: \"Se déplacer en toute sécurité\", parking: \"Stationnement et zones restreintes\", groupShared: \"Installations communes\", bathrooms: \"Salles de bain et toilettes\", kitchen: \"Cuisine\", laundry: \"Buanderie et produits de nettoyage\", groupLiving: \"Vivre ensemble\", outdoor: \"Espace extérieur et heures calmes\", alcohol: \"Alcool, tabac et drogues\", animals: \"Animaux et vie à la ferme\", groupWifi: \"Wi-Fi et équipement\", wifi: \"Wi-Fi, impression et divertissement\", aircon: \"Climatisation et chauffage\", groupSystems: \"Systèmes de la propriété\", waste: \"Déchets et fosse septique\", utilities: \"Électricité et services\", maintenance: \"Entretien\", mail: \"Courrier et livraisons\", groupLeaving: \"Bien partir\", leaving: \"Affaires, colocataires et départ\" },\n    room: { kicker: \"S'INSTALLER\", title: \"Votre chambre\",\n      intro: \"Nous espérons que votre chambre est confortable et propre. Merci de nous aider à réduire les dommages et désagréments pour les autres hôtes en suivant ces consignes.\",\n      b1: \"La nourriture gardée dans votre chambre doit être scellée et rangée correctement.\", b2: \"Jetez régulièrement les déchets dans les bonnes poubelles.\", b3: \"Gardez serviettes et vêtements mouillés loin des lits, sols et meubles.\", b4: \"Ouvrez une fenêtre quand vous le pouvez, pour garder la chambre fraîche et aérée.\", b5: \"Nettoyez régulièrement votre chambre, y compris le linge de lit fourni.\", b6: \"Signalez dommages, fuites, nuisibles, moisissures ou toute panne dès que vous les remarquez.\", b7: \"Merci de respecter les règles concernant le bruit, même dans les chambres.\",\n      cookingTitle: \"Cuisiner dans votre chambre — risque d'incendie\", cookingBody: \"Un micro-ondes ou une bouilloire basique convient si l'un d'eux est fourni ou approuvé. C'est tout — pas de plaques portables, poêles électriques, cuiseurs à riz, friteuses à air, grille-pains, réchauds de camping, brûleurs à gaz ou bougies dans les chambres, sauf si l'appareil et l'endroit ont été approuvés. Ces objets représentent un vrai risque d'incendie dans une chambre — merci de ne pas les utiliser sans notre accord.\",\n      dontTitle: \"Merci de ne pas\", dontBody: \"Déplacer des meubles entre les chambres, ni retirer quoi que ce soit qui se trouvait déjà dans votre chambre à votre arrivée — y compris les articles fournis — sauf si nous vous avons dit que c'était possible.\",\n      arrivalTitle: \"À votre arrivée\", arrivalBody: \"Si quelque chose manque, est endommagé ou ne fonctionne pas correctement, dites-le-nous dès que possible.\" },\n    zones: { kicker: \"S'INSTALLER\", title: \"Deux espaces, une maison\",\n      intro: \"Placid Homestead dispose de deux espaces d'accueil distincts, chacun avec ses propres espaces communs et son propre charme. Nous demandons à nos hôtes d'utiliser la cuisine, la salle de bain et la buanderie de leur propre zone. Cela garde les choses simples, équitables et agréables pour tous. Vous n'êtes pas sûr de votre zone ? Demandez-nous simplement.\",\n      mainHouse: \"La Maison Principale\", paddockRooms: \"Les Paddock Rooms\",\n      switchTitle: \"Envie de changer de zone ?\", switchBody: \"Envie de déménager vers l'autre zone pendant votre séjour ? Faites-le-nous savoir — nous serons ravis de vous ajouter à une liste d'attente, afin que si une place se libère là-bas, vous ayez la priorité avant que nous ne l'annoncions à de nouveaux hôtes.\" },\n    around: { kicker: \"S'INSTALLER\", title: \"Se déplacer en toute sécurité\",\n      intro: \"Plusieurs accès, chemins et portails relient les chambres, le stationnement et les espaces communs de la propriété. Merci de faire attention en vous déplaçant afin que chacun puisse accéder à son espace en toute sécurité.\",\n      b1: \"Utilisez les accès autorisés pour les hôtes et gardez les chemins dégagés.\", b2: \"Soyez prudent sur les terrains inégaux, le gravier et en cas de faible luminosité, surtout après la tombée de la nuit.\", b3: \"Portez des chaussures solides à l'extérieur, surtout la nuit, après la pluie et près des zones d'animaux.\", b4: \"Faites attention aux animaux, véhicules et autres hôtes en vous déplaçant sur la propriété.\", b5: \"Signalez tout ce qui ressemble à un risque de sécurité ou de chute.\",\n      gatesTitle: \"Portails\", gatesBody: \"Les portails de la propriété doivent rester fermés, pour empêcher les animaux de s'échapper vers les espaces d'accueil — ou pire, sur la route, où ils pourraient être blessés ou causer un accident. Si vous trouvez un portail ouvert, merci de le fermer, sauf indication contraire.\",\n      accessTitle: \"Sécurité des accès\", accessBody: \"Si une clé d'accès vous a été attribuée, merci de ne pas la partager ou la donner à quiconque n'est pas un hôte approuvé.\" },\n    parking: { kicker: \"SYSTÈMES DE LA PROPRIÉTÉ\", title: \"Stationnement et zones restreintes\",\n      intro: \"Le stationnement est un espace partagé et communal, merci de vous garer avec considération et de garder les zones d'accès dégagées en permanence — allées, portails et accès agricoles ou d'urgence doivent rester ouverts pour l'usage de tous. Certaines parties de la propriété sont restreintes pour des raisons de sécurité, ou simplement pour protéger la vie privée de l'hôte et des autres hôtes, merci donc de rester en dehors de ces zones sauf indication contraire.\",\n      parkingHeading: \"Stationnement\",\n      b1: \"Garez-vous uniquement dans les zones autorisées — les véhicules sont garés à vos propres risques.\", b2: \"Ne bloquez jamais les portails, allées ou accès d'urgence/agricoles.\", b3: \"Faites attention aux animaux, au terrain inégal et à la faible luminosité en conduisant ou en vous garant.\", b4: \"Dites-nous si votre véhicule fuit de l'huile ou des liquides, et déplacez-le si on vous le demande.\",\n      restrictedTitle: \"Zones restreintes\", restrictedBody: \"Les hangars, ateliers, enclos, barrages, infrastructures hydrauliques et zones privées de l'hôte sont interdits sauf indication claire contraire. Non verrouillé ne veut pas dire sûr — demandez avant d'entrer.\" },\n    bathrooms: { kicker: \"INSTALLATIONS COMMUNES\", title: \"Salles de bain et toilettes\",\n      intro: \"Nos salles de bain sont des espaces communs, merci de les utiliser avec considération pour les autres hôtes qui les partagent avec vous. Quelques habitudes simples font une grande différence pour garder les choses propres et agréables pour tous.\",\n      b1: \"Rincez la douche et retirez les cheveux des siphons après utilisation.\", b2: \"Essuyez l'excès d'eau sur les sols, éviers et plans de travail.\", b3: \"Accrochez les tapis de bain très mouillés dehors sur le fil à linge pour sécher.\", b4: \"Reprenez vos affaires — pas de serviettes, vêtements ou articles de toilette laissés traîner.\", b5: \"Retirez les articles de toilette de la douche une fois terminé, et ramenez-les à votre panier ou chambre.\", b6: \"Prenez des douches courtes, pour que chacun ait son tour et que l'eau chaude ne manque pas.\",\n      septicTitle: \"Fosse septique et eaux grises — nécessite une attention particulière\", septicBody: \"Ceci est une fosse septique, pas un tout-à-l'égout urbain. Ne jetez que du papier toilette et des déchets humains — tout le reste va dans la poubelle de la salle de bain : lingettes (même celles dites « jetables dans les toilettes »), serviettes et tampons, cotons-tiges, essuie-tout, préservatifs, nourriture et cheveux. Le mauvais objet peut vite la boucher.\",\n      reportTitle: \"Signalez tôt\", reportBody: \"Signalez-nous immédiatement les fuites, blocages, problèmes d'eau chaude, écoulements lents, odeurs ou gargouillis — les petits problèmes sont bien plus faciles, et moins coûteux, à résoudre tôt.\" },\n    kitchen: { kicker: \"INSTALLATIONS COMMUNES\", title: \"Cuisine\",\n      intro: \"Notre cuisine est un espace commun, merci de l'utiliser avec considération pour les autres hôtes qui la partagent avec vous. Nettoyez après vous, faites attention au temps que vous passez à cuisiner, et gardez l'espace libre de tout ce qui n'y appartient pas — pour qu'elle reste propre, rangée, et que chacun ait un accès égal.\",\n      b1: \"Lavez, séchez et rangez votre vaisselle juste après utilisation.\", b2: \"Essuyez plans de travail, tables et plaque de cuisson, et nettoyez les appareils après utilisation.\", b3: \"Mettez tous les restes de nourriture, emballages et déchets dans les bonnes poubelles.\", b4: \"Si une poubelle se remplit, ne la surchargez pas — sortez-la au point de collecte principal.\", b5: \"Ne laissez pas de nourriture dehors la nuit — cela attire les nuisibles et gêne les autres.\", b6: \"Soyez attentionné envers les autres hôtes qui attendent pour cuisiner — ne laissez pas votre désordre pour la personne suivante.\", b7: \"Gardez les ustensiles de cuisine communs (ustensiles, casseroles, contenants) dans la cuisine — ne les emportez pas dans votre chambre.\",\n      storageTitle: \"Stockage des aliments\", storageBody: \"Les réfrigérateurs et placards du garde-manger dans la cuisine sont réservés à l'hôte uniquement. Toute la nourriture des hôtes doit être conservée dans votre propre réfrigérateur et placards dans votre chambre, sauf si un tiroir de cuisine vous a été attribué pour le stockage. La nourriture laissée dans la cuisine peut être retirée ou jetée.\",\n      respectTitle: \"Respectez la nourriture des autres hôtes\", respectBody: \"Merci de ne pas utiliser ou prendre la nourriture, boissons, ustensiles ou contenants d'un autre hôte sans demander.\",\n      safetyTitle: \"Sécurité en cuisine\", safetyBody: \"Ne laissez jamais la cuisson sans surveillance. Assurez-vous que la plaque, le four et les appareils sont éteints une fois terminé, et gardez la zone autour dégagée. Si quelque chose déborde, brûle ou sent mauvais, arrêtez-vous et informez-nous — n'utilisez pas un appareil qui semble dangereux.\" },\n    laundry: { kicker: \"INSTALLATIONS COMMUNES\", title: \"Buanderie et produits de nettoyage\",\n      intro: \"Faire fonctionner la buanderie sans accroc est un effort commun — quelques petites habitudes facilitent la vie de tous ceux qui utilisent l'espace. Récupérez votre linge rapidement, rangez après vous et laissez tout prêt pour le prochain hôte.\",\n      laundryHeading: \"Buanderie\",\n      b1: \"Récupérez le linge lavé et séché rapidement une fois terminé.\", b2: \"Évitez de surcharger la machine à laver, et nettoyez tout déversement de liquide.\", b3: \"Utilisez uniquement des cycles courts, pour permettre l'accès aux autres hôtes.\", b4: \"Secouez la boue, l'herbe ou les débris dehors avant de laver des vêtements de ferme ou de travail.\", b5: \"Vérifiez avec nous avant de laver quoi que ce soit de très boueux, huileux ou imbibé de produits chimiques.\", b6: \"Remettez pinces et paniers à leur place de rangement juste après utilisation.\", b7: \"Évitez de faire la lessive tard le soir si cela pourrait déranger les autres.\",\n      cleaningHeading: \"Nettoyage\", cleaningIntro: \"Nous nettoyons soigneusement les espaces communs au moins deux fois par semaine. Entre les nettoyages, merci de ranger après vous et de remettre tout ce que vous utilisez à sa place de rangement.\",\n      toolsTitle: \"Outils de nettoyage\", toolsBody: \"Vous trouverez un aspirateur, une serpillière et un balai rangés dans la buanderie. Merci de mettre l'aspirateur en charge et de remplacer la tête de serpillière par une propre en le rendant.\",\n      suppliesTitle: \"Produits de nettoyage\", suppliesBody: \"La lessive se trouve près de la machine à laver et les produits de nettoyage sous l'évier de la salle de bain. Les produits de nettoyage et chiffons de rechange sont rangés dans l'armoire à linge, ainsi que le papier toilette.\",\n      dirtyTitle: \"Chiffons sales et têtes de serpillière\", dirtyBody: \"Merci de placer les chiffons sales et les têtes de serpillière dans le panier à linge à côté de la machine à laver, afin qu'ils puissent être nettoyés pour une utilisation future.\",\n      lowTitle: \"Stock bas ou quelque chose de cassé ?\", lowBody: \"Merci de nous informer si vous remarquez que les stocks sont bas, ou si quelque chose est cassé ou ne fonctionne pas correctement. Cela inclut les produits de nettoyage, le papier toilette, les chiffons propres, les têtes de serpillière, et l'aspirateur qui fait du bruit ou ne nettoie pas bien.\" },\n    outdoor: { kicker: \"VIVRE ENSEMBLE\", title: \"Espace extérieur et heures calmes\",\n      intro: \"Notre espace extérieur — avec table de billard, tapis de course, rameur, barbecue et tables de repas extérieures — est un excellent endroit pour que les hôtes se détendent et socialisent ensemble. Profitez-en tout en tenant compte de la tranquillité et du confort des autres hôtes.\",\n      b1: \"Profitez de la table de billard, des équipements de sport et de la zone barbecue — gardez simplement le bruit à un niveau respectueux.\", b2: \"Nettoyez après avoir mangé, bu ou utilisé le barbecue, et jetez vos déchets.\", b3: \"Remettez l'équipement et les meubles à leur place après utilisation, et gardez les allées dégagées.\", b4: \"Soyez attentif aux hôtes qui ne font pas partie de votre rassemblement — surtout ceux qui se lèvent tôt ou ont des horaires différents.\", b5: \"Une petite préoccupation ? Signalez-la poliment si vous êtes à l'aise, ou dites-le-nous simplement — nous préférons garder les choses calmes plutôt que formelles.\",\n      quietHeading: \"Heures calmes\", quietText: \"Les heures calmes vont de 22h à 7h. Pendant cette période, merci de garder la musique, la télé et les appels téléphoniques à faible volume, d'éviter les conversations bruyantes en extérieur, et de minimiser le bruit de cuisine, de lessive et de pas près des chambres.\",\n      partyTitle: \"Pas une propriété pour faire la fête\", partyBody: \"C'est une maison pour des personnes qui travaillent, se reposent et voyagent — pas un lieu pour des fêtes. La musique forte, les rassemblements perturbateurs, le comportement agressif ou l'intoxication excessive mettent en danger le repos et le confort des autres hôtes, donc ils ne sont pas autorisés ici.\" },\n    alcoholSmoking: { kicker: \"VIVRE ENSEMBLE\", title: \"Alcool, tabac et drogues\",\n      intro: \"La consommation d'alcool et le tabac sont autorisés, avec des limites. Nous vous demandons de suivre ces règles essentielles pour garder l'espace confortable et sûr pour tous.\",\n      b1: \"Buvez de manière responsable — une consommation excessive menant à un comportement agressif ou indiscipliné n'est pas acceptable.\", b2: \"Fumez et vapotez uniquement dehors, dans les zones désignées — jamais près des portes ou fenêtres.\", b3: \"Vérifiez auprès des hôtes à proximité avant de fumer, et éloignez-vous si quelqu'un n'est pas à l'aise avec la fumée.\", b4: \"Jetez correctement les mégots de cigarettes — ne les laissez jamais traîner par terre.\",\n      dangerTitle: \"Aucune drogue illicite ni comportement agressif\", dangerBody: \"Placid Homestead est une propriété paisible et sans drogue. L'usage ou la possession de drogues illicites, ainsi que les comportements agressifs ou menaçants, ne sont pas autorisés, afin de garder cet espace sûr pour tous. Le non-respect de cette règle peut entraîner un avis de départ, ou dans des cas graves, l'intervention de la police.\" },\n    animals: { kicker: \"VIVRE ENSEMBLE\", title: \"Animaux et vie à la ferme\",\n      intro: \"Une partie de l'expérience ici consiste à partager la propriété avec les animaux qui y vivent. Le bétail et les animaux domestiques se déplacent librement, vous les verrez donc régulièrement autour de la maison et de la propriété — cela fait partie du charme. Rappelez-vous simplement que ce sont des animaux, donc un peu de prudence et de considération est très utile.\",\n      b1: \"Ne nourrissez pas les animaux sauf si nous avons dit que c'était possible.\", b2: \"Ne les poursuivez pas, ne les taquinez pas, ne les soulevez pas et n'interférez pas autrement avec eux.\", b3: \"Gardez toujours les portails fermés, et faites attention aux animaux en conduisant ou en marchant.\", b4: \"Signalez tout animal en liberté, blessé, malade ou se comportant de manière agressive.\",\n      petsTitle: \"Pas d'animaux ni d'enfants pendant le séjour\", petsBody: \"Pour maintenir la propriété adaptée en tant qu'hébergement partagé pour travailleurs, les hôtes ne peuvent pas avoir d'enfants, de bébés ou d'animaux domestiques qui séjournent avec eux, ni faire venir des visiteurs avec des enfants, bébés ou animaux — sauf approbation préalable.\" },\n    wifi: { kicker: \"WI-FI ET ÉQUIPEMENT\", title: \"Wi-Fi, impression et divertissement\",\n      wifiHeading: \"Détails Wi-Fi\", wifiText: \"L'internet rural peut être un peu plus lent ou moins fiable que ce à quoi vous êtes habitué — la météo, les coupures et la distance des tours peuvent tous jouer un rôle, merci donc pour votre patience. Merci d'éviter les téléchargements lourds qui ralentissent la connexion pour les autres hôtes, et informez-nous en cas de coupure — certaines sont hors de notre contrôle, mais nous vérifierons toujours.\",\n      wifiCallout: \"Les informations de connexion Wi-Fi seront sur le tableau d'affichage, ainsi que dans votre chambre.\",\n      printingHeading: \"Impression\", printingText: \"Une imprimante Wi-Fi (Brother HL-L2400DW, Maison Principale) est gratuite pour un usage personnel raisonnable — documents de visa, documents de voyage, billets et formulaires.\",\n      printB1: \"Vérifiez les documents avant d'imprimer.\", printB2: \"Récupérez les impressions rapidement.\", printB3: \"Une impression intensive ou répétée peut entraîner un petit coût.\", printB4: \"Besoin d'aide pour vous connecter ? Faites-le-nous savoir.\",\n      tvHeading: \"Smart TV\", tvText: \"Nous vous avons fourni une Smart TV pour votre divertissement privé. Merci de suivre ces consignes et de nous informer en cas de problème.\",\n      tvB1: \"Utilisez vos propres comptes de streaming, et déconnectez-vous avant de partir.\", tvB2: \"Gardez le volume raisonnable.\", tvB3: \"Merci de remettre les paramètres de langue en anglais avant votre départ.\", tvB4: \"Besoin d'aide pour la configurer ? Écrivez-nous.\" },\n    aircon: { kicker: \"WI-FI ET ÉQUIPEMENT\", title: \"Climatisation et chauffage\",\n      intro: \"Dans la mesure du possible, des unités de climatisation et des appareils de chauffage ont été fournis pour votre confort. Merci de suivre ces consignes pour garantir une utilisation sûre et réduire la consommation d'énergie.\",\n      b1: \"Gardez portes et fenêtres fermées pendant que la climatisation ou le chauffage fonctionne.\", b2: \"Éteignez-le lorsque vous quittez la chambre pour un moment.\", b3: \"Évitez les réglages extrêmes, et gardez filtres et bouches d'aération dégagés.\", b4: \"Gardez le chauffage éloigné du linge de lit, des rideaux et des meubles.\", b5: \"Signalez fuites, odeurs étranges, bruits inhabituels ou mauvais refroidissement/chauffage.\", b6: \"N'utilisez rien d'endommagé, effiloché ou qui semble dangereux.\",\n      unsureTitle: \"Pas sûr du fonctionnement de quelque chose ?\", unsureBody: \"Demandez simplement — toujours mieux que de risquer un dommage accidentel.\" },\n        wasteSeptic: { kicker: \"SYSTÈMES DE LA PROPRIÉTÉ\", title: \"Déchets et fosse septique\",\n      intro: \"Les propriétés rurales dépendent de systèmes septiques et de déchets qui fonctionnent un peu différemment de ce que vous connaissez en ville, et ils peuvent être sensibles si les mauvaises choses vont au mauvais endroit. Garder les déchets, le recyclage et les canalisations organisés et bien utilisés aide à protéger toute la propriété et à garder les choses en bon fonctionnement pour tous ceux qui séjournent ici.\",\n      b1: \"Utilisez les bonnes poubelles — pas de déchets qui traînent dans les chambres ou espaces communs.\", b2: \"Scellez les déchets alimentaires pour ne pas attirer les nuisibles.\", b3: \"Demandez avant de jeter des piles, produits chimiques, huile ou tout ce qui est dangereux.\",\n      neverTitle: \"Ne jamais verser dans une canalisation\", neverBody: \"Huile ou graisse de cuisson, peinture ou produits chimiques, restes de nourriture, marc de café, médicaments, boue, ou lingettes et produits hygiéniques. La fosse septique ne peut pas les gérer — raclez les assiettes dans la poubelle, et rincez les bottes boueuses dehors.\",\n      reportTitle: \"Signalez tôt\", reportBody: \"Canalisations lentes, mauvaises odeurs, gargouillis ou eau stagnante ? Dites-le-nous immédiatement — les petits problèmes grossissent vite ici.\" },\n    utilities: { kicker: \"SYSTÈMES DE LA PROPRIÉTÉ\", title: \"Électricité et services\",\n      intro: \"Parfois, l'électricité peut être interrompue. Nous vous demandons de faire attention à ne pas faire fonctionner plusieurs appareils à la fois, car cela peut surcharger le système électrique et interrompre l'alimentation pour tous.\",\n      b1: \"Éteignez lumières, ventilateurs, chauffages et climatisation lorsqu'ils ne sont pas nécessaires.\", b2: \"Merci de signaler rapidement tout problème d'eau, d'électricité ou d'internet.\",\n      dontTouchTitle: \"Merci de ne pas toucher\", dontTouchBody: \"Compteurs, pompes, réservoirs, systèmes solaires, batteries ou interrupteurs — laissez-nous nous en occuper.\" },\n    maintenance: { kicker: \"SYSTÈMES DE LA PROPRIÉTÉ\", title: \"Entretien\",\n      intro: \"Des travaux d'entretien peuvent devoir être effectués sur la propriété de temps en temps, ce qui peut créer du bruit et, parfois, de brèves interruptions d'électricité ou d'eau — merci de votre patience lorsque cela se produit.\",\n      b1: \"Merci de signaler rapidement tout problème d'eau, d'électricité ou d'internet, afin que nous puissions les réparer avant qu'ils ne causent des interruptions.\",\n      accessTitle: \"Accès aux chambres\", accessBody: \"Nous pourrions occasionnellement avoir besoin d'accéder aux chambres ou aux espaces communs pour des réparations ou des vérifications de sécurité — nous vous préviendrons dans la mesure du possible.\" },\n    mail: { kicker: \"SYSTÈMES DE LA PROPRIÉTÉ\", title: \"Courrier et livraisons\",\n      intro: \"Les livraisons sont organisées via une zone de courrier désignée — un peu de préavis nous aide à garder les choses en bon fonctionnement.\",\n      b1: \"Le courrier et les livraisons vont dans la zone de courrier attribuée près de la cuisine de la Maison Principale.\", b2: \"Les hôtes résidant dans les Paddock Rooms seront informés s'ils reçoivent du courrier.\", b3: \"Prévenez-nous à l'avance si vous attendez quelque chose d'urgent, de valeur, ou sous un autre nom.\", b4: \"Récupérez votre propre courrier rapidement.\",\n      noteTitle: \"Veuillez noter\", noteBody: \"Nous visons à garantir que tout le courrier soit collecté et placé au bon endroit, et que les hôtes soient informés — cependant, les hôtes sont responsables de leur propre courrier.\" },\n    leaving: { kicker: \"BIEN PARTIR\", title: \"Affaires, colocataires et départ\",\n      intro: \"Des habitudes simples gardent l'hébergement partagé confortable pour tous — y compris pour la personne suivante.\",\n      p1: \"Gardez vos affaires en sécurité et bien rangées, et ne laissez pas d'objets de valeur dans les espaces communs ou des véhicules non verrouillés — nous ne pouvons pas être responsables des objets personnels perdus, volés ou endommagés.\",\n      goodHabitsHeading: \"Bonnes habitudes de colocation\",\n      gb1: \"Nettoyez après vous-même et respectez les heures de sommeil et de travail des autres.\", gb2: \"Demandez avant d'emprunter quoi que ce soit.\", gb3: \"Communiquez avec bienveillance, signalez les problèmes tôt, et faites attention au bruit.\", gb4: \"Traitez la maison — et les animaux — comme vous voudriez que la vôtre soit traitée.\",\n      beforeHeading: \"Avant de partir\",\n      c1: \"Retirez toutes vos affaires personnelles et la nourriture du réfrigérateur, des placards ou du tiroir attribué dans votre chambre.\", c2: \"Jetez vos déchets et laissez votre chambre rangée.\", c3: \"Rendez les clés, télécommandes et autres éléments d'accès.\", c4: \"Retirez le linge de lit et laissez-le dans la chambre.\", c5: \"Déconnectez-vous des comptes de streaming, et récupérez vos impressions ou courrier.\", c6: \"Retirez le linge des machines ou de la corde à linge.\", c7: \"Signalez tout dommage ou objet manquant.\",\n      leftTitle: \"Vous avez oublié quelque chose ?\", leftBody: \"Contactez-nous dès que possible après le départ — nous ferons de notre mieux, mais ne pouvons pas garantir que les objets puissent être conservés ou retournés.\" },\n    thanks: { kicker: \"MERCI DE VOTRE SÉJOUR PARMI NOUS\", title: \"Placid Homestead\", bookTitle: \"Notre livre d'or\", bookBody: \"Nous espérons que ce séjour a été mémorable. Nous aimerions que vous laissiez un petit mot amical dans notre livre d'or, afin que nous puissions le relire et le partager avec d'autres hôtes.\" }\n  },\n  de: {\n    switcher: \"Sprache\",\n    cover: { kicker: \"GASTLEITFADEN\", title: \"Placid Homestead\",\n      subtitle: \"Alles, was du für einen angenehmen Aufenthalt brauchst — wie der Hof funktioniert und wie wir alle gut miteinander auskommen.\",\n      intro: \"Hallo, schön, dass du hier bist. Die meisten unserer Gäste sind Rucksacktouristen, Reisende und Saisonarbeiter, die in der Nähe für landwirtschaftliche oder regionale Arbeit wohnen. Dieser Leitfaden behandelt das Alltägliche: dein Zimmer, gemeinsame Räume, die Tiere, und wie wir den Hof für alle angenehm halten.\" },\n    glance: { kicker: \"AUF EINEN BLICK\", title: \"Das Wichtigste\",\n      subtitle: \"Halte diese Seite griffbereit — sie ist die Kurzfassung von allem anderen in diesem Leitfaden.\",\n      emergencyTitle: \"Notfall: 000\", emergencyBody: \"Bei unmittelbarer Gefahr, Feuer, schwerer Verletzung oder medizinischem Notfall zuerst 000 anrufen. Kontaktiere deinen Gastgeber, sobald es sicher ist.\",\n      quietTitle: \"Ruhezeiten: 22–7 Uhr\", quietBody: \"Musik, Anrufe, Küchen- und Waschküchenlärm sowie Schritte in Zimmernähe leise halten.\",\n      areaTitle: \"Dein Bereich\", areaBody: \"Haupthaus oder Paddock Rooms — bitte nutze Küche, Bad und Waschküche deines eigenen Bereichs.\",\n      wifiTitle: \"WLAN\", wifiBody: \"Die Zugangsdaten findest du am Schwarzen Brett sowie in deinem Zimmer.\",\n      flushTitle: \"Niemals hinunterspülen\", flushBody: \"Feuchttücher, Hygieneartikel, Wattestäbchen oder Essensreste. Es ist eine Sickergrube — nutze stattdessen den Mülleimer im Bad.\",\n      alcoholTitle: \"Alkohol & Rauchen\", alcoholBody: \"In Maßen erlaubt. Rauchen und Dampfen nur draußen — keine illegalen Drogen.\",\n      gatesTitle: \"Tore & Tiere\", gatesBody: \"Tore jederzeit geschlossen halten. Tiere nicht füttern, jagen oder stören.\",\n      considerateTitle: \"Sei rücksichtsvoll\", considerateBody: \"Sei respektvoll und rücksichtsvoll gegenüber dem Gastgeber und allen Gästen, die sich das Grundstück mit dir teilen.\" },\n    hosts: { kicker: \"ANKOMMEN\", title: \"Deine Gastgeber & Hilfe erhalten\", hostName: \"Simon & Sita\",\n      p1: \"Willkommen — Simon und ich freuen uns sehr, unser Zuhause mit dir zu teilen, und hoffen, dass dein Aufenthalt hier angenehm, glücklich und entspannend wird.\",\n      p2: \"Simon ist meistens vor Ort anzutreffen, da er hier wohnt, und auch ich bin die meiste Zeit da und unterstütze beim Hausmanagement und der Gästebetreuung. Wir plaudern und helfen gerne, wo wir können, auch wenn wir manchmal beschäftigt sind oder uns eine Auszeit nehmen — wir sind daher nicht immer sofort verfügbar, aber nie weit weg und immer nur eine Nachricht entfernt.\",\n      p3: \"Wir möchten, dass deine Zeit hier komfortabel, unkompliziert und angenehm ist, und hoffen, dass du mit guten Erinnerungen gehst.\",\n      p4: \"Wir haben diesen Leitfaden für den Komfort und die Sicherheit all unserer Gäste zusammengestellt — bitte nimm dir die Zeit, ihn zu lesen und dich mit deinen Pflichten während deines Aufenthalts vertraut zu machen.\",\n      p5: \"Danke für deine Rücksichtnahme und deinen Respekt — genieße deinen Aufenthalt, wir sehen uns.\",\n      signoff: \"Herzliche Grüße,\", signoffNames: \"Simon & Sita\",\n      getInTouch: \"Kontakt\",\n      contactLines: \"Simons Handy: 0474 735 389\\nSitas Handy: 0404 534 688\\nE-Mail: placid.rooms4rent@gmail.com\",\n      whatsapp: \"WhatsApp-Gruppe\",\n      communityChat: \"Nach dem Scannen des QR-Codes wirst du zu unserem Community-Chat hinzugefügt, in dem wir Updates und Ankündigungen für alle Gäste zu allgemeinen Bereichen teilen, sowie zu einem privaten Chat nur für dich und dein Zimmer für alles Persönlichere zu deinem Aufenthalt — Fragen, Anliegen oder alles, was du lieber privat halten möchtest.\",\n      dangerTitle: \"Unmittelbare Gefahr\",\n      dangerBody: \"Zuerst 000 anrufen — Feuer, schwere Verletzung, Gewalt, elektrische Gefahr oder medizinischer Notfall. Kontaktiere uns danach, sobald es sicher ist.\" },\n    toc: { kicker: \"INHALT\", title: \"Inhalt\", groupSettled: \"Ankommen\", hosts: \"Deine Gastgeber & Hilfe erhalten\", room: \"Dein Zimmer\", zones: \"Zwei Bereiche, ein Zuhause\", around: \"Sich sicher bewegen\", parking: \"Parken & Sperrbereiche\", groupShared: \"Gemeinschaftseinrichtungen\", bathrooms: \"Bäder & Toiletten\", kitchen: \"Küche\", laundry: \"Waschküche & Reinigungsmittel\", groupLiving: \"Zusammenleben\", outdoor: \"Außenbereich & Ruhezeiten\", alcohol: \"Alkohol, Rauchen & Drogen\", animals: \"Tiere & Hofleben\", groupWifi: \"WLAN & Ausstattung\", wifi: \"WLAN, Drucken & Unterhaltung\", aircon: \"Klimaanlage und Heizung\", groupSystems: \"Systeme des Grundstücks\", waste: \"Abfall & Sickergrube\", utilities: \"Strom & Versorgung\", maintenance: \"Instandhaltung\", mail: \"Post & Lieferungen\", groupLeaving: \"Gut abreisen\", leaving: \"Besitz, Mitbewohner & Abreise\" },\n    room: { kicker: \"ANKOMMEN\", title: \"Dein Zimmer\",\n      intro: \"Wir hoffen, du findest dein Zimmer komfortabel und sauber. Bitte hilf mit, Schäden und Unannehmlichkeiten für Gäste zu vermeiden, indem du diese Richtlinien befolgst.\",\n      b1: \"Lebensmittel in deinem Zimmer sollten verschlossen und richtig gelagert werden.\", b2: \"Wirf Müll regelmäßig in die richtigen Tonnen.\", b3: \"Halte nasse Handtücher und Kleidung von Betten, Böden und Möbeln fern.\", b4: \"Öffne ein Fenster, wann immer möglich, damit das Zimmer frisch und luftig bleibt.\", b5: \"Reinige dein Zimmer regelmäßig, einschließlich der bereitgestellten Bettwäsche.\", b6: \"Melde Schäden, Lecks, Schädlinge, Schimmel oder Defekte, sobald du sie bemerkst.\", b7: \"Bitte halte dich an die Hausregeln zur Lautstärke, auch in den Zimmern.\",\n      cookingTitle: \"Kochen im Zimmer — Brandgefahr\", cookingBody: \"Einfache Nutzung von Mikrowelle oder Wasserkocher ist in Ordnung, sofern eines gestellt oder genehmigt wurde. Das war's — keine tragbaren Kochplatten, elektrische Pfannen, Reiskocher, Heißluftfritteusen, Toaster, Campingkocher, Gasbrenner oder Kerzen in Zimmern, außer Gerät und Ort wurden ausdrücklich genehmigt. Diese Dinge stellen im Schlafzimmer eine echte Brandgefahr dar — bitte nutze sie nicht ohne unsere Zustimmung.\",\n      dontTitle: \"Bitte nicht\", dontBody: \"Möbel zwischen Zimmern verschieben oder etwas entfernen, das bereits bei deiner Ankunft im Zimmer war — einschließlich bereitgestellter Gegenstände — außer wir haben es ausdrücklich erlaubt.\",\n      arrivalTitle: \"Bei der Ankunft\", arrivalBody: \"Falls etwas fehlt, beschädigt ist oder nicht richtig funktioniert, sag uns bitte so schnell wie möglich Bescheid.\" },\n    zones: { kicker: \"ANKOMMEN\", title: \"Zwei Bereiche, ein Zuhause\",\n      intro: \"Placid Homestead hat zwei separate Gästebereiche, jeder mit eigenen Gemeinschaftsräumen und seinem eigenen besonderen Charme. Wir bitten unsere Gäste, Küche, Bad und Waschküche des eigenen Bereichs zu nutzen. Das hält die Dinge einfach, fair und angenehm für alle. Nicht sicher, in welchem Bereich du bist? Frag uns einfach.\",\n      mainHouse: \"Das Haupthaus\", paddockRooms: \"Die Paddock Rooms\",\n      switchTitle: \"Möchtest du den Bereich wechseln?\", switchBody: \"Möchtest du während deines Aufenthalts in den anderen Bereich ziehen? Sag uns einfach Bescheid — wir setzen dich gerne auf eine Warteliste, sodass du bei einem frei werdenden Platz die erste Option hast, bevor wir ihn neuen Gästen anbieten.\" },\n    around: { kicker: \"ANKOMMEN\", title: \"Sich sicher bewegen\",\n      intro: \"Mehrere Zugänge, Wege und Tore verbinden Zimmer, Parkplätze und Gemeinschaftsräume auf dem Grundstück. Bitte sei vorsichtig beim Bewegen, damit jeder sicher zu seinem Bereich gelangen kann.\",\n      b1: \"Nutze die zugelassenen Gästezugänge und halte Wege frei.\", b2: \"Sei besonders vorsichtig auf unebenem Boden, Kies und bei schlechter Beleuchtung, besonders nach Einbruch der Dunkelheit.\", b3: \"Trage draußen festes Schuhwerk, besonders nachts, nach Regen und in der Nähe von Tierbereichen.\", b4: \"Achte auf Tiere, Fahrzeuge und andere Gäste, wenn du dich auf dem Grundstück bewegst.\", b5: \"Melde alles, was wie eine Sicherheits- oder Stolpergefahr aussieht.\",\n      gatesTitle: \"Tore\", gatesBody: \"Grundstückstore sind stets geschlossen zu halten, damit Tiere nicht in Gästebereiche entkommen — oder schlimmer, auf die Straße, wo sie verletzt werden oder einen Unfall verursachen könnten. Findest du ein offenes Tor, schließe es bitte, sofern nicht anders angegeben.\",\n      accessTitle: \"Zugangssicherheit\", accessBody: \"Wenn dir ein Zugangsschlüssel zugewiesen wurde, teile ihn bitte nicht mit oder gib ihn nicht an jemanden weiter, der kein zugelassener Gast ist.\" },\n    parking: { kicker: \"SYSTEME DES GRUNDSTÜCKS\", title: \"Parken & Sperrbereiche\",\n      intro: \"Parkplätze sind ein gemeinsamer Bereich, bitte parke rücksichtsvoll und halte Zufahrtsbereiche stets frei — Einfahrten, Tore sowie landwirtschaftliche oder Notfallzufahrten müssen für alle nutzbar bleiben. Manche Teile des Grundstücks sind aus Sicherheitsgründen gesperrt, oder um die Privatsphäre des Gastgebers und anderer Gäste zu schützen — bitte bleibe diesen Bereichen fern, sofern nicht anders angegeben.\",\n      parkingHeading: \"Parken\",\n      b1: \"Parke nur in zugelassenen Bereichen — Fahrzeuge werden auf eigenes Risiko geparkt.\", b2: \"Blockiere niemals Tore, Einfahrten oder Notfall-/landwirtschaftliche Zufahrten.\", b3: \"Achte beim Fahren oder Parken auf Tiere, unebenen Boden und schlechte Beleuchtung.\", b4: \"Sag uns Bescheid, falls dein Fahrzeug Öl oder Flüssigkeiten verliert, und bewege es, wenn du darum gebeten wirst.\",\n      restrictedTitle: \"Sperrbereiche\", restrictedBody: \"Schuppen, Werkstätten, Weiden, Dämme, Wasserinfrastruktur und private Gastgeberbereiche sind tabu, sofern nicht ausdrücklich anders angegeben. Nicht verschlossen bedeutet nicht sicher — frag nach, bevor du hineingehst.\" },\n    bathrooms: { kicker: \"GEMEINSCHAFTSEINRICHTUNGEN\", title: \"Bäder & Toiletten\",\n      intro: \"Unsere Bäder sind Gemeinschaftsräume, bitte nutze sie rücksichtsvoll gegenüber den anderen Gästen, die sie mit dir teilen. Ein paar einfache Gewohnheiten tragen viel dazu bei, alles sauber und angenehm für alle zu halten.\",\n      b1: \"Spüle den Duschbereich ab und entferne Haare aus den Abflüssen nach Gebrauch.\", b2: \"Wische überschüssiges Wasser von Böden, Waschbecken und Ablagen ab.\", b3: \"Hänge stark nasse Badematten draußen an der Wäscheleine zum Trocknen auf.\", b4: \"Nimm deine Sachen mit — keine Handtücher, Kleidung oder Toilettenartikel herumliegen lassen.\", b5: \"Entferne deine Toilettenartikel nach der Dusche und bring sie zurück in deinen Korb oder ins Zimmer.\", b6: \"Halte Duschen kurz, damit jeder an die Reihe kommt und das Warmwasser nicht ausgeht.\",\n      septicTitle: \"Sickergrube & Grauwasser — braucht besondere Sorgfalt\", septicBody: \"Dies ist eine Sickergrube, keine städtische Kanalisation. Spüle nur Toilettenpapier und menschliche Ausscheidungen hinunter — alles andere gehört in den Mülleimer im Bad: Feuchttücher (auch solche mit der Aufschrift „spülbar“), Binden und Tampons, Wattestäbchen, Papierhandtücher, Kondome, Essensreste und Haare. Der falsche Gegenstand kann sie schnell verstopfen.\",\n      reportTitle: \"Früh melden\", reportBody: \"Melde uns Lecks, Verstopfungen, Warmwasserprobleme, langsame Abflüsse, Gerüche oder Gluckern sofort — kleine Probleme sind viel einfacher und günstiger, früh zu beheben.\" },\n    kitchen: { kicker: \"GEMEINSCHAFTSEINRICHTUNGEN\", title: \"Küche\",\n      intro: \"Unsere Küche ist ein Gemeinschaftsraum, bitte nutze sie rücksichtsvoll gegenüber den anderen Gästen, die sie mit dir teilen. Räume nach dir auf, achte darauf, wie lange du kochst, und halte den Bereich frei von allem, was dort nicht hingehört — damit sie sauber, ordentlich bleibt und alle gleichen Zugang haben.\",\n      b1: \"Wasche, trockne und räume dein Geschirr direkt nach Gebrauch weg.\", b2: \"Wische Ablagen, Tische und den Herd ab und reinige Geräte nach Gebrauch.\", b3: \"Entsorge alle Essensreste, Verpackungen und Abfälle in den richtigen Tonnen.\", b4: \"Wenn ein Mülleimer voll wird, überlade ihn nicht — bring ihn zur Hauptsammelstelle.\", b5: \"Lass kein Essen über Nacht stehen — es zieht Schädlinge an und stört andere.\", b6: \"Sei rücksichtsvoll gegenüber anderen Gästen, die kochen möchten — hinterlasse kein Chaos für die nächste Person.\", b7: \"Halte gemeinsame Küchengegenstände (Utensilien, Töpfe, Behälter) in der Küche — nimm sie nicht mit ins Zimmer.\",\n      storageTitle: \"Lebensmittellagerung\", storageBody: \"Die Kühlschränke und Vorratsschränke in der Küche sind ausschließlich dem Gastgeber vorbehalten. Alle Lebensmittel der Gäste sollten in deinem eigenen Kühlschrank und Schränken im Zimmer aufbewahrt werden, sofern dir keine Küchenschublade zur Lagerung zugewiesen wurde. In der Küche liegen gelassene Lebensmittel können entfernt oder entsorgt werden.\",\n      respectTitle: \"Respektiere das Essen anderer Gäste\", respectBody: \"Bitte verwende oder nimm keine Lebensmittel, Getränke, Utensilien oder Behälter eines anderen Gastes, ohne zu fragen.\",\n      safetyTitle: \"Sicherheit beim Kochen\", safetyBody: \"Lasse Kochendes niemals unbeaufsichtigt. Stelle sicher, dass Herd, Ofen und Geräte ausgeschaltet sind, wenn du fertig bist, und halte den Bereich um sie herum frei. Wenn etwas überläuft, anbrennt oder falsch riecht, halte an und sag uns Bescheid — nutze kein Gerät weiter, das unsicher erscheint.\" },\n    laundry: { kicker: \"GEMEINSCHAFTSEINRICHTUNGEN\", title: \"Waschküche & Reinigungsmittel\",\n      intro: \"Die Waschküche reibungslos am Laufen zu halten ist eine gemeinsame Anstrengung — ein paar kleine Gewohnheiten erleichtern es allen, die den Raum nutzen. Hole deine Wäsche zügig ab, räume nach dir auf und hinterlasse alles bereit für den nächsten Gast.\",\n      laundryHeading: \"Waschküche\",\n      b1: \"Nimm gewaschene und getrocknete Wäsche zügig heraus, sobald sie fertig ist.\", b2: \"Vermeide es, die Waschmaschine zu überladen, und wische verschüttete Flüssigkeiten auf.\", b3: \"Nutze nur kurze Waschgänge, damit andere Gäste ebenfalls Zugang haben.\", b4: \"Schüttle Schlamm, Gras oder Schmutz zuerst draußen ab, bevor du Arbeits- oder Hofkleidung wäschst.\", b5: \"Sprich mit uns, bevor du etwas stark verschlammtes, öliges oder mit Chemikalien getränktes wäschst.\", b6: \"Bringe Wäscheklammern und Körbe direkt nach Gebrauch an ihren Aufbewahrungsort zurück.\", b7: \"Vermeide es, spät nachts zu waschen, wenn es andere stören könnte.\",\n      cleaningHeading: \"Reinigung\", cleaningIntro: \"Wir reinigen Gemeinschaftsbereiche gründlich mindestens zweimal pro Woche. Zwischen den Reinigungen räume bitte nach dir auf und bringe alles Benutzte an seinen Aufbewahrungsort zurück.\",\n      toolsTitle: \"Reinigungswerkzeuge\", toolsBody: \"Staubsauger, Wischmopp und Besen findest du in der Waschküche. Bitte stelle sicher, dass du den Staubsauger zum Laden anschließt und den Mopp-Kopf beim Zurückbringen durch einen sauberen ersetzt.\",\n      suppliesTitle: \"Reinigungsmittel\", suppliesBody: \"Waschmittel findest du in der Nähe der Waschmaschine und Reinigungsmittel unter dem Waschbecken im Bad. Ersatzreinigungsmittel und -tücher werden im Wäscheschrank aufbewahrt, ebenso wie Toilettenpapier.\",\n      dirtyTitle: \"Schmutzige Tücher & Mopp-Köpfe\", dirtyBody: \"Bitte lege schmutzige Tücher und Mopp-Köpfe in den Wäschekorb neben der Waschmaschine, damit sie für die zukünftige Nutzung gereinigt werden können.\",\n      lowTitle: \"Etwas wird knapp oder ist kaputt?\", lowBody: \"Bitte sag uns Bescheid, wenn du bemerkst, dass Vorräte knapp werden oder etwas kaputt ist oder nicht richtig funktioniert. Dies umfasst Reinigungsmittel, Toilettenpapier, saubere Tücher, Mopp-Köpfe sowie einen Staubsauger, der Geräusche macht oder nicht richtig reinigt.\" },\n    outdoor: { kicker: \"ZUSAMMENLEBEN\", title: \"Außenbereich & Ruhezeiten\",\n      intro: \"Unser Außenbereich — mit Billardtisch, Laufband, Rudergerät, Grill und Tischen im Freien — ist ein toller Ort für Gäste, um sich zu entspannen und gemeinsam zu geselligen. Genieße ihn bitte unter Berücksichtigung der Ruhe und des Komforts anderer Gäste.\",\n      b1: \"Genieße den Billardtisch, die Fitnessgeräte und den Grillbereich — halte einfach die Lautstärke auf einem respektvollen Niveau.\", b2: \"Räume nach dem Essen, Trinken oder Grillen auf und entsorge deinen Müll.\", b3: \"Bringe Ausstattung und Möbel nach Gebrauch an ihren Platz zurück und halte Gehwege frei.\", b4: \"Sei rücksichtsvoll gegenüber Gästen, die nicht zu deiner Runde gehören — besonders solchen mit frühem Start oder anderen Zeitplänen.\", b5: \"Ein kleines Anliegen? Sprich es freundlich an, wenn du dich wohl fühlst, oder sag uns einfach Bescheid — wir halten die Dinge lieber locker als formell.\",\n      quietHeading: \"Ruhezeiten\", quietText: \"Ruhezeiten sind von 22 bis 7 Uhr. In dieser Zeit halte bitte Musik, Fernsehen und Telefonate leise, vermeide laute Gespräche im Freien und minimiere Küchen-, Waschküchen- und Trittgeräusche in der Nähe von Gästezimmern.\",\n      partyTitle: \"Kein Partygrundstück\", partyBody: \"Dies ist ein Zuhause für Menschen, die arbeiten, sich ausruhen und reisen — kein Veranstaltungsort für Partys. Laute Musik, störende Zusammenkünfte, aggressives Verhalten oder starke Trunkenheit gefährden die Ruhe und den Komfort anderer Gäste und sind hier daher nicht erlaubt.\" },\n    alcoholSmoking: { kicker: \"ZUSAMMENLEBEN\", title: \"Alkohol, Rauchen & Drogen\",\n      intro: \"Alkoholkonsum und Rauchen sind mit Einschränkungen erlaubt. Wir bitten dich, diese wesentlichen Regeln zu befolgen, um den Raum für alle angenehm und sicher zu halten.\",\n      b1: \"Trinke verantwortungsvoll — übermäßiger Alkoholkonsum, der zu aggressivem oder unkontrolliertem Verhalten führt, ist nicht akzeptabel.\", b2: \"Rauche und dampfe nur draußen, in dafür vorgesehenen Bereichen — niemals in der Nähe von Türen oder Fenstern.\", b3: \"Frag nahegelegene Gäste vor dem Rauchen, und geh weiter, wenn sich jemand mit dem Rauch nicht wohlfühlt.\", b4: \"Entsorge Zigarettenstummel ordnungsgemäß — lass sie nie auf dem Boden oder herumliegen.\",\n      dangerTitle: \"Keine illegalen Drogen oder aggressives Verhalten\", dangerBody: \"Placid Homestead ist ein friedliches, drogenfreies Grundstück. Illegaler Drogenkonsum oder -besitz sowie aggressives oder bedrohliches Verhalten sind nicht erlaubt, um diesen Ort für alle sicher zu halten. Ein Verstoß gegen diese Regel kann zu einer Kündigung führen oder in schweren Fällen zur Einbeziehung der Polizei.\" },\n    animals: { kicker: \"ZUSAMMENLEBEN\", title: \"Tiere & Hofleben\",\n      intro: \"Ein Teil der Erfahrung hier ist es, das Grundstück mit den Tieren zu teilen, die darauf leben. Vieh und Haustiere bewegen sich frei, sodass du sie regelmäßig um das Haus und das Grundstück herum sehen wirst — das gehört zum Charme dazu. Denk einfach daran, dass es trotzdem Tiere sind, also sind etwas Vorsicht und Rücksicht sehr hilfreich.\",\n      b1: \"Füttere Tiere nicht, es sei denn, wir haben gesagt, dass es in Ordnung ist.\", b2: \"Jage, necke, hebe sie nicht hoch oder störe sie sonst.\", b3: \"Halte Tore jederzeit geschlossen und achte beim Fahren oder Gehen auf Tiere.\", b4: \"Melde jedes Tier, das frei herumläuft, verletzt, krank ist oder sich aggressiv verhält.\",\n      petsTitle: \"Keine Haustiere oder Kinder während des Aufenthalts\", petsBody: \"Um das Grundstück als geteilte Arbeiterunterkunft geeignet zu halten, dürfen Gäste keine eigenen Kinder, Babys oder Haustiere/Tiere bei sich haben und dürfen auch keine Besucher mit Kindern, Babys oder Haustieren/Tieren mitbringen lassen — außer nach vorheriger Genehmigung.\" },\n    wifi: { kicker: \"WLAN & AUSSTATTUNG\", title: \"WLAN, Drucken & Unterhaltung\",\n      wifiHeading: \"WLAN-Details\", wifiText: \"Ländliches Internet kann etwas langsamer oder weniger zuverlässig sein, als du es gewohnt bist — Wetter, Ausfälle und Entfernung zu den Funktürmen können eine Rolle spielen, danke für deine Geduld. Bitte vermeide umfangreiche Downloads, die die Verbindung für andere Gäste verlangsamen, und sag uns Bescheid, falls sie ausfällt — manche Ausfälle liegen außerhalb unserer Kontrolle, wir schauen aber immer danach.\",\n      wifiCallout: \"Die WLAN-Zugangsdaten findest du am Schwarzen Brett sowie in deinem Zimmer.\",\n      printingHeading: \"Drucken\", printingText: \"Ein WLAN-Drucker (Brother HL-L2400DW, Haupthaus) steht für angemessenen persönlichen Gebrauch kostenlos zur Verfügung — Visa-Unterlagen, Reisedokumente, Tickets und Formulare.\",\n      printB1: \"Überprüfe Dokumente vor dem Drucken.\", printB2: \"Hole Ausdrucke zügig ab.\", printB3: \"Intensives oder wiederholtes Drucken kann eine kleine Gebühr verursachen.\", printB4: \"Brauchst du Hilfe beim Verbinden? Sag uns Bescheid.\",\n      tvHeading: \"Smart TV\", tvText: \"Wir haben dir einen Smart TV für deine private Unterhaltung zur Verfügung gestellt. Bitte befolge diese Richtlinien und sag uns Bescheid, falls Probleme auftreten.\",\n      tvB1: \"Nutze deine eigenen Streaming-Konten und melde dich vor dem Auschecken ab.\", tvB2: \"Halte die Lautstärke angemessen.\", tvB3: \"Bitte stelle die Spracheinstellungen vor dem Auschecken wieder auf Englisch um.\", tvB4: \"Brauchst du Hilfe bei der Einrichtung? Schreib uns.\" },\n    aircon: { kicker: \"WLAN & AUSSTATTUNG\", title: \"Klimaanlage und Heizung\",\n      intro: \"Wo möglich, wurden Klimaanlagen und Heizgeräte für deinen Komfort bereitgestellt. Bitte befolge diese Richtlinien für sicheren Gebrauch und geringeren Stromverbrauch.\",\n      b1: \"Halte Türen und Fenster geschlossen, während Klimaanlage oder Heizung läuft.\", b2: \"Schalte sie aus, wenn du das Zimmer eine Weile verlässt.\", b3: \"Vermeide extreme Einstellungen und halte Filter und Lüftungsschlitze frei.\", b4: \"Halte die Heizung von Bettwäsche, Vorhängen und Möbeln fern.\", b5: \"Melde Lecks, seltsame Gerüche, ungewöhnliche Geräusche oder schlechte Kühlung/Heizung.\", b6: \"Verwende nichts Beschädigtes, Ausgefranstes oder unsicher Wirkendes.\",\n      unsureTitle: \"Nicht sicher, wie etwas funktioniert?\", unsureBody: \"Frag einfach nach — immer besser, als versehentliche Schäden zu riskieren.\" },\n        wasteSeptic: { kicker: \"SYSTEME DES GRUNDSTÜCKS\", title: \"Abfall & Sickergrube\",\n      intro: \"Ländliche Grundstücke sind auf Sicker- und Abfallsysteme angewiesen, die etwas anders funktionieren als du es aus der Stadt gewohnt bist, und sie können empfindlich reagieren, wenn die falschen Dinge am falschen Ort landen. Abfall, Recycling und Abflüsse organisiert zu halten und richtig zu nutzen, schützt das gesamte Grundstück und sorgt dafür, dass alles für alle Bewohner reibungslos läuft.\",\n      b1: \"Nutze die richtigen Tonnen — kein loser Müll in Zimmern oder Gemeinschaftsräumen.\", b2: \"Verschließe Essensreste, damit sie keine Schädlinge anlocken.\", b3: \"Frag nach, bevor du Batterien, Chemikalien, Öl oder anderes Gefährliches entsorgst.\",\n      neverTitle: \"Niemals in einen Abfluss gießen\", neverBody: \"Kochöl oder Fett, Farbe oder Chemikalien, Essensreste, Kaffeesatz, Medikamente, Schlamm oder Feuchttücher und Hygieneartikel. Die Sickergrube kann sie nicht verarbeiten — kratze Teller in den Mülleimer und spüle schlammige Stiefel draußen ab.\",\n      reportTitle: \"Früh melden\", reportBody: \"Langsame Abflüsse, schlechte Gerüche, Gluckern oder aufgestautes Wasser? Sag uns sofort Bescheid — kleine Probleme werden hier schnell groß.\" },\n    utilities: { kicker: \"SYSTEME DES GRUNDSTÜCKS\", title: \"Strom & Versorgung\",\n      intro: \"Gelegentlich kann der Strom unterbrochen werden. Wir bitten dich, darauf zu achten, nicht mehrere Geräte gleichzeitig zu betreiben, da dies das elektrische System überlasten und die Stromversorgung für alle unterbrechen kann.\",\n      b1: \"Schalte Lichter, Ventilatoren, Heizungen und Klimaanlagen aus, wenn sie nicht benötigt werden.\", b2: \"Bitte melde Störungen bei Wasser-, Strom- und Internetversorgung frühzeitig.\",\n      dontTouchTitle: \"Bitte nicht anfassen\", dontTouchBody: \"Zähler, Pumpen, Tanks, Solaranlagen, Batterien oder Schalter — überlasse diese uns.\" },\n    maintenance: { kicker: \"SYSTEME DES GRUNDSTÜCKS\", title: \"Instandhaltung\",\n      intro: \"Von Zeit zu Zeit können Instandhaltungsarbeiten auf dem Grundstück erforderlich sein, was etwas Lärm und manchmal kurze Unterbrechungen der Strom- oder Wasserversorgung verursachen kann — wir schätzen deine Geduld, wenn dies geschieht.\",\n      b1: \"Bitte melde Störungen bei Wasser-, Strom- oder Internetversorgung frühzeitig, damit wir sie beheben können, bevor sie Unterbrechungen verursachen.\",\n      accessTitle: \"Zimmerzugang\", accessBody: \"Wir müssen gelegentlich Zimmer oder Gemeinschaftsbereiche für Reparaturen oder Sicherheitsprüfungen betreten — wir werden dies nach Möglichkeit ankündigen.\" },\n    mail: { kicker: \"SYSTEME DES GRUNDSTÜCKS\", title: \"Post & Lieferungen\",\n      intro: \"Lieferungen werden über einen ausgewiesenen Postbereich organisiert — etwas Vorankündigung hilft uns, alles reibungslos am Laufen zu halten.\",\n      b1: \"Post und Lieferungen gehen an den zugewiesenen Postbereich in der Nähe der Küche im Haupthaus.\", b2: \"Gäste, die in den Paddock Rooms wohnen, werden benachrichtigt, wenn Post für sie eintrifft.\", b3: \"Sag uns im Voraus Bescheid, wenn du etwas Dringendes, Wertvolles oder unter einem anderen Namen erwartest.\", b4: \"Hole deine Post zügig ab.\",\n      noteTitle: \"Bitte beachte\", noteBody: \"Wir bemühen uns sicherzustellen, dass alle Post abgeholt und am richtigen Ort platziert wird und Gäste benachrichtigt werden — Gäste sind jedoch für ihre eigene Post verantwortlich.\" },\n    leaving: { kicker: \"GUT ABREISEN\", title: \"Besitz, Mitbewohner & Abreise\",\n      intro: \"Einfache Gewohnheiten halten die gemeinsame Unterkunft für alle angenehm — einschließlich für den nächsten Gast.\",\n      p1: \"Halte deine Sachen sicher und ordentlich und lass keine Wertsachen in Gemeinschaftsbereichen oder unverschlossenen Fahrzeugen liegen — wir können nicht für persönliche Gegenstände haften, die verloren gehen, gestohlen oder beschädigt werden.\",\n      goodHabitsHeading: \"Gute Mitbewohner-Gewohnheiten\",\n      gb1: \"Räume nach dir auf und respektiere die Schlaf- und Arbeitszeiten anderer.\", gb2: \"Frag, bevor du etwas ausleihst.\", gb3: \"Kommuniziere freundlich, melde Probleme frühzeitig und achte auf Lärm.\", gb4: \"Behandle das Zuhause — und die Tiere — so, wie du es dir für deins wünschen würdest.\",\n      beforeHeading: \"Vor deiner Abreise\",\n      c1: \"Entferne alle persönlichen Gegenstände und Lebensmittel aus deinem Kühlschrank, Schränken oder der zugewiesenen Schublade im Zimmer.\", c2: \"Entsorge deinen Müll und hinterlasse dein Zimmer ordentlich.\", c3: \"Gib Schlüssel, Fernbedienungen und andere Zugangsgegenstände zurück.\", c4: \"Nimm die Bettwäsche vom Bett und lass sie im Zimmer.\", c5: \"Melde dich von Streaming-Konten ab und hole Ausdrucke oder Post ab.\", c6: \"Entferne Wäsche aus Maschinen oder von der Wäscheleine.\", c7: \"Melde Schäden oder fehlende Gegenstände.\",\n      leftTitle: \"Etwas vergessen?\", leftBody: \"Kontaktiere uns so bald wie möglich nach der Abreise — wir tun unser Bestes, können aber nicht garantieren, dass Gegenstände aufbewahrt oder zurückgeschickt werden können.\" },\n    thanks: { kicker: \"DANKE FÜR DEINEN AUFENTHALT BEI UNS\", title: \"Placid Homestead\", bookTitle: \"Unser Gästebuch\", bookBody: \"Wir hoffen, dein Aufenthalt war unvergesslich. Wir würden uns freuen, wenn du eine freundliche Nachricht in unserem Gästebuch hinterlässt, damit wir später darauf zurückblicken und sie mit anderen Gästen teilen können.\" }\n  },\n  it: {\n    switcher: \"Lingua\",\n    cover: { kicker: \"GUIDA PER GLI OSPITI\", title: \"Placid Homestead\",\n      subtitle: \"Tutto ciò che ti serve per un soggiorno confortevole — come funziona la casa e come andiamo tutti d'accordo.\",\n      intro: \"Ciao, siamo felici che tu sia qui. La maggior parte dei nostri ospiti sono zaino in spalla, viaggiatori e lavoratori stagionali alloggiati nelle vicinanze per lavori agricoli o regionali. Questa guida copre le cose di tutti i giorni: la tua stanza, gli spazi comuni, gli animali e come mantenere la casa confortevole per tutti.\" },\n    glance: { kicker: \"IN BREVE\", title: \"L'essenziale\",\n      subtitle: \"Tieni a portata di mano questa pagina — è la versione breve di tutto il resto della guida.\",\n      emergencyTitle: \"Emergenza: 000\", emergencyBody: \"In caso di pericolo immediato, incendio, infortunio grave o emergenza medica, chiama prima il 000. Contatta il tuo host quando è sicuro.\",\n      quietTitle: \"Ore di silenzio: 22–7\", quietBody: \"Tieni bassi musica, chiamate, rumori di cucina e lavanderia, e i passi vicino alle stanze.\",\n      areaTitle: \"La tua area\", areaBody: \"Casa Principale o Paddock Rooms — usa cucina, bagno e lavanderia della tua area.\",\n      wifiTitle: \"Wi-Fi\", wifiBody: \"I dettagli di connessione sono in bacheca e nella tua stanza.\",\n      flushTitle: \"Non scaricare mai\", flushBody: \"Salviette, assorbenti, cotton fioc o cibo. È un sistema settico — usa il cestino del bagno.\",\n      alcoholTitle: \"Alcol e fumo\", alcoholBody: \"Consentiti con moderazione. Fuma e usa la sigaretta elettronica solo fuori — niente droghe illecite.\",\n      gatesTitle: \"Cancelli e animali\", gatesBody: \"Tieni sempre chiusi i cancelli. Non nutrire, inseguire o disturbare gli animali.\",\n      considerateTitle: \"Sii rispettoso\", considerateBody: \"Sii rispettoso e premuroso verso l'host e tutti gli ospiti che condividono la proprietà con te.\" },\n    hosts: { kicker: \"SISTEMARSI\", title: \"I tuoi host e come chiedere aiuto\", hostName: \"Simon e Sita\",\n      p1: \"Benvenuto — Simon ed io siamo felicissimi di condividere la nostra casa con te, e speriamo che il tuo soggiorno qui sia piacevole, felice e rilassante.\",\n      p2: \"Troverai generalmente Simon in giro quasi tutti i giorni, dato che vive qui, e anch'io sono presente quasi ogni giorno, aiutando con la gestione della casa e le relazioni con gli ospiti. Ci piace chiacchierare e aiutare quando possiamo, anche se a volte siamo impegnati o ci prendiamo un momento per rilassarci — quindi potremmo non essere sempre disponibili subito, ma non siamo mai lontani, e siamo sempre a un messaggio di distanza.\",\n      p3: \"Vogliamo che il tuo tempo qui sia confortevole, rilassato e piacevole, e speriamo che tu parta con bei ricordi.\",\n      p4: \"Abbiamo preparato questa guida per il comfort e la sicurezza di tutti i nostri ospiti, quindi prenditi il tempo di leggerla e familiarizzare con le tue responsabilità durante il soggiorno con noi.\",\n      p5: \"Grazie per la tua considerazione e il tuo rispetto — goditi il soggiorno, ci vediamo in giro.\",\n      signoff: \"Cordiali saluti,\", signoffNames: \"Simon e Sita\",\n      getInTouch: \"Contattaci\",\n      contactLines: \"Cellulare di Simon: 0474 735 389\\nCellulare di Sita: 0404 534 688\\nEmail: placid.rooms4rent@gmail.com\",\n      whatsapp: \"Gruppo WhatsApp\",\n      communityChat: \"Dopo aver scansionato il codice QR, sarai aggiunto alla nostra chat di comunità, dove condivideremo aggiornamenti e annunci per tutti gli ospiti relativi alle aree comuni, oltre a una chat privata solo per te e la tua stanza per qualsiasi cosa più personale riguardo al tuo soggiorno — domande, richieste o qualsiasi cosa tu preferisca tenere privata e non sollevare nel gruppo.\",\n      dangerTitle: \"Pericolo immediato\",\n      dangerBody: \"Chiama prima il 000 — incendio, infortunio grave, violenza, pericolo elettrico o emergenza medica. Contattaci dopo, quando è sicuro.\" },\n    toc: { kicker: \"INDICE\", title: \"Indice\", groupSettled: \"Sistemarsi\", hosts: \"I tuoi host e come chiedere aiuto\", room: \"La tua stanza\", zones: \"Due spazi, una casa\", around: \"Muoversi in sicurezza\", parking: \"Parcheggio e aree riservate\", groupShared: \"Strutture condivise\", bathrooms: \"Bagni e servizi\", kitchen: \"Cucina\", laundry: \"Lavanderia e prodotti per pulizia\", groupLiving: \"Vivere insieme\", outdoor: \"Spazio esterno e ore di silenzio\", alcohol: \"Alcol, fumo e droghe\", animals: \"Animali e vita di fattoria\", groupWifi: \"Wi-Fi e attrezzature\", wifi: \"Wi-Fi, stampa e intrattenimento\", aircon: \"Aria condizionata e riscaldamento\", groupSystems: \"Impianti della proprietà\", waste: \"Rifiuti e sistema settico\", utilities: \"Elettricità e utenze\", maintenance: \"Manutenzione\", mail: \"Posta e consegne\", groupLeaving: \"Alla partenza\", leaving: \"Effetti personali, coinquilini e check-out\" },\n    room: { kicker: \"SISTEMARSI\", title: \"La tua stanza\",\n      intro: \"Speriamo che tu trovi la tua stanza confortevole e pulita. Aiutaci a ridurre danni e disagi per gli ospiti seguendo queste linee guida.\",\n      b1: \"Il cibo tenuto in stanza deve essere sigillato e conservato correttamente.\", b2: \"Getta regolarmente i rifiuti nei bidoni corretti.\", b3: \"Tieni asciugamani e vestiti bagnati lontano da letti, pavimenti e mobili.\", b4: \"Apri una finestra quando puoi, per mantenere la stanza fresca e arieggiata.\", b5: \"Pulisci regolarmente la tua stanza, compresa la biancheria fornita.\", b6: \"Segnala danni, perdite, parassiti, muffa o guasti non appena li noti.\", b7: \"Segui le regole della casa sul rumore, anche nelle stanze.\",\n      cookingTitle: \"Cucinare in stanza — rischio d'incendio\", cookingBody: \"L'uso base di microonde o bollitore va bene se fornito o approvato. Nient'altro — niente fornelli portatili, padelle elettriche, cuociriso, friggitrici ad aria, tostapane, fornelli da campeggio, bruciatori a gas o candele nelle stanze, a meno che sia l'elettrodomestico che il luogo siano stati approvati. Questi oggetti rappresentano un vero rischio d'incendio in camera da letto — non usarli senza la nostra approvazione.\",\n      dontTitle: \"Per favore non\", dontBody: \"Spostare mobili tra le stanze, né rimuovere nulla che fosse già nella tua stanza al tuo arrivo — inclusi gli oggetti forniti — a meno che non ti abbiamo detto che va bene.\",\n      arrivalTitle: \"All'arrivo\", arrivalBody: \"Se qualcosa manca, è danneggiato o non funziona correttamente, faccelo sapere il prima possibile.\" },\n    zones: { kicker: \"SISTEMARSI\", title: \"Due spazi, una casa\",\n      intro: \"Placid Homestead ha due aree ospiti separate, ciascuna con i propri spazi condivisi e il proprio fascino unico. Chiediamo ai nostri ospiti di usare cucina, bagno e lavanderia della propria area. Questo mantiene le cose semplici, eque e confortevoli per tutti. Non sei sicuro di quale area ti riguardi? Chiedici pure.\",\n      mainHouse: \"La Casa Principale\", paddockRooms: \"Le Paddock Rooms\",\n      switchTitle: \"Vuoi cambiare area?\", switchBody: \"Vuoi trasferirti nell'altra area durante il tuo soggiorno? Faccelo sapere — saremo felici di aggiungerti a una lista d'attesa, così se si libera un posto lì, avrai la prima opzione prima che lo pubblicizziamo a nuovi ospiti.\" },\n    around: { kicker: \"SISTEMARSI\", title: \"Muoversi in sicurezza\",\n      intro: \"Diversi accessi, sentieri e cancelli collegano stanze, parcheggio e spazi comuni in tutta la proprietà. Fai attenzione mentre ti muovi, così tutti possono raggiungere il proprio spazio in sicurezza.\",\n      b1: \"Usa gli accessi approvati per gli ospiti e mantieni i sentieri liberi.\", b2: \"Presta particolare attenzione a terreno irregolare, ghiaia e scarsa illuminazione, specialmente dopo il buio.\", b3: \"Indossa calzature robuste all'esterno, specialmente di notte, dopo la pioggia e vicino alle aree degli animali.\", b4: \"Fai attenzione ad animali, veicoli e altri ospiti mentre ti muovi nella proprietà.\", b5: \"Segnala qualsiasi cosa sembri un rischio di sicurezza o di inciampo.\",\n      gatesTitle: \"Cancelli\", gatesBody: \"I cancelli della proprietà devono restare chiusi, per evitare che gli animali fuggano nelle aree ospiti — o peggio, sulla strada, dove potrebbero farsi male o causare un incidente. Se trovi un cancello aperto, chiudilo, salvo indicazione contraria.\",\n      accessTitle: \"Sicurezza degli accessi\", accessBody: \"Se ti è stata assegnata una chiave d'accesso, non condividerla né darla a chiunque non sia un ospite approvato.\" },\n    parking: { kicker: \"IMPIANTI DELLA PROPRIETÀ\", title: \"Parcheggio e aree riservate\",\n      intro: \"Il parcheggio è uno spazio condiviso e comune, quindi parcheggia con considerazione e mantieni le aree di accesso sempre libere — vialetti, cancelli e accessi agricoli o di emergenza devono restare aperti per l'uso di tutti. Alcune parti della proprietà sono riservate per motivi di sicurezza, o semplicemente per proteggere la privacy dell'host e degli altri ospiti, quindi resta fuori da queste aree salvo indicazione contraria.\",\n      parkingHeading: \"Parcheggio\",\n      b1: \"Parcheggia solo nelle aree approvate — i veicoli sono parcheggiati a proprio rischio.\", b2: \"Non bloccare mai cancelli, vialetti o accessi di emergenza/agricoli.\", b3: \"Fai attenzione ad animali, terreno irregolare e scarsa illuminazione quando guidi o parcheggi.\", b4: \"Dicci se il tuo veicolo perde olio o liquidi, e spostalo se richiesto.\",\n      restrictedTitle: \"Aree riservate\", restrictedBody: \"Capannoni, officine, recinti, dighe, infrastrutture idriche e aree private dell'host sono vietati salvo diversa indicazione esplicita. Non essere chiuso a chiave non significa sicuro — chiedi prima di entrare.\" },\n    bathrooms: { kicker: \"STRUTTURE CONDIVISE\", title: \"Bagni e servizi\",\n      intro: \"I nostri bagni sono spazi condivisi, quindi usali con considerazione verso gli altri ospiti che li condividono con te. Poche abitudini semplici fanno molto per mantenere tutto pulito e piacevole per tutti.\",\n      b1: \"Sciacqua la zona doccia e rimuovi i capelli dagli scarichi dopo l'uso.\", b2: \"Asciuga l'acqua in eccesso da pavimenti, lavandini e piani.\", b3: \"Appendi i tappetini da bagno molto bagnati fuori sullo stendino ad asciugare.\", b4: \"Porta via le tue cose — niente asciugamani, vestiti o articoli da toeletta lasciati in giro.\", b5: \"Rimuovi gli articoli da toeletta dalla doccia una volta finito, e riportali al tuo cestino o stanza.\", b6: \"Fai docce brevi, così tutti hanno il loro turno e l'acqua calda non finisce.\",\n      septicTitle: \"Sistema settico e acque grigie — richiede cura speciale\", septicBody: \"Questo è un sistema settico, non una fognatura urbana. Getta solo carta igienica e rifiuti umani — tutto il resto va nel cestino del bagno: salviette (anche quelle etichettate come \\\"scaricabili\\\"), assorbenti e tamponi, cotton fioc, carta assorbente, preservativi, cibo e capelli. L'oggetto sbagliato può ostruirlo rapidamente.\",\n      reportTitle: \"Segnala subito\", reportBody: \"Segnalaci subito perdite, ostruzioni, problemi con l'acqua calda, scarichi lenti, cattivi odori o gorgoglii — i piccoli problemi sono molto più facili, ed economici, da risolvere presto.\" },\n    kitchen: { kicker: \"STRUTTURE CONDIVISE\", title: \"Cucina\",\n      intro: \"La nostra cucina è uno spazio condiviso, quindi usala con considerazione verso gli altri ospiti che la condividono con te. Pulisci dopo l'uso, fai attenzione a quanto tempo passi a cucinare, e tieni lo spazio libero da tutto ciò che non vi appartiene — così resta pulita, ordinata, e tutti hanno pari accesso.\",\n      b1: \"Lava, asciuga e riponi i tuoi piatti subito dopo l'uso.\", b2: \"Pulisci piani, tavoli e piano cottura, e pulisci gli elettrodomestici dopo l'uso.\", b3: \"Metti tutti gli avanzi di cibo, involucri e imballaggi nei bidoni corretti.\", b4: \"Se un bidone si sta riempiendo, non sovraccaricarlo — portalo al punto di raccolta principale.\", b5: \"Non lasciare cibo fuori durante la notte — attira parassiti e disturba gli altri.\", b6: \"Sii premuroso verso gli altri ospiti in attesa di cucinare — non lasciare il tuo disordine per la persona successiva.\", b7: \"Tieni gli utensili da cucina condivisi (utensili, pentole, contenitori) in cucina — non portarli nella tua stanza.\",\n      storageTitle: \"Conservazione del cibo\", storageBody: \"I frigoriferi e le dispense in cucina sono riservati solo all'host. Tutto il cibo degli ospiti deve essere conservato nel proprio frigorifero e negli armadietti della propria stanza, a meno che non ti sia stato assegnato un cassetto in cucina per la conservazione. Il cibo lasciato in cucina potrebbe essere rimosso o gettato.\",\n      respectTitle: \"Rispetta il cibo degli altri ospiti\", respectBody: \"Per favore non usare o prendere il cibo, le bevande, gli utensili o i contenitori di un altro ospite senza chiedere.\",\n      safetyTitle: \"Sicurezza in cucina\", safetyBody: \"Non lasciare mai la cottura incustodita. Assicurati che il piano cottura, il forno e gli elettrodomestici siano spenti quando hai finito, e mantieni libera l'area circostante. Se qualcosa trabocca, brucia o ha un odore strano, fermati e faccelo sapere — non continuare a usare un elettrodomestico che sembra insicuro.\" },\n    laundry: { kicker: \"STRUTTURE CONDIVISE\", title: \"Lavanderia e prodotti per pulizia\",\n      intro: \"Mantenere la lavanderia in funzione senza problemi è uno sforzo condiviso — poche piccole abitudini rendono tutto più facile per chi usa lo spazio. Ritira il bucato tempestivamente, riordina dopo l'uso, e lascia tutto pronto per il prossimo ospite.\",\n      laundryHeading: \"Lavanderia\",\n      b1: \"Ritira il bucato lavato e asciugato tempestivamente una volta finito.\", b2: \"Evita di sovraccaricare la lavatrice, e pulisci eventuali versamenti di liquidi.\", b3: \"Usa solo cicli brevi, per consentire l'accesso ad altri ospiti.\", b4: \"Scuoti fango, erba o detriti all'aperto prima di lavare abiti da fattoria o da lavoro.\", b5: \"Consultaci prima di lavare qualcosa di molto fangoso, oleoso o imbevuto di sostanze chimiche.\", b6: \"Riporta mollette e cestini al loro posto subito dopo l'uso.\", b7: \"Evita di fare il bucato tardi la sera se potrebbe disturbare gli altri.\",\n      cleaningHeading: \"Pulizia\", cleaningIntro: \"Puliamo a fondo le aree comuni almeno due volte a settimana. Tra una pulizia e l'altra, riordina dopo l'uso e riponi tutto ciò che usi al suo posto.\",\n      toolsTitle: \"Strumenti di pulizia\", toolsBody: \"Troverai aspirapolvere, mocio e scopa riposti nella lavanderia. Assicurati di mettere l'aspirapolvere in carica e sostituire la testina del mocio con una pulita quando lo riponi.\",\n      suppliesTitle: \"Prodotti per pulizia\", suppliesBody: \"Il detersivo per bucato si trova vicino alla lavatrice e i prodotti per pulizia sotto il lavandino del bagno. Prodotti e panni di scorta sono conservati nell'armadio della biancheria, insieme alla carta igienica.\",\n      dirtyTitle: \"Panni sporchi e testine del mocio\", dirtyBody: \"Metti panni sporchi e testine del mocio nel cesto della lavanderia accanto alla lavatrice, così possono essere puliti per un uso futuro.\",\n      lowTitle: \"Qualcosa sta finendo o è rotto?\", lowBody: \"Faccelo sapere se noti che le scorte stanno finendo, o se qualcosa è rotto o non funziona correttamente. Questo include prodotti per pulizia, carta igienica, panni puliti, testine del mocio, e l'aspirapolvere che fa rumore o non pulisce bene.\" },\n    outdoor: { kicker: \"VIVERE INSIEME\", title: \"Spazio esterno e ore di silenzio\",\n      intro: \"Il nostro spazio esterno — con biliardo, tapis roulant, vogatore, barbecue e tavoli per mangiare all'aperto — è un ottimo posto per gli ospiti per rilassarsi e socializzare insieme. Divertiti tenendo conto della pace e del comfort degli altri ospiti.\",\n      b1: \"Goditi il biliardo, le attrezzature da palestra e l'area barbecue — mantieni solo il rumore a un livello rispettoso.\", b2: \"Pulisci dopo aver mangiato, bevuto o usato il barbecue, e getta i rifiuti.\", b3: \"Riporta attrezzature e mobili al loro posto dopo l'uso, e mantieni i passaggi liberi.\", b4: \"Sii attento agli ospiti che non fanno parte del tuo gruppo — specialmente quelli con impegni mattutini o orari diversi.\", b5: \"Hai una piccola preoccupazione? Sollevala con gentilezza se ti senti a tuo agio, o dillo a noi — preferiamo mantenere le cose tranquille piuttosto che formali.\",\n      quietHeading: \"Ore di silenzio\", quietText: \"Le ore di silenzio vanno dalle 22 alle 7. Durante questo periodo, tieni bassi musica, TV e chiamate telefoniche, evita conversazioni rumorose all'aperto, e riduci al minimo il rumore di cucina, lavanderia e passi vicino alle stanze degli ospiti.\",\n      partyTitle: \"Non è una proprietà per feste\", partyBody: \"Questa è una casa per persone che lavorano, riposano e viaggiano — non un luogo per feste. Musica alta, riunioni dirompenti, comportamento aggressivo o forte ubriachezza mettono a rischio il riposo e il comfort degli altri ospiti, quindi non sono consentiti qui.\" },\n    alcoholSmoking: { kicker: \"VIVERE INSIEME\", title: \"Alcol, fumo e droghe\",\n      intro: \"Il consumo di alcol e il
